<script>
    // ============================================================

    const firebaseConfig = {
        apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
        authDomain: "eymotocomidas.firebaseapp.com",
        projectId: "eymotocomidas",

    const auth = firebase.auth();

    // ============================================================
    // 🎵 SISTEMA DE SONIDO MEJORADO
    // ============================================================
    class SonidoEyMoto {
        constructor() {
            this.audioUrl = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
            this.audio = new Audio();
            this.cargado = false;
            this.reproduciendo = false;
            this.intervalos = {}; // Guardar intervalos por pedido
            this.pedidosActivos = {}; // Pedidos que están sonando
            this.cargarSonido();
        }

        cargarSonido() {
            try {
                this.audio = new Audio(this.audioUrl);
                this.audio.preload = 'auto';
                this.audio.addEventListener('canplaythrough', () => {
                    this.cargado = true;
                });
                this.audio.load();
            } catch (e) {
                console.warn('⚠️ Error cargando sonido:', e.message);
                this.cargado = false;
            }
        }

        // Reproducir sonido una vez
        reproducir() {
            try {
                if (!this.cargado) this.cargarSonido();
                const audioClone = new Audio(this.audioUrl);
                audioClone.volume = 0.8;
                audioClone.play().catch(e => {
                    this.fallbackBeep();
                });
            } catch (e) {
                this.fallbackBeep();
            }
        }

        // ✅ INICIAR NOTIFICACIÓN CONTINUA PARA UN PEDIDO
        iniciarNotificacion(pedidoId) {
            // Si ya está sonando este pedido, no hacer nada
            if (this.pedidosActivos[pedidoId]) {
                return;
            }

            console.log(`🔔 Iniciando notificación para pedido: ${pedidoId}`);
            this.pedidosActivos[pedidoId] = true;
            
            // Reproducir inmediatamente
            this.reproducir();
            
            // Configurar intervalo para este pedido
            this.intervalos[pedidoId] = setInterval(() => {
                // Verificar si el pedido sigue activo
                if (this.pedidosActivos[pedidoId]) {
                    this.reproducir();
                } else {
                    // Si ya no está activo, detener
                    this.detenerNotificacion(pedidoId);
                }
            }, 5000);
        }

        // ✅ DETENER NOTIFICACIÓN PARA UN PEDIDO
        detenerNotificacion(pedidoId) {
            if (!pedidoId) {
                // Detener todas las notificaciones
                Object.keys(this.pedidosActivos).forEach(id => {
                    this.detenerNotificacion(id);
                });
                return;
            }

            console.log(`⏹️ Deteniendo notificación para pedido: ${pedidoId}`);
            
            // Eliminar de pedidos activos
            delete this.pedidosActivos[pedidoId];
            
            // Limpiar intervalo
            if (this.intervalos[pedidoId]) {
                clearInterval(this.intervalos[pedidoId]);
                delete this.intervalos[pedidoId];
            }
        }

        // ✅ VERIFICAR SI UN PEDIDO ESTÁ SONANDO
        estaSonando(pedidoId) {
            return this.pedidosActivos[pedidoId] === true;
        }

        // Fallback con Web Audio
        fallbackBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                [800, 1000, 1200].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    const t = i * 0.15;
                    gain.gain.setValueAtTime(0.15, ctx.currentTime + t);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
                    osc.start(ctx.currentTime + t);
                    osc.stop(ctx.currentTime + t + 0.2);
                });
            } catch (e) {}
        }
    }

    // ============================================================
    // INSTANCIA DEL SONIDO
    // ============================================================
    const sonidoEyMoto = new SonidoEyMoto();

    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    let todosLosMensajeros = [];
    let mensajerosFiltrados = [];
    let listenerMensajeros = null;
    let todosLosPedidos = [];
    let tiendasCache = {};
    let recargando = false;
    let pedidosProcesados = {}; // Para evitar duplicados

    // ============================================================
    // FUNCIONES DE AUTENTICACIÓN
    // ============================================================
    function iniciarSesion() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('loginMsg');
        msg.textContent = '';
        if (!email || !pass) { msg.textContent = '❌ Completa todos los campos.'; return; }
        auth.signInWithEmailAndPassword(email, pass)
            .then(async (userCredential) => {
                const user = userCredential.user;
                const doc = await db.collection('usuarios').doc(user.uid).get();
                if (!doc.exists) { await auth.signOut(); msg.textContent = '⛔ Usuario no registrado.'; return; }
                const data = doc.data();
                if (data.admin !== true && data.superAdmin !== true) {
                    await auth.signOut();
                    msg.textContent = '⛔ No tienes permisos de administrador.';
                    return;
                }
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
                document.getElementById('adminUser').textContent = '👑 ' + (data.nombre || email);
                await inicializarPanel();
            })
            .catch(e => { msg.textContent = '❌ Credenciales incorrectas.'; console.error(e); });
    }

    function logout() {
        if (listenerMensajeros) { try { listenerMensajeros(); } catch(e) {} listenerMensajeros = null; }
        if (window._listenersPedidos) {
            window._listenersPedidos.forEach(unsub => { try { unsub(); } catch(e) {} });
            window._listenersPedidos = [];
        }
        // Detener todos los sonidos
        sonidoEyMoto.detenerNotificacion();
        auth.signOut();
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('panel').classList.add('hidden');
        toast('👋 Sesión cerrada', 'info');
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            inicializarPanel();
        } else {
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('panel').classList.add('hidden');
            if (listenerMensajeros) { try { listenerMensajeros(); } catch(e) {} listenerMensajeros = null; }
            if (window._listenersPedidos) {
                window._listenersPedidos.forEach(unsub => { try { unsub(); } catch(e) {} });
                window._listenersPedidos = [];
            }
            sonidoEyMoto.detenerNotificacion();
        }
    });

    // ============================================================
    // INICIALIZAR PANEL
    // ============================================================
    async function inicializarPanel() {
        try {
            await cargarTiendas();
            await cargarMensajeros();
            await cargarPedidosIniciales();
            await escucharPedidosEnTiempoReal();
            toast('✅ Panel de administración cargado', 'success', 2000);
        } catch (error) {
            console.error('❌ Error al inicializar panel:', error);
            toast('❌ Error al cargar el panel', 'error');
        }
    }

    async function cargarTiendas() {
        try {
            const snap = await db.collection('tiendas').get();
            snap.forEach(doc => { tiendasCache[doc.id] = doc.data(); });
            console.log('🏪 Tiendas cargadas:', Object.keys(tiendasCache).length);
        } catch (e) { console.error('Error cargando tiendas:', e); }
    }

    function cargarMensajeros() {
        if (listenerMensajeros) { try { listenerMensajeros(); } catch(e) {} listenerMensajeros = null; }
        listenerMensajeros = db.collection('usuarios')
            .where('mensajero', '==', true)
            .onSnapshot(snap => {
                todosLosMensajeros = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    const tienePedidoActivo = todosLosPedidos.some(p => 
                        p.mensajeroId === doc.id && 
                        (p.estado === 'En camino al restaurante' || p.estado === 'Recogiendo pedido' || p.estado === 'En camino')
                    );
                    todosLosMensajeros.push({ uid: doc.id, ...data, ocupado: tienePedidoActivo });
                });
                filtrarMensajeros();
                actualizarEstadisticas();
            }, err => { 
                console.error('Error en listener de mensajeros:', err);
                toast('⚠️ Error al cargar mensajeros. Recargando...', 'warn');
                setTimeout(() => cargarMensajeros(), 3000);
            });
    }

    // ============================================================
    // CARGAR PEDIDOS INICIALES
    // ============================================================
    async function cargarPedidosIniciales() {
        if (recargando) return;
        recargando = true;
        try {
            const tiendasSnap = await db.collection('tiendas').get();
            todosLosPedidos = [];
            
            for (const tiendaDoc of tiendasSnap.docs) {
                const tiendaId = tiendaDoc.id;
                try {
                    const pedidosSnap = await db.collection('tiendas')
                        .doc(tiendaId)
                        .collection('pedidos')
                        .where('estado', '==', 'Listo para asignar')
                        .get();
                    
                    pedidosSnap.forEach(doc => {
                        const data = doc.data();
                        if (!data.mensajeroId) {
                            todosLosPedidos.push({ 
                                id: doc.id, 
                                tiendaId: tiendaId, 
                                ...data,
                                _cargadoInicial: true 
                            });
                        }
                    });
                } catch (err) {
                    console.warn(`⚠️ Error cargando pedidos de tienda ${tiendaId}:`, err);
                }
            }
            
            console.log(`📦 ${todosLosPedidos.length} pedidos cargados inicialmente`);
            
            renderizarPedidosAsignar();
            actualizarEstadisticas();
            actualizarHeaderBadge();
            
        } catch (error) {
            console.error('❌ Error cargando pedidos iniciales:', error);
            toast('⚠️ Error al cargar pedidos. Reintentando...', 'warn');
            setTimeout(() => {
                recargando = false;
                cargarPedidosIniciales();
            }, 3000);
        } finally {
            recargando = false;
        }
    }

    // ============================================================
    // ESCUCHAR PEDIDOS EN TIEMPO REAL - CON CONTROL DE SONIDO
    // ============================================================
    function escucharPedidosEnTiempoReal() {
        if (window._listenersPedidos) {
            window._listenersPedidos.forEach(unsub => { try { unsub(); } catch(e) {} });
            window._listenersPedidos = [];
        }
        
        db.collection('tiendas').get().then(snap => {
            snap.forEach(doc => {
                const tiendaId = doc.id;
                
                try {
                    const unsubscribe = db.collection('tiendas').doc(tiendaId)
                        .collection('pedidos')
                        .where('estado', 'in', ['Listo para asignar', 'En camino al restaurante', 'Recogiendo pedido', 'En camino', 'Entregado', 'Cancelado'])
                        .onSnapshot(snapPedidos => {
                            snapPedidos.docChanges().forEach(change => {
                                try {
                                    const data = change.doc.data();
                                    const pedidoId = change.doc.id;
                                    const key = `${tiendaId}_${pedidoId}`;
                                    
                                    // ✅ VERIFICAR SI EL PEDIDO ESTÁ DISPONIBLE
                                    const estaDisponible = data.estado === 'Listo para asignar' && !data.mensajeroId;
                                    const tieneMensajero = !!data.mensajeroId;
                                    const esEntregado = data.estado === 'Entregado' || data.estado === 'Cancelado';
                                    
                                    if (change.type === 'added') {
                                        if (estaDisponible) {
                                            const existe = todosLosPedidos.some(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                            if (!existe) {
                                                const tienda = tiendasCache[tiendaId] || {};
                                                const numero = data.numeroPedido || '#' + pedidoId.slice(-6);
                                                
                                                todosLosPedidos.push({ 
                                                    id: pedidoId, 
                                                    tiendaId: tiendaId, 
                                                    ...data,
                                                    _nuevo: true 
                                                });
                                                
                                                // ✅ INICIAR SONIDO SOLO SI ESTÁ DISPONIBLE
                                                if (!sonidoEyMoto.estaSonando(pedidoId)) {
                                                    sonidoEyMoto.iniciarNotificacion(pedidoId);
                                                    toast(`🛵 Nuevo pedido ${numero} disponible`, 'new', 5000);
                                                }
                                            }
                                        } else if (tieneMensajero) {
                                            // Pedido ya asignado desde el inicio
                                            const existe = todosLosPedidos.some(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                            if (!existe) {
                                                todosLosPedidos.push({ 
                                                    id: pedidoId, 
                                                    tiendaId: tiendaId, 
                                                    ...data
                                                });
                                            }
                                        }
                                    } else if (change.type === 'modified') {
                                        const index = todosLosPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                        
                                        // ✅ SI EL PEDIDO YA TIENE MENSAJERO O ESTÁ ENTREGADO, DETENER SONIDO
                                        if (tieneMensajero || esEntregado) {
                                            if (sonidoEyMoto.estaSonando(pedidoId)) {
                                                console.log(`🔇 Pedido ${pedidoId} ya no está disponible, deteniendo sonido`);
                                                sonidoEyMoto.detenerNotificacion(pedidoId);
                                            }
                                        }
                                        
                                        // ✅ SI EL PEDIDO ESTÁ DISPONIBLE Y NO ESTÁ SONANDO, INICIAR SONIDO
                                        if (estaDisponible) {
                                            if (!sonidoEyMoto.estaSonando(pedidoId)) {
                                                const tienda = tiendasCache[tiendaId] || {};
                                                const numero = data.numeroPedido || '#' + pedidoId.slice(-6);
                                                sonidoEyMoto.iniciarNotificacion(pedidoId);
                                                toast(`🛵 Pedido ${numero} disponible`, 'new', 4000);
                                            }
                                        }
                                        
                                        // Actualizar en la lista
                                        if (index !== -1) {
                                            todosLosPedidos[index] = { id: pedidoId, tiendaId: tiendaId, ...data };
                                        } else if (tieneMensajero || estaDisponible) {
                                            todosLosPedidos.push({ id: pedidoId, tiendaId: tiendaId, ...data });
                                        }
                                        
                                        // ✅ SI EL PEDIDO FUE TOMADO POR OTRO, DETENER SONIDO
                                        if (data.mensajeroId && sonidoEyMoto.estaSonando(pedidoId)) {
                                            sonidoEyMoto.detenerNotificacion(pedidoId);
                                        }
                                        
                                    } else if (change.type === 'removed') {
                                        const index = todosLosPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                        if (index !== -1) {
                                            todosLosPedidos.splice(index, 1);
                                            // ✅ DETENER SONIDO SI EL PEDIDO FUE ELIMINADO
                                            if (sonidoEyMoto.estaSonando(pedidoId)) {
                                                sonidoEyMoto.detenerNotificacion(pedidoId);
                                            }
                                        }
                                    }
                                } catch (err) {
                                    console.error('Error procesando cambio de pedido:', err);
                                }
                            });
                            
                            renderizarPedidosAsignar();
                            actualizarEstadisticas();
                            actualizarHeaderBadge();
                            
                        }, err => { 
                            console.error(`Error escuchando pedidos en tienda ${tiendaId}:`, err);
                            setTimeout(() => {
                                if (window._listenersPedidos) {
                                    escucharPedidosEnTiempoReal();
                                }
                            }, 5000);
                        });
                    
                    if (!window._listenersPedidos) window._listenersPedidos = [];
                    window._listenersPedidos.push(unsubscribe);
                } catch (err) {
                    console.error(`Error configurando listener para tienda ${tiendaId}:`, err);
                }
            });
        }).catch(err => {
            console.error('Error obteniendo tiendas para escucha:', err);
            setTimeout(() => {
                if (!window._listenersPedidos) {
                    escucharPedidosEnTiempoReal();
                }
            }, 5000);
        });
    }

    // ============================================================
    // FUNCIONES DE RENDERIZADO
    // ============================================================
    function filtrarMensajeros() {
        const estado = document.getElementById('filtroEstado').value;
        const busqueda = document.getElementById('filtroBusqueda').value.toLowerCase().trim();
        mensajerosFiltrados = todosLosMensajeros.filter(m => {
            if (estado) {
                const activo = m.activo !== false;
                const ocupado = m.ocupado === true;
                if (estado === 'activo' && (!activo || ocupado)) return false;
                if (estado === 'inactivo' && activo) return false;
                if (estado === 'ocupado' && !ocupado) return false;
            }
            if (busqueda) {
                const nombre = (m.nombre || '').toLowerCase();
                const email = (m.email || '').toLowerCase();
                if (!nombre.includes(busqueda) && !email.includes(busqueda)) return false;
            }
            return true;
        });
        renderizarMensajeros();
    }

    function recargarMensajeros() { 
        filtrarMensajeros(); 
        toast('🔄 Mensajeros recargados', 'info', 1500); 
    }

    function recargarPedidos() {
        cargarPedidosIniciales();
        toast('🔄 Pedidos recargados', 'info', 1500);
    }

    function recargarTodo() {
        toast('🔄 Recargando todo...', 'info', 2000);
        cargarMensajeros();
        cargarPedidosIniciales();
        setTimeout(() => {
            toast('✅ Todo recargado correctamente', 'success', 2000);
        }, 1500);
    }

    function renderizarMensajeros() {
        const container = document.getElementById('listaMensajeros');
        if (mensajerosFiltrados.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);"><div style="font-size:48px;margin-bottom:16px;">📭</div><p style="font-size:16px;">No hay mensajeros que coincidan con los filtros</p></div>`;
            return;
        }
        let html = '';
        mensajerosFiltrados.forEach(m => {
            const activo = m.activo !== false;
            const ocupado = m.ocupado === true;
            const iniciales = (m.nombre || m.email || 'M').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
            const estadoClass = ocupado ? 'ocupado' : (activo ? 'activo' : 'inactivo');
            const estadoLabel = ocupado ? '🟠 Ocupado' : (activo ? '🟢 Activo' : '🔴 Inactivo');
            html += `
                <div class="mensajero-card" style="${!activo ? 'opacity:0.6;' : ''}">
                    <div class="avatar">${iniciales}</div>
                    <div class="info">
                        <div class="nombre">${m.nombre || 'Sin nombre'} ${ocupado ? '🛵' : ''}</div>
                        <div class="email">📧 ${m.email || 'Sin email'}</div>
                        <div class="meta">${m.telefono ? '📱 ' + m.telefono : ''} ${m.creadoEn ? ' | 📅 ' + formatearFecha(m.creadoEn) : ''}</div>
                    </div>
                    <span class="estado ${estadoClass}">${estadoLabel}</span>
                    <div class="acciones">
                        <button class="btn-info btn-sm" onclick="verDetalle('${m.uid}')">📋 Ver</button>
                        ${activo && !ocupado ? 
                            `<button class="btn-success btn-sm" onclick="toggleMensajero('${m.uid}', false)">🔴 Desactivar</button>` :
                            activo && ocupado ? 
                            `<button class="btn-warning btn-sm" onclick="toggleMensajero('${m.uid}', false)" style="background:var(--orange);">⏳ Esperando</button>` :
                            `<button class="btn-success btn-sm" onclick="toggleMensajero('${m.uid}', true)">🟢 Activar</button>`
                        }
                        <button class="btn-danger btn-sm" onclick="eliminarMensajero('${m.uid}')">🗑️ Eliminar</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderizarPedidosAsignar() {
        const container = document.getElementById('listaPedidosAsignar');
        const badge = document.getElementById('badgePedidos');
        
        const pedidosPendientes = todosLosPedidos.filter(p => {
            return p.estado === 'Listo para asignar' && !p.mensajeroId;
        });
        
        badge.textContent = pedidosPendientes.length;
        
        if (pedidosPendientes.length === 0) {
            container.innerHTML = `
                <div style="text-align:center;padding:20px;color:var(--text-muted);">
                    <div style="font-size:28px;margin-bottom:8px;">✅</div>
                    No hay pedidos listos para asignar
                </div>
            `;
            return;
        }
        
        const mensajerosActivos = todosLosMensajeros.filter(m => m.activo !== false && !m.ocupado);
        
        let html = '';
        pedidosPendientes.forEach(p => {
            const tienda = tiendasCache[p.tiendaId] || {};
            const nombreTienda = tienda.nombre || 'Tienda';
            const cliente = p.cliente || {};
            const total = p.total || 0;
            const fechaStr = formatearFecha(p.fecha);
            const esNuevo = p._nuevo === true;
            
            let itemsHtml = '';
            if (p.items && p.items.length > 0) {
                p.items.slice(0, 3).forEach(item => {
                    let nombreItem = item.nombre || 'Producto';
                    if (item.pesoGramos) nombreItem += ` (${item.pesoGramos}g)`;
                    const subtotal = item.total || (item.precio * item.cantidad) || 0;
                    itemsHtml += `<div class="item"><span>${nombreItem} x${item.cantidad || 1}</span><span>$${subtotal.toLocaleString('es-CO')}</span></div>`;
                });
                if (p.items.length > 3) {
                    itemsHtml += `<div class="item" style="color:var(--text-muted);font-style:italic;">+ ${p.items.length - 3} más...</div>`;
                }
            }
            
            const hayMensajeros = mensajerosActivos.length > 0;
            const claseNuevo = esNuevo ? 'nuevo' : '';
            
            // ✅ INDICADOR DE SONIDO ACTIVO
            const sonidoActivo = sonidoEyMoto.estaSonando(p.id);
            const indicadorSonido = sonidoActivo ? '🔊 Sonando...' : '';
            
            html += `
                <div class="pedido-asignar ${claseNuevo}" id="pedido-${p.id}">
                    <div class="header">
                        <span class="numero">🛵 ${p.numeroPedido || '#' + p.id.slice(-6)} ${indicadorSonido}</span>
                        <span class="estado-badge">🔔 Listo para asignar</span>
                    </div>
                    <div class="info-grid">
                        <div><span class="label">🏪 Tienda:</span> <span class="value">${nombreTienda}</span></div>
                        <div><span class="label">📅 Fecha:</span> <span class="value">${fechaStr}</span></div>
                        <div><span class="label">👤 Cliente:</span> <span class="value">${cliente.nombre || 'Desconocido'}</span></div>
                        <div><span class="label">📍 Dirección:</span> <span class="value">${cliente.direccion || 'N/A'}</span></div>
                        <div><span class="label">📱 Teléfono:</span> <span class="value">${cliente.telefono || 'N/A'}</span></div>
                        <div><span class="label">💳 Pago:</span> <span class="value">${p.metodoPago || 'Efectivo'}</span></div>
                    </div>
                    ${itemsHtml ? `<div class="items-list">${itemsHtml}</div>` : ''}
                    <div class="total">💰 Total: $${total.toLocaleString('es-CO')}</div>
                    ${hayMensajeros ? 
                        `<button class="btn-success btn-sm" onclick="window.abrirModalAsignacion('${p.id}','${p.tiendaId}')" style="width:100%;margin-top:8px;padding:12px;font-size:14px;">
                            👤 Asignar mensajero
                        </button>` :
                        `<div class="sin-mensajeros" style="padding:10px;background:var(--orange-bg);border-radius:8px;border:1px solid var(--orange);margin-top:8px;">
                            <span style="font-size:14px;">⚠️</span>
                            <span style="font-size:12px;color:var(--orange);">No hay mensajeros disponibles para asignar</span>
                        </div>`
                    }
                    ${sonidoActivo ? `<div style="font-size:10px;color:var(--green);margin-top:4px;text-align:center;">🔊 Sonando notificación...</div>` : ''}
                </div>
            `;
        });
        container.innerHTML = html;
        actualizarEstadisticas();
        actualizarHeaderBadge();
    }

    // ============================================================
    // MODAL DE ASIGNACIÓN
    // ============================================================
    let pedidoAsignacion = null;

    function abrirModalAsignacion(pedidoId, tiendaId) {
        const pedido = todosLosPedidos.find(p => p.id === pedidoId && p.tiendaId === tiendaId);
        if (!pedido) { 
            toast('⚠️ Pedido no encontrado. Recargando...', 'warn');
            recargarPedidos();
            return; 
        }
        
        if (pedido.mensajeroId) {
            toast('ℹ️ Este pedido ya fue asignado a un mensajero', 'info', 3000);
            // ✅ DETENER SONIDO SI YA ESTÁ ASIGNADO
            if (sonidoEyMoto.estaSonando(pedidoId)) {
                sonidoEyMoto.detenerNotificacion(pedidoId);
            }
            recargarPedidos();
            return;
        }
        
        pedidoAsignacion = { tiendaId, pedidoId };
        
        const tienda = tiendasCache[tiendaId] || {};
        const nombreTienda = tienda.nombre || 'Tienda';
        const cliente = pedido.cliente || {};
        const total = pedido.total || 0;
        const numero = pedido.numeroPedido || '#' + pedidoId.slice(-6);
        
        const mensajerosDisponibles = todosLosMensajeros.filter(m => 
            m.activo !== false && !m.ocupado
        );
        
        const modal = document.getElementById('modalAsignacion');
        const contenido = document.getElementById('modalAsignacionContenido');
        const titulo = document.getElementById('modalAsignacionTitulo');
        
        titulo.textContent = `📦 Asignar Pedido ${numero}`;
        
        let mensajerosOptions = '';
        if (mensajerosDisponibles.length === 0) {
            mensajerosOptions = '<option value="">⚠️ No hay mensajeros disponibles</option>';
        } else {
            mensajerosOptions = '<option value="">👤 Seleccionar mensajero...</option>';
            mensajerosDisponibles.forEach(m => {
                mensajerosOptions += `<option value="${m.uid}">${m.nombre || 'Mensajero'} (Disponible)</option>`;
            });
        }
        
        contenido.innerHTML = `
            <div class="pedido-info-resumen">
                <div class="row"><span class="label">🏪 Tienda</span><span class="value">${nombreTienda}</span></div>
                <div class="row"><span class="label">👤 Cliente</span><span class="value">${cliente.nombre || 'Desconocido'}</span></div>
                <div class="row"><span class="label">📍 Dirección</span><span class="value">${cliente.direccion || 'N/A'}</span></div>
                <div class="row"><span class="label">💰 Total</span><span class="value" style="color:var(--green);">$${total.toLocaleString('es-CO')}</span></div>
            </div>
            
            <div class="opcion-asignacion" style="border-color: var(--blue);">
                <div class="titulo" style="color: var(--blue);">👤 Asignación Manual</div>
                <div class="descripcion">Selecciona un mensajero específico para asignar este pedido.</div>
                <div style="margin: 8px 0 4px 0;">
                    <label style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:2px;">📋 Mensajeros disponibles (${mensajerosDisponibles.length}):</label>
                    <select id="selectMensajeroManual" style="background:var(--surface3);border:1px solid var(--border2);color:#fff;padding:10px 12px;border-radius:8px;width:100%;">
                        ${mensajerosOptions}
                    </select>
                </div>
                <button class="btn-asignar manual" onclick="window.asignarPedidoManual()" 
                        style="width:100%;padding:12px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;"
                        ${mensajerosDisponibles.length === 0 ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>
                    ✅ Asignar a este mensajero
                </button>
            </div>
            
            <div class="opcion-asignacion" style="border-color: var(--yellow);">
                <div class="titulo" style="color: var(--yellow);">📢 Notificar a Todos</div>
                <div class="descripcion">Todos los mensajeros disponibles recibirán la notificación y <strong>el primero que acepte</strong> tomará el pedido.</div>
                <div class="mensajeros-disponibles">
                    📨 Mensajeros que recibirán la notificación: 
                    <span class="count" style="color:var(--green);font-weight:700;">${mensajerosDisponibles.length}</span>
                </div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:6px;padding:8px;background:var(--surface3);border-radius:6px;">
                    ⚡ Los mensajeros verán el pedido en su panel y podrán tomarlo voluntariamente.
                </div>
                <button class="btn-asignar broadcast" onclick="window.notificarATodos()" 
                        style="width:100%;padding:12px;border-radius:8px;border:none;background:var(--yellow);color:#1a1a2e;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;"
                        ${mensajerosDisponibles.length === 0 ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>
                    🔔 Notificar a todos los mensajeros
                </button>
            </div>
            
            <button class="btn-cancelar-modal" onclick="window.cerrarModalAsignacion()">Cancelar</button>
        `;
        
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function cerrarModalAsignacion() {
        const modal = document.getElementById('modalAsignacion');
        modal.style.display = 'none';
        document.body.style.overflow = '';
        pedidoAsignacion = null;
    }

    async function asignarPedidoManual() {
        const select = document.getElementById('selectMensajeroManual');
        if (!select) return;
        const mensajeroId = select.value;
        
        if (!mensajeroId) {
            toast('⚠️ Selecciona un mensajero de la lista', 'warn');
            return;
        }
        
        const { tiendaId, pedidoId } = pedidoAsignacion;
        const mensajero = todosLosMensajeros.find(m => m.uid === mensajeroId);
        const nombreMensajero = mensajero?.nombre || 'Mensajero';
        
        const pedidoActual = todosLosPedidos.find(p => p.id === pedidoId && p.tiendaId === tiendaId);
        if (pedidoActual && pedidoActual.mensajeroId) {
            toast('⚠️ Este pedido ya fue asignado a otro mensajero', 'warn');
            // ✅ DETENER SONIDO
            if (sonidoEyMoto.estaSonando(pedidoId)) {
                sonidoEyMoto.detenerNotificacion(pedidoId);
            }
            cerrarModalAsignacion();
            recargarPedidos();
            return;
        }
        
        try {
            toast('⏳ Asignando pedido...', 'info');
            
            await db.collection('tiendas').doc(tiendaId)
                .collection('pedidos').doc(pedidoId)
                .update({
                    mensajeroId: mensajeroId,
                    nombreMensajero: nombreMensajero,
                    estado: 'En camino al restaurante',
                    fechaAsignacion: firebase.firestore.FieldValue.serverTimestamp(),
                    asignadoPor: auth.currentUser?.email || 'Admin (Manual)'
                });
            
            // ✅ DETENER SONIDO PORQUE YA FUE ASIGNADO
            if (sonidoEyMoto.estaSonando(pedidoId)) {
                sonidoEyMoto.detenerNotificacion(pedidoId);
            }
            
            toast(`✅ Pedido asignado a ${nombreMensajero}`, 'success');
            cerrarModalAsignacion();
            
        } catch (e) {
            if (e.code === 'not-found' || e.message.includes('no such document')) {
                toast('⚠️ El pedido ya no existe o fue asignado por otro', 'warn');
                if (sonidoEyMoto.estaSonando(pedidoId)) {
                    sonidoEyMoto.detenerNotificacion(pedidoId);
                }
                cerrarModalAsignacion();
                recargarPedidos();
            } else {
                toast('❌ Error: ' + e.message, 'error');
            }
        }
    }

    async function notificarATodos() {
        const { tiendaId, pedidoId } = pedidoAsignacion;
        
        const pedidoActual = todosLosPedidos.find(p => p.id === pedidoId && p.tiendaId === tiendaId);
        if (pedidoActual && pedidoActual.mensajeroId) {
            toast('⚠️ Este pedido ya fue asignado a otro mensajero', 'warn');
            if (sonidoEyMoto.estaSonando(pedidoId)) {
                sonidoEyMoto.detenerNotificacion(pedidoId);
            }
            cerrarModalAsignacion();
            recargarPedidos();
            return;
        }
        
        try {
            toast('⏳ Notificando mensajeros...', 'info');
            
            await db.collection('tiendas').doc(tiendaId)
                .collection('pedidos').doc(pedidoId)
                .update({
                    estado: 'Listo para asignar',
                    fechaListo: firebase.firestore.FieldValue.serverTimestamp(),
                    notificadoPor: auth.currentUser?.email || 'Admin'
                });
            
            // ✅ INICIAR SONIDO PARA ESTE PEDIDO
            sonidoEyMoto.iniciarNotificacion(pedidoId);
            
            toast('🔔 Notificación enviada a todos los mensajeros disponibles', 'success', 4000);
            cerrarModalAsignacion();
            
        } catch (e) {
            toast('❌ Error: ' + e.message, 'error');
        }
    }

    // ============================================================
    // ESTADÍSTICAS
    // ============================================================
    function actualizarEstadisticas() {
        const activos = todosLosMensajeros.filter(m => m.activo !== false && !m.ocupado).length;
        const inactivos = todosLosMensajeros.filter(m => m.activo === false).length;
        const ocupados = todosLosMensajeros.filter(m => m.activo !== false && m.ocupado).length;
        const pendientes = todosLosPedidos.filter(p => p.estado === 'Listo para asignar' && !p.mensajeroId).length;
        const enCamino = todosLosPedidos.filter(p => p.estado === 'En camino' || p.estado === 'En camino al restaurante' || p.estado === 'Recogiendo pedido').length;
        
        document.getElementById('statActivos').textContent = activos;
        document.getElementById('statInactivos').textContent = inactivos;
        document.getElementById('statOcupados').textContent = ocupados;
        document.getElementById('statPendientes').textContent = pendientes;
        document.getElementById('statEnCamino').textContent = enCamino;
        
        document.getElementById('badgePedidos').textContent = pendientes;
    }

    function actualizarHeaderBadge() {
        const pendientes = todosLosPedidos.filter(p => p.estado === 'Listo para asignar' && !p.mensajeroId).length;
        const badge = document.getElementById('headerBadge');
        badge.textContent = pendientes;
        badge.style.display = pendientes > 0 ? 'inline-block' : 'none';
    }

    // ============================================================
    // GESTIÓN DE MENSAJEROS
    // ============================================================
    async function crearMensajero() {
        const email = document.getElementById('nuevoEmail').value.trim();
        const nombre = document.getElementById('nuevoNombre').value.trim();
        const telefono = document.getElementById('nuevoTelefono').value.trim();
        const password = document.getElementById('nuevoPassword').value.trim();
        if (!email) { toast('⚠️ Ingresa el Gmail del mensajero', 'error'); return; }
        if (!nombre) { toast('⚠️ Ingresa el nombre del mensajero', 'error'); return; }
        if (!password || password.length < 6) { toast('⚠️ La contraseña debe tener al menos 6 caracteres', 'error'); return; }
        try {
            toast('⏳ Creando mensajero...', 'info');
            const result = await auth.createUserWithEmailAndPassword(email, password);
            const uid = result.user.uid;
            await db.collection('usuarios').doc(uid).set({
                email, nombre, telefono: telefono || '',
                mensajero: true, rol: 'mensajero', activo: true, conectado: false,
                creadoEn: firebase.firestore.FieldValue.serverTimestamp()
            });
            await result.user.sendEmailVerification();
            toast(`✅ Mensajero "${nombre}" creado exitosamente`, 'success', 5000);
            limpiarFormulario();
            filtrarMensajeros();
            actualizarEstadisticas();
        } catch (error) {
            if (error.code === 'auth/email-already-in-use') {
                toast('⚠️ Este email ya está registrado. Usa otro Gmail.', 'error');
            } else {
                toast('❌ Error: ' + error.message, 'error');
            }
        }
    }

    function limpiarFormulario() {
        document.getElementById('nuevoEmail').value = '';
        document.getElementById('nuevoNombre').value = '';
        document.getElementById('nuevoTelefono').value = '';
        document.getElementById('nuevoPassword').value = 'Mensajero2026!';
    }

    async function toggleMensajero(uid, activo) {
        if (!confirm(`¿${activo ? 'Activar' : 'Desactivar'} este mensajero?`)) return;
        try {
            await db.collection('usuarios').doc(uid).update({
                activo: activo,
                [`${activo ? 'activado' : 'desactivado'}En`]: firebase.firestore.FieldValue.serverTimestamp()
            });
            toast(`✅ Mensajero ${activo ? 'activado' : 'desactivado'}`, 'success');
            filtrarMensajeros();
            actualizarEstadisticas();
        } catch (e) { toast('❌ Error: ' + e.message, 'error'); }
    }

    async function eliminarMensajero(uid) {
        if (!confirm('⚠️ ¿Eliminar este mensajero permanentemente?')) return;
        try {
            await db.collection('usuarios').doc(uid).delete();
            toast('✅ Mensajero eliminado de Firestore', 'success');
            filtrarMensajeros();
            actualizarEstadisticas();
        } catch (e) { toast('❌ Error: ' + e.message, 'error'); }
    }

    function verDetalle(uid) {
        const mensajero = todosLosMensajeros.find(m => m.uid === uid);
        if (!mensajero) { toast('⚠️ Mensajero no encontrado', 'error'); return; }
        const activo = mensajero.activo !== false;
        const ocupado = mensajero.ocupado === true;
        let html = `
            <div class="info-row"><span class="label">👤 Nombre</span><span class="value">${mensajero.nombre || 'Sin nombre'}</span></div>
            <div class="info-row"><span class="label">📧 Email</span><span class="value">${mensajero.email || 'Sin email'}</span></div>
            <div class="info-row"><span class="label">📱 Teléfono</span><span class="value">${mensajero.telefono || 'N/A'}</span></div>
            <div class="info-row"><span class="label">📌 Estado</span><span class="value" style="color:${activo ? (ocupado ? 'var(--orange)' : 'var(--green)') : 'var(--red)'}">${activo ? (ocupado ? '🟠 Ocupado' : '🟢 Activo') : '🔴 Inactivo'}</span></div>
            <div class="info-row"><span class="label">🆔 UID</span><span class="value" style="font-size:11px;color:var(--text-muted);">${mensajero.uid}</span></div>
            <div class="info-row"><span class="label">📅 Creado</span><span class="value">${formatearFecha(mensajero.creadoEn)}</span></div>
            <div class="info-row"><span class="label">🔌 Conexión</span><span class="value" style="color:${mensajero.conectado ? 'var(--green)' : 'var(--red)'}">${mensajero.conectado ? '🟢 Conectado' : '🔴 Desconectado'}</span></div>
        `;
        if (mensajero.activadoEn) html += `<div class="info-row"><span class="label">✅ Activado</span><span class="value">${formatearFecha(mensajero.activadoEn)}</span></div>`;
        if (mensajero.desactivadoEn) html += `<div class="info-row"><span class="label">❌ Desactivado</span><span class="value">${formatearFecha(mensajero.desactivadoEn)}</span></div>`;
        document.getElementById('modalTitulo').textContent = `📋 ${mensajero.nombre || 'Mensajero'}`;
        document.getElementById('modalContenido').innerHTML = html;
        document.getElementById('modalDetalle').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function cerrarModal(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('modalDetalle').classList.remove('active');
        document.body.style.overflow = '';
    }

    // ============================================================
    // FUNCIONES DE UTILIDAD
    // ============================================================
    function formatearFecha(fecha) {
        if (!fecha) return '--/--/--';
        try {
            let d;
            if (fecha.toDate) d = fecha.toDate();
            else if (fecha.seconds) d = new Date(fecha.seconds * 1000);
            else d = new Date(fecha);
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
                   ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return '--/--/--'; }
    }

    function toast(msg, type = 'info', dur = 4000) {
        const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️', new: '🛵' };
        const wrap = document.getElementById('toastWrap');
        const el = document.createElement('div');
        el.className = `toast t-${type}`;
        el.innerHTML = `<span>${icons[type] || '🔔'}</span><span>${msg}</span>`;
        wrap.appendChild(el);
        setTimeout(() => { el.classList.add('toast-fade'); setTimeout(() => el.remove(), 350); }, dur);
        return el;
    }

    // ============================================================
    // EXPONER FUNCIONES
    // ============================================================
    window.iniciarSesion = iniciarSesion;
    window.logout = logout;
    window.crearMensajero = crearMensajero;
    window.limpiarFormulario = limpiarFormulario;
    window.filtrarMensajeros = filtrarMensajeros;
    window.recargarMensajeros = recargarMensajeros;
    window.recargarPedidos = recargarPedidos;
    window.recargarTodo = recargarTodo;
    window.toggleMensajero = toggleMensajero;
    window.eliminarMensajero = eliminarMensajero;
    window.verDetalle = verDetalle;
    window.cerrarModal = cerrarModal;
    window.toast = toast;
    window.abrirModalAsignacion = abrirModalAsignacion;
    window.cerrarModalAsignacion = cerrarModalAsignacion;
    window.asignarPedidoManual = asignarPedidoManual;
    window.notificarATodos = notificarATodos;

    console.log('✅ Panel de administración de mensajeros cargado correctamente');
    console.log('🔧 Manejo de errores de Firebase mejorado');
    console.log('🔄 Reconexión automática activada');
    console.log('🔇 Control de sonido por pedido individual');
</script>
</body>
</html>
