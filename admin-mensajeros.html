<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin General - EyMoto</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        :root {
            --yellow: #FFD600;
            --yellow-dim: #e6c200;
            --green: #00C853;
            --green-bg: rgba(0,200,83,0.12);
            --blue: #00B0FF;
            --blue-bg: rgba(0,176,255,0.12);
            --red: #FF3D00;
            --red-bg: rgba(255,61,0,0.12);
            --orange: #FF6900;
            --orange-bg: rgba(255,105,0,0.12);
            --purple: #9B59B6;
            --purple-bg: rgba(155,89,182,0.12);
            --surface: #141414;
            --surface2: #1e1e1e;
            --surface3: #252525;
            --border: #2e2e2e;
            --border2: #3a3a3a;
            --text-muted: #888;
            --radius: 10px;
        }
        input, select, textarea, button {
            font-family: inherit;
            font-size: 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--surface3);
            color: #fff;
            padding: 11px 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        input:focus, select:focus { border-color: var(--yellow); }
        select option { background: #1e1e1e; }
        button {
            background: var(--yellow);
            color: #1a1a2e;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background .15s, transform .1s;
        }
        button:hover { background: var(--yellow-dim); }
        button:active { transform: scale(.98); }
        .btn-sm { padding: 7px 12px; font-size: 12px; width: auto; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-success { background: #00C853; color: #fff; }
        .btn-success:hover { background: #00b748; }
        .btn-info { background: #0288d1; color: #fff; }
        .btn-info:hover { background: #0277bd; }
        .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text-muted); }
        .btn-ghost:hover { background: var(--surface3); }
        .btn-warning { background: var(--orange); color: #1a1a2e; }
        .btn-warning:hover { background: #e65c00; }
        .hidden { display: none !important; }

        header {
            background: #0d0d0d;
            border-bottom: 1px solid var(--border);
            padding: 13px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }
        header .brand {
            background: var(--yellow);
            color: #1a1a2e;
            font-weight: 900;
            font-size: 14px;
            padding: 5px 14px;
            border-radius: 20px;
        }
        header h1 { font-size: 15px; font-weight: 600; color: #fff; }
        header .spacer { flex: 1; }
        .btn-refrescar {
            background: var(--blue-bg);
            color: var(--blue);
            border: 1px solid var(--blue);
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
            font-size: 12px;
        }
        .btn-refrescar:hover {
            background: var(--blue);
            color: #fff;
        }
        .btn-refrescar:active {
            transform: scale(0.95);
        }
        .wrap { max-width: 1400px; margin: 0 auto; padding: 22px 20px; }
        #loginBox { max-width: 420px; margin: 60px auto; padding: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
        #loginBox .brand { display: inline-block; background: var(--yellow); color: #1a1a2e; font-size: 26px; font-weight: 900; padding: 10px 24px; border-radius: 30px; }
        #loginBox h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        #loginBox .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 26px; }
        #loginMsg { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 20px; }
        .login-logo { text-align: center; margin-bottom: 28px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
        }
        .stat-card .val { font-size: 28px; font-weight: 900; margin-bottom: 2px; line-height: 1; }
        .stat-card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
        .stat-card.c-yellow .val { color: var(--yellow); }
        .stat-card.c-green .val { color: var(--green); }
        .stat-card.c-blue .val { color: var(--blue); }
        .stat-card.c-red .val { color: var(--red); }
        .stat-card.c-orange .val { color: var(--orange); }
        .stat-card.c-purple .val { color: var(--purple); }

        .pedido-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--yellow);
            transition: all 0.3s ease;
        }
        .pedido-card.pendiente { border-left-color: var(--orange); }
        .pedido-card.preparacion { border-left-color: var(--blue); }
        .pedido-card.listo { border-left-color: var(--green); }
        .pedido-card.entregado { border-left-color: var(--green); opacity: 0.6; }
        .pedido-card.cancelado { border-left-color: var(--red); opacity: 0.5; }

        .pedido-card .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .pedido-card .header .numero {
            font-size: 16px;
            font-weight: 800;
            color: var(--yellow);
        }
        .pedido-card .header .badge-estado {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-estado.pendiente { background: var(--orange); color: #fff; }
        .badge-estado.preparacion { background: var(--blue); color: #fff; }
        .badge-estado.listo { background: var(--green); color: #1a1a2e; }
        .badge-estado.entregado { background: var(--green); color: #1a1a2e; }
        .badge-estado.cancelado { background: var(--red); color: #fff; }

        .pedido-card .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            font-size: 13px;
            margin: 6px 0;
        }
        .pedido-card .info-grid .label { color: var(--text-muted); }
        .pedido-card .info-grid .value { color: #fff; font-weight: 500; }

        .pedido-card .total {
            text-align: right;
            font-size: 16px;
            font-weight: 800;
            color: var(--green);
            margin-top: 6px;
        }
        .pedido-card .items {
            background: var(--surface2);
            border-radius: 8px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 12px;
        }
        .pedido-card .items .item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid var(--border);
        }
        .pedido-card .items .item:last-child { border-bottom: none; }

        .acciones-pedido {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .acciones-pedido button {
            flex: 1;
            min-width: 100px;
            padding: 10px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        .notificacion-listo {
            background: var(--green-bg);
            border: 1px solid var(--green);
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--green);
            animation: pulseNotificacion 2s ease-in-out infinite;
        }
        .notificacion-listo .icono { font-size: 28px; }
        @keyframes pulseNotificacion {
            0%, 100% { opacity: 1; border-color: var(--green); }
            50% { opacity: 0.7; border-color: var(--yellow); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state .icono { font-size: 48px; display: block; margin-bottom: 12px; }

        #toastWrap {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #1e1e1e;
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,.5);
            animation: toastIn .3s ease;
            pointer-events: auto;
            max-width: 380px;
            cursor: pointer;
        }
        .toast.t-success { border-left: 3px solid var(--green); }
        .toast.t-error { border-left: 3px solid var(--red); }
        .toast.t-info { border-left: 3px solid var(--blue); }
        .toast.t-warn { border-left: 3px solid var(--yellow); }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast-fade { animation: toastOut .3s ease forwards; }
        @keyframes toastOut {
            to { opacity: 0; transform: translateX(20px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal .modal-content {
            background: #1e1e1e;
            border-radius: 20px;
            max-width: 550px;
            width: 100%;
            padding: 24px;
            border: 1px solid var(--yellow);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .modal .modal-header h3 { color: #fff; font-size: 18px; font-weight: 700; }
        .modal .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .modal .modal-close:hover { color: var(--red); }
        .modal .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .modal .info-row .label { color: var(--text-muted); }
        .modal .info-row .value { color: #fff; font-weight: 500; }

        .filtros {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: var(--surface2);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .filtros select, .filtros input {
            flex: 1;
            min-width: 150px;
        }
        .filtros button { flex: 0 0 auto; width: auto; }

        .seccion-tiendas {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
        }
        .seccion-tiendas .titulo-seccion {
            font-size: 14px;
            font-weight: 700;
            color: var(--yellow);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .seccion-tiendas .titulo-seccion .badge {
            background: var(--blue);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .tienda-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            transition: border-color 0.3s;
        }
        .tienda-card:hover { border-color: var(--yellow); }
        .tienda-card .icono { font-size: 32px; flex-shrink: 0; }
        .tienda-card .info { flex: 1; min-width: 150px; }
        .tienda-card .info .nombre { font-size: 15px; font-weight: 700; }
        .tienda-card .info .direccion { font-size: 12px; color: var(--text-muted); }
        .tienda-card .info .meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .tienda-card .estado {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .tienda-card .estado.activa { background: var(--green-bg); color: var(--green); }
        .tienda-card .estado.inactiva { background: var(--red-bg); color: var(--red); }
        .tienda-card .acciones { display: flex; gap: 6px; flex-wrap: wrap; }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .pedido-card .info-grid { grid-template-columns: 1fr; }
            .acciones-pedido button { min-width: 60px; font-size: 10px; padding: 8px; }
        }
    </style>
</head>
<body>

<div id="toastWrap"></div>

<div id="loginBox">
    <div class="login-logo"><span class="brand">EyMoto</span></div>
    <h2>Admin General</h2>
    <p class="sub">Gestiona los pedidos de todas las tiendas</p>
    <div class="form-group"><label>Correo</label><input type="email" id="email" placeholder="admin@eymoto.com"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')iniciarSesion()"></div>
    <button onclick="iniciarSesion()">Ingresar</button>
    <p id="loginMsg"></p>
</div>

<div id="panel" class="hidden">
    <header>
        <span class="brand">EyMoto</span>
        <h1>Administración General</h1>
        <span class="spacer"></span>
        <span id="adminUser" style="font-size:12px;color:var(--text-muted);background:var(--surface2);padding:4px 12px;border-radius:12px;"></span>
        <button class="btn-refrescar" onclick="recargarTodo()">🔄 Recargar</button>
        <button class="btn-ghost btn-sm" onclick="logout()" style="width:auto;padding:8px 16px;">Salir</button>
    </header>

    <div class="wrap">
        <div class="stats-grid">
            <div class="stat-card c-orange"><div class="val" id="statPendientes">0</div><div class="lbl">Pendientes</div></div>
            <div class="stat-card c-blue"><div class="val" id="statPreparacion">0</div><div class="lbl">En preparación</div></div>
            <div class="stat-card c-green"><div class="val" id="statListos">0</div><div class="lbl">Listos para asignar</div></div>
            <div class="stat-card c-purple"><div class="val" id="statEnCamino">0</div><div class="lbl">En camino</div></div>
        </div>

        <div class="filtros">
            <select id="filtroEstado" onchange="filtrarPedidos()">
                <option value="">📋 Todos</option>
                <option value="Pendiente">🟠 Pendientes</option>
                <option value="En preparación">🔵 En preparación</option>
                <option value="Listo para asignar">🟢 Listos para asignar</option>
                <option value="En camino">🟣 En camino</option>
                <option value="Entregado">✅ Entregados</option>
                <option value="Cancelado">❌ Cancelados</option>
            </select>
            <input type="text" id="filtroBusqueda" placeholder="🔍 Buscar por #pedido, cliente o tienda..." oninput="filtrarPedidos()">
            <button class="btn-info btn-sm" onclick="abrirModalCrearPedido()" style="width:auto;">➕ Crear pedido</button>
            <button class="btn-refrescar" onclick="recargarTodo()" style="padding:6px 14px;font-size:11px;">🔄 Refrescar</button>
        </div>

        <div id="listaPedidos">
            <div class="empty-state">
                <span class="icono">🍽️</span>
                <p>Cargando pedidos...</p>
            </div>
        </div>

        <div class="seccion-tiendas">
            <div class="titulo-seccion">
                🏪 Tiendas registradas
                <span class="badge" id="badgeTiendas">0</span>
                <button class="btn-refrescar" onclick="cargarTiendas()" style="padding:2px 10px;font-size:10px;">🔄</button>
            </div>
            <div id="listaTiendas">
                <div class="empty-state">
                    <span class="icono">🏪</span>
                    <p>Cargando tiendas...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL CREAR PEDIDO -->
<div class="modal" id="modalCrearPedido">
    <div class="modal-content">
        <div class="modal-header">
            <h3>➕ Crear nuevo pedido</h3>
            <button class="modal-close" onclick="cerrarModal('modalCrearPedido')">✕</button>
        </div>
        <div id="modalCrearContenido">
            <div class="form-group"><label>🏪 Tienda</label>
                <select id="selectTienda"></select>
            </div>
            <div class="form-group"><label>👤 Cliente</label><input id="inputCliente" placeholder="Nombre del cliente"></div>
            <div class="form-group"><label>📍 Dirección</label><input id="inputDireccion" placeholder="Dirección de entrega"></div>
            <div class="form-group"><label>📱 Teléfono</label><input id="inputTelefono" placeholder="Número de teléfono"></div>
            <div class="form-group"><label>📦 Productos (separados por coma)</label><input id="inputProductos" placeholder="Ej: Pizza x2, Hamburguesa x1"></div>
            <div class="form-group"><label>💰 Total</label><input id="inputTotal" type="number" placeholder="0" step="100"></div>
            <div class="form-group"><label>💳 Método de pago</label>
                <select id="inputPago">
                    <option value="Efectivo">Efectivo</option>
                    <option value="Nequi">Nequi</option>
                    <option value="Bancolombia">Bancolombia</option>
                    <option value="Daviplata">Daviplata</option>
                    <option value="Tarjeta">Tarjeta</option>
                </select>
            </div>
            <button onclick="crearPedido()">✅ Crear pedido</button>
        </div>
    </div>
</div>

<!-- MODAL DETALLE PEDIDO -->
<div class="modal" id="modalDetalle">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalDetalleTitulo">Detalle del pedido</h3>
            <button class="modal-close" onclick="cerrarModal('modalDetalle')">✕</button>
        </div>
        <div id="modalDetalleContenido"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ============================================================
// CONFIGURACIÓN FIREBASE
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
    authDomain: "eymotocomidas.firebaseapp.com",
    projectId: "eymotocomidas",
    storageBucket: "eymotocomidas.firebasestorage.app",
    messagingSenderId: "670474251560",
    appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============================================================
// VARIABLES GLOBALES
// ============================================================
let todosLosPedidos = [];
let pedidosFiltrados = [];
let tiendasCache = {};
let tiendasList = [];
let listeners = [];
let recargando = false;

// ============================================================
// AUTENTICACIÓN
// ============================================================
function iniciarSesion() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const msg = document.getElementById('loginMsg');
    msg.textContent = '';
    if (!email || !pass) { msg.textContent = '❌ Completa todos los campos.'; return; }
    auth.signInWithEmailAndPassword(email, pass)
        .then(async (userCredential) => {
            const user = userCredential.user;
            const doc = await db.collection('usuarios').doc(user.uid).get();
            if (!doc.exists) { await auth.signOut(); msg.textContent = '⛔ Usuario no registrado.'; return; }
            const data = doc.data();
            if (data.admin !== true && data.superAdmin !== true) {
                await auth.signOut();
                msg.textContent = '⛔ No tienes permisos de administrador.';
                return;
            }
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            document.getElementById('adminUser').textContent = '👑 ' + (data.nombre || email);
            await inicializarPanel();
        })
        .catch(e => { msg.textContent = '❌ Credenciales incorrectas.'; console.error(e); });
}

function logout() {
    listeners.forEach(unsub => { try { unsub(); } catch(e) {} });
    listeners = [];
    auth.signOut();
    document.getElementById('loginBox').classList.remove('hidden');
    document.getElementById('panel').classList.add('hidden');
    toast('👋 Sesión cerrada', 'info');
}

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('panel').classList.remove('hidden');
        inicializarPanel();
    } else {
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('panel').classList.add('hidden');
        listeners.forEach(unsub => { try { unsub(); } catch(e) {} });
        listeners = [];
    }
});

// ============================================================
// INICIALIZAR PANEL
// ============================================================
async function inicializarPanel() {
    try {
        await cargarTiendas();
        await escucharPedidos();
        await cargarListaTiendas();
        toast('✅ Panel de administración cargado', 'success', 2000);
        console.log('✅ Panel de administración general cargado');

// ============================================================
// ESCUCHAR PEDIDOS - SIN NOTIFICAR A MENSAJEROS
// ============================================================
function escucharPedidos() {
    listeners.forEach(unsub => { try { unsub(); } catch(e) {} });
    listeners = [];

    db.collection('tiendas').get().then(snap => {
        snap.forEach(doc => {
            const tiendaId = doc.id;
            const unsubscribe = db.collection('tiendas')
                .doc(tiendaId)
                .collection('pedidos')
                .onSnapshot(snapshot => {
                    snapshot.docChanges().forEach(change => {
                        const data = change.doc.data();
                        const pedidoId = change.doc.id;

                        if (change.type === 'added') {
                            const existe = todosLosPedidos.some(p => p.id === pedidoId && p.tiendaId === tiendaId);
                            if (!existe) {
                                todosLosPedidos.push({
                                    id: pedidoId,
                                    tiendaId: tiendaId,
                                    ...data
                                });
                            }
                        } else if (change.type === 'modified') {
                            const index = todosLosPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                            if (index !== -1) {
                                todosLosPedidos[index] = {
                                    id: pedidoId,
                                    tiendaId: tiendaId,
                                    ...data
                                };
                            } else {
                                todosLosPedidos.push({
                                    id: pedidoId,
                                    tiendaId: tiendaId,
                                    ...data
                                });
                            }
                        } else if (change.type === 'removed') {
                            const index = todosLosPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                            if (index !== -1) {
                                todosLosPedidos.splice(index, 1);
                            }
                        }
                    });
                    filtrarPedidos();
                    actualizarEstadisticas();
                }, err => {
                    console.warn(`⚠️ Error en listener de tienda ${tiendaId}:`, err.message);
                });
            listeners.push(unsubscribe);
        });
    }).catch(err => {
        console.error('❌ Error obteniendo tiendas:', err);
        setTimeout(escucharPedidos, 5000);
    });
}

// FILTRAR Y RENDERIZAR
// ============================================================
function filtrarPedidos() {
    const estado = document.getElementById('filtroEstado').value;
    const busqueda = document.getElementById('filtroBusqueda').value.toLowerCase().trim();

    pedidosFiltrados = todosLosPedidos.filter(p => {
        if (estado && p.estado !== estado) return false;
        if (busqueda) {
            const numero = (p.numeroPedido || p.id || '').toLowerCase();
            const cliente = (p.cliente?.nombre || '').toLowerCase();
            const tienda = (tiendasCache[p.tiendaId]?.nombre || '').toLowerCase();
            if (!numero.includes(busqueda) && !cliente.includes(busqueda) && !tienda.includes(busqueda)) return false;
        }
        return true;
    });

    pedidosFiltrados.sort((a, b) => {
        const fechaA = a.fecha?.toDate?.() || new Date(a.fecha);
        const fechaB = b.fecha?.toDate?.() || new Date(b.fecha);
        return fechaB - fechaA;
    });

    renderizarPedidos();
}

function renderizarPedidos() {
    const container = document.getElementById('listaPedidos');

    if (pedidosFiltrados.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <span class="icono">📭</span>
                <p>No hay pedidos que coincidan con los filtros</p>
            </div>
        `;
        return;
    }

    let html = '';
    pedidosFiltrados.forEach(p => {
        html += renderizarCard(p);
    });
    container.innerHTML = html;
}

                    <button class="btn-danger" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Cancelado')">❌ Cancelar</button>
                    <button class="btn-ghost btn-sm" onclick="verDetallePedido('${pedido.id}','${pedido.tiendaId}')">📋 Detalle</button>
                </div>
            `;
            break;

        case 'Listo para asignar':
            // 🔥 SIN BOTÓN DE CANCELAR - SOLO MENSAJE DE NOTIFICACIÓN
            botonesHtml = `
                <div class="notificacion-listo">
                    <span class="icono">📢</span>

                        <strong>✅ Pedido notificado al Administrador de Mensajeros</strong><br>

                    <button class="btn-success" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Entregado')">✅ Marcar como entregado</button>

        case 'Entregado':

                <div style="margin-top:8px;padding:10px;background:var(--surface2);border-radius:8px;text-align:center;color:var(--text-muted);font-size:13px;">

    `;
}

// ============================================================
// 🔥 CAMBIAR ESTADO - SIN NOTIFICAR A MENSAJEROS DIRECTAMENTE
// ============================================================
async function cambiarEstado(pedidoId, tiendaId, nuevoEstado) {
    // 🔥 PREGUNTAR SOLO SI ES CANCELAR
    if (nuevoEstado === 'Cancelado') {
        if (!confirm('⚠️ ¿Estás seguro de cancelar este pedido?')) return;
    } else {
        if (!confirm(`¿Cambiar estado a "${nuevoEstado}"?`)) return;
    }

    try {
        const docRef = db.collection('tiendas').doc(tiendaId).collection('pedidos').doc(pedidoId);

        await docRef.update({
            estado: nuevoEstado,
            ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp(),
            [`estado_${nuevoEstado.toLowerCase().replace(/ /g, '_')}_en`]: firebase.firestore.FieldValue.serverTimestamp()
        });

        // 🔥 NOTIFICACIÓN AL ADMIN DE MENSAJEROS (SOLO cuando es "Listo para asignar")
        if (nuevoEstado === 'Listo para asignar') {
            toast('📢 Pedido marcado como listo - Notificado al Administrador de Mensajeros', 'success', 4000);
            console.log(`📦 Pedido ${pedidoId} listo para asignar - Notificado al admin de mensajeros`);
        } else {
            toast(`✅ Pedido actualizado a: ${nuevoEstado}`, 'success', 3000);
        }

        setTimeout(() => {
            filtrarPedidos();
            actualizarEstadisticas();
        }, 500);

    } catch (e) {
        console.error('Error actualizando estado:', e);
        toast('❌ Error: ' + e.message, 'error');
    }
}

async function crearPedido() {
    const tiendaId = document.getElementById('selectTienda').value;
    const cliente = document.getElementById('inputCliente').value.trim();
    const direccion = document.getElementById('inputDireccion').value.trim();
    const telefono = document.getElementById('inputTelefono').value.trim();
    const productosRaw = document.getElementById('inputProductos').value.trim();
    const total = parseFloat(document.getElementById('inputTotal').value) || 0;
    const metodoPago = document.getElementById('inputPago').value;

    if (!tiendaId) { toast('⚠️ Selecciona una tienda', 'error'); return; }
    if (!cliente) { toast('⚠️ Ingresa el nombre del cliente', 'error'); return; }

    const items = productosRaw.split(',').map(p => p.trim()).filter(p => p).map(p => ({
        nombre: p,
        cantidad: 1,
        precio: 0,
        total: 0
    }));

    const numeroPedido = 'PED-' + Date.now().toString().slice(-6);

    try {
        await db.collection('tiendas').doc(tiendaId).collection('pedidos').add({
            numeroPedido: numeroPedido,
            cliente: { nombre: cliente, direccion, telefono },
            items: items,
            total: total,
            metodoPago: metodoPago,
            estado: 'Pendiente',
            fecha: firebase.firestore.FieldValue.serverTimestamp(),
            creadoPor: auth.currentUser?.email || 'Admin'
        });

        toast(`✅ Pedido ${numeroPedido} creado exitosamente`, 'success', 3000);
        cerrarModal('modalCrearPedido');
        limpiarFormularioPedido();

    } catch (e) {
        console.error('Error creando pedido:', e);
        toast('❌ Error: ' + e.message, 'error');
    }
}

    document.getElementById('inputCliente').value = '';

            activa: activo,
            [`${activo ? 'activada' : 'desactivada'}En`]: firebase.firestore.FieldValue.serverTimestamp()
        });
        toast(`✅ Tienda ${activo ? 'activada' : 'desactivada'}`, 'success');
        await cargarListaTiendas();
        await cargarTiendas();

    setTimeout(() => {
        toast('✅ Recargado correctamente', 'success', 1500);
    }, 1000);
}

// ============================================================
// UTILIDADES
// ============================================================
function formatearFecha(fecha) {
    if (!fecha) return '--/--/--';
    try {
        let d;
        if (fecha.toDate) d = fecha.toDate();
        else if (fecha.seconds) d = new Date(fecha.seconds * 1000);
        else d = new Date(fecha);
        return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
               ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
    } catch (e) { return '--/--/--'; }
}

function toast(msg, type = 'info', dur = 4000) {
    const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️' };
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = `toast t-${type}`;
    el.innerHTML = `<span>${icons[type] || '🔔'}</span><span>${msg}</span>`;
    wrap.appendChild(el);
    setTimeout(() => { el.classList.add('toast-fade'); setTimeout(() => el.remove(), 350); }, dur);
    return el;
}
