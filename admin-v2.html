<script>

/* ============================================================

/* ============================================================
   FUNCIONES PARA MODAL DE WHATSAPP
   ============================================================ */
function abrirModalWhatsApp() {
  // Cargar tiendas en el selector del modal
  const sel = document.getElementById('modalTiendaPedido');
  sel.innerHTML = '<option value="">Seleccionar tienda...</option>';
  db.collection('tiendas').get().then(snap => {
    snap.forEach(doc => {
      const t = doc.data();
      sel.innerHTML += `<option value="${doc.id}">${escHtml(t.nombre || doc.id)}</option>`;
    });
    document.getElementById('modalPedidoWhatsApp').classList.add('active');
  }).catch(e => toast('Error al cargar tiendas', 'error'));
}

function cerrarModalWhatsApp() {
  document.getElementById('modalPedidoWhatsApp').classList.remove('active');
  // Limpiar campos
  ['modalTiendaPedido', 'modalNumeroPedido', 'modalCliente', 'modalTelefono', 
   'modalDireccion', 'modalNota', 'modalProductos', 'modalTotal']
    .forEach(id => document.getElementById(id).value = '');
}

async function registrarPedidoWhatsApp() {
  const tiendaId = document.getElementById('modalTiendaPedido').value;
  if (!tiendaId) {
    toast('Selecciona una tienda', 'error');
    return;
  }

  const cliente = document.getElementById('modalCliente').value.trim();
  if (!cliente) {
    toast('Ingresa el nombre del cliente', 'error');
    return;
  }

  // Procesar productos
  const productosText = document.getElementById('modalProductos').value.trim();
  let items = [];
  let totalCalculado = 0;

  if (productosText) {
    const lineas = productosText.split('\n');
    lineas.forEach(linea => {
      const partes = linea.split('-').map(p => p.trim());
      if (partes.length >= 3) {
        const nombre = partes[0];
        const cantidad = parseInt(partes[1]) || 1;
        const precio = parseFloat(partes[2]) || 0;
        items.push({
          nombre: nombre,
          cantidad: cantidad,
          precio: precio,
          total: precio * cantidad
        });
        totalCalculado += precio * cantidad;
      }
    });
  }

  // Si no hay items, agregar uno por defecto
  if (items.length === 0) {
    toast('Agrega al menos un producto', 'error');
    return;
  }

  const total = parseFloat(document.getElementById('modalTotal').value) || totalCalculado;

  const pedidoData = {
    numeroPedido: document.getElementById('modalNumeroPedido').value.trim() || `#${Date.now().toString().slice(-6)}`,
    cliente: {
      nombre: cliente,
      telefono: document.getElementById('modalTelefono').value.trim(),
      direccion: document.getElementById('modalDireccion').value.trim() || 'Recoge en tienda',
      nota: document.getElementById('modalNota').value.trim()
    },
    items: items,
    total: total,
    estado: 'Pendiente',
    fecha: firebase.firestore.FieldValue.serverTimestamp(),
    fuente: 'whatsapp',
    timestamp: Date.now()
  };

  try {
    await db.collection('tiendas').doc(tiendaId).collection('pedidos').add(pedidoData);
    toast('✅ Pedido de WhatsApp registrado correctamente', 'success', 5000);
    cerrarModalWhatsApp();
    // La notificación sonará automáticamente cuando el pedido aparezca en tiempo real
  } catch(e) {
    toast('Error al registrar: ' + e.message, 'error');
  }
}

/* ============================================================
   TOAST
   ============================================================ */
function toast(msg, type = 'info', dur = 3500) {
  const icons = { success:'✅', error:'❌', info:'ℹ️', warn:'⚠️', new:'🛵' };
  const wrap  = document.getElementById('toastWrap');
  const el    = document.createElement('div');
  el.className = `toast t-${type}`;
  el.innerHTML = `<span>${icons[type] || '🔔'}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => {
    el.classList.add('toast-fade');
    setTimeout(() => el.remove(), 350);
  }, dur);
}

/* ============================================================
   SONIDO / ALARMA
   ============================================================ */
function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const frequencies = [440, 523, 659, 880];
    const times = [0, 0.13, 0.26, 0.40];
    frequencies.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime + times[i]);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + times[i] + 0.28);
      osc.start(audioCtx.currentTime + times[i]);
      osc.stop(audioCtx.currentTime + times[i] + 0.3);
    });
  } catch(e) {}
}

function hablar(msg) {
  try {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u  = new SpeechSynthesisUtterance(msg);
    u.lang   = 'es-CO';
    u.rate   = 1.1;
    setTimeout(() => window.speechSynthesis.speak(u), 600);
  } catch(e) {}
}

function startAlarm(nombreTienda, pedidoInfo = '') {
  if (alarmInterval) return;
  beep();
  const mensaje = `Nuevo pedido en ${nombreTienda}${pedidoInfo}`;
  hablar(mensaje);
  alarmInterval = setInterval(() => { beep(); }, 8000);
}

function stopAlarm() {
  if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
  try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e) {}
}

function probarAltavoz() {
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  beep();
  hablar('Alarma configurada en Ey Moto');
  toast('Altavoz inicializado correctamente ✓', 'success');
}

/* ============================================================
   TABS
   ============================================================ */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

/* ============================================================
   AUTH
   ============================================================ */
function iniciarSesion() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const msg   = document.getElementById('loginMsg');
  msg.textContent = '';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(e => { msg.textContent = 'Credenciales incorrectas. Intenta de nuevo.'; });
}

function logout() {
  stopAlarm();
  if (pedidosUnsub) pedidosUnsub();
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  document.getElementById('loginBox').classList.toggle('hidden', !!user);
  document.getElementById('panel').classList.toggle('hidden', !user);
  if (user) inicializar();
  else stopAlarm();
});

/* ============================================================
   INICIALIZAR
   ============================================================ */
async function inicializar() {
  await cargarTiendas();
}

/* ============================================================
   TIENDAS
   ============================================================ */
async function cargarTiendas() {
  // Limpiar selectores
  ['filtroTiendaPedidos','tiendaProducto','tiendaEstado'].forEach(id => {
    const sel = document.getElementById(id);
    if (sel) sel.innerHTML = '<option value="">Seleccionar tienda...</option>';
  });
  const lista = document.getElementById('listaTiendas');
  lista.innerHTML = '';

  try {
    const snap = await db.collection('tiendas').get();
    if (snap.empty) {
      lista.innerHTML = '<p style="color:var(--text-muted);font-size:13px">No hay tiendas registradas aún.</p>';
      return;
    }
    snap.forEach(doc => {
      const t   = doc.data();
      const id  = doc.id;
      const url = `${URL_BASE_MENU}?tienda=${id}`;
      const abierta = t.abierta !== false;

      // Card tienda
      const div = document.createElement('div');
      div.className = 'tienda-item';
      div.innerHTML = `
        <div class="tienda-logo">
          ${t.logo
            ? `<img src="${escHtml(t.logo)}" alt="${escHtml(t.nombre||'')}" onerror="this.parentElement.innerHTML='🏪'">`
            : '🏪'}
        </div>
        <div class="tienda-info">
          <h4>${escHtml(t.nombre || 'Sin nombre')}</h4>
          <p class="meta">📱 ${escHtml(t.whatsapp || '-')}</p>
          <a class="link" href="${url}" target="_blank">🔗 Ver menú digital</a>
          <br><span class="${abierta ? 'badge-open' : 'badge-closed'}">${abierta ? 'Abierta' : 'Cerrada'}</span>
        </div>
        <div class="tienda-actions">
          <button class="btn-info btn-sm" onclick="editarTienda('${id}')">Editar</button>
          <button class="btn-danger btn-sm" onclick="eliminarTienda('${id}')">Eliminar</button>
        </div>
      `;
      lista.appendChild(div);

      // Opciones en selectores
      const opt = `<option value="${id}">${escHtml(t.nombre || id)}</option>`;
      ['filtroTiendaPedidos','tiendaProducto','tiendaEstado'].forEach(sid => {
        const sel = document.getElementById(sid);
        if (sel) sel.innerHTML += opt;
      });
    });
  } catch(e) {
    lista.innerHTML = `<p style="color:var(--red);font-size:13px">Error al cargar tiendas.</p>`;
    console.error(e);
  }
}

async function guardarTienda() {
  const id     = document.getElementById('editTiendaId').value;
  const nombre = document.getElementById('nombreTienda').value.trim();
  const wa     = document.getElementById('whatsapp').value.trim();
  const logo   = document.getElementById('logoTienda').value.trim();
  const banner = document.getElementById('bannerTienda').value.trim();

  if (!nombre || !wa) { toast('Completa el nombre y el WhatsApp.', 'error'); return; }

  const datos = { nombre, whatsapp: wa, logo, banner };

  try {
    if (id) {
      await db.collection('tiendas').doc(id).update(datos);
      toast('Tienda actualizada correctamente.', 'success');
    } else {
      await db.collection('tiendas').add({ ...datos, abierta: true });
      toast('Tienda registrada exitosamente.', 'success');
    }
    cancelarEdTienda();
    cargarTiendas();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function editarTienda(id) {
  try {
    const doc = await db.collection('tiendas').doc(id).get();
    if (!doc.exists) { toast('Tienda no encontrada.', 'error'); return; }
    const t = doc.data();
    document.getElementById('editTiendaId').value  = id;
    document.getElementById('nombreTienda').value  = t.nombre  || '';
    document.getElementById('whatsapp').value      = t.whatsapp || '';
    document.getElementById('logoTienda').value    = t.logo    || '';
    document.getElementById('bannerTienda').value  = t.banner  || '';
    document.getElementById('btnCancelTienda').classList.remove('hidden');
    const btn = document.querySelectorAll('.tab-btn')[1];
    switchTab('tiendas', btn);
    document.getElementById('tab-tiendas').scrollIntoView({ behavior:'smooth' });
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

function cancelarEdTienda() {
  ['editTiendaId','nombreTienda','whatsapp','logoTienda','bannerTienda']
    .forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('btnCancelTienda').classList.add('hidden');
}

async function eliminarTienda(id) {
  if (!confirm('¿Eliminar esta tienda permanentemente? Esta acción no se puede deshacer.')) return;
  try {
    await db.collection('tiendas').doc(id).delete();
    toast('Tienda eliminada.', 'info');
    cargarTiendas();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

/* ============================================================
   PRODUCTOS
   ============================================================ */
async function cargarProductos() {
  const tid  = document.getElementById('tiendaProducto').value;
  const lista = document.getElementById('listaProductos');
  if (!tid) {
    lista.innerHTML = '<p style="color:var(--text-muted);font-size:13px">Selecciona una tienda para ver su inventario.</p>';
    return;
  }
  lista.innerHTML = '<p style="color:var(--text-muted);font-size:13px">Cargando...</p>';
  try {
    const snap = await db.collection('tiendas').doc(tid).collection('productos').get();
    if (snap.empty) {
      lista.innerHTML = '<p style="color:var(--text-muted);font-size:13px">Esta tienda no tiene productos aún.</p>';
      return;
    }
    lista.innerHTML = '';
    snap.forEach(doc => {
      const p   = doc.data();
      const pid = doc.id;
      const div = document.createElement('div');
      div.className = 'prod-item';
      div.innerHTML = `
        <div class="prod-img">
          ${p.img
            ? `<img src="${escHtml(p.img)}" alt="${escHtml(p.name||'')}" onerror="this.parentElement.innerHTML='🍔'">`
            : '🍔'}
        </div>
        <div class="prod-info">
          <h5>${escHtml(p.name || 'Sin nombre')}</h5>
          <p class="pdesc">${escHtml(p.descripcion || '')}</p>
          <span class="prod-cat">${escHtml(p.categoria || 'General')}</span>
        </div>
        <span class="prod-price">$${(p.precio || 0).toLocaleString('es-CO')}</span>
        <div class="prod-actions">
          <button class="btn-info btn-sm" onclick="editarProducto('${pid}','${tid}')">Editar</button>
          <button class="btn-danger btn-sm" onclick="eliminarProducto('${tid}','${pid}')">Borrar</button>
        </div>
      `;
      lista.appendChild(div);
    });
  } catch(e) {
    lista.innerHTML = '<p style="color:var(--red);font-size:13px">Error al cargar productos.</p>';
    console.error(e);
  }
}

async function guardarProducto() {
  const tid  = document.getElementById('tiendaProducto').value;
  const pid  = document.getElementById('editProductoId').value;
  if (!tid) { toast('Selecciona una tienda primero.', 'error'); return; }

  const name       = document.getElementById('nuevoNombre').value.trim();
  const precio     = parseFloat(document.getElementById('nuevoPrecio').value) || 0;
  const categoria  = document.getElementById('nuevoCategoria').value.trim();
  const descripcion= document.getElementById('nuevoDescripcion').value.trim();
  const img        = document.getElementById('nuevoImagen').value.trim();

  if (!name || !precio) { toast('Completa el nombre y el precio.', 'error'); return; }

  const datos = { name, precio, categoria, descripcion, img };

  try {
    const ref = db.collection('tiendas').doc(tid).collection('productos');
    if (pid) {
      await ref.doc(pid).set(datos, { merge: true });
      toast('Producto actualizado correctamente.', 'success');
    } else {
      await ref.add(datos);
      toast('Producto añadido al catálogo.', 'success');
    }
    cancelarEdProducto();
    cargarProductos();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function editarProducto(pid, tid) {
  const selTienda = document.getElementById('tiendaProducto');
  if (selTienda.value !== tid) {
    selTienda.value = tid;
  }
  try {
    const doc = await db.collection('tiendas').doc(tid).collection('productos').doc(pid).get();
    if (!doc.exists) { toast('Producto no encontrado.', 'error'); return; }
    const p = doc.data();
    document.getElementById('editProductoId').value   = pid;
    document.getElementById('nuevoNombre').value      = p.name       || '';
    document.getElementById('nuevoPrecio').value      = p.precio     || '';
    document.getElementById('nuevoCategoria').value   = p.categoria  || '';
    document.getElementById('nuevoDescripcion').value = p.descripcion || '';
    document.getElementById('nuevoImagen').value      = p.img        || '';
    document.getElementById('btnCancelProd').classList.remove('hidden');
    const btn = document.querySelectorAll('.tab-btn')[2];
    switchTab('productos', btn);
    document.getElementById('tab-productos').scrollIntoView({ behavior:'smooth' });
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

function cancelarEdProducto() {
  ['editProductoId','nuevoNombre','nuevoPrecio','nuevoCategoria','nuevoDescripcion','nuevoImagen']
    .forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('btnCancelProd').classList.add('hidden');
}

async function eliminarProducto(tid, pid) {
  if (!confirm('¿Eliminar este producto del catálogo?')) return;
  try {
    await db.collection('tiendas').doc(tid).collection('productos').doc(pid).delete();
    toast('Producto eliminado.', 'info');
    cargarProductos();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

/* ============================================================
   ESTADO
   ============================================================ */
async function cargarEstado() {
  const tid  = document.getElementById('tiendaEstado').value;
  const wrap = document.getElementById('estadoWrap');
  wrap.innerHTML = '';
  if (!tid) return;
  try {
    const doc = await db.collection('tiendas').doc(tid).get();
    if (!doc.exists) return;
    const t      = doc.data();
    const abierta = t.abierta !== false;
    wrap.innerHTML = `
      <div class="estado-card">
        <div class="info">
          <div class="tienda-name">${escHtml(t.nombre || 'Tienda')}</div>
          <div class="estado-txt" id="estadoTexto" style="color:${abierta ? 'var(--green)' : 'var(--red)'}">
            ${abierta ? '🟢 Abierta — recibiendo pedidos' : '🔴 Cerrada temporalmente'}
          </div>
        </div>
        <label class="toggle" title="Cambiar estado">
          <input type="checkbox" id="toggleAbierta" ${abierta ? 'checked' : ''} onchange="toggleEstado('${tid}')">
          <span class="toggle-slider"></span>
        </label>
      </div>
    `;
  } catch(e) { toast('Error al cargar estado.', 'error'); }
}

async function toggleEstado(tid) {
  const cb   = document.getElementById('toggleAbierta');
  const txt  = document.getElementById('estadoTexto');
  try {
    await db.collection('tiendas').doc(tid).update({ abierta: cb.checked });
    txt.style.color = cb.checked ? 'var(--green)' : 'var(--red)';
    txt.textContent = cb.checked ? '🟢 Abierta — recibiendo pedidos' : '🔴 Cerrada temporalmente';
    toast(cb.checked ? 'Tienda marcada como ABIERTA.' : 'Tienda marcada como CERRADA.', cb.checked ? 'success' : 'warn');
    cargarTiendas();
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

/* ============================================================
   PEDIDOS EN TIEMPO REAL
   ============================================================ */
const ESTADO_MAP = {
  'Pendiente':    { col:'col-P', cnt:'cnt-P', ring:'r-pending'  },
  'En Cocina':    { col:'col-C', cnt:'cnt-C', ring:'r-cooking'  },
  'En Camino':    { col:'col-M', cnt:'cnt-M', ring:'r-delivery' },
  'Entregado':    { col:'col-E', cnt:'cnt-E', ring:'r-done'     },
  'Cancelado':    { col:'col-E', cnt:'cnt-E', ring:'r-cancel'   }
};

const EMPTY_MSGS = {
  'col-P': { ico:'⏳', txt:'Sin pedidos pendientes' },
  'col-C': { ico:'👨‍🍳', txt:'Nada en preparación' },
  'col-M': { ico:'🛵', txt:'Nada en camino' },
  'col-E': { ico:'✅', txt:'Sin entregas aún' }
};

function escucharPedidos() {
  const tid = document.getElementById('filtroTiendaPedidos').value;
  if (pedidosUnsub) { pedidosUnsub(); pedidosUnsub = null; }
  stopAlarm();
  resetKanban();
  pedidosPendientes.clear();
  if (!tid) return;
  esInicial = true;

  pedidosUnsub = db.collection('tiendas').doc(tid)
    .collection('pedidos')
    .orderBy('fecha', 'desc')
    .onSnapshot(snap => {
      if (!esInicial) {
        snap.docChanges().forEach(ch => {
          if (ch.type === 'added' && ch.doc.data().estado === 'Pendiente') {
            const data = ch.doc.data();
            const pedidoId = ch.doc.id;
            
            if (pedidosPendientes.has(pedidoId)) return;
            pedidosPendientes.add(pedidoId);
            
            const sel = document.getElementById('filtroTiendaPedidos');
            const nom = sel.options[sel.selectedIndex]?.text || 'la tienda';
            
            const cliente = data.cliente?.nombre || 'Cliente';
            const total = data.total || 0;
            const items = data.items?.length || 0;
            const fuente = data.fuente === 'whatsapp' ? '📱 WhatsApp' : '🛵 App';
            const infoPedido = ` de ${cliente} (${fuente}) - ${items} productos - $${total.toLocaleString('es-CO')}`;
            
            startAlarm(nom, infoPedido);
            toast(`🛵 ¡Nuevo pedido de ${cliente} en ${nom}! ${items} productos - $${total.toLocaleString('es-CO')}`, 'new', 7000);
          }
        });
      }

      resetKanban();
      const counts = { 'Pendiente':0, 'En Cocina':0, 'En Camino':0, 'Entregado':0, 'Cancelado':0 };

      snap.forEach(doc => {
        renderPedido(doc, tid, counts);
      });

      Object.entries(ESTADO_MAP).forEach(([estado, cfg]) => {
        const el = document.getElementById(cfg.cnt);
        if (el) el.textContent = counts[estado] || 0;
      });

      ['col-P','col-C','col-M','col-E'].forEach(colId => {
        const el = document.getElementById(colId);
        if (el && el.children.length === 0) {
          const { ico, txt } = EMPTY_MSGS[colId];
          el.innerHTML = `<div class="empty-col"><span class="ico">${ico}</span>${txt}</div>`;
        }
      });

      document.getElementById('statP').textContent = counts['Pendiente'] || 0;
      document.getElementById('statC').textContent = counts['En Cocina'] || 0;
      document.getElementById('statM').textContent = counts['En Camino'] || 0;
      document.getElementById('statE').textContent = counts['Entregado'] || 0;

      const pend = counts['Pendiente'] || 0;
      document.getElementById('tabBadge').textContent  = pend;
      const hb = document.getElementById('headerBadge');
      hb.textContent  = pend;
      hb.style.display = pend > 0 ? 'inline-block' : 'none';

      if (counts['Pendiente'] === 0) {
        stopAlarm();
        pedidosPendientes.clear();
      }

      esInicial = false;
    }, err => {
      console.error('Firestore error:', err);
      toast('Error al escuchar pedidos. Revisa la consola.', 'error');
    });
}

function resetKanban() {
  ['col-P','col-C','col-M','col-E'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });
}

function renderPedido(doc, tiendaId, counts) {
  const p      = doc.data();
  const pid    = doc.id;
  const estado = p.estado || 'Pendiente';
  if (counts[estado] !== undefined) counts[estado]++;

  const cfg    = ESTADO_MAP[estado];
  if (!cfg) return;
  const colEl  = document.getElementById(cfg.col);
  if (!colEl) return;

  const num   = p.numeroPedido || '#--';
  let   fecha = '--';
  if (p.fecha) {
    const d = new Date(p.fecha);
    fecha   = `${d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})} · ${d.toLocaleDateString('es-CO')}`;
  }

  let itemsHtml = '';
  if (p.items && p.items.length) {
    p.items.forEach(it => {
      const nombre = escHtml(it.nombre || it.name || 'Producto');
      const cantidad = it.cantidad || 1;
      const precioUnitario = it.precio || 0;
      const totalItem = it.total || (precioUnitario * cantidad);
      itemsHtml += `
        <div class="item-row">
          <span>• ${nombre} <b>x${cantidad}</b></span>
          <span>$${totalItem.toLocaleString('es-CO')}</span>
        </div>`;
    });
    const totalItems = p.items.reduce((sum, it) => sum + (it.cantidad || 1), 0);
    itemsHtml = `<div style="margin-bottom:4px;color:var(--text-muted);font-weight:600;">📦 ${totalItems} producto${totalItems > 1 ? 's' : ''} ${p.fuente === 'whatsapp' ? '📱' : ''}</div>` + itemsHtml;
  } else {
    itemsHtml = '<span style="color:var(--text-muted)">Sin detalle de productos</span>';
  }

  const clienteInfo = p.cliente || {};
  const nombreCliente = escHtml(clienteInfo.nombre || 'Desconocido');
  const telefonoCliente = escHtml(clienteInfo.telefono || '');
  const direccionCliente = escHtml(clienteInfo.direccion || 'Recoge en tienda');
  const notaCliente = escHtml(clienteInfo.nota || '');

  let acciones = '';
  if (estado === 'Pendiente') {
    acciones += `<button class="btn-cook" onclick="cambiarEstado('${tiendaId}','${pid}','En Cocina')">👨‍🍳 Enviar a cocina</button>`;
    acciones += `<button class="btn-cancel" onclick="cambiarEstado('${tiendaId}','${pid}','Cancelado')">✕ Cancelar pedido</button>`;
  }
  if (estado === 'En Cocina') {
    acciones += `<button class="btn-go" onclick="cambiarEstado('${tiendaId}','${pid}','En Camino')">🛵 Salió a entregar</button>`;
    acciones += `<button class="btn-cancel" onclick="cambiarEstado('${tiendaId}','${pid}','Cancelado')">✕ Cancelar</button>`;
  }
  if (estado === 'En Camino') {
    acciones += `<button class="btn-done" onclick="cambiarEstado('${tiendaId}','${pid}','Entregado')">✅ Marcar como entregado</button>`;
  }
  if (estado === 'Entregado' || estado === 'Cancelado') {
    acciones += `<button class="btn-remove" onclick="eliminarPedido('${tiendaId}','${pid}')">🗑 Remover del panel</button>`;
  }

  const esNuevo = estado === 'Pendiente' && esInicial === false;

  const card = document.createElement('div');
  card.className = `pedido-card ${cfg.ring}${esNuevo ? ' nuevo-pedido' : ''}`;
  card.innerHTML = `
    <div class="pedido-num">📋 Comanda ${escHtml(num)} ${p.fuente === 'whatsapp' ? '📱' : ''}</div>
    <div class="pedido-time">🕒 ${fecha}</div>
    <div class="pedido-client">👤 <strong>${nombreCliente}</strong>
      ${telefonoCliente ? `<span style="font-weight:400;color:var(--text-muted)">· 📱 ${telefonoCliente}</span>` : ''}
    </div>
    <div class="pedido-dir">📍 ${direccionCliente}</div>
    ${notaCliente ? `<div style="font-size:12px;color:var(--orange);margin-bottom:8px;">📝 Nota: ${notaCliente}</div>` : ''}
    <div class="pedido-items">
      ${itemsHtml}
      <div class="pedido-total">
        <span class="lbl">💰 Total del pedido</span>
        <span class="val">$${(p.total || 0).toLocaleString('es-CO')}</span>
      </div>
    </div>
    <div class="accion-btns">${acciones}</div>
  `;
  colEl.appendChild(card);
}

async function cambiarEstado(tiendaId, pedidoId, nuevoEstado) {
  try {
    stopAlarm();
    await db.collection('tiendas').doc(tiendaId)
      .collection('pedidos').doc(pedidoId)
      .update({ estado: nuevoEstado });
    const labels = {
      'Pendiente':'Pendiente','En Cocina':'En cocina',
      'En Camino':'En camino','Entregado':'Entregado ✅','Cancelado':'Cancelado'
    };
    toast(`Pedido actualizado → ${labels[nuevoEstado] || nuevoEstado}`, 'success');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function eliminarPedido(tiendaId, pedidoId) {
  if (!confirm('¿Remover este pedido del panel? Esta acción es irreversible.')) return;
  try {
    stopAlarm();
    await db.collection('tiendas').doc(tiendaId)
      .collection('pedidos').doc(pedidoId)
      .delete();
    toast('Pedido removido del panel.', 'info');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

/* ============================================================
   HELPER
   ============================================================ */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
</script>
