<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
    .tienda-card-item { border:1px solid #444; padding:15px; margin-top:12px; border-radius:8px; background: #222; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
  </style>
</head>
<body>
<header>🚀 PANEL DE ADMINISTRACIÓN GENERAL - EYMOTO</header>
<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
  </div>
  <div id="panel" class="hidden">
    <div class="card">
        <h3>🏪 Lista de Tiendas</h3>
        <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()"><option value="">Selecciona una tienda</option></select>
        <div id="listaTiendas"></div>
    </div>
    <div class="card"><h3>📦 Lista de Productos</h3><div id="listaProductos"></div></div>
    <button onclick="auth.signOut()">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- FUNCIONES RESTAURADAS ---
window.cargarTiendas = async function() {
  const lista = document.getElementById("listaTiendas");
  const select = document.getElementById("filtroTiendaPedidos");
  lista.innerHTML = "";
  const snap = await db.collection("tiendas").get();
  snap.forEach(doc => {
    const t = doc.data();
    lista.innerHTML += `<div class="tienda-card-item"><b>${t.nombre}</b></div>`;
    select.innerHTML += `<option value="${doc.id}">${t.nombre}</option>`;
  });
};

window.escucharPedidosEnTiempoReal = function() {
  const tId = document.getElementById("filtroTiendaPedidos").value;
  if (!tId) return;
  db.collection("tiendas").doc(tId).collection("pedidos").onSnapshot(snap => {
     console.log("Pedidos cargados:", snap.size);
  });
};

document.getElementById("btnIniciarSesion").addEventListener("click", () => {
    auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value);
});

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    cargarTiendas();
  }
});
</script>
</body>
</html>
