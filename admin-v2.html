<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
    .tienda-card-item { border:1px solid #444; padding:15px; margin-top:12px; border-radius:8px; background: #222; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
    .btn-edit { background: #00bcd4; color: #000; width: auto; padding: 6px 12px; }
    .btn-danger { background: #dc3545; color: #fff; width: auto; padding: 6px 12px; }
    .flex-buttons { display: flex; gap: 5px; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN GENERAL - EYMOTO</header>

<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso Administrativo</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
  </div>

  <div id="panel" class="hidden">
    <div class="card">
      <h3>🍔 Formulario de Producto</h3>
      <select id="tiendaProducto" onchange="cargarProductosOriginal()">
        <option value="">Seleccionar tienda...</option>
      </select>
      <input type="hidden" id="editProductoId">
      <input id="nuevoNombre" placeholder="Nombre del producto">
      <input id="nuevoPrecio" type="number" placeholder="Precio ($)">
      <input id="nuevoCategoria" placeholder="Categoría (Ej: Hamburguesas)">
      <textarea id="nuevoDescripcion" placeholder="Descripción..." rows="2"></textarea>
      <input id="nuevoImagen" placeholder="URL de la foto">
      <button onclick="guardarProductoOriginal()">Guardar Producto</button>
      <button id="btnCancelarEdicion" class="hidden" onclick="cancelarEdicionProducto()" style="background:#555; color:#fff;">Cancelar</button>
    </div>

    <div class="card">
      <h3>📦 Lista de Productos</h3>
      <div id="listaProductos"></div>
    </div>

    <button onclick="logout()" style="background:#444; color:#fff;">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY", authDomain: "eymotocomidas.firebaseapp.com", projectId: "eymotocomidas", storageBucket: "eymotocomidas.firebasestorage.app", messagingSenderId: "670474251560", appId: "1:670474251560:web:eab1fbbb744af4e0b8341d" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 1. CARGAR PRODUCTOS (CORREGIDA)
window.cargarProductosOriginal = async function() {
  const tiendaId = document.getElementById("tiendaProducto").value;
  const lista = document.getElementById("listaProductos");
  if (!tiendaId) return;

  lista.innerHTML = "Cargando...";
  const snap = await db.collection("tiendas").doc(tiendaId).collection("productos").get();
  
  lista.innerHTML = "";
  snap.forEach(doc => {
    const p = doc.data();
    lista.innerHTML += `
      <div class="producto-item">
        <div><b>${p.name}</b> ($${p.precio})<br><small>${p.categoria || ''} - ${p.descripcion || ''}</small></div>
        <div class="flex-buttons">
          <button class="btn-edit" onclick="activarEdicionProducto('${doc.id}', \`${p.name}\`, ${p.precio}, \`${p.categoria || ''}\`, \`${p.descripcion || ''}\`, \`${p.img || ''}\`)">✏️</button>
          <button class="btn-danger" onclick="eliminarProductoOriginal('${doc.id}')">🗑️</button>
        </div>
      </div>`;
  });
}

// 2. GUARDAR PRODUCTO (CORREGIDA)
window.guardarProductoOriginal = async function() {
  const tiendaId = document.getElementById("tiendaProducto").value;
  const prodId = document.getElementById("editProductoId").value;
  if (!tiendaId) return alert("Selecciona una tienda primero");

  const datos = {
    name: document.getElementById("nuevoNombre").value,
    precio: parseFloat(document.getElementById("nuevoPrecio").value) || 0,
    categoria: document.getElementById("nuevoCategoria").value,
    descripcion: document.getElementById("nuevoDescripcion").value,
    img: document.getElementById("nuevoImagen").value
  };

  const ref = db.collection("tiendas").doc(tiendaId).collection("productos");
  if (prodId) await ref.doc(prodId).update(datos);
  else await ref.add(datos);
  
  alert("Guardado");
  cancelarEdicionProducto();
  cargarProductosOriginal();
}

// 3. ELIMINAR PRODUCTO (CORREGIDA)
window.eliminarProductoOriginal = async function(idProd) {
  const tiendaId = document.getElementById("tiendaProducto").value;
  if (!confirm("¿Eliminar?")) return;
  await db.collection("tiendas").doc(tiendaId).collection("productos").doc(idProd).delete();
  cargarProductosOriginal();
}

// AYUDAS DE EDICIÓN
window.activarEdicionProducto = (id, n, p, c, d, i) => {
  document.getElementById("editProductoId").value = id;
  document.getElementById("nuevoNombre").value = n;
  document.getElementById("nuevoPrecio").value = p;
  document.getElementById("nuevoCategoria").value = c;
  document.getElementById("nuevoDescripcion").value = d;
  document.getElementById("nuevoImagen").value = i;
  document.getElementById("btnCancelarEdicion").classList.remove("hidden");
}

window.cancelarEdicionProducto = () => {
  document.getElementById("editProductoId").value = "";
  // Limpiar campos...
  document.getElementById("btnCancelarEdicion").classList.add("hidden");
}

// AUTH Y CARGA INICIAL
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    // Cargar tiendas en el select
    db.collection("tiendas").get().then(snap => {
      const sel = document.getElementById("tiendaProducto");
      snap.forEach(doc => sel.innerHTML += `<option value="${doc.id}">${doc.data().nombre}</option>`);
    });
  }
});

document.getElementById("btnIniciarSesion").onclick = () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  firebase.auth().signInWithEmailAndPassword(email, pass);
};

window.logout = () => firebase.auth().signOut().then(() => location.reload());
</script>
</body>
</html>
