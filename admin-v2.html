<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 10px 0; }
    .btn-action { width: auto; padding: 5px 10px; margin-left: 5px; font-size: 12px; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN - EYMOTO</header>

<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
  </div>

  <div id="panel" class="hidden">
    <div id="editorProducto" class="card hidden" style="border: 2px solid #f5c400;">
      <h3>✏️ Editar Producto</h3>
      <input type="hidden" id="editId">
      <input id="editNombre" placeholder="Nombre del producto">
      <input id="editPrecio" type="number" placeholder="Precio">
      <input id="editCategoria" placeholder="Categoría">
      <textarea id="editDesc" placeholder="Descripción"></textarea>
      <button onclick="guardarEdicion()">Guardar Cambios</button>
      <button onclick="document.getElementById('editorProducto').classList.add('hidden')" style="background:#555;">Cancelar</button>
    </div>

    <div class="card">
      <h3>🍔 Gestión de Productos</h3>
      <select id="tiendaProducto" onchange="cargarProductosOriginal()">
        <option value="">Selecciona tienda para ver productos</option>
      </select>
      <div id="listaProductos"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Cargar tiendas
async function cargarTiendas() {
  const selectProd = document.getElementById("tiendaProducto");
  const snap = await db.collection("tiendas").get();
  snap.forEach(doc => {
    selectProd.innerHTML += `<option value="${doc.id}">${doc.data().nombre}</option>`;
  });
}

// Listar productos con botones de acción
window.cargarProductosOriginal = async function() {
  const tId = document.getElementById("tiendaProducto").value;
  const lista = document.getElementById("listaProductos");
  if(!tId) return;
  const snap = await db.collection("productos").where("tiendaId", "==", tId).get();
  lista.innerHTML = "";
  snap.forEach(doc => {
    const p = doc.data();
    lista.innerHTML += `
      <div class="producto-item">
        <span><b>${p.name}</b> - $${p.precio}</span>
        <div>
          <button class="btn-action" onclick="abrirEdicion('${doc.id}', '${p.name}', ${p.precio}, '${p.categoria || ''}', '${p.descripcion || ''}')">✏️ Editar</button>
          <button class="btn-action" style="background:#dc3545;" onclick="borrarProducto('${doc.id}')">🗑️ Borrar</button>
        </div>
      </div>`;
  });
};

// Abrir editor
window.abrirEdicion = (id, nombre, precio, cat, desc) => {
  document.getElementById("editId").value = id;
  document.getElementById("editNombre").value = nombre;
  document.getElementById("editPrecio").value = precio;
  document.getElementById("editCategoria").value = cat;
  document.getElementById("editDesc").value = desc;
  document.getElementById("editorProducto").classList.remove("hidden");
};

// Guardar cambios
window.guardarEdicion = async () => {
  const id = document.getElementById("editId").value;
  await db.collection("productos").doc(id).update({
    name: document.getElementById("editNombre").value,
    precio: parseFloat(document.getElementById("editPrecio").value),
    categoria: document.getElementById("editCategoria").value,
    descripcion: document.getElementById("editDesc").value
  });
  alert("Producto actualizado correctamente");
  document.getElementById("editorProducto").classList.add("hidden");
  cargarProductosOriginal();
};

// Borrar
window.borrarProducto = async (id) => {
  if(confirm("¿Seguro que quieres borrar este producto?")) {
    await db.collection("productos").doc(id).delete();
    cargarProductosOriginal();
  }
};

document.getElementById("btnIniciarSesion").addEventListener("click", () => {
  auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value);
});

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    cargarTiendas();
  }
});
</script>
</body>
</html>
