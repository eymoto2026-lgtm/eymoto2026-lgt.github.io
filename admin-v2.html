<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; transition: background 0.2s; }
    button:hover { background: #e0b300; }
    .hidden { display:none; }
    .tienda-card-item { border:1px solid #444; padding:15px; margin-top:12px; border-radius:8px; background: #222; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
    .pedido-card { border: 2px solid #333; padding: 15px; margin-top: 12px; border-radius: 8px; background: #1e1e1e; }
    .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .flex-buttons { display: flex; gap: 5px; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN - EYMOTO</header>

<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso al Panel</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
    <p id="loginMsg" style="color: #ff4444;"></p>
  </div>

  <div id="panel" class="hidden">
    <div class="card" style="border: 2px solid #f5c400;">
      <h3>📋 Monitor de Pedidos</h3>
      <button onclick="probarVozAlarma()">🔔 Probar Altavoz</button>
      <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()">
        <option value="">Seleccionar tienda...</option>
      </select>
      <div id="contenedorPedidos"></div>
    </div>

    <div class="card">
      <h3 id="tituloFormProducto">🍔 Gestión de Productos</h3>
      <select id="tiendaProducto" onchange="cargarProductosOriginal()"></select>
      <input id="nuevoNombre" placeholder="Nombre">
      <input id="nuevoPrecio" type="number" placeholder="Precio">
      <input id="nuevoCategoria" placeholder="Categoría">
      <textarea id="nuevoDescripcion" placeholder="Descripción"></textarea>
      <button id="btnGuardarProducto" onclick="guardarProductoOriginal()">Guardar Producto</button>
      <div id="listaProductos"></div>
    </div>
    <button onclick="logout()" style="background:#444; color:#fff;">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let pedidosUnsubscribe = null;
let despertadorInterval = null;

// --- FUNCIONES SONIDO ---
function reproducirSonidoDespertador(nombreTienda) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(`Atención, nuevo pedido en ${nombreTienda}`);
    msg.lang = 'es-CO';
    window.speechSynthesis.speak(msg);
  }
}

window.probarVozAlarma = () => reproducirSonidoDespertador("Ey Moto");

function activarAlarma(nombre) {
  if (!despertadorInterval) {
    reproducirSonidoDespertador(nombre);
    despertadorInterval = setInterval(() => reproducirSonidoDespertador(nombre), 5000);
  }
}

function detenerAlarma() {
  clearInterval(despertadorInterval);
  despertadorInterval = null;
  window.speechSynthesis.cancel();
}

// --- LOGICA PRODUCTOS (SUBCOLECCIÓN) ---
window.cargarProductosOriginal = async function() {
  const tiendaId = document.getElementById("tiendaProducto").value;
  const lista = document.getElementById("listaProductos");
  lista.innerHTML = "";
  if (!tiendaId) return;

  const snap = await db.collection("tiendas").doc(tiendaId).collection("productos").get();
  snap.forEach(doc => {
    const p = doc.data();
    lista.innerHTML += `
      <div class="producto-item">
        <div><b>${p.nombre || p.name}</b> - $${p.precio}</div>
        <button onclick="eliminarProducto('${doc.id}')">🗑️</button>
      </div>`;
  });
}

window.guardarProductoOriginal = async function() {
  const tiendaId = document.getElementById("tiendaProducto").value;
  const data = {
    nombre: document.getElementById("nuevoNombre").value,
    precio: parseFloat(document.getElementById("nuevoPrecio").value),
    categoria: document.getElementById("nuevoCategoria").value,
    descripcion: document.getElementById("nuevoDescripcion").value
  };
  await db.collection("tiendas").doc(tiendaId).collection("productos").add(data);
  alert("Producto guardado");
  cargarProductosOriginal();
}

// --- LOGICA PEDIDOS ---
window.escucharPedidosEnTiempoReal = function() {
  const select = document.getElementById("filtroTiendaPedidos");
  const tiendaId = select.value;
  if (pedidosUnsubscribe) pedidosUnsubscribe();
  detenerAlarma();
  if (!tiendaId) return;

  let esInicial = true;
  pedidosUnsubscribe = db.collection("tiendas").doc(tiendaId).collection("pedidos")
    .orderBy("fecha", "desc").onSnapshot(snap => {
      let nuevo = false;
      snap.docChanges().forEach(c => { if(c.type==='added' && c.doc.data().estado==='Pendiente') nuevo=true; });
      if (!esInicial && nuevo) activarAlarma(select.options[select.selectedIndex].text);
      esInicial = false;
    });
}

// Inicialización
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    db.collection("tiendas").get().then(snap => {
      snap.forEach(doc => {
        const opt = `<option value="${doc.id}">${doc.data().nombre}</option>`;
        document.getElementById("filtroTiendaPedidos").innerHTML += opt;
        document.getElementById("tiendaProducto").innerHTML += opt;
      });
    });
  }
});

document.getElementById("btnIniciarSesion").onclick = () => {
  auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value)
    .catch(e => document.getElementById("loginMsg").innerText = e.message);
};

window.logout = () => { detenerAlarma(); auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
