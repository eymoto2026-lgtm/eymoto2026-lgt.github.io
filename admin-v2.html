<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
    .pedido-card { border: 2px solid #ffc107; padding: 15px; margin-top: 12px; border-radius: 8px; background: #1e1e1e; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 10px 0; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN - EYMOTO</header>
<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso Administrativo</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
    <p id="loginMsg" style="color: #ff4444;"></p>
  </div>

  <div id="panel" class="hidden">
    <div class="card" style="border: 2px solid #f5c400;">
      <h3>📋 Monitor de Pedidos</h3>
      <button onclick="probarVozAlarma()">🔔 Probar Altavoz</button>
      <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()"><option value="">Selecciona tienda...</option></select>
      <div id="contenedorPedidos"></div>
    </div>
    <div class="card">
        <h3>🍔 Productos</h3>
        <select id="tiendaProducto" onchange="cargarProductosOriginal()"><option value="">Selecciona tienda...</option></select>
        <div id="listaProductos"></div>
    </div>
    <button onclick="auth.signOut()" style="background:#444; color:#fff;">Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY", authDomain: "eymotocomidas.firebaseapp.com", projectId: "eymotocomidas", storageBucket: "eymotocomidas.firebasestorage.app", messagingSenderId: "670474251560", appId: "1:670474251560:web:eab1fbbb744af4e0b8341d" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// Lógica de Sonido
window.probarVozAlarma = () => {
    const msg = new SpeechSynthesisUtterance("Sistema de pedidos Ey Moto activo");
    msg.lang = 'es-CO';
    window.speechSynthesis.speak(msg);
};

// Escuchar Pedidos (Formato Elegante)
window.escucharPedidosEnTiempoReal = () => {
    const tiendaId = document.getElementById("filtroTiendaPedidos").value;
    const cont = document.getElementById("contenedorPedidos");
    if(!tiendaId) return;

    db.collection("tiendas").doc(tiendaId).collection("pedidos").orderBy("fecha", "desc").onSnapshot(snap => {
        cont.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            let itemsHTML = "";
            if(p.items) p.items.forEach(i => itemsHTML += `🍜 ${i.nombre} x${i.cantidad} = $${i.total?.toLocaleString()}<br>`);
            
            cont.innerHTML += `
            <div class="pedido-card">
                <p style="color:#f5c400; font-weight:bold;">🛵 PEDIDO #${p.numeroPedido || 'N/A'}</p>
                <p>📅 ${p.fecha || 'Sin fecha'}</p>
                <p>👤 <b>Cliente:</b> ${p.cliente?.nombre}<br>📱 <b>Tel:</b> ${p.cliente?.telefono}<br>📍 <b>Dir:</b> ${p.cliente?.direccion}</p>
                <div style="border-top:1px solid #444; margin:10px 0;">
                    <p>🧾 <b>PRODUCTOS</b></p>${itemsHTML}
                </div>
                <p style="font-size:18px; color:#28a745; font-weight:bold;">💰 TOTAL: $${(p.total || 0).toLocaleString()}</p>
            </div>`;
        });
    });
};

// Carga Inicial
auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        // Cargar tiendas en select
        db.collection("tiendas").get().then(snap => {
            const sel = document.getElementById("filtroTiendaPedidos");
            snap.forEach(d => sel.innerHTML += `<option value="${d.id}">${d.data().nombre}</option>`);
        });
    }
});

document.getElementById("btnIniciarSesion").onclick = () => {
    auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value)
    .catch(e => document.getElementById("loginMsg").innerText = e.message);
};
</script>
</body>
</html>
