<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
    .tienda-card-item { border:1px solid #444; padding:15px; margin-top:12px; border-radius:8px; background: #222; }
    .pedido-card { border: 2px solid #333; padding: 15px; margin-top: 12px; border-radius: 8px; background: #1e1e1e; }
    .status-pendiente { border-color: #ffc107; }
    .grid-acciones { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-top: 12px; }
    .btn-status { font-size: 12px; padding: 8px; margin: 0; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN GENERAL - EYMOTO</header>
<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso al Panel</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
  </div>

  <div id="panel" class="hidden">
    <div class="card" style="border: 2px solid #f5c400;">
      <h3>📋 Monitor Global de Pedidos</h3>
      <button onclick="probarVozAlarma()">🔔 Probar Altavoz</button>
      <div id="contenedorPedidos"></div>
    </div>
    <button onclick="auth.signOut()" style="background:#444; color:#fff;">Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let colaPedidosPendientes = [];
let esReproduciendo = false;

function procesarColaDeVoz() {
    if (colaPedidosPendientes.length > 0 && !esReproduciendo && 'speechSynthesis' in window) {
        esReproduciendo = true;
        const msg = new SpeechSynthesisUtterance("Atención, tienes pedidos pendientes por confirmar.");
        msg.lang = 'es-CO';
        msg.onend = () => {
            esReproduciendo = false;
            setTimeout(procesarColaDeVoz, 5000);
        };
        window.speechSynthesis.speak(msg);
    }
}

window.probarVozAlarma = () => {
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Sistema de alerta listo."));
}

window.escucharPedidosEnTiempoReal = () => {
    const cont = document.getElementById("contenedorPedidos");
    db.collectionGroup("pedidos").orderBy("fecha", "desc").onSnapshot(snap => {
        cont.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            const id = doc.id;
            const tienda = doc.ref.parent.parent.id;
            
            if (p.estado === "Pendiente" && !colaPedidosPendientes.includes(id)) {
                colaPedidosPendientes.push(id);
            }
            
            cont.innerHTML += `
                <div class="pedido-card status-pendiente">
                    <p><b>Tienda:</b> ${tienda} | <b>Pedido:</b> ${p.numeroPedido || '---'}</p>
                    <div class="grid-acciones">
                        <button onclick="cambiarEstado('${tienda}', '${id}', 'En Preparación')" class="btn-status">🔵 Cocinar</button>
                        <button onclick="cambiarEstado('${tienda}', '${id}', 'Entregado')" class="btn-status">🟢 Entregado</button>
                    </div>
                </div>`;
        });
        if (colaPedidosPendientes.length > 0) procesarColaDeVoz();
    });
}

window.cambiarEstado = async (tId, pId, estado) => {
    colaPedidosPendientes = colaPedidosPendientes.filter(id => id !== pId);
    await db.collection("tiendas").doc(tId).collection("pedidos").doc(pId).update({ estado });
    if (colaPedidosPendientes.length === 0) window.speechSynthesis.cancel();
};

document.getElementById("btnIniciarSesion").addEventListener("click", () => {
    auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value);
});

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        escucharPedidosEnTiempoReal();
    }
});
</script>
</body>
</html>
