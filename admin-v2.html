<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin V2 - EyMoto</title>
    <style>
        body{font-family:sans-serif; background:#121212; color:#fff; padding:20px;}
        .card{background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:15px; border:1px solid #333;}
        input, select, textarea{width:100%; padding:10px; margin:5px 0; background:#2a2a2a; border:1px solid #444; color:#fff; border-radius:5px; box-sizing:border-box;}
        button{background:#f5c400; border:none; padding:10px; width:100%; font-weight:bold; cursor:pointer; margin-top:10px; border-radius:5px;}
        .grid{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
        .pedido-alerta{background:#3a0000; border:2px solid #ff4444; padding:15px; margin:10px 0; animation: flash 1s infinite;}
        @keyframes flash{0%{opacity:1} 50%{opacity:0.5} 100%{opacity:1}}
    </style>
</head>
<body>

<div id="loginBox" class="card">
    <h3>🔐 Acceso Administrativo</h3>
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="iniciarSesion()">Entrar</button>
</div>

<div id="panel" style="display:none;">
    <div class="grid">
        <!-- MONITOR Y ALARMAS -->
        <div class="card">
            <h3>🔔 Monitor de Pedidos</h3>
            <select id="selMon" onchange="conectarMonitor()"><option>Seleccionar tienda...</option></select>
            <div id="listaPedidos"></div>
        </div>

        <!-- TIENDAS -->
        <div class="card">
            <h3>🏪 Gestión Tiendas</h3>
            <input id="tNom" placeholder="Nombre Tienda">
            <button onclick="guardarTienda()">Guardar / Editar</button>
            <div id="listaTiendas"></div>
        </div>
    </div>

    <!-- PRODUCTOS Y CATEGORÍAS -->
    <div class="card">
        <h3>🍔 Productos y Categorías</h3>
        <select id="selProd" onchange="cargarProductos()"><option>Seleccionar tienda...</option></select>
        <input id="pNom" placeholder="Nombre">
        <input id="pCat" placeholder="Categoría">
        <input id="pPrec" type="number" placeholder="Precio">
        <button onclick="guardarProducto()">Guardar Producto</button>
        <div id="listaProductos"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY", authDomain: "eymotocomidas.firebaseapp.com", projectId: "eymotocomidas", storageBucket: "eymotocomidas.firebasestorage.app", messagingSenderId: "670474251560", appId: "1:670474251560:web:eab1fbbb744af4e0b8341d" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. AUTENTICACIÓN
    function iniciarSesion(){
        firebase.auth().signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
        .then(() => location.reload()).catch(e => alert(e.message));
    }

    firebase.auth().onAuthStateChanged(u => {
        if(u){ document.getElementById('loginBox').style.display='none'; document.getElementById('panel').style.display='block'; cargarDatos(); }
    });

    // 2. TIENDAS (Crear, Editar, Eliminar, Abrir/Cerrar)
    async function guardarTienda(){
        const nombre = document.getElementById('tNom').value;
        await db.collection('tiendas').add({nombre, abierta: true});
        cargarDatos();
    }

    async function toggleTienda(id, estado){
        await db.collection('tiendas').doc(id).update({abierta: !estado});
        cargarDatos();
    }

    async function eliminarTienda(id){
        await db.collection('tiendas').doc(id).delete();
        cargarDatos();
    }

    // 3. PRODUCTOS (Crear, Editar, Eliminar, Categoría)
    async function guardarProducto(){
        const tId = document.getElementById('selProd').value;
        await db.collection('tiendas').doc(tId).collection('productos').add({
            name: document.getElementById('pNom').value,
            categoria: document.getElementById('pCat').value,
            precio: parseFloat(document.getElementById('pPrec').value)
        });
        cargarProductos();
    }

    // 4. MONITOR Y ALARMAS (100% Real)
    function conectarMonitor(){
        const tId = document.getElementById('selMon').value;
        db.collection('tiendas').doc(tId).collection('pedidos').onSnapshot(snap => {
            const list = document.getElementById('listaPedidos');
            list.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                if(p.estado === 'Pendiente') {
                    // ALARMA
                    const msg = new SpeechSynthesisUtterance("Nuevo pedido en " + tId);
                    window.speechSynthesis.speak(msg);
                    list.innerHTML += `<div class="pedido-alerta">${p.numeroPedido} - ¡NUEVO!</div>`;
                }
            });
        });
    }

    async function cargarDatos(){
        const snap = await db.collection('tiendas').get();
        const selM = document.getElementById('selMon');
        const selP = document.getElementById('selProd');
        snap.forEach(doc => {
            selM.innerHTML += `<option value="${doc.id}">${doc.data().nombre}</option>`;
            selP.innerHTML += `<option value="${doc.id}">${doc.data().nombre}</option>`;
        });
    }
</script>
</body>
</html>
