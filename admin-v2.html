<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - EyMoto</title>

  <style>
    body { font-family: Arial; background:#111; color:#fff; margin:0; }
    header { background:#000; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .container { padding:20px; }
    .card { background:#1c1c1c; padding:15px; margin-bottom:10px; border-radius:10px; }
    input, button { padding:10px; margin:5px 0; width:100%; border-radius:5px; border:none; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; }
    .hidden { display:none; }
    .tienda { border:1px solid #333; padding:10px; margin-top:10px; border-radius:8px; }
  </style>
</head>

<body>

<header>ADMIN V2 - EYMOTO</header>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h3>🔐 Login Administrador</h3>
    <input type="email" id="email">
    <input type="password" id="password">
    <button onclick="login()">Iniciar sesión</button>
    <p id="loginMsg"></p>
  </div>

  <!-- PANEL -->
  <div id="panel" class="hidden">

    <div class="card">
      <h3>➕ Crear Tienda</h3>
      <input id="nombreTienda" placeholder="Nombre tienda">

<input id="whatsapp" placeholder="WhatsApp">

<input id="logoTienda" placeholder="URL del logo">

<input id="bannerTienda" placeholder="URL del banner (opcional)">
      <button onclick="crearTienda()">Crear Tienda</button>
    </div>

    <div class="card">
      <h3>➕ Crear Producto</h3>

      <select id="tiendaProducto" onchange="cargarProductos()">
        <option value="">Seleccionar tienda</option>
      </select>

      <input id="nuevoNombre" placeholder="Nombre">
      <input id="nuevoPrecio" type="number" placeholder="Precio">
      <input id="nuevoCategoria" placeholder="Categoría">
      <input id="nuevoDescripcion" placeholder="Descripción">
      <input id="nuevoImagen" placeholder="Imagen">

      <button onclick="crearProducto()">Crear Producto</button>
    </div>

    <div class="card">
      <h3>🏪 Tiendas</h3>
      <div id="listaTiendas"></div>
    </div>

    <div class="card">
      <h3>📦 Productos</h3>
      <div id="listaProductos"></div>
    </div>

    <button onclick="logout()">Cerrar sesión</button>

  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).catch(e => loginMsg.innerText = e.message);
}

// AUTH
auth.onAuthStateChanged(async user => {
  if (user) {

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    await cargarTiendas();
    await cargarSelectTiendas();

    const select = document.getElementById("tiendaProducto");

    // seleccionar primera tienda automáticamente
    if (select.options.length > 1) {
      select.selectedIndex = 1;
    }

    cargarProductos();

  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("panel").style.display = "none";
  }
});
// TIENDAS
async function crearTienda() {
  const id = nombreTienda.value.toLowerCase().replace(/\s/g, "");

  await db.collection("tiendas").doc(id).set({
    nombre: nombreTienda.value,
    whatsapp: whatsapp.value,
    logo: logoTienda.value,
    banner: bannerTienda.value || "",
    activa: true,
    abierta: true,
    createdAt: Date.now()
  });

  cargarTiendas();
  cargarSelectTiendas();
}

async function cargarTiendas() {
  listaTiendas.innerHTML = "";
  const snap = await db.collection("tiendas").get();

  snap.forEach(doc => {
    const t = doc.data();
    listaTiendas.innerHTML += `
      <div class="tienda">
        <b>${t.nombre}</b><br>
        ${t.whatsapp}
      </div>`;
  });
}

// SELECT TIENDAS
async function cargarSelectTiendas() {
  tiendaProducto.innerHTML = '<option value="">Seleccionar tienda</option>';

  const snap = await db.collection("tiendas").get();

  snap.forEach(doc => {
    const t = doc.data();
    tiendaProducto.innerHTML += `
      <option value="${doc.id}">
        ${t.nombre}
      </option>`;
  });
}

// PRODUCTOS
async function cargarProductos() {

  const cont = document.getElementById("listaProductos");
  cont.innerHTML = "";

  const tiendaId = document.getElementById("tiendaProducto").value;

  if (!tiendaId) {
    console.log("No hay tienda seleccionada");
    return;
  }

  const snap = await db
    .collection("tiendas")
    .doc(tiendaId)
    .collection("productos")
    .get();

  snap.forEach(doc => {

    const p = doc.data();

    cont.innerHTML += `
      <div class="tienda">
        <b>${p.name}</b><br>
        Precio: $${p.precio}<br>
        Categoría: ${p.categoria}<br>
        Disponible: ${p.disponible ? "✅ Sí" : "❌ No"}

        <br><br>

        <button onclick="cambiarDisponibilidad('${doc.id}', ${p.disponible})">
          ${p.disponible ? "❌ Agotar" : "✅ Activar"}
        </button>

        <br><br>

        <button onclick="eliminarProducto('${doc.id}','${p.name}')">
          🗑️ Eliminar
        </button>
      </div>
    `;
  });
}
// CREAR PRODUCTO
async function crearProducto() {
  const tiendaId = tiendaProducto.value;

  await db
    .collection("tiendas")
    .doc(tiendaId)
    .collection("productos")
    .add({
      name: nuevoNombre.value,
      precio: Number(nuevoPrecio.value),
      categoria: nuevoCategoria.value,
      descripcion: nuevoDescripcion.value,
      img: nuevoImagen.value,
      disponible: true
    });

  cargarProductos();
}

// CAMBIAR DISPONIBILIDAD
async function cambiarDisponibilidad(productoId, disponibleActual) {

  const tiendaId =
    document.getElementById("tiendaProducto").value;

  try {

    const ref = db
      .collection("tiendas")
      .doc(tiendaId)
      .collection("productos")
      .doc(productoId);

    await ref.set({
      disponible: !disponibleActual
    }, { merge: true });

    alert("CAMBIADO A: " + (!disponibleActual));

    const prueba = await ref.get();

    alert(
      "VALOR FIREBASE: " +
      prueba.data().disponible
    );

    cargarProductos();

  } catch (e) {

    alert("ERROR: " + e.message);
    console.error(e);

  }
}
window.eliminarProducto = async function(productoId, nombre) {
  if (!confirm("¿Eliminar " + nombre + "?")) {
    return;
  }

  try {

    const tiendaId =
      document.getElementById("tiendaProducto").value;

    await db
      .collection("tiendas")
      .doc(tiendaId)
      .collection("productos")
      .doc(productoId)
      .delete();

    alert("Producto eliminado");

    cargarProductos();

  } catch (e) {

    console.error(e);
    alert("ERROR: " + e.message);

  }

}
// LOGOUT
function logout() {
  auth.signOut();
}
</script>

</body>
</html>
