<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
  </style>
</head>

<body>
<header>🚀 PANEL DE ADMINISTRACIÓN - EYMOTO</header>
<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso al Panel</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
    <p id="errorLogin" style="color:red;"></p>
  </div>

  <div id="panel" class="hidden">
    <div class="card" style="border: 2px solid #f5c400;">
      <h3>📋 Monitor Global de Pedidos</h3>
      <button onclick="probarVozAlarma()" style="background: #008b9b; color: #fff;">🔔 Inicializar Altavoz</button>
      <div id="contenedorPedidos"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// --- CONFIGURACIÓN (Asegúrate de copiar tu config real aquí) ---
const firebaseConfig = {
    apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
    authDomain: "eymotocomidas.firebaseapp.com",
    projectId: "eymotocomidas",
    storageBucket: "eymotocomidas.firebasestorage.app",
    messagingSenderId: "670474251560",
    appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- LÓGICA DE LOGIN (Lo que faltaba) ---
document.getElementById("btnIniciarSesion").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorLogin");
    
    try {
        await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) {
        errorMsg.innerText = "Error: " + e.message;
    }
});

// --- LÓGICA DE COLA DE AUDIO ---
let colaAlertas = [];
let procesandoCola = false;

async function procesarCola() {
  if (procesandoCola || colaAlertas.length === 0) return;
  procesandoCola = true;
  
  const nombreTienda = colaAlertas.shift();
  
  if ('speechSynthesis' in window) {
    const mensaje = new SpeechSynthesisUtterance(`Atención, nuevo pedido para ${nombreTienda}`);
    mensaje.lang = 'es-CO';
    await new Promise(resolve => {
      mensaje.onend = resolve;
      mensaje.onerror = resolve;
      window.speechSynthesis.speak(mensaje);
    });
  }
  
  procesandoCola = false;
  setTimeout(procesarCola, 800);
}

// --- MONITOREO GLOBAL ---
function iniciarMonitoreoGlobal() {
  db.collection("tiendas").get().then(snap => {
    snap.forEach(doc => {
      const tiendaId = doc.id;
      const nombreTienda = doc.data().nombre;
      
      db.collection("tiendas").doc(tiendaId).collection("pedidos")
        .where("estado", "==", "Pendiente")
        .onSnapshot(snapPedidos => {
          snapPedidos.docChanges().forEach(change => {
            if (change.type === "added") {
              colaAlertas.push(nombreTienda);
              procesarCola();
            }
          });
        });
    });
  });
}

window.probarVozAlarma = () => {
  const msg = new SpeechSynthesisUtterance("Sistema de audio listo");
  msg.lang = 'es-CO';
  window.speechSynthesis.speak(msg);
};

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    iniciarMonitoreoGlobal();
  }
});
</script>
</body>
</html>
