<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
  </style>
</head>
<body>
<header>🚀 PANEL DE ADMINISTRACIÓN GENERAL - EYMOTO</header>
<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso al Panel Administrativo</h3>
    <input type="email" id="email" placeholder="ejemplo@eymoto.com">
    <input type="password" id="password" placeholder="••••••••">
    <button id="btnIniciarSesion">Ingresar al Panel</button>
    <p id="loginMsg" style="color: #ff4444; font-weight: bold; margin-top: 10px;"></p>
  </div>

  <div id="panel" class="hidden">
    <div class="card" style="border: 2px solid #f5c400;">
      <h3>📋 Monitor de Pedidos</h3>
      <button onclick="probarVozAlarma()">🔔 Probar Altavoz</button>
      <button onclick="detenerAlarma()" style="background: #dc3545; color: #fff; margin-top: 10px;">🔇 Detener Alarma</button>
      <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()">
        <option value="">Seleccionar tienda...</option>
      </select>
      <div id="contenedorPedidos"></div>
    </div>
    <button onclick="logout()" style="background:#444; color:#fff; margin-top:20px;">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let despertadorInterval = null;
let pedidosUnsubscribe = null;

// --- ALARMA ---
window.probarVozAlarma = function() {
    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Ey Moto, sistema de voz activo"));
};

function activarAlarma() {
    if (despertadorInterval) return;
    const msg = new SpeechSynthesisUtterance("¡Atención, nuevo pedido recibido!");
    window.speechSynthesis.speak(msg);
    despertadorInterval = setInterval(() => window.speechSynthesis.speak(msg), 5000);
}

window.detenerAlarma = function() {
    clearInterval(despertadorInterval);
    despertadorInterval = null;
    window.speechSynthesis.cancel();
};

// --- LOGICA ---
document.getElementById("btnIniciarSesion").addEventListener("click", async () => {
    try {
        await auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value);
    } catch (e) {
        document.getElementById("loginMsg").innerText = "Error: " + e.message;
    }
});

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
    } else {
        document.getElementById("loginBox").classList.remove("hidden");
        document.getElementById("panel").classList.add("hidden");
        detenerAlarma();
    }
});

window.logout = function() {
    detenerAlarma();
    auth.signOut();
};

// --- PEDIDOS (Corregido para sonar al detectar nuevo pedido) ---
window.escucharPedidosEnTiempoReal = function() {
    const tiendaId = document.getElementById("filtroTiendaPedidos").value;
    if (!tiendaId) return;
    if (pedidosUnsubscribe) pedidosUnsubscribe();

    pedidosUnsubscribe = db.collection("pedidos")
        .where("tiendaId", "==", tiendaId)
        .where("estado", "==", "Pendiente")
        .onSnapshot(snap => {
            snap.docChanges().forEach(change => {
                if (change.type === "added") activarAlarma();
            });
        });
};
</script>
</body>
</html>
