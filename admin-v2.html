<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
  </style>
</head>

<body>
<header>🚀 PANEL DE ADMINISTRACIÓN - EYMOTO</header>
<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso al Panel</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar al Panel</button>
    <p id="errorLogin" style="color:#ff4444;"></p>
  </div>

  <div id="panel" class="hidden">
    <div class="card">
      <h3>📋 Monitor Global</h3>
      <button onclick="probarVozAlarma()">🔔 Probar Altavoz</button>
      <div id="contenedorPedidos"></div>
    </div>
    <button onclick="auth.signOut()" style="background:#444; color:#fff;">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  // CONFIGURACIÓN ORIGINAL
  const firebaseConfig = {
    apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
    authDomain: "eymotocomidas.firebaseapp.com",
    projectId: "eymotocomidas",
    storageBucket: "eymotocomidas.firebasestorage.app",
    messagingSenderId: "670474251560",
    appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // LOGIN RESTAURADO
  document.getElementById("btnIniciarSesion").addEventListener("click", () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(email, pass).catch(e => {
      document.getElementById("errorLogin").innerText = "Error: " + e.message;
    });
  });

  // CONTROL DE ESTADO RESTAURADO
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panel").classList.remove("hidden");
      console.log("Sesión activa");
      // AQUÍ PUEDES VOLVER A LLAMAR A TU FUNCIÓN DE CARGA ORIGINAL:
      // iniciarMonitoreoGlobal(); 
      // cargarTiendas();
    } else {
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("panel").classList.add("hidden");
    }
  });

  window.probarVozAlarma = () => {
    const msg = new SpeechSynthesisUtterance("Sistema de audio listo");
    window.speechSynthesis.speak(msg);
  };
</script>
</body>
</html>
