<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - EyMotoComidas</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 10px; width: 300px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f5c400; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }
        .hidden { display: none; }
        #errorLogin { color: #ff6b6b; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- CAJA DE LOGIN -->
    <div id="loginBox" class="card">
        <h3>EyMoto Administrador</h3>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnIniciarSesion">Ingresar</button>
        <p id="errorLogin"></p>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="panel" class="card hidden">
        <h3>Panel Activo</h3>
        <p>Has iniciado sesión correctamente.</p>
        <button id="btnCerrarSesion" style="background: #444; color: #fff;">Cerrar Sesión</button>
    </div>

    <script type="module">
        // 1. IMPORTACIONES
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 2. CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
            authDomain: "eymotocomidas.firebaseapp.com",
            projectId: "eymotocomidas",
            storageBucket: "eymotocomidas.firebasestorage.app",
            messagingSenderId: "670474251560",
            appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
        };

        // 3. INICIALIZACIÓN
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 4. LÓGICA DE EVENTOS
        document.getElementById("btnIniciarSesion").addEventListener("click", async () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorLogin");

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                errorMsg.innerText = "Error: " + e.message;
            }
        });

        document.getElementById("btnCerrarSesion").addEventListener("click", () => {
            signOut(auth);
        });

        // 5. ESTADO DE SESIÓN
        onAuthStateChanged(auth, (user) => {
            const loginBox = document.getElementById("loginBox");
            const panel = document.getElementById("panel");
            
            if (user) {
                loginBox.classList.add("hidden");
                panel.classList.remove("hidden");
            } else {
                loginBox.classList.remove("hidden");
                panel.classList.add("hidden");
            }
        });
    </script>
</body>
</html>
