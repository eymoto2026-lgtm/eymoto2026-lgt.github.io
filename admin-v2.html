<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; transition: background 0.2s; }
    button:hover { background: #e0b300; }
    .hidden { display:none; }
    .tienda-card-item { border:1px solid #444; padding:15px; margin-top:12px; border-radius:8px; background: #222; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
    .pedido-card { border: 2px solid #333; padding: 15px; margin-top: 12px; border-radius: 8px; background: #1e1e1e; }
    .status-pendiente { border-color: #ffc107; }
    .status-preparacion { border-color: #17a2b8; }
    .status-entregado { border-color: #28a745; }
    .status-cancelado { border-color: #dc3545; }
    .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .badge-pendiente { background: #ffc107; color: #000; }
    .badge-preparacion { background: #17a2b8; color: #fff; }
    .badge-entregado { background: #28a745; color: #fff; }
    .badge-cancelado { background: #dc3545; color: #fff; }
    .grid-acciones { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-top: 12px; }
    .btn-status { font-size: 12px; padding: 8px; margin: 0; }
    .btn-danger { background: #dc3545; color: #fff; width: auto; padding: 6px 12px; font-size: 13px; }
    .btn-edit { background: #00bcd4; color: #000; width: auto; padding: 6px 12px; font-size: 13px; margin-right: 5px; }
    .flex-buttons { display: flex; gap: 5px; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN GENERAL - EYMOTO</header>
<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso al Panel Administrativo</h3>
    <input type="email" id="email" placeholder="ejemplo@eymoto.com">
    <input type="password" id="password" placeholder="••••••••">
    <button id="btnIniciarSesion">Ingresar al Panel</button>
    <p id="loginMsg" style="color: #ff4444; font-weight: bold; margin-top: 10px;"></p>
  </div>

  <div id="panel" class="hidden">
    <div class="card" style="border: 2px solid #f5c400; background: #151515;">
      <h3>📋 Monitor de Pedidos</h3>
      <button onclick="probarVozAlarma()" style="background: #008b9b; color: #fff;">🔔 Test Altavoz</button>
      <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()"><option value="">Seleccionar tienda...</option></select>
      <div id="contenedorPedidos"></div>
    </div>

    <div class="card" style="border-left: 5px solid #00bcd4;">
      <h3 id="tituloFormTienda">🏪 Formulario de Tienda</h3>
      <input type="hidden" id="editTiendaId">
      <input id="nombreTienda" placeholder="Nombre Comercial">
      <input id="whatsapp" placeholder="WhatsApp">
      <input id="logoTienda" placeholder="URL Logo">
      <input id="bannerTienda" placeholder="URL Banner">
      <button id="btnGuardarTienda" onclick="guardarTiendaOriginal()">Registrar Tienda</button>
      <button id="btnCancelarTiendaEdicion" class="hidden" onclick="cancelarEdicionTienda()">Cancelar</button>
    </div>

    <div class="card" style="border-left: 5px solid #ffc107;">
      <h3 id="tituloFormProducto">🍔 Formulario de Producto</h3>
      <select id="tiendaProducto" onchange="cargarProductosOriginal()"><option value="">Seleccionar tienda...</option></select>
      <input type="hidden" id="editProductoId">
      <input id="nuevoNombre" placeholder="Nombre producto">
      <input id="nuevoPrecio" type="number" placeholder="Precio">
      <input id="nuevoCategoria" placeholder="Categoría">
      <textarea id="nuevoDescripcion" placeholder="Descripción"></textarea>
      <input id="nuevoImagen" placeholder="URL Imagen">
      <button id="btnGuardarProducto" onclick="guardarProductoOriginal()">Añadir/Guardar Producto</button>
      <button id="btnCancelarEdicion" class="hidden" onclick="cancelarEdicionProducto()">Cancelar</button>
    </div>

    <div class="card"><h3>🏪 Lista de Tiendas</h3><div id="listaTiendas"></div></div>
    <div class="card"><h3>📦 Productos</h3><div id="listaProductos"></div></div>
    <div class="card">
        <h3>🏪 Estado de Tienda</h3>
        <select id="tiendaEstado" onchange="cargarEstadoTienda()"><option value="">Seleccionar tienda...</option></select>
        <p id="estadoActual">Estado: <b>-</b></p>
        <button onclick="toggleTienda()" style="background: #28a745; color: #fff;">Cambiar Estado</button>
    </div>
    <button onclick="logout()">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY", authDomain: "eymotocomidas.firebaseapp.com", projectId: "eymotocomidas", storageBucket: "eymotocomidas.firebasestorage.app", messagingSenderId: "670474251560", appId: "1:670474251560:web:eab1fbbb744af4e0b8341d" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db = firebase.firestore();
let pedidosUnsubscribe = null; let despertadorInterval = null;

// --- FUNCIONES DE ALARMA Y PEDIDOS ---
function reproducirSonidoDespertador(nombreTienda = "Ey Moto") {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(`Atención, nuevo pedido para ${nombreTienda}`);
        msg.lang = 'es-CO'; window.speechSynthesis.speak(msg);
    }
}
window.probarVozAlarma = () => { if ('speechSynthesis' in window) { const msg = new SpeechSynthesisUtterance("Alarma configurada"); window.speechSynthesis.speak(msg); alert("Altavoz listo"); } };
function detenerAlarma() { clearInterval(despertadorInterval); despertadorInterval = null; window.speechSynthesis.cancel(); }
function activarAlarma(nombre) { if (!despertadorInterval) { reproducirSonidoDespertador(nombre); despertadorInterval = setInterval(() => reproducirSonidoDespertador(nombre), 5000); } }

window.escucharPedidosEnTiempoReal = function() {
    const tiendaId = document.getElementById("filtroTiendaPedidos").value;
    if (pedidosUnsubscribe) pedidosUnsubscribe();
    if (!tiendaId) return;
    pedidosUnsubscribe = db.collection("tiendas").doc(tiendaId).collection("pedidos").orderBy("fecha", "desc").onSnapshot(snap => {
        const contenedor = document.getElementById("contenedorPedidos");
        contenedor.innerHTML = "";
        let nuevoPendiente = false;
        snap.forEach(doc => {
            const p = doc.data();
            if (p.estado === "Pendiente") nuevoPendiente = true;
            contenedor.innerHTML += `
            <div class="pedido-card">
                <b>${p.numeroPedido}</b> - ${p.estado}
                <div class="grid-acciones">
                    <button class="btn-status" onclick="cambiarEstadoPedido('${tiendaId}', '${doc.id}', 'Pendiente')">🟡</button>
                    <button class="btn-status" onclick="cambiarEstadoPedido('${tiendaId}', '${doc.id}', 'Entregado')">🟢</button>
                    <button class="btn-danger" onclick="eliminarPedidoHistorial('${tiendaId}', '${doc.id}')">🗑️</button>
                </div>
            </div>`;
        });
        if (nuevoPendiente) activarAlarma(document.getElementById("filtroTiendaPedidos").options[document.getElementById("filtroTiendaPedidos").selectedIndex].text);
        else detenerAlarma();
    });
}

window.cambiarEstadoPedido = (tId, pId, est) => db.collection("tiendas").doc(tId).collection("pedidos").doc(pId).update({ estado: est });
window.eliminarPedidoHistorial = (tId, pId) => db.collection("tiendas").doc(tId).collection("pedidos").doc(pId).delete();

// --- GESTIÓN TIENDAS Y PRODUCTOS (Ruta Unificada) ---
window.cargarTiendas = async () => {
    const snap = await db.collection("tiendas").get();
    const lista = document.getElementById("listaTiendas");

    lista.innerHTML = "";

    snap.forEach(doc => {
        const t = doc.data();

        lista.innerHTML += `
            <div class="tienda-card-item">
                <b>${t.nombre || "Sin nombre"}</b><br>

                <small>${t.whatsapp || ""}</small><br>

                <button class="btn-edit"
                    onclick="activarEdicionTienda('${doc.id}', '${t.nombre || ""}', '${t.whatsapp || ""}', '${t.logo || ""}', '${t.banner || ""}')">
                    ✏️ Editar
                </button>

                <button class="btn-danger"
                    onclick="eliminarTiendaOriginal('${doc.id}')">
                    🗑️ Eliminar
                </button>
            </div>
        `;
    });
};
window.guardarProductoOriginal = async () => {
    const tId = document.getElementById("tiendaProducto").value;
    const pId = document.getElementById("editProductoId").value;
    const datos = {
        name: document.getElementById("nuevoNombre").value,
        precio: parseFloat(document.getElementById("nuevoPrecio").value) || 0,
        categoria: document.getElementById("nuevoCategoria").value,
        descripcion: document.getElementById("nuevoDescripcion").value,
        img: document.getElementById("nuevoImagen").value
    };
    const ref = db.collection("tiendas").doc(tId).collection("productos");
    pId ? await ref.doc(pId).set(datos, { merge: true }) : await ref.add(datos);
    cancelarEdicionProducto(); cargarProductosOriginal();
};

window.cargarProductosOriginal = async () => {
    const tId = document.getElementById("tiendaProducto").value;
    const lista = document.getElementById("listaProductos");
    const snap = await db.collection("tiendas").doc(tId).collection("productos").get();
    lista.innerHTML = "";
    snap.forEach(doc => {
        const p = doc.data();
        lista.innerHTML += `<div class="producto-item">${p.name} - $${p.precio}
        <button class="btn-edit" onclick="activarEdicionProducto('${doc.id}', '${p.name}', ${p.precio}, '${p.categoria}', '${p.descripcion}', '${p.img}')">✏️</button>
        <button class="btn-danger" onclick="eliminarProductoOriginal('${doc.id}')">🗑️</button></div>`;
    });
};

window.eliminarProductoOriginal = async (idProd) => {
    const tId = document.getElementById("tiendaProducto").value;
    await db.collection("tiendas").doc(tId).collection("productos").doc(idProd).delete();
    cargarProductosOriginal();
};

window.activarEdicionProducto = (id, name, precio, cat, desc, img) => {
    document.getElementById("editProductoId").value = id;
    document.getElementById("nuevoNombre").value = name;
    document.getElementById("nuevoPrecio").value = precio;
    document.getElementById("nuevoCategoria").value = cat;
    document.getElementById("nuevoDescripcion").value = desc;
    document.getElementById("nuevoImagen").value = img;
    document.getElementById("btnCancelarEdicion").classList.remove("hidden");
};

window.cancelarEdicionProducto = () => {
    document.getElementById("editProductoId").value = "";
    document.getElementById("nuevoNombre").value = "";
    document.getElementById("btnCancelarEdicion").classList.add("hidden");
};
window.activarEdicionTienda = (id, nombre, whatsapp, logo, banner) => {
    document.getElementById("editTiendaId").value = id;
    document.getElementById("nuevoNombreTienda").value = nombre;
    document.getElementById("nuevoWhatsappTienda").value = whatsapp;
    document.getElementById("nuevoLogoTienda").value = logo;
    document.getElementById("nuevoBannerTienda").value = banner;

    document.getElementById("btnCancelarTienda").classList.remove("hidden");
};
  window.cancelarEdicionTienda = () => {
    const id = document.getElementById("editTiendaId");
    if (id) id.value = "";

    document.getElementById("nuevoNombreTienda").value = "";
    document.getElementById("nuevoWhatsappTienda").value = "";
    document.getElementById("nuevoLogoTienda").value = "";
    document.getElementById("nuevoBannerTienda").value = "";

    document.getElementById("btnCancelarTienda").classList.add("hidden");
};
  window.eliminarTiendaOriginal = async (id) => {
    const confirmar = confirm("¿Eliminar esta tienda?");

    if (!confirmar) return;

    await db.collection("tiendas").doc(id).delete();
    cargarTiendas();
};
// --- RESTO DE FUNCIONES ---
window.toggleTienda = async () => {
    const id = document.getElementById("tiendaEstado").value;
    const ref = db.collection("tiendas").doc(id);

    const doc = await ref.get();
    const abierta = doc.data()?.abierta === true;

    await ref.update({
        abierta: !abierta
    });

    cargarEstadoTienda();
};

window.cargarEstadoTienda = async () => {
    const id = document.getElementById("tiendaEstado").value;
    const doc = await db.collection("tiendas").doc(id).get();

    const abierta = doc.data()?.abierta === true;

    document.getElementById("estadoActual").innerHTML =
        `Estado: <b>${abierta ? "🟢 ABIERTO" : "🔴 CERRADO"}</b>`;
};
window.guardarTiendaOriginal = async () => {
    const id = document.getElementById("editTiendaId")?.value || "";

    const datos = {
        nombre: document.getElementById("nuevoNombreTienda").value,
        whatsapp: document.getElementById("nuevoWhatsappTienda").value,
        logo: document.getElementById("nuevoLogoTienda").value,
        banner: document.getElementById("nuevoBannerTienda").value,
        abierta: true,
        updatedAt: Date.now()
    };

    const ref = db.collection("tiendas");

    if (id) {
        await ref.doc(id).set(datos, { merge: true });
    } else {
        await ref.add({
            ...datos,
            createdAt: Date.now()
        });
    }

    cancelarEdicionTienda();
    cargarTiendas();
};
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        cargarTiendas();
    } else {
        document.getElementById("loginBox").classList.remove("hidden");
        document.getElementById("panel").classList.add("hidden");
    }
});

document.getElementById("btnIniciarSesion").onclick = () => auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value);
window.logout = () => { detenerAlarma(); auth.signOut(); };

</script>
</body>
</html>
