<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
    .pedido-card { border: 2px solid #ffc107; padding: 15px; margin-top: 10px; border-radius: 8px; background: #222; }
    .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .grid-acciones { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
  </style>
</head>
<body>
<header>🚀 PANEL DE ADMINISTRACIÓN - EYMOTO</header>
<div class="container">
  
  <div id="loginBox" class="card">
    <h3>🔐 Acceso al Panel</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar al Panel</button>
    <p id="errorLogin" style="color:#ff4444;"></p>
  </div>

  <div id="panel" class="hidden">
    
    <div class="card">
      <h3>📋 Monitor Global de Pedidos</h3>
      <button onclick="probarVozAlarma()" style="background: #008b9b; color: #fff;">🔔 Inicializar Altavoz</button>
      <div id="contenedorPedidos"></div>
    </div>

    <div class="card">
      <h3>🏪 Gestión de Tiendas</h3>
      <input id="nombreTienda" placeholder="Nombre de la Tienda">
      <input id="whatsapp" placeholder="WhatsApp">
      <button onclick="guardarTiendaOriginal()">Registrar Tienda</button>
      <div id="listaTiendas"></div>
    </div>

    <button onclick="auth.signOut()" style="background:#444; color:#fff;">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = { /* ... TU CONFIG ... */ };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// --- LÓGICA DE COLA DE VOZ ---
let colaAlertas = [];
let procesandoCola = false;

async function procesarCola() {
  if (procesandoCola || colaAlertas.length === 0) return;
  procesandoCola = true;
  const nombre = colaAlertas.shift();
  if ('speechSynthesis' in window) {
    const msg = new SpeechSynthesisUtterance(`Atención, nuevo pedido en ${nombre}`);
    msg.lang = 'es-CO';
    await new Promise(r => { msg.onend = r; msg.onerror = r; window.speechSynthesis.speak(msg); });
  }
  procesandoCola = false;
  setTimeout(procesarCola, 1000);
}

// --- MONITOREO Y GESTIÓN ---
function iniciarMonitoreoGlobal() {
  db.collection("tiendas").onSnapshot(snap => {
    snap.forEach(doc => {
      const nombreTienda = doc.data().nombre;
      db.collection("tiendas").doc(doc.id).collection("pedidos")
        .where("estado", "==", "Pendiente")
        .onSnapshot(pSnap => {
          pSnap.docChanges().forEach(change => {
            if (change.type === "added") {
              colaAlertas.push(nombreTienda);
              procesarCola();
              renderizarPedidos();
            }
          });
        });
    });
  });
}

// ... AQUÍ IRÍAN TUS OTRAS FUNCIONES ORIGINALES (guardarTiendaOriginal, cambiarEstado, etc) ...

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    iniciarMonitoreoGlobal();
  } else {
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("panel").classList.add("hidden");
  }
});
</script>
</body>
</html>
