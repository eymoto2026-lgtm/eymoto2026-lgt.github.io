<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - EyMoto</title>

  <style>
    body { font-family: Arial; background:#111; color:#fff; margin:0; }
    header { background:#000; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .container { padding:20px; }
    .card { background:#1c1c1c; padding:15px; margin-bottom:10px; border-radius:10px; }
    input, button, select { padding:10px; margin:5px 0; width:100%; border-radius:5px; border:none; box-sizing: border-box; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; }
    .hidden { display:none; }
    .tienda { border:1px solid #333; padding:10px; margin-top:10px; border-radius:8px; }
    
    /* ESTILOS DE LA FASE 4 (PANEL DE PEDIDOS) */
    .pedido-card { border: 2px solid #333; padding: 15px; margin-top: 10px; border-radius: 8px; background: #222; }
    .status-pendiente { border-color: #ffc107; }
    .status-preparacion { border-color: #17a2b8; }
    .status-entregado { border-color: #28a745; }
    .status-cancelado { border-color: #dc3545; }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .badge-pendiente { background: #ffc107; color: #000; }
    .badge-preparacion { background: #17a2b8; color: #fff; }
    .badge-entregado { background: #28a745; color: #fff; }
    .badge-cancelado { background: #dc3545; color: #fff; }

    .grid-acciones { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 5px; margin-top: 10px; }
    .btn-status { font-size: 12px; padding: 6px; }
  </style>
</head>

<body>

<header>ADMIN V2 - EYMOTO</header>

<div class="container">

  <div id="loginBox" class="card">
    <h3>🔐 Login Administrador</h3>
    <input type="email" id="email">
    <input type="password" id="password">
    <button id="btnIniciarSesion">Iniciar sesión</button>
    <p id="loginMsg" style="color: red;"></p>
  </div>

  <div id="panel" class="hidden">

    <div class="card" style="border: 2px solid #f5c400;">
      <h3>📋 Monitor de Pedidos en Tiempo Real</h3>
      <label style="font-size: 13px; color: #aaa;">Filtrar pedidos por Tienda:</label>
      <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()">
        <option value="">Seleccionar tienda para monitorear</option>
      </select>
      
      <div id="contenedorPedidos" style="margin-top:15px;">
        <p style="color: #aaa; text-align: center;">Selecciona una tienda arriba para ver sus comandas...</p>
      </div>
    </div>

    <div class="card">
      <h3>➕ Crear Tienda</h3>
      <input id="nombreTienda" placeholder="Nombre tienda">
      <input id="whatsapp" placeholder="WhatsApp">
      <input id="logoTienda" placeholder="URL del logo">
      <input id="bannerTienda" placeholder="URL del banner (opcional)">
      <input id="sonidoTiendaNueva" placeholder="URL de sonido personalizado .mp3 (opcional)">
      <button onclick="crearTienda()">Crear Tienda</button>
    </div>

    <div class="card">
      <h3>➕ Crear Producto</h3>
      <select id="tiendaProducto" onchange="cargarProductos()">
        <option value="">Seleccionar tienda</option>
      </select>
      <input id="nuevoNombre" placeholder="Nombre">
      <input id="nuevoPrecio" type="number" placeholder="Precio">
      <input id="nuevoCategoria" placeholder="Categoría">
      <input id="nuevoDescripcion" placeholder="Descripción">
      <input id="nuevoImagen" placeholder="Imagen">
      <button onclick="crearProducto()">Crear Producto</button>
    </div>

    <div class="card">
      <h3>🏪 Tiendas</h3>
      <div id="listaTiendas"></div>
    </div>

    <div class="card">
      <h3>📦 Productos</h3>
      <div id="listaProductos"></div>
    </div>

    <div class="card">
      <h3>🏪 Abrir / Cerrar Tienda</h3>
      <select id="tiendaEstado" onchange="cargarEstadoTienda()">
        <option value="">Seleccionar tienda</option>
      </select>
      <p id="estadoActual">Estado: -</p>
      <button onclick="toggleTienda()">Cambiar Estado</button>
    </div>

    <button onclick="logout()" style="background:#555; color:#fff; margin-top:20px;">Cerrar sesión</button>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Variables globales para el monitor
let pedidosUnsubscribe = null;
let sonidoAlerta = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav"); // Tono por defecto
let cargaInicialCompleta = false; // Evita que suenen los pedidos existentes al abrir la web

// --- DEFINICIÓN DE TODAS LAS FUNCIONES GLOBALES ---

window.escucharPedidosEnTiempoReal = async function() {
  const tiendaId = document.getElementById("filtroTiendaPedidos").value;
  const contenedor = document.getElementById("contenedorPedidos");
  if (!contenedor) return;

  if (pedidosUnsubscribe) {
    pedidosUnsubscribe();
  }

  if (!tiendaId) {
    contenedor.innerHTML = '<p style="color: #aaa; text-align: center;">Selecciona una tienda arriba para ver sus comandas...</p>';
    return;
  }

  contenedor.innerHTML = '<p style="color: #f5c400; text-align: center;">Conectando con el canal de comandas... ⏳</p>';
  
  // Resetear la bandera para la nueva tienda seleccionada
  cargaInicialCompleta = false;

  // 🔥 1. Cargar el sonido configurado para esta tienda específica
  try {
    const tiendaDoc = await db.collection("tiendas").doc(tiendaId).get();
    if (tiendaDoc.exists && tiendaDoc.data().sonidoUrl) {
      sonidoAlerta = new Audio(tiendaDoc.data().sonidoUrl);
    } else {
      // Sonido de respaldo estándar si no configuraron nada
      sonidoAlerta = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-84.wav");
    }
  } catch (error) {
    console.error("Error cargando audio de la tienda: ", error);
  }

  // 2. Escuchar los pedidos en tiempo real
  pedidosUnsubscribe = db.collection("tiendas").doc(tiendaId).collection("pedidos")
    .orderBy("fecha", "desc")
    .onSnapshot(snap => {
      
      // 🔥 3. Evaluar si hay alertas de nuevos pedidos ingresando
      if (cargaInicialCompleta && !snap.metadata.hasPendingWrites) {
        snap.docChanges().forEach(change => {
          if (change.type === "added") {
            // ¡Ha llegado un pedido nuevo de verdad! Ejecutar audio
            sonidoAlerta.play().catch(e => console.log("Permiso de audio requerido por el navegador: ", e));
          }
        });
      }

      contenedor.innerHTML = "";
      
      if (snap.empty) {
        contenedor.innerHTML = '<p style="color: #aaa; text-align: center;">No se han registrado pedidos hoy en esta tienda. 🍔</p>';
        cargaInicialCompleta = true; // Si está vacío, los siguientes que entren son nuevos
        return;
      }

      snap.forEach(doc => {
        const p = doc.data();
        const idPedido = doc.id;
        const numPedido = p.numeroPedido || "#----";
        const estado = p.estado || "Pendiente";
        
        let fechaFormateada = "Verificar Hora";
        if (p.fecha) {
          const d = new Date(p.fecha);
          fechaFormateada = `${d.toLocaleDateString('es-CO')} - ${d.toLocaleTimeString('es-CO', {hour: '2-digit', minute:'2-digit'})}`;
        }

        let claseBorde = "status-pendiente";
        let claseBadge = "badge-pendiente";
        if (estado === "En Preparación") { claseBorde = "status-preparacion"; claseBadge = "badge-preparacion"; }
        if (estado === "Entregado") { claseBorde = "status-entregado"; claseBadge = "badge-entregado"; }
        if (estado === "Cancelado") { claseBorde = "status-cancelado"; claseBadge = "badge-cancelado"; }

        let itemsHTML = "";
        if (p.items && p.items.length > 0) {
          p.items.forEach(item => {
            itemsHTML += `• ${item.nombre} <b>x${item.cantidad}</b> ($${(item.total || 0).toLocaleString('es-CO')})<br>`;
          });
        } else {
          itemsHTML = "No se pudieron recuperar los productos.";
        }

        const cNombre = p.cliente?.nombre || "No registrado";
        const cTelefono = p.cliente?.telefono || "No registrado";
        const cDireccion = p.cliente?.direccion || "No registrado";
        const cBarrio = p.cliente?.barrio || "No registrado";
        const cObservaciones = p.cliente?.observaciones || "Ninguna";

        contenedor.innerHTML += `
          <div class="pedido-card ${claseBorde}">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #333; padding-bottom:8px; margin-bottom:8px;">
              <span style="font-size:16px; font-weight:bold; color:#f5c400;">📦 Pedido ${numPedido}</span>
              <span class="badge ${claseBadge}">${estado.toUpperCase()}</span>
            </div>
            
            <p style="font-size:12px; color:#aaa; margin:2px 0;">🕒 <b>Fecha:</b> ${fechaFormateada}</p>
            <p style="margin:5px 0; font-size:14px;">👤 <b>Cliente:</b> ${cNombre} (${cTelefono})</p>
            <p style="margin:5px 0; font-size:14px;">📍 <b>Dirección:</b> ${cDireccion} - <b>Barrio:</b> ${cBarrio}</p>
            <p style="margin:5px 0; font-size:13px; color:#ffc107;">📝 <b>Notas:</b> ${cObservaciones}</p>
            
            <div style="background:#111; padding:10px; border-radius:5px; margin:10px 0; font-size:13px;">
              <span style="color:#aaa; display:block; margin-bottom:4px; font-weight:bold;">🧾 COMANDA:</span>
              ${itemsHTML}
              <hr style="border:0; border-top:1px dashed #333; margin:8px 0;">
              <span style="font-size:15px; color:#28a745; font-weight:bold;">TOTAL DEL TICKET: $${(p.total || 0).toLocaleString('es-CO')}</span>
            </div>

            <div class="grid-acciones">
              <button onclick="cambiarEstadoPedido('${tiendaId}', '${idPedido}', 'Pendiente')" class="btn-status" style="background:#ffc107; color:#000;">🟡 Pendiente</button>
              <button onclick="cambiarEstadoPedido('${tiendaId}', '${idPedido}', 'En Preparación')" class="btn-status" style="background:#17a2b8; color:#fff;">🔵 Cocina</button>
              <button onclick="cambiarEstadoPedido('${tiendaId}', '${idPedido}', 'Entregado')" class="btn-status" style="background:#28a745; color:#fff;">🟢 Entregado</button>
              <button onclick="cambiarEstadoPedido('${tiendaId}', '${idPedido}', 'Cancelado')" class="btn-status" style="background:#dc3545; color:#fff;">❌ Cancelar</button>
            </div>

            <button onclick="eliminarPedidoHistorial('${tiendaId}', '${idPedido}')" style="background:#333; color:#ff4444; margin-top:12px; padding:6px; font-size:12px; border:1px solid #444; border-radius:4px; font-weight:normal;">
              🗑️ Eliminar pedido de la pantalla
            </button>
          </div>
        `;
      });

      // Una vez impresos los pedidos existentes, liberamos la bandera de sonido
      cargaInicialCompleta = true;
    }, error => {
      console.error("Error en Snapshot de pedidos: ", error);
    });
}

window.cambiarEstadoPedido = async function(tiendaId, idPedido, nuevoEstado) {
  try {
    await db.collection("tiendas").doc(tiendaId).collection("pedidos").doc(idPedido).update({
      estado: nuevoEstado
    });
  } catch (e) {
    alert("❌ Error al cambiar el estado: " + e.message);
  }
}

window.eliminarPedidoHistorial = async function(tiendaId, idPedido) {
  if (!confirm("¿Estás seguro de que deseas quitar permanentemente este pedido de la pantalla?")) return;
  try {
    await db.collection("tiendas").doc(tiendaId).collection("pedidos").doc(idPedido).delete();
  } catch (e) {
    alert("❌ Error al eliminar el pedido: " + e.message);
  }
}

window.cargarTiendas = async function() {
  const listaTiendas = document.getElementById("listaTiendas");
  if (!listaTiendas) return;
  listaTiendas.innerHTML = "";
  
  const snap = await db.collection("tiendas").get();
  const urlBaseGitHub = "https://eymoto2026-lgtm.github.io/eymoto2026-lgt.github.io/"; 

  snap.forEach(doc => {
    const t = doc.data();
    const idTienda = doc.id; 
    const urlCompleta = `${urlBaseGitHub}?tienda=${idTienda}`;
    const whatsappActual = t.whatsapp || "";
    const nombreActual = t.nombre || "";
    const sonidoActual = t.sonidoUrl || "";

    listaTiendas.innerHTML += `
      <div class="tienda" style="border: 1px solid #333; padding: 15px; margin-top: 10px; border-radius: 8px; background: #222;">
        
        <label style="font-size: 13px; color: #f5c400; font-weight: bold;">🏪 Nombre de la Tienda:</label>
        <input id="nom-${idTienda}" value="${nombreActual}" placeholder="Nombre del restaurante" style="margin-top: 5px; margin-bottom: 12px; padding: 8px; background:#333; color:#fff; border:1px solid #444; border-radius:4px; width:100%; box-sizing:border-box;">

        <label style="font-size: 13px; color: #aaa;">📞 Número de WhatsApp:</label>
        <input id="ws-${idTienda}" value="${whatsappActual}" placeholder="Ej: 573001234567" style="margin-top: 5px; margin-bottom: 12px; padding: 8px; background:#333; color:#fff; border:1px solid #444; border-radius:4px; width:100%; box-sizing:border-box;">
        
        <label style="font-size: 13px; color: #aaa;">🎵 Enlace del Sonido (.mp3):</label>
        <input id="snd-${idTienda}" value="${sonidoActual}" placeholder="URL del audio de alerta para comandas" style="margin-top: 5px; margin-bottom: 12px; padding: 8px; background:#333; color:#fff; border:1px solid #444; border-radius:4px; width:100%; box-sizing:border-box;">

        <button onclick="actualizarTiendaDatos('${idTienda}')" style="background: #28a745; color: #fff; width: 100%; margin: 5px 0 15px 0; padding: 10px; font-size: 14px; border-radius: 4px;">
          💾 Guardar Cambios (Nombre, WhatsApp y Sonido)
        </button>

        <div style="margin-top: 10px; background: #000; padding: 10px; border-radius: 5px; display: flex; align-items: center; justify-content: space-between; gap: 10px;">
          <a href="${urlCompleta}" target="_blank" style="color: #00bcd4; text-decoration: none; font-weight: bold; word-break: break-all; flex: 1;">
            🔗 ${urlCompleta}
          </a>
          <button onclick="copiarUrl('${urlCompleta}', this)" style="background: #333; color: #fff; width: auto; margin: 0; padding: 8px 12px; font-size: 13px; border-radius: 4px; border: 1px solid #444;">
            📋 Copiar
          </button>
        </div>

        <br>
        <button onclick="eliminarTienda('${idTienda}','${t.nombre}')" style="background:#ff3333; color:#fff; width:auto; padding: 6px 12px; font-size:12px; border-radius: 4px; margin-top: 5px;">
          🗑️ Eliminar Tienda
        </button>
      </div>`;
  });
}

window.cargarSelectTiendas = async function() {
  const tiendaProducto = document.getElementById("tiendaProducto");
  const tiendaEstado = document.getElementById("tiendaEstado");
  const filtroTiendaPedidos = document.getElementById("filtroTiendaPedidos");
  if(!tiendaProducto || !tiendaEstado || !filtroTiendaPedidos) return;

  tiendaProducto.innerHTML = '<option value="">Seleccionar tienda</option>';
  tiendaEstado.innerHTML = '<option value="">Seleccionar tienda</option>';
  filtroTiendaPedidos.innerHTML = '<option value="">Seleccionar tienda para monitorear</option>';

  const snap = await db.collection("tiendas").get();
  snap.forEach(doc => {
    const t = doc.data();
    tiendaProducto.innerHTML += `<option value="${doc.id}">${t.nombre}</option>`;
    tiendaEstado.innerHTML += `<option value="${doc.id}">${t.nombre}</option>`;
    filtroTiendaPedidos.innerHTML += `<option value="${doc.id}">${t.nombre}</option>`;
  });
}

window.actualizarTiendaDatos = async function(tiendaId) {
  const nuevoNombre = document.getElementById(`nom-${tiendaId}`).value.trim();
  const nuevoCelu = document.getElementById(`ws-${tiendaId}`).value.trim();
  const nuevoSonido = document.getElementById(`snd-${tiendaId}`).value.trim();

  if(!nuevoNombre || !nuevoCelu) {
    alert("Por favor, llena ambos campos (Nombre y WhatsApp).");
    return;
  }

  try {
    await db.collection("tiendas").doc(tiendaId).update({
      nombre: nuevoNombre,
      whatsapp: nuevoCelu,
      sonidoUrl: nuevoSonido
    });
    alert("✅ ¡Datos e historial de sonido actualizados con éxito!");
    await window.cargarTiendas(); 
    await window.cargarSelectTiendas(); 
    // Si la tienda modificada es la que se está monitoreando, recargar la configuración del audio
    if(document.getElementById("filtroTiendaPedidos").value === tiendaId){
      window.escucharPedidosEnTiempoReal();
    }
  } catch (e) {
    alert("❌ Error al actualizar: " + e.message);
  }
}

window.copiarUrl = function(url, boton) {
  navigator.clipboard.writeText(url).then(() => {
    const textoOriginal = boton.innerHTML;
    boton.innerHTML = "¡Copiado! ✅";
    boton.style.background = "#28a745"; 
    
    setTimeout(() => {
      boton.innerHTML = textoOriginal;
      boton.style.background = "#333"; 
    }, 2000);
  }).catch(err => {
    console.error("No se pudo copiar el enlace: ", err);
    alert("Error al copiar el enlace.");
  });
}

window.crearTienda = async function() {
  const nombreVal = document.getElementById("nombreTienda").value;
  const whatsappVal = document.getElementById("whatsapp").value;
  const logoVal = document.getElementById("logoTienda").value;
  const bannerVal = document.getElementById("bannerTienda").value || "";
  const sonidoVal = document.getElementById("sonidoTiendaNueva").value || "";
  const id = nombreVal.toLowerCase().replace(/\s/g, "");

  await db.collection("tiendas").doc(id).set({
    nombre: nombreVal,
    whatsapp: whatsappVal,
    logo: logoVal,
    banner: bannerVal,
    sonidoUrl: sonidoVal,
    activa: true,
    abierta: true,
    createdAt: Date.now()
  });

  // Limpiar campos
  document.getElementById("nombreTienda").value = "";
  document.getElementById("whatsapp").value = "";
  document.getElementById("logoTienda").value = "";
  document.getElementById("bannerTienda").value = "";
  document.getElementById("sonidoTiendaNueva").value = "";

  await window.cargarTiendas();
  await window.cargarSelectTiendas();
}

window.cargarProductos = async function() {
  const cont = document.getElementById("listaProductos");
  if (!cont) return;
  cont.innerHTML = "";

  const tiendaId = document.getElementById("tiendaProducto").value;
  if (!tiendaId) return;

  const snap = await db.collection("tiendas").doc(tiendaId).collection("productos").get();
  snap.forEach(doc => {
    const p = doc.data();
    cont.innerHTML += `
      <div class="tienda">
        <b>${p.name}</b><br>
        Precio: $${p.precio}<br>
        Categoría: ${p.categoria}<br>
        Disponible: ${p.disponible ? "✅ Sí" : "❌ No"}
        <br><br>
        <button onclick="cambiarDisponibilidad('${doc.id}', ${p.disponible})">
          ${p.disponible ? "❌ Agotar" : "✅ Activar"}
        </button>
        <br><br>
        <button onclick="eliminarProducto('${doc.id}','${p.name}')">
          🗑️ Eliminar
        </button>
      </div>`;
  });
}

window.crearProducto = async function() {
  const tiendaId = document.getElementById("tiendaProducto").value;

  await db.collection("tiendas").doc(tiendaId).collection("productos").add({
    name: document.getElementById("nuevoNombre").value,
    precio: Number(document.getElementById("nuevoPrecio").value),
    categoria: document.getElementById("nuevoCategoria").value,
    descripcion: document.getElementById("nuevoDescripcion").value,
    img: document.getElementById("nuevoImagen").value,
    disponible: true
  });

  await window.cargarProductos();
}

window.cambiarDisponibilidad = async function(productoId, disponibleActual) {
  const tiendaId = document.getElementById("tiendaProducto").value;

  try {
    const ref = db.collection("tiendas").doc(tiendaId).collection("productos").doc(productoId);
    await ref.set({ disponible: !disponibleActual }, { merge: true });
    await window.cargarProductos();
  } catch (e) {
    alert("ERROR: " + e.message);
  }
}

window.eliminarProducto = async function(productoId, nombre) {
  if (!confirm("¿Eliminar " + nombre + "?")) return;

  try {
    const tiendaId = document.getElementById("tiendaProducto").value;
    await db.collection("tiendas").doc(tiendaId).collection("productos").doc(productoId).delete();
    await window.cargarProductos();
  } catch (e) {
    alert("ERROR: " + e.message);
  }
}

window.eliminarTienda = async function(tiendaId, nombre) {
  if (tiendaId === "eymotocomidas") {
    alert("No puedes eliminar la tienda principal");
    return;
  }

  const confirmar = confirm(`¿Eliminar la tienda ${nombre}?`);
  if (!confirmar) return;

  try {
    const productos = await db.collection("tiendas").doc(tiendaId).collection("productos").get();
    for (const docu of productos.docs) {
      await docu.ref.delete();
    }

    await db.collection("tiendas").doc(tiendaId).delete();
    alert("Tienda eliminada");

    await window.cargarTiendas();
    await window.cargarSelectTiendas();
    document.getElementById("listaProductos").innerHTML = "";
  } catch (e) {
    alert("Error: " + e.message);
  }
}

window.toggleTienda = async function() {
  const tiendaId = document.getElementById("tiendaEstado").value;
  if (!tiendaId) {
    alert("Seleccione una tienda");
    return;
  }

  const ref = db.collection("tiendas").doc(tiendaId);
  const snap = await ref.get();
  const actual = snap.data().abierta;

  await ref.update({ abierta: !actual });
  await window.cargarEstadoTienda();

  alert(!actual ? "Tienda ABIERTA" : "Tienda CERRADA");
}

window.logout = function() {
  auth.signOut();
}

window.cargarEstadoTienda = async function() {
  const tiendaId = document.getElementById("tiendaEstado").value;
  if (!tiendaId) return;

  const docSnap = await db.collection("tiendas").doc(tiendaId).get();
  if (!docSnap.exists) return;

  const data = docSnap.data();
  document.getElementById("estadoActual").innerHTML = data.abierta ? "🟢 Estado: ABIERTA" : "🔴 Estado: CERRADA";
}

// --- ESCUCHADORES DE FLUJO Y AUTENTICACIÓN ---

auth.onAuthStateChanged(async user => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    await window.cargarTiendas();
    await window.cargarSelectTiendas();

    const select = document.getElementById("tiendaProducto");
    if (select && select.options.length > 1) {
      select.selectedIndex = 1;
    }
    await window.cargarProductos();
    
    // Auto-seleccionar la primera tienda también en el monitor de pedidos
    const selectPedidos = document.getElementById("filtroTiendaPedidos");
    if(selectPedidos && selectPedidos.options.length > 1) {
      selectPedidos.selectedIndex = 1;
      window.escucharPedidosEnTiempoReal();
    }
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("panel").style.display = "none";
    if (pedidosUnsubscribe) pedidosUnsubscribe();
  }
});

document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("btnIniciarSesion");
  if (btn) {
    btn.addEventListener("click", () => {
      const emailVal = document.getElementById("email").value.trim();
      const passwordVal = document.getElementById("password").value.trim();

      if (!emailVal || !passwordVal) {
        alert("Por favor, ingresa correo y contraseña.");
        return;
      }

      console.log("Intentando conectar con Firebase para:", emailVal);
      
      auth.signInWithEmailAndPassword(emailVal, passwordVal)
        .then((userCredential) => {
          console.log("¡Login exitoso!", userCredential.user);
          alert("🔑 Conexión exitosa. Cargando panel...");
        })
        .catch(e => {
          console.error("Error de Firebase:", e);
          document.getElementById("loginMsg").innerText = "Error: " + e.message;
          alert("❌ Error al iniciar sesión: " + e.message);
        });
    });
  } else {
    console.error("No se encontró el botón btnIniciarSesion en el HTML");
  }
});
</script>
