<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 10px 0; background: #222; margin-top:5px; padding: 10px; }
    .pedido-card { border: 1px solid #555; padding: 15px; margin-bottom: 10px; background: #222; }
    .tienda-header { cursor: pointer; padding: 15px; background: #333; margin-top: 10px; border-radius: 8px; font-weight: bold; border: 1px solid #f5c400; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN - EYMOTO</header>

<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
  </div>

  <div id="panel" class="hidden">
    <div class="card">
      <h3>📋 Monitor de Pedidos</h3>
      <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()">
        <option value="">Selecciona una tienda</option>
      </select>
      <div id="contenedorPedidos"></div>
    </div>

    <div class="card">
      <h3>🍔 Gestión de Productos (Haz clic en una tienda)</h3>
      <div id="listaTiendasDesplegables"></div>
    </div>

    <button onclick="auth.signOut()" style="background:#444; color:#fff;">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Carga de Tiendas
window.cargarTiendas = async function() {
  const snap = await db.collection("tiendas").get();
  const contenedor = document.getElementById("listaTiendasDesplegables");
  contenedor.innerHTML = "";
  snap.forEach(doc => {
    contenedor.innerHTML += `
      <div class="tienda-header" onclick="toggleProductos('${doc.id}')">🏪 ${doc.data().nombre}</div>
      <div id="productos-${doc.id}" class="hidden"></div>
    `;
  });
};

// Carga de Productos y acciones (Editar/Borrar)
window.toggleProductos = async function(tId) {
  const div = document.getElementById(`productos-${tId}`);
  div.classList.toggle("hidden");
  if(!div.classList.contains("hidden") && div.innerHTML === "") {
    const snap = await db.collection("productos").where("tiendaId", "==", tId).get();
    snap.forEach(doc => {
      const p = doc.data();
      div.innerHTML += `
        <div class="producto-item">
          <span><b>${p.name}</b> - $${p.precio}</span>
          <div>
            <button onclick="alert('Funcionalidad de edición aquí')">✏️</button>
            <button onclick="borrarProducto('${doc.id}')" style="background:#dc3545;">🗑️</button>
          </div>
        </div>`;
    });
  }
};

window.borrarProducto = async (id) => {
  if(confirm("¿Borrar producto?")) { await db.collection("productos").doc(id).delete(); alert("Eliminado"); }
};

document.getElementById("btnIniciarSesion").addEventListener("click", () => {
  auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value);
});

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    cargarTiendas();
  }
});
</script>
</body>
</html>
