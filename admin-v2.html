<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin V2 PRO FIX - EyMoto</title>

<style>
body {font-family:Arial;background:#0f0f0f;color:#fff;margin:0}
header{background:#000;padding:15px;text-align:center;color:#f5c400;font-weight:bold}
.container{padding:20px;max-width:1200px;margin:auto}
.card{background:#1c1c1c;padding:15px;margin:10px 0;border-radius:10px}

.pedido{
  background:#111;
  padding:12px;
  margin:10px 0;
  border-left:5px solid #f5c400;
  animation:pop .2s ease-in;
}

@keyframes pop{
  from{transform:scale(.95);opacity:.5}
  to{transform:scale(1);opacity:1}
}

.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.pendiente{background:#ffc107;color:#000}
.proceso{background:#17a2b8}
.entregado{background:#28a745}
.cancelado{background:#dc3545}

button{padding:8px;border:none;cursor:pointer;margin:3px;border-radius:6px}
.btn{background:#f5c400}
.danger{background:#dc3545;color:#fff}
</style>
</head>

<body>

<header>🚀 ADMIN V2 PRO FIX - RAPPI MODE</header>

<div class="container">

<div class="card">
<h3>📡 Pedidos en tiempo real</h3>

<select id="tienda"></select>
<button onclick="listen()">Escuchar pedidos</button>

<div id="lista"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
authDomain:"eymotocomidas.firebaseapp.com",
projectId:"eymotocomidas"
});

const db=firebase.firestore();

let unsub=null;
let lastCount=0;

/* 🔊 SONIDO REAL */
function beep(){
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
osc.type="square";
osc.frequency.value=900;
osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.2);
}

/* 🔥 ALERTA RAPPI */
function alertNew(){
document.body.style.background="red";
setTimeout(()=>document.body.style.background="#0f0f0f",300);
beep();
}

/* 📦 LOAD TIENDAS */
async function loadStores(){
const snap=await db.collection("tiendas").get();
const sel=document.getElementById("tienda");
sel.innerHTML="";
snap.forEach(d=>{
sel.innerHTML+=`<option value="${d.id}">${d.data().nombre}</option>`;
});
}

/* 🚀 LISTENER REAL */
function listen(){
const id=document.getElementById("tienda").value;
const lista=document.getElementById("lista");

if(unsub)unsub();

unsub=db.collection("tiendas").doc(id).collection("pedidos")
.orderBy("fecha","desc")
.onSnapshot(snap=>{

lista.innerHTML="";

if(snap.size>lastCount){
alertNew();
}
lastCount=snap.size;

snap.forEach(doc=>{
const p=doc.data();

lista.innerHTML+=`
<div class="pedido">
<b>📦 Pedido</b><br>
👤 ${p.cliente?.nombre||"N/A"}<br>
💰 $${p.total||0}<br>

<span class="badge pendiente">${p.estado}</span><br>

<button class="btn" onclick="update('${id}','${doc.id}','En Preparación')">Preparar</button>
<button class="btn" onclick="update('${id}','${doc.id}','Entregado')">Entregado</button>
<button class="danger" onclick="update('${id}','${doc.id}','Cancelado')">Cancelar</button>
</div>
`;
});

});
}

/* 🔁 UPDATE ESTADO */
window.update=async(t,p,s)=>{
await db.collection("tiendas").doc(t)
.collection("pedidos").doc(p).update({estado:s});
}

/* INIT */
loadStores();
</script>

</body>
</html>
