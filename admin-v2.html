<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - EyMoto</title>

  <style>
    body { font-family: Arial; background:#111; color:#fff; margin:0; }
    header { background:#000; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .container { padding:20px; }
    .card { background:#1c1c1c; padding:15px; margin-bottom:10px; border-radius:10px; }
    input, button, select { padding:10px; margin:5px 0; width:100%; border-radius:5px; border:none; box-sizing: border-box; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; }
    .hidden { display:none; }
    .tienda { border:1px solid #333; padding:10px; margin-top:10px; border-radius:8px; background: #222; position: relative; }
    
    /* ESTILOS PANEL DE PEDIDOS */
    .pedido-card { border: 2px solid #333; padding: 15px; margin-top: 10px; border-radius: 8px; background: #222; }
    .status-pendiente { border-color: #ffc107; }
    .status-preparacion { border-color: #17a2b8; }
    .status-entregado { border-color: #28a745; }
    .status-cancelado { border-color: #dc3545; }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .badge-pendiente { background: #ffc107; color: #000; }
    .badge-preparacion { background: #17a2b8; color: #fff; }
    .badge-entregado { background: #28a745; color: #fff; }
    .badge-cancelado { background: #dc3545; color: #fff; }

    .grid-acciones { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 5px; margin-top: 10px; }
    .btn-status { font-size: 12px; padding: 6px; }
    
    .btn-danger { background: #dc3545; color: #fff; width: auto; padding: 5px 10px; font-size: 12px; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #333; padding: 8px 0; }
  </style>
</head>

<body>

<header>ADMIN V2 - EYMOTO</header>

<div class="container">

  <div id="loginBox" class="card">
    <h3>🔐 Login Administrador</h3>
    <input type="email" id="email" placeholder="Correo Electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Iniciar sesión</button>
    <p id="loginMsg" style="color: red;"></p>
  </div>

  <div id="panel" class="hidden">

    <div class="card" style="border: 2px solid #f5c400;">
      <h3>📋 Monitor de Pedidos en Tiempo Real</h3>
      
      <button onclick="probarSonidoSistema()" style="background:#00bcd4; color:#000; margin-bottom:15px; padding:10px; font-weight:bold;">🔔 Inicializar / Probar Altavoz ("Ey Moto")</button>
      
      <label style="font-size: 13px; color: #aaa;">Filtrar pedidos por Tienda:</label>
      <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()">
        <option value="">Seleccionar tienda para monitorear</option>
      </select>
      
      <div id="contenedorPedidos" style="margin-top:15px;">
        <p style="color: #aaa; text-align: center;">Selecciona una tienda arriba para ver sus comandas...</p>
      </div>
    </div>

    <div class="card">
      <h3>➕ Crear Tienda</h3>
      <input id="nombreTienda" placeholder="Nombre tienda">
      <input id="whatsapp" placeholder="WhatsApp">
      <input id="logoTienda" placeholder="URL del logo">
      <input id="bannerTienda" placeholder="URL del banner (opcional)">
      <button onclick="crearTienda()">Crear Tienda</button>
    </div>

    <div class="card">
      <h3>➕ Crear o Editar Producto</h3>
      <select id="tiendaProducto" onchange="cargarProductos()">
        <option value="">Seleccionar tienda</option>
      </select>
      <input id="nuevoNombre" placeholder="Nombre">
      <input id="nuevoPrecio" type="number" placeholder="Precio">
      <input id="nuevoCategoria" placeholder="Categoría">
      <input id="nuevoDescripcion" placeholder="Descripción">
      <input id="nuevoImagen" placeholder="Imagen">
      <button onclick="crearProducto()">Guardar Producto</button>
    </div>

    <div class="card">
      <h3>🏪 Tiendas registradas</h3>
      <div id="listaTiendas"></div>
    </div>

    <div class="card">
      <h3>📦 Lista de Productos (Edición)</h3>
      <div id="listaProductos"></div>
    </div>

    <div class="card">
      <h3>🏪 Abrir / Cerrar Tienda</h3>
      <select id="tiendaEstado" onchange="cargarEstadoTienda()">
        <option value="">Seleccionar tienda</option>
      </select>
      <p id="estadoActual">Estado: -</p>
      <button onclick="toggleTienda()">Cambiar Estado</button>
    </div>

    <button onclick="logout()" style="background:#555; color:#fff; margin-top:20px;">Cerrar sesión</button>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let pedidosUnsubscribe = null;
let cargaInicialCompleta = false; 

// SISTEMA DE VOZ NATIVO (REEMPLAZA AL BASE64 CORRUPTO)
window.probarSonidoSistema = function() {
  if ('speechSynthesis' in window) {
    const textToSpeech = new SpeechSynthesisUtterance("Ey Moto");
    textToSpeech.lang = 'es-CO'; 
    textToSpeech.rate = 1.1; 
    window.speechSynthesis.speak(textToSpeech);
    console.log("Altavoz probado exitosamente.");
  } else {
    alert("Tu navegador no soporta alertas de voz automáticas.");
  }
}

// --- MONITOREO EN TIEMPO REAL ---

window.escucharPedidosEnTiempoReal = async function() {
  const tiendaId = document.getElementById("filtroTiendaPedidos").value;
  const contenedor = document.getElementById("contenedorPedidos");
  if (!contenedor) return;

  if (pedidosUnsubscribe) pedidosUnsubscribe();

  if (!tiendaId) {
    contenedor.innerHTML = '<p style="color: #aaa; text-align: center;">Selecciona una tienda arriba para ver sus comandas...</p>';
    return;
  }

  contenedor.innerHTML = '<p style="color: #f5c400; text-align: center;">Conectando con el canal de comandas... ⏳</p>';
  cargaInicialCompleta = false;

  pedidosUnsubscribe = db.collection("tiendas").doc(tiendaId).collection("pedidos")
    .orderBy("fecha", "desc")
    .onSnapshot(snap => {
      
      if (cargaInicialCompleta && !snap.metadata.hasPendingWrites) {
        snap.docChanges().forEach(change => {
          if (change.type === "added") {
            console.log("¡Pedido recibido! Alerta por voz ejecutada.");
            probarSonidoSistema();
          }
        });
      }

      contenedor.innerHTML = "";
      
      if (snap.empty) {
        contenedor.innerHTML = '<p style="color: #aaa; text-align: center;">No se han registrado pedidos hoy. 🍔</p>';
        cargaInicialCompleta = true;
        return;
      }

      snap.forEach(doc => {
        const p = doc.data();
        const idPedido = doc.id;
        const numPedido = p.numeroPedido || "#----";
        const estado = p.estado || "Pendiente";
        
        let fechaFormateada = "Verificar Hora";
        if (p.fecha) {
          const d = new Date(p.fecha);
          fechaFormateada = `${d.toLocaleDateString('es-CO')} - ${d.toLocaleTimeString('es-CO', {hour: '2-digit', minute:'2-digit'})}`;
        }

        let claseBorde = "status-pendiente";
        let claseBadge = "badge-pendiente";
        if (estado === "En Preparación") { claseBorde = "status-preparacion"; claseBadge = "badge-preparacion"; }
        if (estado === "Entregado") { claseBorde = "status-entregado"; claseBadge = "badge-entregado"; }
        if (estado === "Cancelado") { claseBorde = "status-cancelado"; claseBadge = "badge-cancelado"; }

        let itemsHTML = "";
        if (p.items && p.items.length > 0) {
          p.items.forEach(item => {
            itemsHTML += `• ${item.nombre} <b>x${item.cantidad}</b> ($${(item.total || 0).toLocaleString('es-CO')})<br>`;
          });
        }

        contenedor.innerHTML += `
          <div class="pedido-card ${claseBorde}">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #333; padding-bottom:8px; margin-bottom:8px;">
              <span style="font-size:16px; font-weight:bold; color:#f5c400;">📦 Pedido ${numPedido}</span>
              <span class="badge ${claseBadge}">${estado.toUpperCase()}</span>
            </div>
            <p style="font-size:12px; color:#aaa; margin:2px 0;">🕒 <b>Fecha:</b> ${fechaFormateada}</p>
            <p style="margin:5px 0; font-size:14px;">👤 <b>Cliente:</b> ${p.cliente?.nombre || 'No registrado'}</p>
            <p style="margin:5px 0; font-size:14px;">📍 <b>Dirección:</b> ${p.cliente?.direccion || 'No registrado'}</p>
            
            <div style="background:#111; padding:10px; border-radius:5px; margin:10px 0; font-size:13px;">
              ${itemsHTML}
              <hr style="border:0; border-top:1px dashed #333; margin:8px 0;">
              <span style="font-size:15px; color:#28a745; font-weight:bold;">TOTAL: $${(p.total || 0).toLocaleString('es-CO')}</span>
            </div>

            <div class="grid-acciones">
              <button onclick="cambiarEstadoPedido('${tiendaId}', '${idPedido}', 'Pendiente')" class="btn-status" style="background:#ffc107; color:#000;">🟡 Pendiente</button>
              <button onclick="cambiarEstadoPedido('${tiendaId}', '${idPedido}', 'En Preparación')" class="btn-status" style="background:#17a2b8; color:#fff;">🔵 Cocina</button>
              <button onclick="cambiarEstadoPedido('${tiendaId}', '${idPedido}', 'Entregado')" class="btn-status" style="background:#28a745; color:#fff;">🟢 Entregado</button>
              <button onclick="cambiarEstadoPedido('${tiendaId}', '${idPedido}', 'Cancelado')" class="btn-status" style="background:#dc3545; color:#fff;">❌ Cancelar</button>
            </div>
            <button onclick="eliminarPedidoHistorial('${tiendaId}', '${idPedido}')" style="background:#333; color:#ff4444; margin-top:12px; padding:6px; font-size:12px; border:1px solid #444; border-radius:4px;">🗑️ Quitar de pantalla</button>
          </div>
        `;
      });
      cargaInicialCompleta = true;
    });
}

window.cambiarEstadoPedido = async function(tiendaId, idPedido, nuevoEstado) {
  try {
    await db.collection("tiendas").doc(tiendaId).collection("pedidos").doc(idPedido).update({ estado: nuevoEstado });
  } catch (e) { alert("❌ Error: " + e.message); }
}

window.eliminarPedidoHistorial = async function(tiendaId, idPedido) {
  if (!confirm("¿Eliminar de la pantalla?")) return;
  try { await db.collection("tiendas").doc(tiendaId).collection("pedidos").doc(idPedido).delete(); } catch (e) { alert("❌ Error: " + e.message); }
}

// --- GESTIÓN DE TIENDAS ---

window.cargarTiendas = async function() {
  const listaTiendas = document.getElementById("listaTiendas");
  const filtroTienda = document.getElementById("filtroTiendaPedidos");
  const tiendaProducto = document.getElementById("tiendaProducto");
  const tiendaEstado = document.getElementById("tiendaEstado");

  if (listaTiendas) listaTiendas.innerHTML = "";
  
  if(filtroTienda) filtroTienda.innerHTML = '<option value="">Seleccionar tienda para monitorear</option>';
  if(tiendaProducto) tiendaProducto.innerHTML = '<option value="">Seleccionar tienda</option>';
  if(tiendaEstado) tiendaEstado.innerHTML = '<option value="">Seleccionar tienda</option>';

  const snap = await db.collection("tiendas").get();
  const urlBaseGitHub = "https://eymoto2026-lgtm.github.io/eymoto2026-lgt.github.io/"; 

  snap.forEach(doc => {
    const t = doc.data();
    const idTienda = doc.id; 
    const urlCompleta = `${urlBaseGitHub}?tienda=${idTienda}`;
    
    if (listaTiendas) {
      listaTiendas.innerHTML += `
        <div class="tienda">
          <h4>🏪 ${t.nombre || 'Sin nombre'}</h4>
          <p>📱 WhatsApp: ${t.whatsapp || '-'}</p>
          <p>🔗 <a href="${urlCompleta}" target="_blank" style="color:#f5c400;">Ver menú digital</a></p>
          <button class="btn-danger" onclick="eliminarTienda('${idTienda}')" style="position:absolute; right:10px; top:10px;">🗑️ Borrar Tienda</button>
        </div>
      `;
    }

    const opt = `<option value="${idTienda}">${t.nombre || idTienda}</option>`;
    if(filtroTienda) filtroTienda.innerHTML += opt;
    if(tiendaProducto) tiendaProducto.innerHTML += opt;
    if(tiendaEstado) tiendaEstado.innerHTML += opt;
  });
}

window.crearTienda = async function() {
  const nombre = document.getElementById("nombreTienda").value.trim();
  const whatsapp = document.getElementById("whatsapp").value.trim();
  const logo = document.getElementById("logoTienda").value.trim();
  const banner = document.getElementById("bannerTienda").value.trim();

  if(!nombre || !whatsapp) return alert("Escribe el nombre y WhatsApp de la tienda");

  try {
    await db.collection("tiendas").add({ nombre, whatsapp, logo, banner, abierta: true });
    alert("🏪 ¡Tienda creada con éxito!");
    cargarTiendas();
  } catch(e) { alert("Error: " + e.message); }
}

window.eliminarTienda = async function(idTienda) {
  if(!confirm("¿Seguro que deseas eliminar esta tienda con todo su contenido?")) return;
  try {
    await db.collection("tiendas").doc(idTienda).delete();
    alert("Tienda eliminada.");
    cargarTiendas();
  } catch(e) { alert("Error: " + e.message); }
}

// --- GESTIÓN DE PRODUCTOS (CON EDICIÓN Y ELIMINACIÓN RESTAURADAS) ---

window.crearProducto = async function() {
  const tiendaId = document.getElementById("tiendaProducto").value;
  const nombre = document.getElementById("nuevoNombre").value.trim();
  const precio = parseFloat(document.getElementById("nuevoPrecio").value) || 0;
  const categoria = document.getElementById("nuevoCategoria").value.trim();
  const descripcion = document.getElementById("nuevoDescripcion").value.trim();
  const imagen = document.getElementById("nuevoImagen").value.trim();

  if(!tiendaId || !nombre || !precio) return alert("Selecciona tienda, pon nombre y precio válido");

  try {
    await db.collection("tiendas").doc(tiendaId).collection("productos").add({
      nombre, precio, categoria, descripcion, imagen
    });
    alert("🍔 ¡Producto guardado con éxito!");
    
    // Limpiar campos de texto
    document.getElementById("nuevoNombre").value = "";
    document.getElementById("nuevoPrecio").value = "";
    document.getElementById("nuevoCategoria").value = "";
    document.getElementById("nuevoDescripcion").value = "";
    document.getElementById("nuevoImagen").value = "";
    
    cargarProductos();
  } catch(e) { alert("Error: " + e.message); }
}

window.cargarProductos = async function() {
  const tiendaId = document.getElementById("tiendaProducto").value;
  const lista = document.getElementById("listaProductos");
  if(!lista) return;
  lista.innerHTML = "";

  if(!tiendaId) return;

  const snap = await db.collection("tiendas").doc(tiendaId).collection("productos").get();
  snap.forEach(doc => {
    const p = doc.data();
    const idProd = doc.id;
    lista.innerHTML += `
      <div class="producto-item">
        <div>
          <b>${p.nombre}</b> - $${(p.precio || 0).toLocaleString('es-CO')} | <span style="color:#aaa;">${p.categoria || 'Sin Cat.'}</span>
        </div>
        <div>
          <button onclick="cargarProductoParaEditar('${tiendaId}', '${idProd}', \`${p.nombre}\`, ${p.precio}, \`${p.categoria || ''}\`, \`${p.descripcion || ''}\`, \`${p.imagen || ''}\`)" style="width:auto; padding:4px 8px; background:#ffc107; color:#000; font-size:12px; margin-right:5px;">✏️ Editar</button>
          <button onclick="eliminarProducto('${tiendaId}', '${idProd}')" class="btn-danger">🗑️ Eliminar</button>
        </div>
      </div>
    `;
  });
}

window.cargarProductoParaEditar = function(tiendaId, idProd, nombre, precio, categoria, descripcion, imagen) {
  document.getElementById("nuevoNombre").value = nombre;
  document.getElementById("nuevoPrecio").value = precio;
  document.getElementById("nuevoCategoria").value = categoria;
  document.getElementById("nuevoDescripcion").value = descripcion;
  document.getElementById("nuevoImagen").value = imagen;
  
  // Al volver a guardar lo creará, si prefieres sobreescribir borramos el viejo al guardar
  window.eliminarProductoSilencioso(tiendaId, idProd);
  alert("Datos cargados arriba en el formulario. Edita lo que necesites y dale a 'Guardar Producto'.");
}

window.eliminarProducto = async function(tiendaId, idProd) {
  if(!confirm("¿Deseas eliminar este producto?")) return;
  try {
    await db.collection("tiendas").doc(tiendaId).collection("productos").doc(idProd).delete();
    cargarProductos();
  } catch(e) { alert("Error: " + e.message); }
}

window.eliminarProductoSilencioso = async function(tiendaId, idProd) {
  try { await db.collection("tiendas").doc(tiendaId).collection("productos").doc(idProd).delete(); } catch(e){}
}

// --- CONTROL DE ESTADO (ABIERTO/CERRADO) ---

window.cargarEstadoTienda = async function() {
  const tiendaId = document.getElementById("tiendaEstado").value;
  const txt = document.getElementById("estadoActual");
  if(!tiendaId || !txt) return;

  const doc = await db.collection("tiendas").doc(tiendaId).get();
  if(doc.exists) {
    const abierta = doc.data().abierta !== false;
    txt.innerHTML = `Estado: <b>${abierta ? '🟢 ABIERTO' : '🔴 CERRADO'}</b>`;
  }
}

window.toggleTienda = async function() {
  const tiendaId = document.getElementById("tiendaEstado").value;
  if(!tiendaId) return alert("Selecciona una tienda");

  try {
    const ref = db.collection("tiendas").doc(tiendaId);
    const doc = await ref.get();
    const estadoActual = doc.data().abierta !== false;
    await ref.update({ abierta: !estadoActual });
    cargarEstadoTienda();
    alert("¡Estado de la tienda cambiado!");
  } catch(e) { alert("Error: " + e.message); }
}

// --- SISTEMA DE LOGUEO Y AUTENTICACIÓN ---

document.getElementById("btnIniciarSesion").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("loginMsg");

  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (e) {
    msg.innerText = "Error en credenciales: " + e.message;
  }
});

window.logout = function() {
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  const loginBox = document.getElementById("loginBox");
  const panel = document.getElementById("panel");

  if (user) {
    loginBox.classList.add("hidden");
    panel.classList.remove("hidden");
    cargarTiendas();
  } else {
    loginBox.classList.remove("hidden");
    panel.classList.add("hidden");
  }
});
</script>
</body>
</html>
