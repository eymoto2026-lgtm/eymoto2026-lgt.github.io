<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; transition: background 0.2s; }
    button:hover { background: #e0b300; }
    .hidden { display:none; }
    .pedido-card { border: 2px solid #333; padding: 15px; margin-top: 12px; border-radius: 8px; background: #1e1e1e; }
    .status-pendiente { border-color: #ffc107; }
    .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .producto-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 12px 0; }
    .flex-buttons { display: flex; gap: 5px; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN GENERAL - EYMOTO</header>

<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso Administrativo</h3>
    <input type="email" id="email" placeholder="ejemplo@eymoto.com">
    <input type="password" id="password" placeholder="••••••••">
    <button id="btnIniciarSesion">Ingresar al Panel</button>
    <p id="loginMsg" style="color: #ff4444; font-weight: bold;"></p>
  </div>

  <div id="panel" class="hidden">
    <div class="card" style="border: 2px solid #f5c400;">
      <h3>📋 Monitor de Pedidos</h3>
      <button onclick="probarVozAlarma()" style="background: #008b9b; color: #fff;">🔔 Probar Altavoz ("Ey Moto")</button>
      <select id="filtroTiendaPedidos" onchange="escucharPedidosEnTiempoReal()"></select>
      <div id="contenedorPedidos"></div>
    </div>

    <div class="card">
      <h3>🍔 Gestión de Productos</h3>
      <select id="tiendaProducto" onchange="cargarProductosOriginal()"></select>
      <input id="nuevoNombre" placeholder="Nombre">
      <input id="nuevoPrecio" type="number" placeholder="Precio">
      <button onclick="guardarProductoOriginal()">Guardar Producto</button>
      <div id="listaProductos"></div>
    </div>
    
    <button onclick="logout()" style="background:#444; color:#fff;">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = { /* ... tu configuración ... */ };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let pedidosUnsubscribe = null;
let despertadorInterval = null;

// --- FUNCIONES DE ALARMA ---
function reproducirSonidoDespertador(nombreTienda) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(`Atención, nuevo pedido para ${nombreTienda}`);
    msg.lang = 'es-CO';
    window.speechSynthesis.speak(msg);
  }
}

window.probarVozAlarma = function() {
  const msg = new SpeechSynthesisUtterance("Alarma configurada correctamente en Ey Moto");
  msg.lang = 'es-CO';
  window.speechSynthesis.speak(msg);
}

function detenerAlarma() {
  clearInterval(despertadorInterval);
  despertadorInterval = null;
  window.speechSynthesis.cancel();
}

function activarAlarma(nombreTienda) {
  if (!despertadorInterval) {
    reproducirSonidoDespertador(nombreTienda);
    despertadorInterval = setInterval(() => reproducirSonidoDespertador(nombreTienda), 5000);
  }
}

// --- LÓGICA DE PEDIDOS ---
window.escucharPedidosEnTiempoReal = function() {
  const tiendaId = document.getElementById("filtroTiendaPedidos").value;
  if (pedidosUnsubscribe) pedidosUnsubscribe();
  detenerAlarma();
  if (!tiendaId) return;

  const select = document.getElementById("filtroTiendaPedidos");
  const nombreTienda = select.options[select.selectedIndex].text;

  let esCargaInicial = true;
  pedidosUnsubscribe = db.collection("tiendas").doc(tiendaId).collection("pedidos")
    .orderBy("fecha", "desc").onSnapshot(snap => {
      let nuevoPendiente = false;
      snap.docChanges().forEach(c => {
        if (c.type === "added" && c.doc.data().estado === "Pendiente") nuevoPendiente = true;
      });
      
      if (!esCargaInicial && nuevoPendiente) activarAlarma(nombreTienda);
      
      // Renderizado...
      esCargaInicial = false;
    });
}

// ... Mantén el resto de tus funciones de cargarTiendas, guardarProducto, etc.
// Asegúrate de que cargarProductosOriginal consulte db.collection("productos").where("tiendaId", "==", tiendaId)

document.getElementById("btnIniciarSesion").addEventListener("click", () => {
    auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value);
});

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
        cargarTiendas(); // Función que llena los selects
    }
});
</script>
</body>
</html>
