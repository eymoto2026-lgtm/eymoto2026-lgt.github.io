<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - Gestión Total EyMoto</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#fff; margin:0; padding:0; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; font-weight:bold; color: #f5c400; border-bottom: 2px solid #222; }
    .container { padding:20px; max-width: 1200px; margin: 0 auto; }
    .card { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:12px; border: 1px solid #333; }
    input, button, select, textarea { padding:12px; margin:8px 0; width:100%; border-radius:6px; border:1px solid #444; background: #252525; color: #fff; box-sizing: border-box; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; border: none; }
    .hidden { display:none; }
    .producto-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 10px 0; }
  </style>
</head>
<body>

<header>🚀 PANEL DE ADMINISTRACIÓN - EYMOTO</header>

<div class="container">
  <div id="loginBox" class="card">
    <h3>🔐 Acceso</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnIniciarSesion">Ingresar</button>
  </div>

  <div id="panel" class="hidden">
    <div class="card">
      <h3>📋 Monitor de Pedidos</h3>
      <select id="filtroTiendaPedidos" onchange="console.log('Cambio en pedidos')">
        <option value="">Selecciona una tienda</option>
      </select>
      <div id="contenedorPedidos"></div>
    </div>

    <div class="card">
      <h3>🍔 Gestión de Productos</h3>
      <select id="tiendaProducto" onchange="cargarProductosOriginal()">
        <option value="">Selecciona tienda para ver productos</option>
      </select>
      <div id="listaProductos"></div>
    </div>

    <div class="card">
      <h3>🏪 Tiendas</h3>
      <div id="listaTiendas"></div>
    </div>

    <button onclick="auth.signOut()" style="background:#444; color:#fff;">🚪 Cerrar Sesión</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
  storageBucket: "eymotocomidas.firebasestorage.app",
  messagingSenderId: "670474251560",
  appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

window.cargarTiendas = async function() {
  try {
    const snap = await db.collection("tiendas").get();
    const selectPedidos = document.getElementById("filtroTiendaPedidos");
    const selectProd = document.getElementById("tiendaProducto");
    const lista = document.getElementById("listaTiendas");
    
    // Limpiar antes de llenar
    selectPedidos.innerHTML = '<option value="">Selecciona una tienda</option>';
    selectProd.innerHTML = '<option value="">Selecciona tienda para ver productos</option>';
    lista.innerHTML = "";

    snap.forEach(doc => {
      const t = doc.data();
      lista.innerHTML += `<div class="card"><b>${t.nombre}</b> (ID: ${doc.id})</div>`;
      selectPedidos.innerHTML += `<option value="${doc.id}">${t.nombre}</option>`;
      selectProd.innerHTML += `<option value="${doc.id}">${t.nombre}</option>`;
    });
  } catch (e) { console.error("Error al cargar tiendas:", e); }
};

window.cargarProductosOriginal = async function() {
  const tId = document.getElementById("tiendaProducto").value;
  const lista = document.getElementById("listaProductos");
  
  if(!tId) { lista.innerHTML = ""; return; }
  
  lista.innerHTML = "Cargando productos...";
  
  try {
    const snap = await db.collection("productos").where("tiendaId", "==", tId).get();
    lista.innerHTML = "";
    if(snap.empty) { lista.innerHTML = "No hay productos registrados para esta tienda."; return; }
    
    snap.forEach(doc => {
      const p = doc.data();
      lista.innerHTML += `<div class="producto-item"><span>${p.name || 'Sin nombre'}</span><span>$${p.precio || 0}</span></div>`;
    });
  } catch (e) { 
    console.error("Error al cargar productos:", e); 
    lista.innerHTML = "Error al cargar datos.";
  }
};

document.getElementById("btnIniciarSesion").addEventListener("click", () => {
  auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value);
});

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("panel").classList.remove("hidden");
    cargarTiendas();
  } else {
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("panel").classList.add("hidden");
  }
});
</script>
</body>
</html>
