<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin V2 PRO REAL</title>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0}
header{background:#000;color:#f5c400;padding:15px;text-align:center}
.container{padding:20px;max-width:1200px;margin:auto}
.card{background:#1c1c1c;padding:15px;margin-bottom:15px;border-radius:10px}
input,select,button,textarea{
width:100%;padding:10px;margin:5px 0;background:#222;color:#fff;border:1px solid #444
}
button{background:#f5c400;color:#000;font-weight:bold;cursor:pointer}
.hidden{display:none}
.item{background:#222;padding:10px;margin-top:8px;border-radius:6px}
.flex{display:flex;gap:5px}
</style>

</head>

<body>

<header>🚀 ADMIN V2 PRO REAL</header>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email">
<input id="password" type="password">
<button id="loginBtn">Entrar</button>
</div>

<div id="panel" class="hidden">

<!-- TIENDAS -->
<div class="card">
<h3>🏪 Tiendas</h3>

<input type="hidden" id="editTiendaId">
<input id="tNombre" placeholder="Nombre">
<input id="tWhatsapp" placeholder="WhatsApp">
<input id="tLogo" placeholder="Logo">
<input id="tBanner" placeholder="Banner">

<button onclick="guardarTienda()">Guardar Tienda</button>

<div id="listaTiendas"></div>
</div>

<!-- CATEGORÍAS -->
<div class="card">
<h3>📂 Categorías</h3>

<select id="catTienda"></select>
<input type="hidden" id="editCatId">
<input id="catNombre" placeholder="Nombre categoría">

<button onclick="guardarCategoria()">Guardar Categoría</button>

<div id="listaCategorias"></div>
</div>

<!-- PRODUCTOS -->
<div class="card">
<h3>📦 Productos</h3>

<select id="prodTienda"></select>
<select id="prodCategoria"></select>

<input type="hidden" id="editProdId">
<input id="pNombre" placeholder="Nombre">
<input id="pPrecio" placeholder="Precio">

<button onclick="guardarProducto()">Guardar Producto</button>

<div id="listaProductos"></div>
</div>

<!-- PEDIDOS -->
<div class="card">
<h3>📋 Pedidos en tiempo real</h3>

<select id="pedidoTienda"></select>
<div id="pedidos"></div>
<div id="estado"></div>

</div>

<button onclick="logout()">Salir</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */
firebase.initializeApp({
apiKey:"AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
authDomain:"eymotocomidas.firebaseapp.com",
projectId:"eymotocomidas"
});

const auth=firebase.auth();
const db=firebase.firestore();

let pedidoListener=null;

/* ================= AUTH ================= */
auth.onAuthStateChanged(u=>{
if(u){
loginBox.classList.add("hidden");
panel.classList.remove("hidden");
init();
}else{
loginBox.classList.remove("hidden");
panel.classList.add("hidden");
}
});

loginBtn.onclick=()=>auth.signInWithEmailAndPassword(email.value,password.value);
logout.onclick=()=>auth.signOut();

/* ================= INIT ================= */
function init(){
cargarTiendas();
}

/* ================= TIENDAS ================= */
async function cargarTiendas(){
const snap=await db.collection("tiendas").get();

listaTiendas.innerHTML="";
catTienda.innerHTML="";
prodTienda.innerHTML="";
pedidoTienda.innerHTML="";

snap.forEach(d=>{
const t=d.data();

listaTiendas.innerHTML+=`
<div class="item">
<b>${t.nombre}</b>
<div class="flex">
<button onclick="editarTienda('${d.id}')">Edit</button>
<button onclick="eliminarTienda('${d.id}')">Del</button>
</div>
</div>
`;

catTienda.innerHTML+=`<option value="${d.id}">${t.nombre}</option>`;
prodTienda.innerHTML+=`<option value="${d.id}">${t.nombre}</option>`;
pedidoTienda.innerHTML+=`<option value="${d.id}">${t.nombre}</option>`;
});
}

/* ================= TIENDAS CRUD ================= */
async function guardarTienda(){
const id=editTiendaId.value;

const data={
nombre:tNombre.value,
whatsapp:tWhatsapp.value,
logo:tLogo.value,
banner:tBanner.value
};

if(id) await db.collection("tiendas").doc(id).set(data,{merge:true});
else await db.collection("tiendas").add(data);

cargarTiendas();
}

function editarTienda(id){
db.collection("tiendas").doc(id).get().then(d=>{
const t=d.data();
editTiendaId.value=id;
tNombre.value=t.nombre;
tWhatsapp.value=t.whatsapp;
tLogo.value=t.logo;
tBanner.value=t.banner;
});
}

async function eliminarTienda(id){
await db.collection("tiendas").doc(id).delete();
cargarTiendas();
}

/* ================= CATEGORÍAS ================= */
async function guardarCategoria(){
const t=catTienda.value;

await db.collection("tiendas").doc(t)
.collection("categorias").add({
nombre:catNombre.value
});

cargarCategorias();
}

async function cargarCategorias(){
const t=catTienda.value;
if(!t) return;

const snap=await db.collection("tiendas").doc(t)
.collection("categorias").get();

listaCategorias.innerHTML="";
prodCategoria.innerHTML="";

snap.forEach(d=>{
const c=d.data();

listaCategorias.innerHTML+=`
<div class="item">${c.nombre}</div>
`;

prodCategoria.innerHTML+=`
<option value="${c.nombre}">${c.nombre}</option>
`;
});
}

catTienda.onchange=cargarCategorias;

/* ================= PRODUCTOS ================= */
async function guardarProducto(){
const t=prodTienda.value;

const data={
nombre:pNombre.value,
precio:pPrecio.value,
categoria:prodCategoria.value
};

await db.collection("tiendas").doc(t)
.collection("productos").add(data);

cargarProductos();
}

async function cargarProductos(){
const t=prodTienda.value;
if(!t) return;

const snap=await db.collection("tiendas").doc(t)
.collection("productos").get();

listaProductos.innerHTML="";

snap.forEach(d=>{
const p=d.data();

listaProductos.innerHTML+=`
<div class="item">
${p.nombre} - $${p.precio}
</div>
`;
});
}

prodTienda.onchange=cargarProductos;

/* ================= PEDIDOS ================= */
pedidoTienda.onchange=()=>{
listenPedidos();
};

function listenPedidos(){
const t=pedidoTienda.value;
if(!t) return;

if(pedidoListener) pedidoListener();

pedidoListener=db.collection("tiendas").doc(t)
.collection("pedidos")
.orderBy("fecha","desc")
.onSnapshot(snap=>{

let pendientes=0;
pedidos.innerHTML="";

snap.forEach(d=>{
const p=d.data();
if(p.estado==="Pendiente") pendientes++;

pedidos.innerHTML+=`
<div class="item">
<b>${p.numeroPedido}</b> - ${p.estado}
</div>
`;
});

estado.innerHTML="Pendientes: "+pendientes;

/* 🔊 ALARMA REAL */
if(pendientes>0){
const msg=new SpeechSynthesisUtterance("Nuevo pedido pendiente");
speechSynthesis.speak(msg);
}

});
}

</script>

</body>
</html>
