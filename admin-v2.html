<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - EyMoto</title>

  <style>
    body { font-family: Arial; background:#111; color:#fff; margin:0; }
    header { background:#000; padding:15px; text-align:center; font-size:20px; font-weight:bold; }
    .container { padding:20px; }
    .card { background:#1c1c1c; padding:15px; margin-bottom:10px; border-radius:10px; }
    input, button { padding:10px; margin:5px 0; width:100%; border-radius:5px; border:none; }
    button { background:#f5c400; color:#000; font-weight:bold; cursor:pointer; }
    .hidden { display:none; }
    .tienda { border:1px solid #333; padding:10px; margin-top:10px; border-radius:8px; }
  </style>
</head>

<body>

<header>ADMIN V2 - EYMOTO</header>

<div class="container">

  <div id="loginBox" class="card">
    <h3>🔐 Login Administrador</h3>
    <input type="email" id="email">
    <input type="password" id="password">
    <button onclick="login()">Iniciar sesión</button>
    <p id="loginMsg"></p>
  </div>

  <div id="panel" class="hidden">

    <div class="card">
      <h3>➕ Crear Tienda</h3>
      <input id="nombreTienda" placeholder="Nombre tienda">
      <input id="whatsapp" placeholder="WhatsApp">
      <input id="logoTienda" placeholder="URL del logo">
      <input id="bannerTienda" placeholder="URL del banner (opcional)">
      <button onclick="crearTienda()">Crear Tienda</button>
    </div>

    <div class="card">
      <h3>➕ Crear Producto</h3>
      <select id="tiendaProducto" onchange="cargarProductos()">
        <option value="">Seleccionar tienda</option>
      </select>
      <input id="nuevoNombre" placeholder="Nombre">
      <input id="nuevoPrecio" type="number" placeholder="Precio">
      <input id="nuevoCategoria" placeholder="Categoría">
      <input id="nuevoDescripcion" placeholder="Descripción">
      <input id="nuevoImagen" placeholder="Imagen">
      <button onclick="crearProducto()">Crear Producto</button>
    </div>

    <div class="card">
      <h3>🏪 Tiendas</h3>
      <div id="listaTiendas"></div>
    </div>

    <div class="card">
      <h3>📦 Productos</h3>
      <div id="listaProductos"></div>
    </div>

    <div class="card">
      <h3>🏪 Abrir / Cerrar Tienda</h3>
      <select id="tiendaEstado">
        <option value="">Seleccionar tienda</option>
      </select>
      <p id="estadoActual">Estado: -</p>
      <button onclick="toggleTienda()">Cambiar Estado</button>
    </div>

    <button onclick="logout()">Cerrar sesión</button>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// DECLARACIÓN TEMPRANA DE FUNCIONES EN WINDOW (CRUCIAL)
window.actualizarWhatsapp = async function(tiendaId) {
  const nuevoCelu = document.getElementById(`ws-${tiendaId}`).value.trim();

  if(!nuevoCelu) {
    alert("Por favor, ingresa un número de WhatsApp válido.");
    return;
  }

  try {
    await db.collection("tiendas").doc(tiendaId).update({
      whatsapp: nuevoCelu
    });
    
    alert("✅ ¡WhatsApp actualizado con éxito!");
    cargarTiendas(); 
  } catch (e) {
    alert("❌ Error al actualizar: " + e.message);
  }
}

window.copiarUrl = function(url, boton) {
  navigator.clipboard.writeText(url).then(() => {
    const textoOriginal = boton.innerHTML;
    boton.innerHTML = "¡Copiado! ✅";
    boton.style.background = "#28a745"; 
    
    setTimeout(() => {
      boton.innerHTML = textoOriginal;
      boton.style.background = "#333"; 
    }, 2000);
  }).catch(err => {
    console.error("No se pudo copiar el enlace: ", err);
    alert("Error al copiar el enlace.");
  });
}

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).catch(e => loginMsg.innerText = e.message);
}

// AUTH
auth.onAuthStateChanged(async user => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    await cargarTiendas();
    await cargarSelectTiendas();

    const select = document.getElementById("tiendaProducto");
    if (select.options.length > 1) {
      select.selectedIndex = 1;
    }
    cargarProductos();
  } else {
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("panel").style.display = "none";
  }
});

// TIENDAS
async function crearTienda() {
  const id = nombreTienda.value.toLowerCase().replace(/\s/g, "");

  await db.collection("tiendas").doc(id).set({
    nombre: nombreTienda.value,
    whatsapp: whatsapp.value,
    logo: logoTienda.value,
    banner: bannerTienda.value || "",
    activa: true,
    abierta: true,
    createdAt: Date.now()
  });

  cargarTiendas();
  cargarSelectTiendas();
}
