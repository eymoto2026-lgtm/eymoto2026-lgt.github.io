<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin V2 - EyMoto</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      margin: 0;
    }

    header {
      background: #000;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #f5c400;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    .hidden {
      display: none;
    }

    .tienda {
      border: 1px solid #333;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    .ok {
      color: lime;
    }

    .bad {
      color: red;
    }
  </style>
</head>
<body>

<header>ADMIN V2 - EYMOTO</header>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h3>🔐 Login Administrador</h3>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Iniciar sesión</button>
    <p id="loginMsg"></p>
  </div>

  <!-- PANEL -->
  <div id="panel" class="hidden">

    <div class="card">
      <h3>➕ Crear Tienda</h3>
      <input type="text" id="nombreTienda" placeholder="Nombre tienda">
      <input type="text" id="whatsapp" placeholder="WhatsApp (ej: 5731...)">
      <button onclick="crearTienda()">Crear Tienda</button>
    </div>

    <div class="card">
      <h3>🏪 Tiendas</h3>
      <div id="listaTiendas"></div>
    </div>

    <button onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<!-- Firebase (IMPORTANTE: primero esto) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  function login() {
    const email = emailInput.value;
    const password = passwordInput.value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("loginMsg").innerText = "✔ Login correcto";
      })
      .catch(err => {
        document.getElementById("loginMsg").innerText = "❌ " + err.message;
      });
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("panel").style.display = "block";
      cargarTiendas();
    } else {
      document.getElementById("loginBox").style.display = "block";
      document.getElementById("panel").style.display = "none";
    }
  });

  async function crearTienda() {
    const nombre = document.getElementById("nombreTienda").value;
    const whatsapp = document.getElementById("whatsapp").value;

    const id = nombre.toLowerCase().replace(/\s/g, "");

    await db.collection("tiendas").doc(id).set({
      nombre,
      whatsapp,
      abierta: true,
      activa: true,
      createdAt: Date.now()
    });

    cargarTiendas();
  }

  async function cargarTiendas() {
    const cont = document.getElementById("listaTiendas");
    cont.innerHTML = "";

    const snap = await db.collection("tiendas").get();

    snap.forEach(doc => {
      const t = doc.data();

      cont.innerHTML += `
        <div class="tienda">
          <b>${t.nombre}</b><br>
          ${t.whatsapp}<br>
          Estado: ${t.activa ? "Activa" : "Inactiva"}
        </div>
      `;
    });
  }

  function logout() {
    auth.signOut();
  }
</script>
  }

  function logout() {
    auth.signOut();
  }
</script>
