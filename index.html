<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EyMotoComidas Pro</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
}

header{
  background:#333;
  color:white;
  text-align:center;
  padding:20px;
}

header h1{
  margin-top:10px;
  font-size:42px;
}

..logo{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:15px;
}

.banner img{
  width:100%;
}

.categories{
  display:flex;
  gap:8px;
  padding:10px;
  background:#fff;
  overflow-x:auto;
  white-space:nowrap;
}

.categories button{
  flex:0 0 auto;
  border:none;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px;
  padding-bottom:300px;
}

.card{
  background:#fff;
  border-radius:10px;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.buy{
  width:100%;
  margin-top:10px;
  background:#333;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #ccc;
  padding:10px;
  max-height:40vh;
  overflow:auto;
}
  .checkout{
  width:100%;
  background:#333;
  color:#fff;
  border:none;
  padding:15px;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.checkout:hover{
  background:#000;
}
  .cart h3{
  margin:0 0 10px 0;
}
</style>
</head>

<body>

<header>
  <img id="logoTienda" class="logo">
  <h1>EyMotoComidas</h1>

  <div id="estadoTienda"
    style="margin-top:10px;padding:10px;border-radius:10px;background:#28a745;color:white;">
    🟢 TIENDA ABIERTA
  </div>
</header>

<div class="banner">
  <img src="img/banner.jpg">
</div>

<div class="categories">
  <button onclick="filterProducts('Todos')">Todos</button>
  <button onclick="filterProducts('Hamburguesas')">🍔 Hamburguesas</button>
  <button onclick="filterProducts('Perros')">🌭 Perros</button>
  <button onclick="filterProducts('Salchipapas')">🍟 Salchipapas</button>
  <button onclick="filterProducts('Burritos')">🌮 Burritos</button>
  <button onclick="filterProducts('Bebidas')">🥤 Bebidas</button>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h3>🛒 Carrito</h3>
  <div id="cartItems"></div>
  <p>Total: $<span id="total">0</span></p>
  <button class="checkout" onclick="sendWhatsApp()">Comprar</button>
</div>

<script>
let cart = [];
let products = [];
let currentProducts = [];
let whatsapp = "";

const params = new URLSearchParams(window.location.search);
const tiendaId = params.get("tienda") || "eymotocomidas";

function filterProducts(cat){
  currentProducts = (cat === "Todos")
    ? products
    : products.filter(p => p.category === cat);

  renderProducts();
}

function renderProducts(){
  document.getElementById("products").innerHTML =
    currentProducts.map(p => `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <p><b>$${p.price}</b></p>
        <button class="buy" onclick="add('${p.name}')">Comprar</button>
      </div>
    `).join('');
}

function add(name){
  let prod = products.find(p => p.name === name);
  let item = cart.find(x => x.name === name);

  if(item) item.qty++;
  else cart.push({...prod, qty:1});

  renderCart();
}

function renderCart(){
  let total = 0;

  document.getElementById("cartItems").innerHTML =
    cart.map((p,i)=>{
      total += p.price * p.qty;

      return `
        ${p.name} x${p.qty}
        <button onclick="add('${p.name}')">+</button>
        <button onclick="removeItem(${i})">🗑️</button><br>
      `;
    }).join('');

  document.getElementById("total").innerText = total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

function sendWhatsApp(){
  let msg = "🛵 PEDIDO%0A%0A";
  let total = 0;

  cart.forEach(p=>{
    total += p.price * p.qty;
    msg += `${p.name} x${p.qty} = $${p.price * p.qty}%0A`;
  });

  msg += `%0ATotal: $${total}`;

  window.open(`https://wa.me/${whatsapp}?text=${msg}`);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function cargarTienda(){

  const tiendaRef = doc(db, "tiendas", tiendaId);
  const snap = await getDoc(tiendaRef);

  if(!snap.exists()) return;

  const data = snap.data();

  document.querySelector("h1").innerText = data.nombre;
 if(data.logo && data.logo !== ""){
  document.getElementById("logoTienda").src = data.logo;
}else{
  document.getElementById("logoTienda").src = "img/img1.png";
}
  whatsapp = (data.whatsapp || "").replace("+","");

  if(data.abierta === false){
    document.getElementById("estadoTienda").innerText = "🔴 TIENDA CERRADA";
    document.getElementById("estadoTienda").style.background = "red";
  }

  cargarProductos();
}

async function cargarProductos(){
  const ref = collection(db, "tiendas", tiendaId, "productos");
  const snap = await getDocs(ref);

  products = [];

  snap.forEach(d=>{
    const p = d.data();

    if(p.disponible){
      products.push({
        name:p.name,
        category:p.categoria,
        price:p.precio,
        img:p.img,
        description:p.descripcion
      });
    }
  });

  currentProducts = products;
  renderProducts();
}

cargarTienda();
</script>

</body>
</html>
