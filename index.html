<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EyMotoComidas Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
}

.logo{width:90px;border-radius:12px}

.banner img{width:100%}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:white;
    padding:10px;
    border-radius:10px;
}

.buy{
    width:100%;
    background:#333;
    color:white;
    padding:10px;
    border:none;
    border-radius:10px;
}

.cart{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:10px;
    border-top:1px solid #ccc;
}
</style>
</head>

<body>

<header>
    <img id="logoTienda" class="logo">
    <h1 id="nombreTienda"></h1>
</header>

<div id="estadoTienda" style="padding:10px;font-weight:bold;text-align:center">
🟢 CARGANDO...
</div>

<div class="banner">
<img src="" alt="">
</div>

<div class="products" id="products"></div>

<div class="cart">
<h3>🛒 Carrito</h3>
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>
<button onclick="sendWhatsApp()">Comprar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas"
};

const app = initializeApp(firebaseConfig);
const firestore = getFirestore(app);

/* ================= SOLO 1 TIENDA ================= */
const tiendaId = new URLSearchParams(location.search).get("tienda");

if (!tiendaId) {
  document.body.innerHTML = "❌ Falta ?tienda=ID";
  throw new Error("Sin tienda");
}

/* ================= ESTADO GLOBAL ================= */
let whatsapp = "";
let products = [];
let cart = [];

/* ================= TIENDA ================= */
async function cargarTienda() {

  const snap = await getDoc(doc(firestore, "tiendas", tiendaId));

  if (!snap.exists()) {
    document.body.innerHTML = "❌ Tienda no encontrada";
    return;
  }

  const data = snap.data();

  document.getElementById("nombreTienda").textContent = data.nombre || "Tienda";
  document.getElementById("logoTienda").src = data.logo || "";

  if (data.banner) {
    document.querySelector(".banner img").src = data.banner;
  }

  whatsapp = (data.whatsapp || "").replace("+", "");

  const estado = document.getElementById("estadoTienda");
  estado.innerText = data.abierta === false ? "🔴 TIENDA CERRADA" : "🟢 TIENDA ABIERTA";
  estado.style.background = data.abierta === false ? "#dc3545" : "#28a745";
}

/* ================= PRODUCTOS ================= */
async function cargarProductos() {

  const snap = await getDocs(
    collection(firestore, "tiendas", tiendaId, "productos")
  );

  products = [];

  snap.forEach(d => {
    const p = d.data();

    if (p.disponible) {
      products.push({
        name: p.name,
        price: p.precio,
        img: p.img,
        description: p.descripcion || ""
      });
    }
  });

  renderProducts();
}

/* ================= RENDER PRODUCTOS ================= */
function renderProducts() {

  const html = products.map((p, i) => `
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p class="small">${p.description}</p>
      <b>$${p.price}</b>
      <button class="buy" onclick="addToCart(${i})">Comprar</button>
    </div>
  `).join("");

  document.getElementById("products").innerHTML = html;
}

/* ================= CARRITO ================= */
window.addToCart = function(i) {
  cart.push(products[i]);
  renderCart();
};

function renderCart() {

  let total = 0;

  document.getElementById("cartItems").innerHTML = cart.map(p => {
    total += p.price;
    return `${p.name}<br>`;
  }).join("");

  document.getElementById("total").innerText = total;
}

/* ================= WHATSAPP ================= */
window.sendWhatsApp = function () {

  let msg = "🛵 PEDIDO%0A%0A";

  cart.forEach(p => {
    msg += `${p.name}%0A`;
  });

  window.open(`https://wa.me/${whatsapp}?text=${msg}`);
};

/* ================= INICIO APP ================= */
(async function init() {
  await cargarTienda();
  await cargarProductos();
})();
</script>
</body>
</html>
