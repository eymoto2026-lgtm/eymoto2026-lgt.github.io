<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EyMotoComidas App</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#333;color:#fff;text-align:center;padding:15px}
.logo{width:90px;border-radius:10px}
.banner img{width:100%}
.products{display:grid;grid-template-columns:repeat(auto-fill,180px);gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px}
.card img{width:100%;height:130px;object-fit:cover}
.buy{width:100%;background:#333;color:#fff;padding:10px;border:none;border-radius:10px}
.cart{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px;border-top:1px solid #ccc}
</style>
</head>

<body>

<header>
  <img id="logoTienda" class="logo">
  <h2 id="nombreTienda"></h2>
</header>

<div class="banner">
  <img src="" id="bannerImg">
</div>

<div id="estado" style="padding:10px;text-align:center;font-weight:bold"></div>

<div class="products" id="products"></div>

<div class="cart">
  <div id="cartItems"></div>
  <b>Total: $<span id="total">0</span></b>
  <button onclick="sendWhatsApp()">Comprar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= TIENDA ID ================= */
const tiendaId = new URLSearchParams(location.search).get("tienda");

if (!tiendaId) {
  document.body.innerHTML = "❌ Falta ?tienda=nombre";
  throw new Error("Sin tiendaId");
}

/* ================= ESTADO GLOBAL ================= */
let whatsapp = "";
let productos = [];
let carrito = [];

/* ================= CARGAR TIENDA ================= */
async function cargarTienda() {
  const ref = doc(db, "tiendas", tiendaId);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.body.innerHTML = "❌ Tienda no existe";
    return;
  }

  const data = snap.data();

  document.getElementById("nombreTienda").textContent = data.nombre || "Tienda";
  document.getElementById("logoTienda").src = data.logo || "";

  if (data.banner) {
    document.querySelector(".banner img").src = data.banner;
  }

  whatsapp = (data.whatsapp || "").replace("+", "");

  const estado = document.getElementById("estadoTienda");
  estado.innerText = data.abierta ? "🟢 ABIERTA" : "🔴 CERRADA";
  estado.style.background = data.abierta ? "#28a745" : "#dc3545";
}

/* ================= CARGAR PRODUCTOS ================= */
async function cargarProductos() {
  const snap = await getDocs(collection(db, "tiendas", tiendaId, "productos"));

  productos = [];

  snap.forEach(d => {
    const p = d.data();

    if (p.disponible) {
      productos.push(p);
    }
  });

  renderProductos();
}

/* ================= RENDER PRODUCTOS ================= */
function renderProductos() {
  document.getElementById("products").innerHTML =
    productos.map((p, i) => `
      <div class="card">
        <img src="${p.img || ''}">
        <h3>${p.name}</h3>
        <p class="small">${p.descripcion || ""}</p>
        <b>$${p.precio}</b>
        <button class="buy" onclick="add(${i})">Comprar</button>
      </div>
    `).join("");
}

/* ================= CARRITO ================= */
window.add = function(i) {
  carrito.push(productos[i]);
  renderCarrito();
};

function renderCarrito() {
  let total = 0;

  document.getElementById("cartItems").innerHTML =
    carrito.map(p => {
      total += Number(p.precio || 0);
      return `${p.name}<br>`;
    }).join("");

  document.getElementById("total").innerText = total;
  document.getElementById("subtotal").innerText = total;
}

/* ================= WHATSAPP ================= */
window.sendWhatsApp = function() {

  let msg = "🛵 PEDIDO%0A%0A";

  carrito.forEach(p => {
    msg += `${p.name}%0A`;
  });

  window.open(`https://wa.me/${whatsapp}?text=${msg}`);
};

/* ================= INIT ================= */
(async function init() {
  try {
    await cargarTienda();
    await cargarProductos();
  } catch (e) {
    console.error(e);
    document.body.innerHTML = "❌ Error cargando tienda";
  }
})();
</script>

</body>
</html>
