<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyMotoComidas - Menú Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        /* HEADER CON BANNER */
        .header {
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        
        .banner-container {
            width: 100%;
            height: 220px;
            overflow: hidden;
            position: relative;
            background: #1a1a2e;
        }
        .banner-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .banner-container .banner-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #FFD600;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }
        
        .header-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 20px;
            background: linear-gradient(transparent 0%, rgba(0,0,0,0.7) 100%);
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            z-index: 2;
        }
        .header-overlay .info-bg {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: -1;
        }
        
        .header .logo {
            width: 100px;
            height: 100px;
            border-radius: 0;
            object-fit: contain;
            display: block;
            flex-shrink: 0;
            background: transparent;
            border: none;
            padding: 0;
        }
        .header .logo-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 0;
            background: #FFD600;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            color: #1a1a2e;
            flex-shrink: 0;
            border: none;
        }
        
        .header .info {
            flex: 1;
            min-width: 0;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        .header .info .brand {
            font-size: 26px;
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .header .info .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }
        .header .info .estado {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 4px;
            text-shadow: none;
        }
        .header .info .estado.abierto {
            background: #00C853;
            color: #fff;
        }
        .header .info .estado.cerrado {
            background: #FF3D00;
            color: #fff;
        }

        /* CONTRASTE PARA TEXTO */
        .text-color-light {
            color: #ffffff !important;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8) !important;
        }
        .text-color-dark {
            color: #1a1a2e !important;
            text-shadow: 0 2px 8px rgba(255,255,255,0.3) !important;
        }
        .brand-light {
            color: #ffffff !important;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8) !important;
        }
        .brand-dark {
            color: #1a1a2e !important;
            text-shadow: 0 2px 10px rgba(255,255,255,0.3) !important;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 200px;
        }

        /* ===== CATEGORÍAS - CORREGIDO ===== */
        .categoria-titulo {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
            margin: 24px 0 14px 0;
            padding: 10px 16px;
            background: #1a1a2e;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .categoria-titulo .categoria-icono {
            font-size: 24px;
        }
        .categoria-titulo .categoria-texto {
            flex: 1;
        }
        .categoria-titulo .categoria-badge {
            font-size: 12px;
            font-weight: 700;
            background: rgba(255,255,255,0.2);
            padding: 2px 12px;
            border-radius: 20px;
        }

        /* ===== PRODUCTOS ===== */
        .producto-card {
            background: #fff;
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            gap: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #eee;
        }
        .producto-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .producto-img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
        }
        .producto-img.sin-imagen {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #ccc;
        }
        .producto-info {
            flex: 1;
            min-width: 0;
        }
        .producto-info h4 {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 2px;
        }
        .producto-info .descripcion {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        .producto-info .precio {
            font-size: 16px;
            font-weight: 800;
            color: #1a1a2e;
        }

        /* BOTONES DEL PRODUCTO */
        .producto-acciones {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .producto-acciones button {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-restar {
            background: #f0f0f0;
            color: #333;
        }
        .btn-restar:hover {
            background: #e0e0e0;
        }
        .btn-sumar {
            color: #ffffff;
            transition: all 0.2s;
        }
        .btn-sumar:hover {
            transform: scale(1.05);
            filter: brightness(0.85);
        }
        .producto-acciones .cantidad {
            font-size: 16px;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
            color: #1a1a2e;
        }

        /* CARRITO FLOTANTE */
        .carrito-flotante {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 3px solid #FFD600;
            padding: 16px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            z-index: 200;
            max-height: 80vh;
            overflow-y: auto;
            transition: border-color 0.3s ease;
        }
        .carrito-flotante .carrito-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .carrito-flotante .carrito-header h3 {
            font-size: 16px;
            color: #1a1a2e;
        }
        .carrito-flotante .vaciar-btn {
            background: none;
            border: none;
            color: #FF3D00;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .carrito-flotante .vaciar-btn:hover {
            text-decoration: underline;
        }
        .carrito-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .carrito-item .nombre {
            flex: 1;
        }
        .carrito-item .subtotal {
            font-weight: 600;
            color: #1a1a2e;
        }
        .carrito-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 6px 0;
            border-top: 2px solid #FFD600;
            margin-top: 6px;
            font-size: 18px;
            font-weight: 800;
            color: #1a1a2e;
            transition: border-color 0.3s ease;
        }
        .carrito-total .total-valor {
            color: #1a1a2e;
        }
        
        .btn-comprar {
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            color: #ffffff;
        }
        .btn-comprar:hover {
            transform: scale(1.01);
            filter: brightness(0.9);
        }
        .btn-comprar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .form-datos {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        .form-datos .label-form {
            font-size: 11px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            display: block;
            margin-bottom: 4px;
        }
        .form-datos input,
        .form-datos textarea {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px 14px;
            width: 100%;
            margin-bottom: 8px;
            font-size: 14px;
            color: #1a1a2e;
            transition: border-color 0.3s ease;
        }
        .form-datos input:focus,
        .form-datos textarea:focus {
            outline: none;
            border-color: #FFD600;
            transition: border-color 0.3s ease;
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            max-width: 90%;
        }
        .toast {
            background: #1a1a2e;
            color: #fff;
            border-radius: 12px;
            padding: 12px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease;
            text-align: center;
            border-left: 4px solid #FFD600;
            transition: border-color 0.3s ease;
        }
        .toast.success {
            border-left-color: #00C853;
        }
        .toast.error {
            border-left-color: #FF3D00;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* TIENDA CERRADA */
        .tienda-cerrada-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            flex-direction: column;
            padding: 30px;
        }
        .tienda-cerrada-overlay.visible {
            display: flex;
        }
        .tienda-cerrada-overlay .icono {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .tienda-cerrada-overlay h2 {
            color: #FFD600;
            font-size: 28px;
            margin-bottom: 10px;
            transition: color 0.3s ease;
        }
        .tienda-cerrada-overlay p {
            color: #ddd;
            font-size: 16px;
            text-align: center;
            max-width: 400px;
        }

        .categoria-vacia {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .banner-container { height: 160px; }
            .header .logo { width: 70px; height: 70px; }
            .header .logo-placeholder { width: 70px; height: 70px; font-size: 28px; }
            .header .info .brand { font-size: 20px; }
            .header-overlay { padding: 14px; gap: 12px; }
            .producto-img { width: 60px; height: 60px; }
            .producto-info h4 { font-size: 13px; }
            .container { padding: 10px; padding-bottom: 200px; }
            .carrito-flotante { padding: 12px 16px; }
            .categoria-titulo { font-size: 17px; padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- OVERLAY DE TIENDA CERRADA -->
    <div class="tienda-cerrada-overlay" id="tiendaCerradaOverlay">
        <div class="icono">🔒</div>
        <h2 id="cerradoTitulo">Tienda Cerrada</h2>
        <p>Lo sentimos, la tienda se encuentra cerrada temporalmente. Vuelve más tarde.</p>
    </div>

    <!-- HEADER -->
    <div class="header" id="headerPrincipal">
        <div class="banner-container">
            <img id="bannerHeader" src="" alt="Banner" onerror="this.style.display='none'">
            <div class="banner-placeholder" id="bannerPlaceholder" style="display:none;">🍔</div>
        </div>
        <div class="header-overlay" id="headerOverlay">
            <div class="info-bg"></div>
            <img class="logo" id="logoHeader" src="" alt="Logo" onerror="this.style.display='none'">
            <div class="logo-placeholder" id="logoPlaceholder" style="display:none;">EM</div>
            <div class="info" id="infoContainer">
                <div class="brand" id="nombreTiendaHeader">EyMotoComidas</div>
                <div class="subtitle" id="whatsappHeader">📱 Cargando...</div>
                <span class="estado abierto" id="estadoHeader">🟢 Abierto</span>
            </div>
        </div>
    </div>

    <div class="container" id="contenedorMenu">
        <div id="listaProductos" style="text-align:center;padding:40px;color:#888;">
            <div style="font-size:32px;margin-bottom:12px;">⏳</div>
            Cargando menú...
        </div>
    </div>

    <!-- CARRITO -->
    <div class="carrito-flotante" id="carritoFlotante">
        <div class="carrito-header">
            <h3>🛒 Carrito</h3>
            <button class="vaciar-btn" onclick="vaciarCarrito()">Vaciar</button>
        </div>
        <div id="itemsCarrito">
            <div style="color:#888;font-size:13px;text-align:center;padding:8px 0;">
                No hay productos en el carrito
            </div>
        </div>
        
        <div class="form-datos" id="formDatos" style="display:none;">
            <span class="label-form">👤 Datos de entrega</span>
            <input type="text" id="clienteNombre" placeholder="Tu nombre completo">
            <input type="tel" id="clienteTelefono" placeholder="Teléfono (ej: 3169934516)">
            <input type="text" id="clienteDireccion" placeholder="Dirección de entrega">
            <input type="text" id="clienteBarrio" placeholder="Barrio">
            <textarea id="clienteObservaciones" placeholder="Observaciones (ej: sin cebolla...)"></textarea>
        </div>

        <div class="carrito-total" id="carritoTotal">
            <span>💰 Total</span>
            <span class="total-valor" id="totalCarrito">$0</span>
        </div>
        <button class="btn-comprar" id="btnComprar" onclick="enviarPedido()" disabled>
            📱 Comprar Ahora
        </button>
        <div style="font-size:10px;color:#aaa;text-align:center;margin-top:6px;">
            El pedido se enviará al administrador
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // ============================================================
        // CONFIGURACIÓN FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
            authDomain: "eymotocomidas.firebaseapp.com",
            projectId: "eymotocomidas",
            storageBucket: "eymotocomidas.firebasestorage.app",
            messagingSenderId: "670474251560",
            appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================================
        // OBTENER ID DE TIENDA
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const TIENDA_ID = urlParams.get('tienda');

        if (!TIENDA_ID) {
            mostrarToast('⚠️ No se especificó una tienda', 'error');
        }

        console.log('🏪 Tienda ID:', TIENDA_ID);

        // ============================================================
        // ESTADO
        // ============================================================
        let carrito = [];
        let productos = [];
        let tiendaData = {};
        let tiendaAbierta = true;
        let colorPrincipal = '#FFD600';

        // ============================================================
        // FUNCIÓN: DETECTAR BRILLO
        // ============================================================
        function getColorBrightness(hexColor) {
            if (!hexColor) return 0.5;
            
            let r, g, b;
            if (hexColor.startsWith('#')) {
                const cleanHex = hexColor.replace('#', '');
                if (cleanHex.length === 3) {
                    r = parseInt(cleanHex[0] + cleanHex[0], 16);
                    g = parseInt(cleanHex[1] + cleanHex[1], 16);
                    b = parseInt(cleanHex[2] + cleanHex[2], 16);
                } else if (cleanHex.length === 6) {
                    r = parseInt(cleanHex.substring(0, 2), 16);
                    g = parseInt(cleanHex.substring(2, 4), 16);
                    b = parseInt(cleanHex.substring(4, 6), 16);
                } else {
                    return 0.5;
                }
            } else {
                return 0.5;
            }

            return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        }

        // ============================================================
        // FUNCIÓN: OBTENER COLOR DOMINANTE
        // ============================================================
        function getDominantColor(imageUrl, callback) {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 50;
                    canvas.height = 50;
                    ctx.drawImage(img, 0, 0, 50, 50);
                    
                    const imageData = ctx.getImageData(0, 0, 50, 50);
                    const data = imageData.data;
                    
                    const colorCount = {};
                    let maxCount = 0;
                    let dominantColor = '#FFD600';
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        const brightness = (r + g + b) / 3;
                        if (brightness < 30 || brightness > 225) continue;
                        
                        const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
                        colorCount[hex] = (colorCount[hex] || 0) + 1;
                        if (colorCount[hex] > maxCount) {
                            maxCount = colorCount[hex];
                            dominantColor = hex;
                        }
                    }
                    
                    callback(dominantColor);
                } catch (e) {
                    console.warn('Error al extraer color:', e);
                    callback('#FFD600');
                }
            };
            img.onerror = function() {
                console.warn('No se pudo cargar la imagen para extraer color');
                callback('#FFD600');
            };
            img.src = imageUrl;
        }

        // ============================================================
        // FUNCIÓN: APLICAR COLORES DINÁMICOS
        // ============================================================
        function aplicarColoresDinamicos(colorHex) {
            if (!colorHex || colorHex === '#FFD600') {
                colorHex = '#FFD600';
            }
            
            colorPrincipal = colorHex;
            const brightness = getColorBrightness(colorHex);
            const isLight = brightness > 0.5;
            const textColor = isLight ? '#1a1a2e' : '#ffffff';
            const hoverBrightness = isLight ? 0.85 : 1.15;

            // 1. Botones "sumar"
            document.querySelectorAll('.btn-sumar').forEach(el => {
                el.style.background = colorHex;
                el.style.color = textColor;
            });

            // 2. Botón "Comprar"
            const btnComprar = document.getElementById('btnComprar');
            if (btnComprar) {
                btnComprar.style.background = colorHex;
                btnComprar.style.color = textColor;
            }

            // 3. Categorías (fondo y texto)
            document.querySelectorAll('.categoria-titulo').forEach(el => {
                el.style.background = colorHex;
                el.style.color = textColor;
                // El badge también
                const badge = el.querySelector('.categoria-badge');
                if (badge) {
                    badge.style.background = textColor;
                    badge.style.color = colorHex;
                }
            });

            // 4. Borde superior del carrito
            const carrito = document.getElementById('carritoFlotante');
            if (carrito) carrito.style.borderTopColor = colorHex;

            // 5. Línea del total
            const totalLine = document.getElementById('carritoTotal');
            if (totalLine) totalLine.style.borderTopColor = colorHex;

            // 6. Inputs en focus
            const style = document.getElementById('dynamic-colors') || document.createElement('style');
            style.id = 'dynamic-colors';
            style.textContent = `
                .form-datos input:focus, .form-datos textarea:focus {
                    border-color: ${colorHex} !important;
                }
                .tienda-cerrada-overlay h2 {
                    color: ${colorHex} !important;
                }
                .btn-sumar:hover {
                    filter: brightness(${hoverBrightness});
                }
                .btn-comprar:hover {
                    filter: brightness(${hoverBrightness});
                }
            `;
            document.head.appendChild(style);
        }

        // ============================================================
        // FUNCIÓN: CONTRASTE BANNER
        // ============================================================
        function aplicarContrasteBanner(imagenUrl) {
            const infoContainer = document.getElementById('infoContainer');
            const brandElement = document.getElementById('nombreTiendaHeader');
            
            if (!imagenUrl) {
                infoContainer.className = 'info';
                brandElement.className = 'brand';
                return;
            }

            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 50;
                    canvas.height = 50;
                    ctx.drawImage(img, 0, 0, 50, 50);
                    
                    const pixel = ctx.getImageData(25, 25, 1, 1).data;
                    const hex = '#' + [pixel[0], pixel[1], pixel[2]]
                        .map(v => v.toString(16).padStart(2, '0'))
                        .join('');
                    
                    const brightness = getColorBrightness(hex);
                    const isLight = brightness > 0.5;
                    
                    infoContainer.className = 'info';
                    brandElement.className = 'brand';
                    
                    if (isLight) {
                        infoContainer.classList.add('text-color-dark');
                        brandElement.classList.add('brand-dark');
                    } else {
                        infoContainer.classList.add('text-color-light');
                        brandElement.classList.add('brand-light');
                    }
                } catch (e) {
                    console.warn('Error al analizar contraste:', e);
                }
            };
            img.onerror = function() {
                console.warn('No se pudo cargar la imagen para contraste');
            };
            img.src = imagenUrl;
        }

        // ============================================================
        // CARGAR TIENDA
        // ============================================================
        async function cargarTienda() {
            if (!TIENDA_ID) return;
            try {
                const doc = await db.collection('tiendas').doc(TIENDA_ID).get();
                if (doc.exists) {
                    tiendaData = doc.data();
                    
                    document.getElementById('nombreTiendaHeader').textContent = tiendaData.nombre || 'EyMotoComidas';
                    document.getElementById('whatsappHeader').textContent = '📱 ' + (tiendaData.whatsapp || 'Sin teléfono');
                    
                    // BANNER
                    const bannerEl = document.getElementById('bannerHeader');
                    const bannerPlaceholder = document.getElementById('bannerPlaceholder');
                    
                    if (tiendaData.banner && tiendaData.banner.trim() !== '') {
                        bannerEl.src = tiendaData.banner;
                        bannerEl.style.display = 'block';
                        bannerPlaceholder.style.display = 'none';
                        
                        bannerEl.onload = function() {
                            getDominantColor(tiendaData.banner, function(color) {
                                aplicarColoresDinamicos(color);
                            });
                            aplicarContrasteBanner(tiendaData.banner);
                        };
                        bannerEl.onerror = function() {
                            this.style.display = 'none';
                            bannerPlaceholder.style.display = 'flex';
                            if (tiendaData.logo) {
                                getDominantColor(tiendaData.logo, function(color) {
                                    aplicarColoresDinamicos(color);
                                });
                            }
                        };
                    } else {
                        bannerEl.style.display = 'none';
                        bannerPlaceholder.style.display = 'flex';
                        if (tiendaData.logo) {
                            getDominantColor(tiendaData.logo, function(color) {
                                aplicarColoresDinamicos(color);
                            });
                        }
                    }

                    // LOGO
                    const logoEl = document.getElementById('logoHeader');
                    const logoPlaceholder = document.getElementById('logoPlaceholder');
                    if (tiendaData.logo && tiendaData.logo.trim() !== '') {
                        logoEl.src = tiendaData.logo;
                        logoEl.style.display = 'block';
                        logoPlaceholder.style.display = 'none';
                        logoEl.onerror = function() {
                            this.style.display = 'none';
                            logoPlaceholder.style.display = 'flex';
                            const nombre = tiendaData.nombre || 'EyMoto';
                            const iniciales = nombre.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
                            logoPlaceholder.textContent = iniciales || 'EM';
                        };
                    } else {
                        logoEl.style.display = 'none';
                        logoPlaceholder.style.display = 'flex';
                        const nombre = tiendaData.nombre || 'EyMoto';
                        const iniciales = nombre.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
                        logoPlaceholder.textContent = iniciales || 'EM';
                    }

                    // ESTADO
                    tiendaAbierta = tiendaData.abierta !== false;
                    const estadoEl = document.getElementById('estadoHeader');
                    const overlayEl = document.getElementById('tiendaCerradaOverlay');
                    
                    if (tiendaAbierta) {
                        estadoEl.textContent = '🟢 Abierto';
                        estadoEl.className = 'estado abierto';
                        overlayEl.classList.remove('visible');
                    } else {
                        estadoEl.textContent = '🔴 Cerrado';
                        estadoEl.className = 'estado cerrado';
                        overlayEl.classList.add('visible');
                    }
                } else {
                    console.warn('⚠️ La tienda no existe en Firestore');
                    document.getElementById('nombreTiendaHeader').textContent = 'Tienda no encontrada';
                }
            } catch (e) {
                console.error('Error al cargar tienda:', e);
                mostrarToast('Error al cargar la tienda', 'error');
            }
        }

        // ============================================================
        // CARGAR PRODUCTOS - CORREGIDO PARA MOSTRAR CATEGORÍAS
        // ============================================================
        async function cargarProductos() {
            const lista = document.getElementById('listaProductos');

            if (!TIENDA_ID) {
                lista.innerHTML = `
                    <div style="color:#FF3D00;text-align:center;padding:40px;">
                        ⚠️ No se especificó una tienda
                    </div>
                `;
                return;
            }

            try {
                const snap = await db.collection('tiendas').doc(TIENDA_ID).collection('productos').get();

                if (snap.empty) {
                    lista.innerHTML = `
                        <div style="color:#888;text-align:center;padding:40px;">
                            <div style="font-size:32px;margin-bottom:12px;">🍽️</div>
                            No hay productos disponibles en esta tienda
                        </div>
                    `;
                    return;
                }

                productos = [];
                let html = '';
                let categoriaActual = '';
                let primeraCategoria = true;

                snap.forEach(doc => {
                    const p = doc.data();
                    const id = doc.id;
                    productos.push({ id, ...p });

                    const categoria = p.categoria || 'General';
                    
                    // Mostrar categoría SOLO si es diferente a la anterior
                    if (categoria !== categoriaActual) {
                        categoriaActual = categoria;
                        
                        // Icono según categoría
                        let icono = '📂';
                        const catLower = categoria.toLowerCase();
                        if (catLower.includes('salchi')) icono = '🌭';
                        else if (catLower.includes('hamburguesa') || catLower.includes('burger')) icono = '🍔';
                        else if (catLower.includes('pizza')) icono = '🍕';
                        else if (catLower.includes('pollo')) icono = '🍗';
                        else if (catLower.includes('bebida') || catLower.includes('gaseosa') || catLower.includes('jugo')) icono = '🥤';
                        else if (catLower.includes('postre') || catLower.includes('dulce')) icono = '🍰';
                        else if (catLower.includes('combo')) icono = '📦';
                        
                        // Contar productos en esta categoría
                        const count = snap.docs.filter(d => {
                            const data = d.data();
                            return (data.categoria || 'General') === categoria;
                        }).length;
                        
                        html += `
                            <div class="categoria-titulo" id="cat-${categoria.replace(/\s/g, '')}">
                                <span class="categoria-icono">${icono}</span>
                                <span class="categoria-texto">${escHtml(categoria)}</span>
                                <span class="categoria-badge">${count}</span>
                            </div>
                        `;
                    }

                    // Producto
                    const imagenHtml = p.img && p.img.trim() !== ''
                        ? `<img class="producto-img" src="${escHtml(p.img)}" alt="${escHtml(p.name||'')}" onerror="this.className='producto-img sin-imagen';this.textContent='🍔'">`
                        : `<div class="producto-img sin-imagen">🍔</div>`;

                    html += `
                        <div class="producto-card">
                            ${imagenHtml}
                            <div class="producto-info">
                                <h4>${escHtml(p.name || 'Producto')}</h4>
                                ${p.descripcion ? `<div class="descripcion">${escHtml(p.descripcion)}</div>` : ''}
                                <div class="precio">$${(p.precio || 0).toLocaleString('es-CO')}</div>
                            </div>
                            <div class="producto-acciones">
                                <button class="btn-restar" onclick="quitarDelCarrito('${id}')">−</button>
                                <span class="cantidad" id="cant-${id}">${carrito.find(c => c.id === id)?.cantidad || 0}</span>
                                <button class="btn-sumar" onclick="agregarAlCarrito('${id}')">+</button>
                            </div>
                        </div>
                    `;
                });

                lista.innerHTML = html;

                // Aplicar colores dinámicos
                if (colorPrincipal) {
                    aplicarColoresDinamicos(colorPrincipal);
                }

                // Actualizar cantidades
                carrito.forEach(item => {
                    const el = document.getElementById(`cant-${item.id}`);
                    if (el) el.textContent = item.cantidad;
                });

                console.log(`✅ ${productos.length} productos cargados en ${snap.docs.length} documentos`);

            } catch (error) {
                console.error('Error al cargar productos:', error);
                lista.innerHTML = `
                    <div style="color:#FF3D00;text-align:center;padding:40px;">
                        ❌ Error al cargar el menú
                    </div>
                `;
            }
        }

        // ============================================================
        // FUNCIONES DEL CARRITO
        // ============================================================
        function agregarAlCarrito(productoId) {
            if (!tiendaAbierta) {
                mostrarToast('⚠️ La tienda está cerrada temporalmente', 'error');
                return;
            }

            const producto = productos.find(p => p.id === productoId);
            if (!producto) return;

            const existente = carrito.find(p => p.id === productoId);
            if (existente) {
                existente.cantidad++;
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.name,
                    precio: producto.precio,
                    cantidad: 1,
                    imagen: producto.img || ''
                });
            }
            actualizarCarrito();
            const el = document.getElementById(`cant-${productoId}`);
            if (el) el.textContent = carrito.find(p => p.id === productoId)?.cantidad || 0;
        }

        function quitarDelCarrito(productoId) {
            const index = carrito.findIndex(p => p.id === productoId);
            if (index === -1) return;

            if (carrito[index].cantidad > 1) {
                carrito[index].cantidad--;
            } else {
                carrito.splice(index, 1);
            }
            actualizarCarrito();
            const el = document.getElementById(`cant-${productoId}`);
            if (el) el.textContent = carrito.find(p => p.id === productoId)?.cantidad || 0;
        }

        function actualizarCarrito() {
            const itemsContainer = document.getElementById('itemsCarrito');
            const totalContainer = document.getElementById('totalCarrito');
            const btnComprar = document.getElementById('btnComprar');

            if (carrito.length === 0) {
                itemsContainer.innerHTML = `
                    <div style="color:#888;font-size:13px;text-align:center;padding:8px 0;">
                        No hay productos en el carrito
                    </div>
                `;
                totalContainer.textContent = '$0';
                btnComprar.disabled = true;
                document.getElementById('formDatos').style.display = 'none';
                return;
            }

            let html = '';
            let total = 0;
            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                html += `
                    <div class="carrito-item">
                        <span class="nombre">${escHtml(item.nombre)} x${item.cantidad}</span>
                        <span class="subtotal">$${subtotal.toLocaleString('es-CO')}</span>
                    </div>
                `;
            });

            itemsContainer.innerHTML = html;
            totalContainer.textContent = `$${total.toLocaleString('es-CO')}`;
            btnComprar.disabled = false;
            document.getElementById('formDatos').style.display = 'block';
        }

        function vaciarCarrito() {
            if (carrito.length === 0) return;
            if (!confirm('¿Vaciar el carrito?')) return;
            carrito = [];
            actualizarCarrito();
            document.getElementById('formDatos').style.display = 'none';
            productos.forEach(p => {
                const el = document.getElementById(`cant-${p.id}`);
                if (el) el.textContent = '0';
            });
            mostrarToast('Carrito vaciado', 'success');
        }

        // ============================================================
        // GENERAR NÚMERO DE PEDIDO
        // ============================================================
        function generarNumeroPedido() {
            const num = String(Math.floor(Math.random() * 9000) + 1000);
            return `#${num}`;
        }

        // ============================================================
        // ENVIAR PEDIDO
        // ============================================================
        async function enviarPedido() {
            if (!tiendaAbierta) {
                mostrarToast('⚠️ La tienda está cerrada', 'error');
                return;
            }

            if (carrito.length === 0) {
                mostrarToast('El carrito está vacío', 'error');
                return;
            }

            const nombre = document.getElementById('clienteNombre').value.trim();
            const telefono = document.getElementById('clienteTelefono').value.trim();
            const direccion = document.getElementById('clienteDireccion').value.trim();
            const barrio = document.getElementById('clienteBarrio').value.trim();
            const observaciones = document.getElementById('clienteObservaciones').value.trim();

            if (!nombre) {
                mostrarToast('Por favor ingresa tu nombre', 'error');
                document.getElementById('clienteNombre').focus();
                return;
            }

            if (!telefono) {
                mostrarToast('Por favor ingresa tu teléfono', 'error');
                document.getElementById('clienteTelefono').focus();
                return;
            }

            const numeroPedido = generarNumeroPedido();
            const fecha = new Date();
            const fechaStr = fecha.toLocaleDateString('es-CO');
            const horaStr = fecha.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });

            let total = 0;
            const items = carrito.map(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                return {
                    nombre: item.nombre,
                    cantidad: item.cantidad,
                    precio: item.precio,
                    total: subtotal
                };
            });

            // MENSAJE WHATSAPP
            let mensajeWhatsApp = `🏪 *${tiendaData.nombre || 'EYMOTOCOMIDAS'}*\n\n`;
            mensajeWhatsApp += `🛵 *NUEVO PEDIDO ${numeroPedido}*\n\n`;
            mensajeWhatsApp += `📅 *Fecha:* ${fechaStr}\n`;
            mensajeWhatsApp += `⏰ *Hora:* ${horaStr}\n\n`;
            mensajeWhatsApp += `👤 *Cliente:*\n${nombre}\n\n`;
            mensajeWhatsApp += `📱 *Teléfono:*\n${telefono}\n\n`;
            mensajeWhatsApp += `📍 *Dirección:*\n${direccion || 'Recoge en tienda'}\n\n`;
            if (barrio) mensajeWhatsApp += `🏘️ *Barrio:*\n${barrio}\n\n`;
            if (observaciones) mensajeWhatsApp += `📝 *Observaciones:*\n${observaciones}\n\n`;
            mensajeWhatsApp += `🧾 *PRODUCTOS*\n\n`;

            items.forEach(item => {
                mensajeWhatsApp += `🍜 ${item.nombre} x${item.cantidad} = $${item.total.toLocaleString('es-CO')}\n`;
            });

            mensajeWhatsApp += `\n💰 *TOTAL:* $${total.toLocaleString('es-CO')}`;

            // GUARDAR EN FIRESTORE
            const pedidoData = {
                numeroPedido: numeroPedido,
                cliente: {
                    nombre: nombre,
                    telefono: telefono,
                    direccion: direccion || 'Recoge en tienda',
                    barrio: barrio || '',
                    observaciones: observaciones || ''
                },
                items: items,
                total: total,
                estado: 'Pendiente',
                fecha: firebase.firestore.FieldValue.serverTimestamp(),
                fuente: 'whatsapp',
                timestamp: Date.now()
            };

            try {
                if (TIENDA_ID) {
                    await db.collection('tiendas').doc(TIENDA_ID).collection('pedidos').add(pedidoData);
                    console.log('✅ Pedido guardado en Firestore');
                }
            } catch (error) {
                console.error('❌ Error al guardar en Firestore:', error);
            }

            // ENVIAR POR WHATSAPP
            const telefonoWhatsApp = tiendaData.whatsapp || '573164043436';
            const urlWhatsApp = `https://wa.me/${telefonoWhatsApp}?text=${encodeURIComponent(mensajeWhatsApp)}`;

            mostrarToast(`✅ Pedido ${numeroPedido} enviado correctamente`, 'success');
            window.open(urlWhatsApp, '_blank');

            // Limpiar carrito
            carrito = [];
            actualizarCarrito();
            document.getElementById('formDatos').style.display = 'none';
            document.getElementById('clienteNombre').value = '';
            document.getElementById('clienteTelefono').value = '';
            document.getElementById('clienteDireccion').value = '';
            document.getElementById('clienteBarrio').value = '';
            document.getElementById('clienteObservaciones').value = '';
            
            productos.forEach(p => {
                const el = document.getElementById(`cant-${p.id}`);
                if (el) el.textContent = '0';
            });
        }

        // ============================================================
        // TOAST
        // ============================================================
        function mostrarToast(mensaje, tipo = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            toast.textContent = mensaje;
            if (tipo === 'info' && colorPrincipal) {
                toast.style.borderLeftColor = colorPrincipal;
            }
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================
        // ESCAPE HTML
        // ============================================================
        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        document.addEventListener('DOMContentLoaded', async () => {
            await cargarTienda();
            await cargarProductos();

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && document.activeElement.tagName !== 'TEXTAREA') {
                    const btn = document.getElementById('btnComprar');
                    if (!btn.disabled) {
                        enviarPedido();
                    }
                }
            });
        });

        console.log('✅ Menú EyMotoComidas cargado correctamente');
        console.log('🏪 Tienda ID:', TIENDA_ID);
    </script>
</body>
