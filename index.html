<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EyMotoComidas Pro</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  padding-bottom:180px;
}

header{
  background:#333;
  color:white;
  text-align:center;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.logo{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:15px;
}

.banner img{
  width:100%;
}

.categories{
  display:flex;
  gap:8px;
  padding:10px;
  background:#fff;
  overflow-x:auto;
  white-space:nowrap;
}

.categories button{
  flex:0 0 auto;
  border:none;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px;
  padding-bottom:300px;
}

.card{
  background:#fff;
  border-radius:10px;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.buy{
  width:100%;
  margin-top:10px;
  background:#333;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #ccc;
  padding:15px;
  max-height:40vh;
  overflow:auto;
  box-sizing:border-box;
  z-index: 999;
}

.checkout{
  display:block;
  width:100%;
  background:#333;
  color:#fff;
  border:none;
  padding:16px;
  border-radius:12px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.checkout:hover{
  background:#000;
}

.cart h3{
  margin:0 0 10px 0;
}

/* MODAL DEL FORMULARIO DE PEDIDO */
.modal {
  display: none; 
  position: fixed; 
  z-index: 2000; 
  left: 0;
  top: 0;
  width: 100%; 
  height: 100%; 
  overflow: auto; 
  background-color: rgba(0,0,0,0.6); 
  align-items: center;
  justify-content: center;
}

.modal-content {
  background-color: #fff;
  margin: auto;
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 450px;
  box-sizing: border-box;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.modal h2 {
  margin-top: 0;
  font-size: 22px;
  color: #333;
  text-align: center;
  margin-bottom: 20px;
}

.modal label {
  display: block;
  margin-top: 12px;
  font-weight: bold;
  color: #555;
  font-size: 14px;
}

.modal input, .modal textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 8px;
  box-sizing: border-box;
  font-size: 15px;
}

.modal textarea {
  resize: none;
  height: 70px;
}

.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn-cancelar {
  flex: 1;
  background: #eee;
  color: #333;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

.btn-enviar {
  flex: 2;
  background: #28a745;
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}
</style>
</head>

<body>

<header>
  <img id="logoTienda" class="logo">
  <h1>EyMotoComidas</h1>

  <div id="estadoTienda" style="margin-top:10px;padding:10px;border-radius:10px;background:#28a745;color:white;font-weight:bold;">
    🟢 TIENDA ABIERTA
  </div>
</header>

<div class="banner">
  <img src="img/banner.jpg">
</div>

<div class="categories">
  <button onclick="filterProducts('Todos')">Todos</button>
  <button onclick="filterProducts('Hamburguesas')">🍔 Hamburguesas</button>
  <button onclick="filterProducts('Perros')">🌭 Perros</button>
  <button onclick="filterProducts('Salchipapas')">🍟 Salchipapas</button>
  <button onclick="filterProducts('Burritos')">🌮 Burritos</button>
  <button onclick="filterProducts('Bebidas')">🥤 Bebidas</button>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h3>🛒 Carrito</h3>
  <div id="cartItems"></div>
  <p>Total: $<span id="total">0</span></p>
  <button id="btnComprar" class="checkout">Comprar</button>
</div>

<!-- VENTANA MODAL FORMULARIO PROFESIONAL -->
<div id="modalPedido" class="modal">
  <div class="modal-content">
    <h2>📋 Datos de Entrega</h2>
     
    <label>👤 Nombre Completo *</label>
    <input type="text" id="formNombre" placeholder="Ej: Juan Pérez" required>
     
    <label>📱 Teléfono *</label>
    <input type="tel" id="formTelefono" placeholder="Ej: 3001234567" required>
     
    <label>📍 Dirección *</label>
    <input type="text" id="formDireccion" placeholder="Ej: Cra 10 #15-20" required>
     
    <label>🏘️ Barrio *</label>
    <input type="text" id="formBarrio" placeholder="Ej: Novalito" required>
     
    <label>📝 Observaciones</label>
    <textarea id="formObservaciones" placeholder="Ej: Sin cebolla, salsas aparte..."></textarea>
     
    <div class="modal-buttons">
      <button class="btn-cancelar" id="btnCerrarModal">Volver</button>
      <button class="btn-enviar" id="btnConfirmarPedido">ENVIAR PEDIDO</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];
let products = [];
let currentProducts = [];
let whatsapp = "";
let tiendaAbierta = true; 

const params = new URLSearchParams(window.location.search);
const tiendaId = params.get("tienda") || "eymotocomidas";

function filterProducts(cat){
  currentProducts = (cat === "Todos")
    ? products
    : products.filter(p => p.category === cat);

  renderProducts();
}

function renderProducts(){
  document.getElementById("products").innerHTML =
    currentProducts.map(p => `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.description || ''}</p>
        <p><b>$${p.price}</b></p>
        <button class="buy" ${!tiendaAbierta ? 'style="background:#aaa; cursor:not-allowed;"' : ''} onclick="add('${p.name}')">
          ${tiendaAbierta ? 'Comprar' : 'Cerrado'}
        </button>
      </div>
    `).join('');
}

function add(name){
  if (!tiendaAbierta) {
    alert("🛑 Lo sentimos, este negocio se encuentra CERRADO en este momento.");
    return;
  }

  let prod = products.find(p => p.name === name);
  let item = cart.find(x => x.name === name);

  if(item) {
    item.qty++;
  } else {
    cart.push({...prod, qty:1});
  }

  renderCart();
}

function renderCart(){
  let total = 0;

  document.getElementById("cartItems").innerHTML =
    cart.map((p,i)=>{
      total += p.price * p.qty;

      return `
        ${p.name} x${p.qty}
        <button onclick="add('${p.name}')">+</button>
        <button onclick="removeItem(${i})">🗑️</button><br>
      `;
    }).join('');

  document.getElementById("total").innerText = total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

async function cargarTienda(){
  try {
    const tiendaRef = doc(db, "tiendas", tiendaId);
    const snap = await getDoc(tiendaRef);

    if(!snap.exists()) {
      console.error("La tienda no existe en Firebase");
      return;
    }

    const data = snap.data();
    window.tiendaNombre = data.nombre || "Tienda";
    document.querySelector("h1").innerText = data.nombre;
     
    if(data.logo && data.logo !== ""){
      document.getElementById("logoTienda").src = data.logo;
    } else {
      document.getElementById("logoTienda").src = "img/img1.png";
    }
     
    whatsapp = (data.whatsapp || "").replace("+","").trim();

    const btnComprar = document.getElementById("btnComprar");

    if(data.abierta === false){
      tiendaAbierta = false; 
      document.getElementById("estadoTienda").innerText = "🔴 TIENDA CERRADA";
      document.getElementById("estadoTienda").style.background = "red";
       
      if(btnComprar) {
        btnComprar.innerText = "🚫 ESTABLECIMIENTO CERRADO";
        btnComprar.style.background = "#555";
        btnComprar.style.cursor = "not-allowed";
      }
    } else {
      tiendaAbierta = true;
      document.getElementById("estadoTienda").innerText = "🟢 TIENDA ABIERTA";
      document.getElementById("estadoTienda").style.background = "#28a745";
       
      if(btnComprar) {
        btnComprar.innerText = "Comprar";
        btnComprar.style.background = "#333";
        btnComprar.style.cursor = "pointer";
      }
    }

    await cargarProductos();
  } catch (error) {
    console.error("Error cargando la tienda: ", error);
  }
}

async function cargarProductos(){
  try {
    const ref = collection(db, "tiendas", tiendaId, "productos");
    const snap = await getDocs(ref);

    products = [];

    snap.forEach(d=>{
      const p = d.data();

      if(p.disponible !== false){ 
        products.push({
          name: p.name,
          category: p.categoria,
          price: Number(p.precio) || 0,
          img: p.img,
          description: p.descripcion
        });
      }
    });

    currentProducts = products;
    renderProducts();
  } catch (error) {
    console.error("Error cargando productos: ", error);
  }
}

function abrirModalPedido() {
  if (!tiendaAbierta) {
    alert("🛑 No puedes realizar compras con el establecimiento cerrado.");
    return;
  }
  if(cart.length === 0){
    alert("El carrito está vacío");
    return;
  }
  if(!whatsapp){
    alert("No hay WhatsApp configurado en esta tienda.");
    return;
  }
   
  document.getElementById("modalPedido").style.display = "flex";
}

function cerrarModalPedido() {
  document.getElementById("modalPedido").style.display = "none";
}

async function procesarYEnviarPedido(){
  const nombre = document.getElementById("formNombre").value.trim();
  const telefono = document.getElementById("formTelefono").value.trim();
  const direccion = document.getElementById("formDireccion").value.trim();
  const barrio = document.getElementById("formBarrio").value.trim();
  const observaciones = document.getElementById("formObservations") ? document.getElementById("formObservations").value.trim() : document.getElementById("formObservaciones").value.trim() || "Ninguna";

  if(!nombre || !telefono || !direccion || !barrio) {
    alert("Por favor, completa todos los campos obligatorios (*).");
    return;
  }

  try {
    const tiendaRef = doc(db, "tiendas", tiendaId);
    const snap = await getDoc(tiendaRef);

    if(!snap.exists()){
      alert("Tienda no encontrada");
      return;
    }

    const data = snap.data();
    if (data.abierta === false) {
      alert("🛑 El negocio acaba de cerrar sus servicios.");
      cerrarModalPedido();
      window.location.reload();
      return;
    }

    const tiendaNombre = data.nombre || "Tienda";
    let totalPedido = 0;
    let items = [];

    const ahora = new Date();
    const fechaStr = ahora.toLocaleDateString('es-CO');
    const horaStr = ahora.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });

    const timestampId = Date.now().toString();
    const numeroPedido = timestampId.substring(timestampId.length - 4);

    let msg = `🏪 *${tiendaNombre.toUpperCase()}*\n\n`;
    msg += `🛵 *NUEVO PEDIDO #${numeroPedido}*\n\n`; 
    msg += `📅 *Fecha:* ${fechaStr}\n`;
    msg += `⏰ *Hora:* ${horaStr}\n\n`;
    msg += `👤 *Cliente:*\n${nombre}\n\n`;
    msg += `📱 *Teléfono:*\n${telefono}\n\n`;
    msg += `📍 *Dirección:*\n${direccion}\n\n`;
    msg += `🏘️ *Barrio:*\n${barrio}\n\n`;
    msg += `📝 *Observaciones:*\n${observaciones}\n\n`;
    msg += `🧾 *PRODUCTOS*\n\n`;

    cart.forEach(p=>{
      const price = Number(p.price); 
      const qty = Number(p.qty);
      const totalItem = price * qty;
      totalPedido += totalItem;

      items.push({
        nombre: p.name,
        cantidad: qty,
        total: totalItem
      });

      msg += `🍜 ${p.name} x${qty} = $${totalItem.toLocaleString('es-CO')}\n`;
    });

    msg += `\n💰 *TOTAL:* $${totalPedido.toLocaleString('es-CO')}`;

    await addDoc(
      collection(db, "tiendas", tiendaId, "pedidos"),
      {
        numeroPedido: "#" + numeroPedido,
        fecha: ahora.toISOString(),
        tiendaNombre,
        cliente: { nombre, telefono, direccion, barrio, observaciones },
        items,
        total: totalPedido,
        estado: "Pendiente"
      }
    );

    cerrarModalPedido();
     
    window.open(
      `https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`,
      "_blank"
    );
  } catch (error) {
    console.error("Error al procesar la compra: ", error);
    alert("Hubo un error al procesar tu pedido.");
  }
} 

window.filterProducts = filterProducts;
window.add = add;
window.removeItem = removeItem;

document.addEventListener("DOMContentLoaded", () => {
  cargarTienda();
   
  const btnComprar = document.getElementById("btnComprar");
  if(btnComprar) {
    btnComprar.addEventListener("click", abrirModalPedido);
  }

  document.getElementById("btnCerrarModal").addEventListener("click", cerrarModalPedido);
  document.getElementById("btnConfirmarPedido").addEventListener("click", procesarYEnviarPedido);
});
</script>
</body>
</html>
