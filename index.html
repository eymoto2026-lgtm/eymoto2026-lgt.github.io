<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EyMotoComidas Pro</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f4f4f4; padding-bottom:180px; }
    header { background:#333; color:white; text-align:center; padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .logo { width:70px; height:70px; object-fit:cover; border-radius:15px; }
    .banner-img { width:100%; height:auto; display:block; min-height:100px; background:#eee; }
    .categories { display:flex; gap:8px; padding:10px; background:#fff; overflow-x:auto; white-space:nowrap; }
    .categories button { flex:0 0 auto; border:none; padding:10px 15px; border-radius:20px; cursor:pointer; background:#eee; }
    .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; padding:10px; }
    .card { background:#fff; border-radius:10px; padding:10px; display:flex; flex-direction:column; justify-content:space-between; }
    .card img { width:100%; height:140px; object-fit:cover; border-radius:8px; }
    .buy { width:100%; margin-top:10px; background:#333; color:#fff; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; }
    .cart { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #ccc; padding:15px; max-height:40vh; overflow:auto; z-index: 999; }
    .checkout { display:block; width:100%; background:#333; color:#fff; border:none; padding:16px; border-radius:12px; font-size:20px; font-weight:bold; cursor:pointer; margin-top:10px; }
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
    .modal-content { background-color: #fff; margin: auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; }
  </style>
</head>
<body>

<header>
  <img id="logoTienda" class="logo" src="" alt="Logo">
  <h1 id="tituloTienda">Cargando...</h1>
  <div id="estadoTienda" style="padding:10px; border-radius:10px; font-weight:bold;">🟢 TIENDA ABIERTA</div>
</header>

<img id="bannerTiendaEnMenu" class="banner-img" src="" alt="Banner">

<div class="categories">
  <button onclick="window.filterProducts('Todos')">Todos</button>
  <button onclick="window.filterProducts('Hamburguesas')">🍔 Hamburguesas</button>
  <button onclick="window.filterProducts('Perros')">🌭 Perros</button>
  <button onclick="window.filterProducts('Salchipapas')">🍟 Salchipapas</button>
  <button onclick="window.filterProducts('Bebidas')">🥤 Bebidas</button>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h3>🛒 Carrito</h3>
  <div id="cartItems"></div>
  <p>Total: $<span id="total">0</span></p>
  <button id="btnComprar" class="checkout">Comprar</button>
</div>

<div id="modalPedido" class="modal">
  <div class="modal-content">
    <h2>📋 Datos de Entrega</h2>
    <input type="text" id="formNombre" placeholder="Nombre">
    <input type="text" id="formDireccion" placeholder="Dirección">
    <button onclick="document.getElementById('modalPedido').style.display='none'">Volver</button>
    <button id="btnConfirmarPedido" style="background:#28a745; color:#fff;">ENVIAR PEDIDO</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
});
const db = getFirestore(app);

let cart = [], products = [], whatsapp = "";
let tiendaAbierta = false;
const idTienda = new URLSearchParams(window.location.search).get('tienda');

async function init() {
  if(!idTienda) return;
  const snap = await getDoc(doc(db, "tiendas", idTienda));
  if(snap.exists()){
      const data = snap.data();
      tiendaAbierta = (data.abierta === true || data.abierta === "true");

      const titulo = document.getElementById("tituloTienda");
      if(titulo) titulo.innerText = data.nombre || "Tienda";
      document.getElementById("logoTienda").src = data.logo || "";
      document.getElementById("bannerTiendaEnMenu").src = data.banner || "";
      whatsapp = data.whatsapp;
      
      const estadoDiv = document.getElementById("estadoTienda");
      if (tiendaAbierta) {
          estadoDiv.innerText = "🟢 TIENDA ABIERTA";
          estadoDiv.style.backgroundColor = "#28a745";
          estadoDiv.style.color = "white";
      } else {
          estadoDiv.innerText = "🔴 TIENDA CERRADA";
          estadoDiv.style.backgroundColor = "#dc3545";
          estadoDiv.style.color = "white";
          const btn = document.getElementById("btnComprar");
          if(btn) {
            btn.disabled = true;
            btn.innerText = "TIENDA CERRADA";
            btn.style.background = "#666";
          }
      }
      
      const prodSnap = await getDocs(collection(db, "tiendas", idTienda, "productos"));
      products = prodSnap.docs.map(d => ({id: d.id, ...d.data()}));
      render(products);
  }
}

function render(list) {
    document.getElementById("products").innerHTML = list.map(p => `
        <div class="card">
            <img src="${p.img || ''}">
            <h3>${p.name}</h3>
            <p>$${p.precio}</p>
            <button class="buy" onclick="window.add('${p.name}')">
                ${tiendaAbierta ? 'Añadir' : 'Tienda Cerrada'}
            </button>
        </div>
    `).join('');
}

window.filterProducts = (cat) => {
    const filtered = cat === "Todos" ? products : products.filter(p => p.categoria === cat);
    render(filtered);
};

window.add = (name) => {
    if (!tiendaAbierta) {
        alert("⚠️ ¡Lo sentimos! La tienda está CERRADA.");
        return; 
    }
    let prod = products.find(p => p.name === name);
    let item = cart.find(x => x.name === name);
    if(item) item.qty++;
    else cart.push({...prod, qty: 1});
    renderCart();
};

window.updateQty = (index, change) => {
    cart[index].qty += change;
    if (cart[index].qty <= 0) cart.splice(index, 1);
    renderCart();
};

window.removeItem = (i) => { 
    cart.splice(i, 1); 
    renderCart(); 
};

function renderCart() {
    let total = 0;
    const cartContainer = document.getElementById("cartItems");
    cartContainer.innerHTML = cart.map((p, i) => {
        total += Number(p.precio) * p.qty;
        return `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                <span>${p.name}</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button onclick="window.updateQty(${i}, -1)">-</button>
                    <span>${p.qty}</span>
                    <button onclick="window.updateQty(${i}, 1)">+</button>
                    <button onclick="window.removeItem(${i})" style="color:red; border:none; background:none; cursor:pointer;">🗑️</button>
                </div>
            </div>
        `;
    }).join('');
    document.getElementById("total").innerText = total;
}

document.getElementById("btnConfirmarPedido").onclick = () => {
    const msg = `Pedido:\n` + cart.map(p => `${p.name} x${p.qty}`).join('\n') + `\nTotal: $${document.getElementById("total").innerText}`;
    window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
};

document.getElementById("btnComprar").onclick = () => document.getElementById("modalPedido").style.display = "flex";

init();
</script>
</body>
</html>
