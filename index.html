<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EyMotoComidas Pro</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f4f4;
  padding-bottom:180px;
}

header{
  background:#333;
  color:white;
  text-align:center;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

.logo{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:15px;
}

.banner img{
  width:100%;
}

.categories{
  display:flex;
  gap:8px;
  padding:10px;
  background:#fff;
  overflow-x:auto;
  white-space:nowrap;
}

.categories button{
  flex:0 0 auto;
  border:none;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px;
  padding-bottom:300px;
}

.card{
  background:#fff;
  border-radius:10px;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.buy{
  width:100%;
  margin-top:10px;
  background:#333;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #ccc;
  padding:15px;
  max-height:40vh;
  overflow:auto;
  box-sizing:border-box;
}

.checkout{
  display:block;
  width:100%;
  background:#333;
  color:#fff;
  border:none;
  padding:16px;
  border-radius:12px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.checkout:hover{
  background:#000;
}

.cart h3{
  margin:0 0 10px 0;
}
</style>
</head>

<body>

<header>
  <img id="logoTienda" class="logo">
  <h1>EyMotoComidas</h1>

  <div id="estadoTienda" style="margin-top:10px;padding:10px;border-radius:10px;background:#28a745;color:white;">
    🟢 TIENDA ABIERTA
  </div>
</header>

<div class="banner">
  <img src="img/banner.jpg">
</div>

<div class="categories">
  <button onclick="filterProducts('Todos')">Todos</button>
  <button onclick="filterProducts('Hamburguesas')">🍔 Hamburguesas</button>
  <button onclick="filterProducts('Perros')">🌭 Perros</button>
  <button onclick="filterProducts('Salchipapas')">🍟 Salchipapas</button>
  <button onclick="filterProducts('Burritos')">🌮 Burritos</button>
  <button onclick="filterProducts('Bebidas')">🥤 Bebidas</button>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h3>🛒 Carrito</h3>
  <div id="cartItems"></div>
  <p>Total: $<span id="total">0</span></p>
  <button id="btnComprar" class="checkout">Comprar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// Configuración de Firebase
const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Variables de estado de la aplicación
let cart = [];
let products = [];
let currentProducts = [];
let whatsapp = "";

const params = new URLSearchParams(window.location.search);
const tiendaId = params.get("tienda") || "eymotocomidas";

// Funciones de la Tienda y Renderizado
function filterProducts(cat){
  currentProducts = (cat === "Todos")
    ? products
    : products.filter(p => p.category === cat);

  renderProducts();
}

function renderProducts(){
  document.getElementById("products").innerHTML =
    currentProducts.map(p => `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.description || ''}</p>
        <p><b>$${p.price}</b></p>
        <button class="buy" onclick="add('${p.name}')">Comprar</button>
      </div>
    `).join('');
}

function add(name){
  let prod = products.find(p => p.name === name);
  let item = cart.find(x => x.name === name);

  if(item) {
    item.qty++;
  } else {
    cart.push({...prod, qty:1});
  }

  renderCart();
}

function renderCart(){
  let total = 0;

  document.getElementById("cartItems").innerHTML =
    cart.map((p,i)=>{
      total += p.price * p.qty;

      return `
        ${p.name} x${p.qty}
        <button onclick="add('${p.name}')">+</button>
        <button onclick="removeItem(${i})">🗑️</button><br>
      `;
    }).join('');

  document.getElementById("total").innerText = total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

// Carga de Datos desde Firebase
async function cargarTienda(){
  try {
    const tiendaRef = doc(db, "tiendas", tiendaId);
    const snap = await getDoc(tiendaRef);

    if(!snap.exists()) {
      console.error("La tienda no existe en Firebase");
      return;
    }

    const data = snap.data();
    window.tiendaNombre = data.nombre || "Tienda";
    document.querySelector("h1").innerText = data.nombre;
    
    if(data.logo && data.logo !== ""){
      document.getElementById("logoTienda").src = data.logo;
    } else {
      document.getElementById("logoTienda").src = "img/img1.png";
    }
    
    whatsapp = (data.whatsapp || "").replace("+","").trim();

    if(data.abierta === false){
      document.getElementById("estadoTienda").innerText = "🔴 TIENDA CERRADA";
      document.getElementById("estadoTienda").style.background = "red";
    }

    await cargarProductos();
  } catch (error) {
    console.error("Error cargando la tienda: ", error);
  }
}

async function cargarProductos(){
  try {
    const ref = collection(db, "tiendas", tiendaId, "productos");
    const snap = await getDocs(ref);

    products = [];

    snap.forEach(d=>{
      const p = d.data();

      // Aseguramos que solo entren los disponibles
      if(p.disponible !== false){ 
        products.push({
          name: p.name,
          category: p.categoria,
          price: Number(p.precio) || 0,
          img: p.img,
          description: p.descripcion
        });
      }
    });

    currentProducts = products;
    renderProducts();
  } catch (error) {
    console.error("Error cargando productos: ", error);
  }
}

async function sendWhatsApp(){
  if(!whatsapp){
    alert("No hay WhatsApp configurado en esta tienda.");
    return;
  }

  if(cart.length === 0){
    alert("El carrito está vacío");
    return;
  }

  try {
    const tiendaRef = doc(db, "tiendas", tiendaId);
    const snap = await getDoc(tiendaRef);

    if(!snap.exists()){
      alert("Tienda no encontrada");
      return;
    }

    const data = snap.data();
    const tiendaNombre = data.nombre || "Tienda";
    const numeroPedido = Date.now();

    let subtotal = 0;
    let items = [];

    let msg = `*PEDIDO ${tiendaNombre.toUpperCase()}*\n`;
    msg += `*Pedido #:* ${numeroPedido}\n\n`;

    cart.forEach(p=>{
      const price = Number(p.price);
      const qty = Number(p.qty);
      const totalItem = price * qty;

      subtotal += totalItem;

      items.push({
        nombre: p.name,
        cantidad: qty,
        total: totalItem
      });

      msg += `• ${p.name} x${qty} = $${totalItem}\n`;
    });

    msg += `\n*Subtotal:* $${subtotal}\n`;
    msg += `*Domicilio:* A convenir\n`;
    msg += `*Total:* $${subtotal}`;

    // Guardar el pedido en Firebase
    await addDoc(
      collection(db, "tiendas", tiendaId, "pedidos"),
      {
        numeroPedido,
        fecha: new Date().toISOString(),
        tiendaNombre,
        items,
        subtotal,
        total: subtotal,
        whatsapp
      }
    );

    // Abrir WhatsApp en pestaña nueva
    window.open(
      `https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`,
      "_blank"
    );
  } catch (error) {
    console.error("Error al procesar la compra: ", error);
    alert("Hubo un error al procesar tu pedido.");
  }
} 

// CRUCIAL: Hacer las funciones visibles para los botones HTML (onclick)
window.filterProducts = filterProducts;
window.add = add;
window.removeItem = removeItem;

// Inicializar la aplicación al cargar
document.addEventListener("DOMContentLoaded", () => {
  cargarTienda();
  const btnComprar = document.getElementById("btnComprar");
  if(btnComprar) {
    btnComprar.addEventListener("click", sendWhatsApp);
  }
});
</script>
</body>
</html>
