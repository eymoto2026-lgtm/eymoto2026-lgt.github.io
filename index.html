<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EyMotoComidas Pro</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f4f4f4; padding-bottom:180px; }
    header { background:#333; color:white; text-align:center; padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .logo { width:70px; height:70px; object-fit:cover; border-radius:15px; }
    /* Banner Ajustado */
 .banner-img{
    width:100%;
    height:auto;
    display:block;
    background-size: contain;
    background-position:center;
    background-repeat:no-repeat;
    background-color:#fff;
}
    .categories { display:flex; gap:8px; padding:10px; background:#fff; overflow-x:auto; white-space:nowrap; }
    .categories button { flex:0 0 auto; border:none; padding:10px 15px; border-radius:20px; cursor:pointer; background:#eee; }
    .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; padding:10px; padding-bottom:300px; }
    .card { background:#fff; border-radius:10px; padding:10px; display:flex; flex-direction:column; justify-content:space-between; }
    .card img { width:100%; height:140px; object-fit:cover; border-radius:8px; }
    .buy { width:100%; margin-top:10px; background:#333; color:#fff; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; }
    .cart { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #ccc; padding:15px; max-height:40vh; overflow:auto; box-sizing:border-box; z-index: 999; }
    .checkout { display:block; width:100%; background:#333; color:#fff; border:none; padding:16px; border-radius:12px; font-size:20px; font-weight:bold; cursor:pointer; margin-top:10px; }
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
    .modal-content { background-color: #fff; margin: auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; }
    .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancelar { flex: 1; background: #eee; border: none; padding: 14px; border-radius: 10px; cursor: pointer; }
    .btn-enviar { flex: 2; background: #28a745; color: #fff; border: none; padding: 14px; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <img id="logoTienda" class="logo" src="" alt="Logo">
  <h1 id="tituloTienda">EyMotoComidas</h1>
  <div id="estadoTienda" style="margin-top:10px;padding:10px;border-radius:10px;background:#28a745;color:white;font-weight:bold;">🟢 TIENDA ABIERTA</div>
</header>

<img id="bannerTiendaEnMenu" class="banner-img" src="" alt="Banner">

<div class="categories">
  <button onclick="window.filterProducts('Todos')">Todos</button>
  <button onclick="window.filterProducts('Hamburguesas')">🍔 Hamburguesas</button>
  <button onclick="window.filterProducts('Perros')">🌭 Perros</button>
  <button onclick="window.filterProducts('Salchipapas')">🍟 Salchipapas</button>
  <button onclick="window.filterProducts('Bebidas')">🥤 Bebidas</button>
</div>

<div class="products" id="products"></div>

<div class="cart">
  <h3>🛒 Carrito</h3>
  <div id="cartItems"></div>
  <p>Total: $<span id="total">0</span></p>
  <button id="btnComprar" class="checkout">Comprar</button>
</div>

<div id="modalPedido" class="modal">
  <div class="modal-content">
    <h2>📋 Datos de Entrega</h2>
    <input type="text" id="formNombre" placeholder="Nombre">
    <input type="tel" id="formTelefono" placeholder="Teléfono">
    <input type="text" id="formDireccion" placeholder="Dirección">
    <input type="text" id="formBarrio" placeholder="Barrio">
    <textarea id="formObservaciones" placeholder="Observaciones"></textarea>
    <div class="modal-buttons">
      <button class="btn-cancelar" id="btnCerrarModal">Volver</button>
      <button class="btn-enviar" id="btnConfirmarPedido">ENVIAR</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];
let products = [];
let whatsapp = "";

const urlParams = new URLSearchParams(window.location.search);
const idTienda = urlParams.get('tienda');

if(idTienda) {
  onSnapshot(doc(db, "tiendas", idTienda), (docSnap) => {
    if (docSnap.exists()) {
        const datos = docSnap.data();
        const banner = document.getElementById("bannerTiendaEnMenu");
        if (banner && datos.banner) {
            banner.src = datos.banner;
        }
    }
  });

  async function cargarTodo() {
    const snap = await getDoc(doc(db, "tiendas", idTienda));
    if(snap.exists()){
        const data = snap.data();
        document.getElementById("tituloTienda").innerText = data.nombre;
        document.getElementById("logoTienda").src = data.logo || "";
        whatsapp = data.whatsapp;
        const prodSnap = await getDocs(collection(db, "tiendas", idTienda, "productos"));
        products = prodSnap.docs.map(d => ({id: d.id, ...d.data()}));
        render(products);
    }
  }
  cargarTodo();
}

function render(list) {
    document.getElementById("products").innerHTML = list.map(p => `
        <div class="card">
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <p>$${p.precio}</p>
            <button class="buy" onclick="window.add('${p.name}')">Comprar</button>
        </div>
    `).join('');
}

window.filterProducts = (cat) => {
    const filtered = cat === "Todos" ? products : products.filter(p => p.categoria === cat);
    render(filtered);
};

window.add = (name) => {
    let prod = products.find(p => p.name === name);
    let item = cart.find(x => x.name === name);
    if(item) item.qty++;
    else cart.push({...prod, qty: 1});
    renderCart();
};

window.removeItem = (i) => {
    cart.splice(i, 1);
    renderCart();
};

function renderCart() {
    let total = 0;
    const cartContainer = document.getElementById("cartItems");
    cartContainer.innerHTML = cart.map((p, i) => {
        total += Number(p.precio) * p.qty;
        return `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${p.name} x${p.qty}</span>
                <button onclick="window.removeItem(${i})">🗑️</button>
            </div>
        `;
    }).join('');
    document.getElementById("total").innerText = total;
}

document.getElementById("btnConfirmarPedido").onclick = () => {
    const nombre = document.getElementById("formNombre").value;
    const dir = document.getElementById("formDireccion").value;
    let msg = `Nuevo Pedido para ${document.getElementById("tituloTienda").innerText}\n\n`;
    cart.forEach(p => msg += `${p.name} x${p.qty} - $${p.precio * p.qty}\n`);
    msg += `\nTotal: $${document.getElementById("total").innerText}\nCliente: ${nombre}\nDirección: ${dir}`;
    window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
};

document.getElementById("btnComprar").onclick = () => document.getElementById("modalPedido").style.display = "flex";
document.getElementById("btnCerrarModal").onclick = () => document.getElementById("modalPedido").style.display = "none";
</script>
</body>
</html>
