<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyMotoComidas Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }
        .header {
            background: #141414;
            border-bottom: 1px solid #2e2e2e;
            padding: 12px 16px;
            text-align: center;
        }
        .header .brand {
            font-size: 24px;
            font-weight: 900;
            color: #FF6900;
        }
        .producto {
            background: #141414;
            border: 1px solid #2e2e2e;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .producto-info h4 {
            font-size: 14px;
            font-weight: 600;
        }
        .producto-info .precio {
            color: #FF6900;
            font-weight: 700;
            font-size: 13px;
        }
        .producto-acciones {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .producto-acciones button {
            background: #252525;
            border: 1px solid #2e2e2e;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .producto-acciones button:hover {
            background: #FF6900;
        }
        .producto-acciones .cantidad {
            font-weight: 700;
            font-size: 16px;
            min-width: 24px;
            text-align: center;
        }
        .carrito {
            background: #141414;
            border: 1px solid #2e2e2e;
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            position: sticky;
            bottom: 0;
        }
        .carrito-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .carrito-total .total {
            color: #00C853;
        }
        .btn-comprar {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-comprar:hover {
            background: #128C7E;
        }
        .btn-comprar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .form-datos {
            margin-top: 16px;
        }
        .form-datos input {
            background: #1e1e1e;
            border: 1px solid #2e2e2e;
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-datos input:focus {
            outline: none;
            border-color: #FF6900;
        }
        .form-datos textarea {
            background: #1e1e1e;
            border: 1px solid #2e2e2e;
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
        }
        .form-datos textarea:focus {
            outline: none;
            border-color: #FF6900;
        }
        .label-form {
            font-size: 11px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            display: block;
            margin-bottom: 4px;
        }
        .vaciar-carrito {
            background: transparent;
            border: 1px solid #2e2e2e;
            color: #888;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .vaciar-carrito:hover {
            border-color: #FF3D00;
            color: #FF3D00;
        }
        .item-carrito {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1e1e1e;
            font-size: 13px;
        }
        .item-carrito .nombre {
            flex: 1;
        }
        .item-carrito .subtotal {
            color: #00C853;
            font-weight: 600;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            border: 1px solid #2e2e2e;
            border-radius: 12px;
            padding: 12px 24px;
            z-index: 999;
            animation: slideDown 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        .toast.success {
            border-left: 4px solid #00C853;
        }
        .toast.error {
            border-left: 4px solid #FF3D00;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        .categoria-titulo {
            font-size: 16px;
            font-weight: 700;
            color: #FF6900;
            margin: 16px 0 8px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid #2e2e2e;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #2e2e2e;
            border-top-color: #FF6900;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .badge-pedido {
            background: #FF6900;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            .producto {
                padding: 10px 12px;
            }
            .header .brand {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- TOAST PARA NOTIFICACIONES -->
    <div id="toastContainer"></div>

    <!-- HEADER -->
    <div class="header">
        <div class="brand">🏪 EyMotoComidas</div>
        <div style="font-size:12px;color:#888;margin-top:4px;">Menú digital</div>
    </div>

    <div class="container">
        <!-- LISTA DE PRODUCTOS -->
        <div id="listaProductos">
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top:12px;">Cargando menú...</p>
            </div>
        </div>

        <!-- FORMULARIO DATOS CLIENTE -->
        <div class="form-datos" id="formDatos" style="display:none;">
            <span class="label-form">👤 Datos de entrega</span>
            <input type="text" id="clienteNombre" placeholder="Tu nombre completo">
            <input type="tel" id="clienteTelefono" placeholder="Teléfono (ej: 3169934516)">
            <input type="text" id="clienteDireccion" placeholder="Dirección de entrega">
            <input type="text" id="clienteBarrio" placeholder="Barrio">
            <textarea id="clienteObservaciones" placeholder="Observaciones (ej: sin cebolla, con todo...)"></textarea>
        </div>

        <!-- CARRITO -->
        <div class="carrito" id="carrito">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <span style="font-weight:700;">🛒 Carrito</span>
                <button class="vaciar-carrito" onclick="vaciarCarrito()">Vaciar</button>
            </div>
            <div id="itemsCarrito">
                <div style="color:#888;font-size:13px;text-align:center;padding:12px 0;">
                    No hay productos en el carrito
                </div>
            </div>
            <div class="carrito-total">
                <span>Total</span>
                <span class="total" id="totalCarrito">$0</span>
            </div>
            <button class="btn-comprar" id="btnComprar" onclick="enviarPedido()" disabled>
                📱 Comprar Ahora
            </button>
            <div style="font-size:10px;color:#555;text-align:center;margin-top:6px;">
                El pedido se enviará al administrador
            </div>
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // ============================================================
        // CONFIGURACIÓN FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
            authDomain: "eymotocomidas.firebaseapp.com",
            projectId: "eymotocomidas",
            storageBucket: "eymotocomidas.firebasestorage.app",
            messagingSenderId: "670474251560",
            appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================================
        // OBTENER ID DE TIENDA DESDE LA URL
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const TIENDA_ID = urlParams.get('tienda');

        if (!TIENDA_ID) {
            mostrarToast('⚠️ No se especificó una tienda', 'error');
        }

        console.log('🏪 Tienda ID:', TIENDA_ID);

        // ============================================================
        // ESTADO DEL CARRITO
        // ============================================================
        let carrito = [];
        let productos = [];

        // ============================================================
        // FUNCIONES DEL CARRITO
        // ============================================================
        function agregarAlCarrito(productoId) {
            const producto = productos.find(p => p.id === productoId);
            if (!producto) return;

            const existente = carrito.find(p => p.id === productoId);
            if (existente) {
                existente.cantidad++;
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.name,
                    precio: producto.precio,
                    cantidad: 1,
                    imagen: producto.img || ''
                });
            }
            actualizarCarrito();
        }

        function quitarDelCarrito(productoId) {
            const index = carrito.findIndex(p => p.id === productoId);
            if (index === -1) return;

            if (carrito[index].cantidad > 1) {
                carrito[index].cantidad--;
            } else {
                carrito.splice(index, 1);
            }
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const itemsContainer = document.getElementById('itemsCarrito');
            const totalContainer = document.getElementById('totalCarrito');
            const btnComprar = document.getElementById('btnComprar');

            if (carrito.length === 0) {
                itemsContainer.innerHTML = `
                    <div style="color:#888;font-size:13px;text-align:center;padding:12px 0;">
                        No hay productos en el carrito
                    </div>
                `;
                totalContainer.textContent = '$0';
                btnComprar.disabled = true;
                return;
            }

            let html = '';
            let total = 0;
            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                html += `
                    <div class="item-carrito">
                        <span class="nombre">${escHtml(item.nombre)} x${item.cantidad}</span>
                        <span class="subtotal">$${subtotal.toLocaleString('es-CO')}</span>
                    </div>
                `;
            });

            itemsContainer.innerHTML = html;
            totalContainer.textContent = `$${total.toLocaleString('es-CO')}`;
            btnComprar.disabled = false;

            // Mostrar formulario de datos
            document.getElementById('formDatos').style.display = 'block';
        }

        function vaciarCarrito() {
            if (carrito.length === 0) return;
            if (!confirm('¿Vaciar el carrito?')) return;
            carrito = [];
            actualizarCarrito();
            document.getElementById('formDatos').style.display = 'none';
            mostrarToast('Carrito vaciado', 'success');
        }

        // ============================================================
        // GENERAR NÚMERO DE PEDIDO
        // ============================================================
        function generarNumeroPedido() {
            const num = String(Math.floor(Math.random() * 9000) + 1000);
            return `#${num}`;
        }

        // ============================================================
        // ENVIAR PEDIDO (WhatsApp + Firestore)
        // ============================================================
        async function enviarPedido() {
            if (carrito.length === 0) {
                mostrarToast('El carrito está vacío', 'error');
                return;
            }

            const nombre = document.getElementById('clienteNombre').value.trim();
            const telefono = document.getElementById('clienteTelefono').value.trim();
            const direccion = document.getElementById('clienteDireccion').value.trim();
            const barrio = document.getElementById('clienteBarrio').value.trim();
            const observaciones = document.getElementById('clienteObservaciones').value.trim();

            if (!nombre) {
                mostrarToast('Por favor ingresa tu nombre', 'error');
                document.getElementById('clienteNombre').focus();
                return;
            }

            if (!telefono) {
                mostrarToast('Por favor ingresa tu teléfono', 'error');
                document.getElementById('clienteTelefono').focus();
                return;
            }

            const numeroPedido = generarNumeroPedido();
            const fecha = new Date();
            const fechaStr = fecha.toLocaleDateString('es-CO');
            const horaStr = fecha.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });

            // Calcular total
            let total = 0;
            carrito.forEach(item => {
                total += item.precio * item.cantidad;
            });

            // Preparar items
            const items = carrito.map(item => ({
                nombre: item.nombre,
                cantidad: item.cantidad,
                precio: item.precio,
                total: item.precio * item.cantidad
            }));

            // ============================================================
            // CONSTRUIR MENSAJE PARA WHATSAPP (formato exacto)
            // ============================================================
            let mensajeWhatsApp = `🏪 *EYMOTOCOMIDAS*\n\n`;
            mensajeWhatsApp += `🛵 *NUEVO PEDIDO ${numeroPedido}*\n\n`;
            mensajeWhatsApp += `📅 *Fecha:* ${fechaStr}\n`;
            mensajeWhatsApp += `⏰ *Hora:* ${horaStr}\n\n`;
            mensajeWhatsApp += `👤 *Cliente:*\n${nombre}\n\n`;
            mensajeWhatsApp += `📱 *Teléfono:*\n${telefono}\n\n`;
            mensajeWhatsApp += `📍 *Dirección:*\n${direccion || 'Recoge en tienda'}\n\n`;
            if (barrio) mensajeWhatsApp += `🏘️ *Barrio:*\n${barrio}\n\n`;
            if (observaciones) mensajeWhatsApp += `📝 *Observaciones:*\n${observaciones}\n\n`;
            mensajeWhatsApp += `🧾 *PRODUCTOS*\n\n`;

            items.forEach(item => {
                mensajeWhatsApp += `🍜 ${item.nombre} x${item.cantidad} = $${item.total.toLocaleString('es-CO')}\n`;
            });

            mensajeWhatsApp += `\n💰 *TOTAL:* $${total.toLocaleString('es-CO')}`;

            // ============================================================
            // GUARDAR EN FIRESTORE
            // ============================================================
            const pedidoData = {
                numeroPedido: numeroPedido,
                cliente: {
                    nombre: nombre,
                    telefono: telefono,
                    direccion: direccion || 'Recoge en tienda',
                    barrio: barrio || '',
                    observaciones: observaciones || ''
                },
                items: items,
                total: total,
                estado: 'Pendiente',
                fecha: firebase.firestore.FieldValue.serverTimestamp(),
                fuente: 'whatsapp',
                timestamp: Date.now()
            };

            try {
                if (TIENDA_ID) {
                    await db.collection('tiendas').doc(TIENDA_ID).collection('pedidos').add(pedidoData);
                    console.log('✅ Pedido guardado en Firestore');
                } else {
                    console.warn('⚠️ No hay tienda ID, no se guardó en Firestore');
                }
            } catch (error) {
                console.error('❌ Error al guardar en Firestore:', error);
            }

            // ============================================================
            // ENVIAR POR WHATSAPP
            // ============================================================
            const telefonoWhatsApp = '573164043436';
            const urlWhatsApp = `https://wa.me/${telefonoWhatsApp}?text=${encodeURIComponent(mensajeWhatsApp)}`;

            // Mostrar toast de confirmación
            mostrarToast(`✅ Pedido ${numeroPedido} enviado correctamente`, 'success');

            // Abrir WhatsApp
            window.open(urlWhatsApp, '_blank');

            // Limpiar carrito
            carrito = [];
            actualizarCarrito();
            document.getElementById('formDatos').style.display = 'none';

            // Limpiar campos
            document.getElementById('clienteNombre').value = '';
            document.getElementById('clienteTelefono').value = '';
            document.getElementById('clienteDireccion').value = '';
            document.getElementById('clienteBarrio').value = '';
            document.getElementById('clienteObservaciones').value = '';
        }

        // ============================================================
        // CARGAR PRODUCTOS DESDE FIRESTORE
        // ============================================================
        async function cargarProductos() {
            const lista = document.getElementById('listaProductos');

            if (!TIENDA_ID) {
                lista.innerHTML = `
                    <div style="color:#FF3D00;text-align:center;padding:40px;">
                        ⚠️ No se especificó una tienda
                    </div>
                `;
                return;
            }

            try {
                const snap = await db.collection('tiendas').doc(TIENDA_ID).collection('productos').get();

                if (snap.empty) {
                    lista.innerHTML = `
                        <div style="color:#888;text-align:center;padding:40px;">
                            No hay productos disponibles en esta tienda
                        </div>
                    `;
                    return;
                }

                productos = [];
                let html = '';

                snap.forEach(doc => {
                    const p = doc.data();
                    const id = doc.id;
                    productos.push({ id, ...p });

                    html += `
                        <div class="producto">
                            <div class="producto-info">
                                <h4>${escHtml(p.name || 'Producto')}</h4>
                                <div class="precio">$${(p.precio || 0).toLocaleString('es-CO')}</div>
                                ${p.descripcion ? `<div style="font-size:11px;color:#888;margin-top:2px;">${escHtml(p.descripcion)}</div>` : ''}
                            </div>
                            <div class="producto-acciones">
                                <button onclick="quitarDelCarrito('${id}')">−</button>
                                <span class="cantidad" id="cant-${id}">${carrito.find(c => c.id === id)?.cantidad || 0}</span>
                                <button onclick="agregarAlCarrito('${id}')">+</button>
                            </div>
                        </div>
                    `;
                });

                lista.innerHTML = html;

                // Actualizar cantidades visibles
                carrito.forEach(item => {
                    const el = document.getElementById(`cant-${item.id}`);
                    if (el) el.textContent = item.cantidad;
                });

            } catch (error) {
                console.error('Error al cargar productos:', error);
                lista.innerHTML = `
                    <div style="color:#FF3D00;text-align:center;padding:40px;">
                        ❌ Error al cargar el menú
                    </div>
                `;
            }
        }

        // ============================================================
        // TOAST NOTIFICACIONES
        // ============================================================
        function mostrarToast(mensaje, tipo = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            toast.textContent = mensaje;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================
        // ESCAPE HTML
        // ============================================================
        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            cargarProductos();

            // Tecla Enter para enviar pedido
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && document.activeElement.tagName !== 'TEXTAREA') {
                    const btn = document.getElementById('btnComprar');
                    if (!btn.disabled) {
                        enviarPedido();
                    }
                }
            });
        });

        console.log('✅ Menú EyMotoComidas cargado correctamente');
        console.log('🏪 Tienda:', TIENDA_ID);
    </script>

</body>
</html>
