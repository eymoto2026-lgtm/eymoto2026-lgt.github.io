<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyMotoComidas - Menú Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        /* HEADER CON LOGO */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px 16px;
            text-align: center;
            border-bottom: 4px solid #FFD600;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .header .logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #FFD600;
            background: #fff;
            padding: 4px;
        }
        .header .brand {
            font-size: 28px;
            font-weight: 900;
            color: #FFD600;
            text-shadow: 0 2px 10px rgba(255,214,0,0.3);
        }
        .header .subtitle {
            color: #aaa;
            font-size: 13px;
            margin-top: 4px;
        }
        .header .estado {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 6px;
        }
        .header .estado.abierto {
            background: #00C853;
            color: #fff;
        }
        .header .estado.cerrado {
            background: #FF3D00;
            color: #fff;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 200px;
        }

        /* CATEGORÍAS */
        .categoria-titulo {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 20px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 3px solid #FFD600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* PRODUCTOS - TARJETAS CON IMAGEN */
        .producto-card {
            background: #fff;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            gap: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #eee;
        }
        .producto-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }
        .producto-img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
        }
        .producto-img.sin-imagen {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #ccc;
        }
        .producto-info {
            flex: 1;
            min-width: 0;
        }
        .producto-info h4 {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 2px;
        }
        .producto-info .descripcion {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .producto-info .precio {
            font-size: 16px;
            font-weight: 800;
            color: #1a1a2e;
        }
        .producto-acciones {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .producto-acciones button {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-restar {
            background: #f0f0f0;
            color: #333;
        }
        .btn-restar:hover {
            background: #e0e0e0;
        }
        .btn-sumar {
            background: #FFD600;
            color: #1a1a2e;
        }
        .btn-sumar:hover {
            background: #f5c800;
            transform: scale(1.05);
        }
        .producto-acciones .cantidad {
            font-size: 16px;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
            color: #1a1a2e;
        }

        /* CARRITO FLOTANTE */
        .carrito-flotante {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 3px solid #FFD600;
            padding: 16px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            z-index: 200;
            max-height: 80vh;
            overflow-y: auto;
        }
        .carrito-flotante .carrito-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .carrito-flotante .carrito-header h3 {
            font-size: 16px;
            color: #1a1a2e;
        }
        .carrito-flotante .vaciar-btn {
            background: none;
            border: none;
            color: #FF3D00;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .carrito-flotante .vaciar-btn:hover {
            text-decoration: underline;
        }
        .carrito-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .carrito-item .nombre {
            flex: 1;
        }
        .carrito-item .subtotal {
            font-weight: 600;
            color: #1a1a2e;
        }
        .carrito-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 6px 0;
            border-top: 2px solid #FFD600;
            margin-top: 6px;
            font-size: 18px;
            font-weight: 800;
            color: #1a1a2e;
        }
        .carrito-total .total-valor {
            color: #1a1a2e;
        }
        .btn-comprar {
            background: #FFD600;
            color: #1a1a2e;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-comprar:hover {
            background: #f5c800;
            transform: scale(1.01);
        }
        .btn-comprar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* FORMULARIO DATOS */
        .form-datos {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        .form-datos .label-form {
            font-size: 11px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            display: block;
            margin-bottom: 4px;
        }
        .form-datos input,
        .form-datos textarea {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px 14px;
            width: 100%;
            margin-bottom: 8px;
            font-size: 14px;
            color: #1a1a2e;
            transition: border-color 0.2s;
        }
        .form-datos input:focus,
        .form-datos textarea:focus {
            outline: none;
            border-color: #FFD600;
        }
        .form-datos textarea {
            resize: vertical;
            min-height: 50px;
        }

        /* TOAST */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            max-width: 90%;
        }
        .toast {
            background: #1a1a2e;
            color: #fff;
            border-radius: 12px;
            padding: 12px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease;
            text-align: center;
            border-left: 4px solid #FFD600;
        }
        .toast.success {
            border-left-color: #00C853;
        }
        .toast.error {
            border-left-color: #FF3D00;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .header .brand { font-size: 22px; }
            .header .logo { width: 56px; height: 56px; }
            .producto-img { width: 64px; height: 64px; }
            .producto-info h4 { font-size: 13px; }
            .container { padding: 10px; padding-bottom: 200px; }
            .carrito-flotante { padding: 12px 16px; }
        }
    </style>
</head>
<body>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- HEADER CON LOGO -->
    <div class="header">
        <div class="logo-container">
            <img class="logo" id="logoHeader" src="" alt="Logo" onerror="this.style.display='none'">
            <div>
                <div class="brand" id="nombreTiendaHeader">EyMotoComidas</div>
                <div class="subtitle" id="direccionTiendaHeader">Menú digital</div>
                <span class="estado abierto" id="estadoHeader">🟢 Abierto</span>
            </div>
        </div>
    </div>

    <div class="container" id="contenedorMenu">
        <!-- PRODUCTOS CARGADOS AQUÍ -->
        <div id="listaProductos" style="text-align:center;padding:40px;color:#888;">
            <div style="font-size:32px;margin-bottom:12px;">⏳</div>
            Cargando menú...
        </div>
    </div>

    <!-- CARRITO FLOTANTE -->
    <div class="carrito-flotante" id="carritoFlotante">
        <div class="carrito-header">
            <h3>🛒 Carrito</h3>
            <button class="vaciar-btn" onclick="vaciarCarrito()">Vaciar</button>
        </div>
        <div id="itemsCarrito">
            <div style="color:#888;font-size:13px;text-align:center;padding:8px 0;">
                No hay productos en el carrito
            </div>
        </div>
        
        <!-- FORMULARIO DATOS CLIENTE -->
        <div class="form-datos" id="formDatos" style="display:none;">
            <span class="label-form">👤 Datos de entrega</span>
            <input type="text" id="clienteNombre" placeholder="Tu nombre completo">
            <input type="tel" id="clienteTelefono" placeholder="Teléfono (ej: 3169934516)">
            <input type="text" id="clienteDireccion" placeholder="Dirección de entrega">
            <input type="text" id="clienteBarrio" placeholder="Barrio">
            <textarea id="clienteObservaciones" placeholder="Observaciones (ej: sin cebolla...)"></textarea>
        </div>

        <div class="carrito-total">
            <span>💰 Total</span>
            <span class="total-valor" id="totalCarrito">$0</span>
        </div>
        <button class="btn-comprar" id="btnComprar" onclick="enviarPedido()" disabled>
            📱 Comprar Ahora
        </button>
        <div style="font-size:10px;color:#aaa;text-align:center;margin-top:6px;">
            El pedido se enviará al administrador
        </div>
    </div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        // ============================================================
        // CONFIGURACIÓN FIREBASE
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
            authDomain: "eymotocomidas.firebaseapp.com",
            projectId: "eymotocomidas",
            storageBucket: "eymotocomidas.firebasestorage.app",
            messagingSenderId: "670474251560",
            appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================================
        // OBTENER ID DE TIENDA DESDE LA URL
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const TIENDA_ID = urlParams.get('tienda');

        if (!TIENDA_ID) {
            mostrarToast('⚠️ No se especificó una tienda', 'error');
        }

        console.log('🏪 Tienda ID:', TIENDA_ID);

        // ============================================================
        // ESTADO DEL CARRITO
        // ============================================================
        let carrito = [];
        let productos = [];
        let tiendaData = {};

        // ============================================================
        // CARGAR DATOS DE LA TIENDA
        // ============================================================
        async function cargarTienda() {
            if (!TIENDA_ID) return;
            try {
                const doc = await db.collection('tiendas').doc(TIENDA_ID).get();
                if (doc.exists) {
                    tiendaData = doc.data();
                    document.getElementById('nombreTiendaHeader').textContent = tiendaData.nombre || 'EyMotoComidas';
                    document.getElementById('direccionTiendaHeader').textContent = '📱 ' + (tiendaData.whatsapp || '');
                    
                    // Logo
                    if (tiendaData.logo) {
                        document.getElementById('logoHeader').src = tiendaData.logo;
                        document.getElementById('logoHeader').style.display = 'block';
                    }
                    
                    // Estado
                    const estadoEl = document.getElementById('estadoHeader');
                    if (tiendaData.abierta !== false) {
                        estadoEl.textContent = '🟢 Abierto';
                        estadoEl.className = 'estado abierto';
                    } else {
                        estadoEl.textContent = '🔴 Cerrado';
                        estadoEl.className = 'estado cerrado';
                    }
                }
            } catch (e) {
                console.error('Error al cargar tienda:', e);
            }
        }

        // ============================================================
        // CARGAR PRODUCTOS
        // ============================================================
        async function cargarProductos() {
            const lista = document.getElementById('listaProductos');

            if (!TIENDA_ID) {
                lista.innerHTML = `
                    <div style="color:#FF3D00;text-align:center;padding:40px;">
                        ⚠️ No se especificó una tienda
                    </div>
                `;
                return;
            }

            try {
                const snap = await db.collection('tiendas').doc(TIENDA_ID).collection('productos').get();

                if (snap.empty) {
                    lista.innerHTML = `
                        <div style="color:#888;text-align:center;padding:40px;">
                            <div style="font-size:32px;margin-bottom:12px;">🍽️</div>
                            No hay productos disponibles en esta tienda
                        </div>
                    `;
                    return;
                }

                productos = [];
                let html = '';
                let categoriaActual = '';

                snap.forEach(doc => {
                    const p = doc.data();
                    const id = doc.id;
                    productos.push({ id, ...p });

                    const categoria = p.categoria || 'General';
                    if (categoria !== categoriaActual) {
                        categoriaActual = categoria;
                        html += `<div class="categoria-titulo">📂 ${categoria}</div>`;
                    }

                    const imagenHtml = p.img 
                        ? `<img class="producto-img" src="${escHtml(p.img)}" alt="${escHtml(p.name||'')}" onerror="this.className='producto-img sin-imagen';this.textContent='🍔'">`
                        : `<div class="producto-img sin-imagen">🍔</div>`;

                    html += `
                        <div class="producto-card">
                            ${imagenHtml}
                            <div class="producto-info">
                                <h4>${escHtml(p.name || 'Producto')}</h4>
                                ${p.descripcion ? `<div class="descripcion">${escHtml(p.descripcion)}</div>` : ''}
                                <div class="precio">$${(p.precio || 0).toLocaleString('es-CO')}</div>
                            </div>
                            <div class="producto-acciones">
                                <button class="btn-restar" onclick="quitarDelCarrito('${id}')">−</button>
                                <span class="cantidad" id="cant-${id}">${carrito.find(c => c.id === id)?.cantidad || 0}</span>
                                <button class="btn-sumar" onclick="agregarAlCarrito('${id}')">+</button>
                            </div>
                        </div>
                    `;
                });

                lista.innerHTML = html;

                // Actualizar cantidades visibles
                carrito.forEach(item => {
                    const el = document.getElementById(`cant-${item.id}`);
                    if (el) el.textContent = item.cantidad;
                });

            } catch (error) {
                console.error('Error al cargar productos:', error);
                lista.innerHTML = `
                    <div style="color:#FF3D00;text-align:center;padding:40px;">
                        ❌ Error al cargar el menú
                    </div>
                `;
            }
        }

        // ============================================================
        // FUNCIONES DEL CARRITO
        // ============================================================
        function agregarAlCarrito(productoId) {
            const producto = productos.find(p => p.id === productoId);
            if (!producto) return;

            // Verificar si la tienda está abierta
            if (tiendaData.abierta === false) {
                mostrarToast('⚠️ La tienda está cerrada temporalmente', 'error');
                return;
            }

            const existente = carrito.find(p => p.id === productoId);
            if (existente) {
                existente.cantidad++;
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.name,
                    precio: producto.precio,
                    cantidad: 1,
                    imagen: producto.img || ''
                });
            }
            actualizarCarrito();
            // Actualizar cantidad en la UI
            const el = document.getElementById(`cant-${productoId}`);
            if (el) el.textContent = carrito.find(p => p.id === productoId)?.cantidad || 0;
        }

        function quitarDelCarrito(productoId) {
            const index = carrito.findIndex(p => p.id === productoId);
            if (index === -1) return;

            if (carrito[index].cantidad > 1) {
                carrito[index].cantidad--;
            } else {
                carrito.splice(index, 1);
            }
            actualizarCarrito();
            const el = document.getElementById(`cant-${productoId}`);
            if (el) el.textContent = carrito.find(p => p.id === productoId)?.cantidad || 0;
        }

        function actualizarCarrito() {
            const itemsContainer = document.getElementById('itemsCarrito');
            const totalContainer = document.getElementById('totalCarrito');
            const btnComprar = document.getElementById('btnComprar');

            if (carrito.length === 0) {
                itemsContainer.innerHTML = `
                    <div style="color:#888;font-size:13px;text-align:center;padding:8px 0;">
                        No hay productos en el carrito
                    </div>
                `;
                totalContainer.textContent = '$0';
                btnComprar.disabled = true;
                document.getElementById('formDatos').style.display = 'none';
                return;
            }

            let html = '';
            let total = 0;
            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                html += `
                    <div class="carrito-item">
                        <span class="nombre">${escHtml(item.nombre)} x${item.cantidad}</span>
                        <span class="subtotal">$${subtotal.toLocaleString('es-CO')}</span>
                    </div>
                `;
            });

            itemsContainer.innerHTML = html;
            totalContainer.textContent = `$${total.toLocaleString('es-CO')}`;
            btnComprar.disabled = false;
            document.getElementById('formDatos').style.display = 'block';
        }

        function vaciarCarrito() {
            if (carrito.length === 0) return;
            if (!confirm('¿Vaciar el carrito?')) return;
            carrito = [];
            actualizarCarrito();
            document.getElementById('formDatos').style.display = 'none';
            // Resetear cantidades en UI
            productos.forEach(p => {
                const el = document.getElementById(`cant-${p.id}`);
                if (el) el.textContent = '0';
            });
            mostrarToast('Carrito vaciado', 'success');
        }

        // ============================================================
        // GENERAR NÚMERO DE PEDIDO
        // ============================================================
        function generarNumeroPedido() {
            const num = String(Math.floor(Math.random() * 9000) + 1000);
            return `#${num}`;
        }

        // ============================================================
        // ENVIAR PEDIDO
        // ============================================================
        async function enviarPedido() {
            if (carrito.length === 0) {
                mostrarToast('El carrito está vacío', 'error');
                return;
            }

            // Verificar si la tienda está abierta
            if (tiendaData.abierta === false) {
                mostrarToast('⚠️ La tienda está cerrada temporalmente', 'error');
                return;
            }

            const nombre = document.getElementById('clienteNombre').value.trim();
            const telefono = document.getElementById('clienteTelefono').value.trim();
            const direccion = document.getElementById('clienteDireccion').value.trim();
            const barrio = document.getElementById('clienteBarrio').value.trim();
            const observaciones = document.getElementById('clienteObservaciones').value.trim();

            if (!nombre) {
                mostrarToast('Por favor ingresa tu nombre', 'error');
                document.getElementById('clienteNombre').focus();
                return;
            }

            if (!telefono) {
                mostrarToast('Por favor ingresa tu teléfono', 'error');
                document.getElementById('clienteTelefono').focus();
                return;
            }

            const numeroPedido = generarNumeroPedido();
            const fecha = new Date();
            const fechaStr = fecha.toLocaleDateString('es-CO');
            const horaStr = fecha.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });

            let total = 0;
            const items = carrito.map(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                return {
                    nombre: item.nombre,
                    cantidad: item.cantidad,
                    precio: item.precio,
                    total: subtotal
                };
            });

            // ============================================================
            // MENSAJE PARA WHATSAPP
            // ============================================================
            let mensajeWhatsApp = `🏪 *${tiendaData.nombre || 'EYMOTOCOMIDAS'}*\n\n`;
            mensajeWhatsApp += `🛵 *NUEVO PEDIDO ${numeroPedido}*\n\n`;
            mensajeWhatsApp += `📅 *Fecha:* ${fechaStr}\n`;
            mensajeWhatsApp += `⏰ *Hora:* ${horaStr}\n\n`;
            mensajeWhatsApp += `👤 *Cliente:*\n${nombre}\n\n`;
            mensajeWhatsApp += `📱 *Teléfono:*\n${telefono}\n\n`;
            mensajeWhatsApp += `📍 *Dirección:*\n${direccion || 'Recoge en tienda'}\n\n`;
            if (barrio) mensajeWhatsApp += `🏘️ *Barrio:*\n${barrio}\n\n`;
            if (observaciones) mensajeWhatsApp += `📝 *Observaciones:*\n${observaciones}\n\n`;
            mensajeWhatsApp += `🧾 *PRODUCTOS*\n\n`;

            items.forEach(item => {
                mensajeWhatsApp += `🍜 ${item.nombre} x${item.cantidad} = $${item.total.toLocaleString('es-CO')}\n`;
            });

            mensajeWhatsApp += `\n💰 *TOTAL:* $${total.toLocaleString('es-CO')}`;

            // ============================================================
            // GUARDAR EN FIRESTORE
            // ============================================================
            const pedidoData = {
                numeroPedido: numeroPedido,
                cliente: {
                    nombre: nombre,
                    telefono: telefono,
                    direccion: direccion || 'Recoge en tienda',
                    barrio: barrio || '',
                    observaciones: observaciones || ''
                },
                items: items,
                total: total,
                estado: 'Pendiente',
                fecha: firebase.firestore.FieldValue.serverTimestamp(),
                fuente: 'whatsapp',
                timestamp: Date.now()
            };

            try {
                if (TIENDA_ID) {
                    await db.collection('tiendas').doc(TIENDA_ID).collection('pedidos').add(pedidoData);
                    console.log('✅ Pedido guardado en Firestore');
                }
            } catch (error) {
                console.error('❌ Error al guardar en Firestore:', error);
            }

            // ============================================================
            // ENVIAR POR WHATSAPP
            // ============================================================
            const telefonoWhatsApp = tiendaData.whatsapp || '573164043436';
            const urlWhatsApp = `https://wa.me/${telefonoWhatsApp}?text=${encodeURIComponent(mensajeWhatsApp)}`;

            mostrarToast(`✅ Pedido ${numeroPedido} enviado correctamente`, 'success');
            window.open(urlWhatsApp, '_blank');

            // Limpiar carrito
            carrito = [];
            actualizarCarrito();
            document.getElementById('formDatos').style.display = 'none';
            document.getElementById('clienteNombre').value = '';
            document.getElementById('clienteTelefono').value = '';
            document.getElementById('clienteDireccion').value = '';
            document.getElementById('clienteBarrio').value = '';
            document.getElementById('clienteObservaciones').value = '';
            
            productos.forEach(p => {
                const el = document.getElementById(`cant-${p.id}`);
                if (el) el.textContent = '0';
            });
        }

        // ============================================================
        // TOAST
        // ============================================================
        function mostrarToast(mensaje, tipo = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            toast.textContent = mensaje;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ============================================================
        // ESCAPE HTML
        // ============================================================
        function escHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        document.addEventListener('DOMContentLoaded', async () => {
            await cargarTienda();
            await cargarProductos();

            // Tecla Enter para enviar pedido
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && document.activeElement.tagName !== 'TEXTAREA') {
                    const btn = document.getElementById('btnComprar');
                    if (!btn.disabled) {
                        enviarPedido();
                    }
                }
            });
        });

        console.log('✅ Menú EyMotoComidas cargado correctamente');
    </script>
</body>
</html>
