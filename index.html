<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EyMotoComidas Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
}

.logo{width:90px;border-radius:12px}

.banner img{width:100%}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:10px;
    padding:10px;
}

.card{
    background:white;
    padding:10px;
    border-radius:10px;
}

.buy{
    width:100%;
    background:#333;
    color:white;
    padding:10px;
    border:none;
    border-radius:10px;
}

.cart{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:10px;
    border-top:1px solid #ccc;
}
</style>
</head>

<body>

<header>
    <img id="logoTienda" class="logo">
    <h1 id="nombreTienda"></h1>
</header>

<div id="estadoTienda" style="padding:10px;font-weight:bold;text-align:center">
🟢 CARGANDO...
</div>

<div class="banner">
<img src="" alt="">
</div>

<div class="products" id="products"></div>

<div class="cart">
<h3>🛒 Carrito</h3>
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>
<button onclick="sendWhatsApp()">Comprar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
  authDomain: "eymotocomidas.firebaseapp.com",
  projectId: "eymotocomidas"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= SOLO 1 VEZ ================= */
const params = new URLSearchParams(location.search);
const tiendaId = params.get("tienda");

if (!tiendaId) {
  document.body.innerHTML = "❌ Falta ?tienda=nombre";
  throw new Error("Sin tienda");
}

/* ================= VARIABLES ================= */
let whatsapp = "";
let products = [];
let cart = [];

/* ================= TIENDA ================= */
async function loadStore(){

  const snap = await getDoc(doc(db,"tiendas",tiendaId));

  if(!snap.exists()){
    document.body.innerHTML="❌ Tienda no existe";
    return;
  }

  const data = snap.data();

  document.getElementById("nombreTienda").textContent = data.nombre || "";
  document.getElementById("logoTienda").src = data.logo || "";
  document.querySelector(".banner img").src = data.banner || "";

  whatsapp = (data.whatsapp || "").replace("+","");

  document.getElementById("estadoTienda").innerHTML =
    data.abierta === false ? "🔴 CERRADA" : "🟢 ABIERTA";
}

/* ================= PRODUCTOS ================= */
async function loadProducts(){

  const snap = await getDocs(collection(db,"tiendas",tiendaId,"productos"));

  products = [];

  snap.forEach(d=>{
    const p = d.data();
    if(p.disponible){
      products.push(p);
    }
  });

  renderProducts();
}

/* ================= RENDER ================= */
function renderProducts(){

  document.getElementById("products").innerHTML =
  products.map((p,i)=>`
    <div class="card">
      <img src="${p.img}" style="width:100%;height:120px;object-fit:cover">
      <h3>${p.name}</h3>
      <p>${p.descripcion || ""}</p>
      <b>$${p.precio}</b>
      <button class="buy" onclick="add(${i})">Comprar</button>
    </div>
  `).join("");
}

/* ================= CARRITO ================= */
window.add = function(i){
  cart.push(products[i]);
  renderCart();
};

function renderCart(){

  let total = 0;

  document.getElementById("cartItems").innerHTML =
  cart.map(p=>{
    total += p.precio;
    return `${p.name}<br>`;
  }).join("");

  document.getElementById("total").innerText = total;
}

/* ================= WHATSAPP ================= */
window.sendWhatsApp = function(){

  let msg = "🛵 Pedido%0A%0A";

  cart.forEach(p=>{
    msg += `${p.name}%0A`;
  });

  window.open(`https://wa.me/${whatsapp}?text=${msg}`);
};

/* ================= INIT ================= */
(async function(){
  await loadStore();
  await loadProducts();
})();
</script>

</body>
</html>
