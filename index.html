<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EyMotoComidas Pro</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f4f4f4; padding-bottom:180px; }
    header { background:#333; color:white; text-align:center; padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .logo { width:70px; height:70px; object-fit:cover; border-radius:15px; }
    .banner-img { width:100%; height:auto; display:block; min-height:100px; background:#eee; }
    .categories { display:flex; gap:8px; padding:15px; background:#fff; overflow-x:auto; white-space:nowrap; border-bottom: 1px solid #ddd; }
    .categories button { border:none; padding:8px 16px; border-radius:20px; cursor:pointer; background:#f0f0f0; font-weight:bold; }
    .products { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:15px; padding:15px; }
    .card { background:#fff; border-radius:12px; padding:12px; display:flex; flex-direction:column; justify-content:space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card img { width:100%; height:140px; object-fit:cover; border-radius:8px; }
    .descripcion-text { font-size: 13px; color: #666; margin: 5px 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; min-height: 40px; }
    .precio { font-weight: bold; color: #28a745; font-size: 18px; margin: 10px 0; }
    .buy { width:100%; background:#333; color:#fff; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer; }
    .cart { 
        position:fixed; bottom:0; left:0; right:0; background:#fff; 
        border-top:1px solid #ccc; padding:10px; max-height:40vh; 
        overflow-y:auto; z-index: 999;
    }
    #cartItems { margin-bottom: 10px; }
    cart { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #ccc; padding:15px; max-height:40vh; overflow:auto; z-index: 999; }
    .checkout { display:block; width:100%; background:#333; color:#fff; border:none; padding:16px; border-radius:12px; font-size:20px; font-weight:bold; cursor:pointer; }
    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
    .modal-content { background-color: #fff; margin: auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; }
  </style>
</head>
<body>

<header>
  <img id="logoTienda" class="logo" src="" alt="Logo">
  <h1 id="tituloTienda">Cargando...</h1>
  <div id="estadoTienda"></div>
</header>

<img id="bannerTiendaEnMenu" class="banner-img" src="" alt="Banner">
<div class="categories" id="categoriasContainer"></div>
<div class="products" id="products"></div>

<div class="cart">
  <h3>🛒 Carrito</h3>
  <div id="cartItems"></div>
  <p>Total: $<span id="total">0</span></p>
  <button id="btnComprar" class="checkout">Comprar</button>
</div>

<div id="modalPedido" class="modal">
  <div class="modal-content">
    <h2>📋 Datos de Entrega</h2>
    <input type="text" id="formNombre" placeholder="Nombre" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="text" id="formDireccion" placeholder="Dirección" style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="document.getElementById('modalPedido').style.display='none'" style="width:48%;">Volver</button>
    <button id="btnConfirmarPedido" style="width:48%; background:#28a745; color:#fff; border:none; padding:10px;">ENVIAR</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const app = initializeApp({ apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY", authDomain: "eymotocomidas.firebaseapp.com", projectId: "eymotocomidas" });
const db = getFirestore(app);

let cart = [], products = [], whatsapp = "";
let tiendaAbierta = false;
const idTienda = new URLSearchParams(window.location.search).get('tienda');

async function init() {
  if(!idTienda) return;
  const snap = await getDoc(doc(db, "tiendas", idTienda));
  if(snap.exists()){
      const data = snap.data();
      tiendaAbierta = (data.abierta === true || data.abierta === "true");
      document.getElementById("tituloTienda").innerText = data.nombre || "Tienda";
      document.getElementById("logoTienda").src = data.logo || "";
      document.getElementById("bannerTiendaEnMenu").src = data.banner || "";
      whatsapp = data.whatsapp;
      
      const catContainer = document.getElementById("categoriasContainer");
      catContainer.innerHTML = `<button onclick="window.filterProducts('Todos')">Todos</button>`;
      if (data.categorias && Array.isArray(data.categorias)) {
          data.categorias.forEach(cat => {
              const btn = document.createElement("button");
              btn.innerText = cat;
              btn.onclick = () => window.filterProducts(cat);
              catContainer.appendChild(btn);
          });
      }
      
      const prodSnap = await getDocs(collection(db, "tiendas", idTienda, "productos"));
      products = prodSnap.docs.map(d => ({id: d.id, ...d.data()}));
      render(products);
  }
}

function render(list) {
    document.getElementById("products").innerHTML = list.map(p => `
        <div class="card">
            <img src="${p.img || ''}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p class="descripcion-text">${p.descripcion || ''}</p>
            <p class="precio">$${(Number(p.precio) || 0).toLocaleString()}</p>
            <button class="buy" onclick="window.add('${p.name}')">Añadir</button>
        </div>
    `).join('');
}

window.filterProducts = (cat) => {
    const filtered = cat === "Todos" ? products : products.filter(p => p.categoria === cat);
    render(filtered);
};

window.add = (name) => {
    if (!tiendaAbierta) { alert("⚠️ Tienda cerrada."); return; }
    let prod = products.find(p => p.name === name);
    let item = cart.find(x => x.name === name);
    if(item) item.qty++;
    else cart.push({...prod, qty: 1});
    renderCart();
};

window.updateQty = (index, change) => {
    cart[index].qty += change;
    if (cart[index].qty <= 0) cart.splice(index, 1);
    renderCart();
};

window.removeItem = (i) => { cart.splice(i, 1); renderCart(); };

function renderCart() {
    let total = 0;
    const cartContainer = document.getElementById("cartItems");
    cartContainer.innerHTML = cart.map((p, i) => {
        total += Number(p.precio) * p.qty;
        return `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #eee; padding:5px 0;">
                <span style="font-size:14px;">${p.name}</span>
                <div style="display:flex; align-items:center; gap:5px;">
                    <button onclick="window.updateQty(${i}, -1)" style="padding:2px 8px;">-</button>
                    <span style="min-width:20px; text-align:center;">${p.qty}</span>
                    <button onclick="window.updateQty(${i}, 1)" style="padding:2px 8px;">+</button>
                    <button onclick="window.removeItem(${i})" style="color:red; background:none; border:none; margin-left:10px; cursor:pointer;">🗑️</button>
                </div>
            </div>`;
    }).join('');
    document.getElementById("total").innerText = total.toLocaleString();
}

// Estos eventos ahora SÍ tienen elementos en el DOM para ejecutarse
document.getElementById("btnConfirmarPedido").onclick = () => {
    const msg = `Pedido:\n` + cart.map(p => `${p.name} x${p.qty}`).join('\n') + `\nTotal: $${document.getElementById("total").innerText}`;
    window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');
};

document.getElementById("btnComprar").onclick = () => document.getElementById("modalPedido").style.display = "flex";

init();
</script>
</body>
</html>
