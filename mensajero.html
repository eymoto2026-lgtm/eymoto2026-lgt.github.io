<script>
    // ============================================================
    // CONFIGURACIÓN FIREBASE
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
        authDomain: "eymotocomidas.firebaseapp.com",
        projectId: "eymotocomidas",
        storageBucket: "eymotocomidas.firebasestorage.app",
        messagingSenderId: "670474251560",
        appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ============================================================
    // 🎵 SISTEMA DE SONIDO MEJORADO
    // ============================================================
    class SonidoEyMoto {
        constructor() {
            this.audioUrl = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
            this.audio = new Audio();
            this.cargado = false;
            this.reproduciendo = false;
            this.intervalos = {};
            this.pedidosActivos = {};
            this.cargarSonido();
        }

        cargarSonido() {
            try {
                this.audio = new Audio(this.audioUrl);
                this.audio.preload = 'auto';
                this.audio.addEventListener('canplaythrough', () => {
                    this.cargado = true;
                });
                this.audio.load();
            } catch (e) {
                console.warn('⚠️ Error cargando sonido:', e.message);
                this.cargado = false;
            }
        }

        reproducir() {
            try {
                if (!this.cargado) this.cargarSonido();
                const audioClone = new Audio(this.audioUrl);
                audioClone.volume = 0.8;
                audioClone.play().catch(e => {
                    this.fallbackBeep();
                });
            } catch (e) {
                this.fallbackBeep();
            }
        }

        iniciarNotificacion(pedidoId) {
            if (this.pedidosActivos[pedidoId]) return;
            console.log(`🔔 Iniciando notificación para pedido: ${pedidoId}`);
            this.pedidosActivos[pedidoId] = true;
            this.reproducir();
            this.intervalos[pedidoId] = setInterval(() => {
                if (this.pedidosActivos[pedidoId]) {
                    this.reproducir();
                } else {
                    this.detenerNotificacion(pedidoId);
                }
            }, 5000);
        }

        detenerNotificacion(pedidoId) {
            if (!pedidoId) {
                Object.keys(this.pedidosActivos).forEach(id => {
                    this.detenerNotificacion(id);
                });
                return;
            }
            console.log(`⏹️ Deteniendo notificación para pedido: ${pedidoId}`);
            delete this.pedidosActivos[pedidoId];
            if (this.intervalos[pedidoId]) {
                clearInterval(this.intervalos[pedidoId]);
                delete this.intervalos[pedidoId];
            }
        }

        estaSonando(pedidoId) {
            return this.pedidosActivos[pedidoId] === true;
        }

        fallbackBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                [800, 1000, 1200].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    const t = i * 0.15;
                    gain.gain.setValueAtTime(0.15, ctx.currentTime + t);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
                    osc.start(ctx.currentTime + t);
                    osc.stop(ctx.currentTime + t + 0.2);
                });
            } catch (e) {}
        }
    }

    // ============================================================
    // INSTANCIA DEL SONIDO
    // ============================================================
    const sonidoEyMoto = new SonidoEyMoto();

    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    let mensajeroUid = null;
    let mensajeroData = null;
    let pedidosListener = null;
    let tiendasCache = {};
    let todosLosPedidos = [];
    let listenerActivo = false;
    let timeoutReconexion = null;
    let mensajeroConectado = true;
    let accionPendiente = null;

    // ============================================================
    // FUNCIONES DE AUTENTICACIÓN
    // ============================================================
    function iniciarSesion() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('loginMsg');
        msg.textContent = '';
        if (!email || !pass) { msg.textContent = '❌ Completa todos los campos.'; return; }
        auth.signInWithEmailAndPassword(email, pass)
            .then(async (userCredential) => {
                const user = userCredential.user;
                const doc = await db.collection('usuarios').doc(user.uid).get();
                if (!doc.exists) { await auth.signOut(); msg.textContent = '⛔ Usuario no registrado como mensajero.'; return; }
                const data = doc.data();
                if (data.mensajero !== true) { await auth.signOut(); msg.textContent = '⛔ No tienes permisos de mensajero.'; return; }
                mensajeroUid = user.uid;
                mensajeroData = data;
                mensajeroConectado = data.conectado !== false;
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
                document.getElementById('mensajeroInfo').textContent = '👤 ' + (data.nombre || email);
                actualizarIndicadorConexion();
                await db.collection('usuarios').doc(user.uid).update({
                    conectado: mensajeroConectado,
                    ultimaConexion: firebase.firestore.FieldValue.serverTimestamp()
                });
                await inicializarPanel();
            })
            .catch(e => { console.error('Error de login:', e); msg.textContent = '❌ Credenciales incorrectas.'; });
    }

    function cerrarSesion() {
        sonidoEyMoto.detenerNotificacion();
        if (mensajeroUid) {
            db.collection('usuarios').doc(mensajeroUid).update({
                conectado: false,
                ultimaDesconexion: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(() => {});
        }
        if (pedidosListener) { try { pedidosListener(); } catch(e) {} pedidosListener = null; }
        listenerActivo = false;
        if (timeoutReconexion) { clearTimeout(timeoutReconexion); timeoutReconexion = null; }
        auth.signOut();
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('panel').classList.add('hidden');
        toast('👋 Sesión cerrada', 'info');
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            mensajeroUid = user.uid;
            inicializarPanel();
        } else {
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('panel').classList.add('hidden');
            if (pedidosListener) { try { pedidosListener(); } catch(e) {} pedidosListener = null; }
            listenerActivo = false;
            sonidoEyMoto.detenerNotificacion();
        }
    });

    // ============================================================
    // TOGGLE CONECTADO/DESCONECTADO
    // ============================================================
    function toggleEstadoConexion() {
        if (!mensajeroUid) return;
        const nuevoEstado = !mensajeroConectado;
        mostrarModalConfirmacion(
            nuevoEstado ? '🟢 Conectar' : '🔴 Desconectar',
            nuevoEstado ? '¿Quieres conectarte y recibir pedidos?' : '¿Quieres desconectarte y no recibir más pedidos?',
            () => { ejecutarCambioConexion(nuevoEstado); }
        );
    }

    function ejecutarCambioConexion(nuevoEstado) {
        mensajeroConectado = nuevoEstado;
        db.collection('usuarios').doc(mensajeroUid).update({
            conectado: nuevoEstado,
            [`${nuevoEstado ? 'conectado' : 'desconectado'}En`]: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            actualizarIndicadorConexion();
            if (nuevoEstado) {
                toast('🟢 Te has conectado. Recibirás pedidos.', 'success', 3000);
                if (!listenerActivo) { escucharPedidos(); }
            } else {
                toast('🔴 Te has desconectado. No recibirás pedidos.', 'warn', 3000);
                sonidoEyMoto.detenerNotificacion();
                if (pedidosListener) { try { pedidosListener(); } catch(e) {} pedidosListener = null; }
                listenerActivo = false;
                renderizarPedidos();
            }
        }).catch(e => {
            console.error('Error actualizando estado:', e);
            toast('❌ Error al cambiar estado', 'error');
            mensajeroConectado = !nuevoEstado;
            actualizarIndicadorConexion();
        });
    }

    function actualizarIndicadorConexion() {
        const estadoEl = document.getElementById('estadoConexion');
        if (mensajeroConectado) {
            estadoEl.textContent = '🟢 Conectado';
            estadoEl.className = 'estado';
        } else {
            estadoEl.textContent = '🔴 Desconectado';
            estadoEl.className = 'estado desconectado';
        }
    }

    // ============================================================
    // MODAL DE CONFIRMACIÓN
    // ============================================================
    function mostrarModalConfirmacion(titulo, mensaje, onConfirm) {
        document.getElementById('modalTitulo').textContent = titulo;
        document.getElementById('modalMensaje').textContent = mensaje;
        document.getElementById('modalConfirmacion').classList.add('active');
        accionPendiente = onConfirm;
        document.getElementById('btnConfirmarAccion').onclick = function() {
            if (accionPendiente) { accionPendiente(); accionPendiente = null; }
            cerrarModalConfirmacion();
        };
    }

    function cerrarModalConfirmacion() {
        document.getElementById('modalConfirmacion').classList.remove('active');
        accionPendiente = null;
    }

    // ============================================================
    // INICIALIZAR PANEL
    // ============================================================
    async function inicializarPanel() {
        try {
            const doc = await db.collection('usuarios').doc(mensajeroUid).get();
            if (doc.exists) {
                const data = doc.data();
                mensajeroConectado = data.conectado !== false;
                actualizarIndicadorConexion();
            }
            await cargarTiendas();
            await escucharPedidos();
            toast('✅ Panel de mensajero cargado correctamente', 'success', 2000);
            console.log('✅ Panel de mensajero cargado correctamente');
        } catch (error) {
            console.error('❌ Error al inicializar panel:', error);
            toast('❌ Error al cargar el panel', 'error');
            setTimeout(inicializarPanel, 5000);
        }
    }

    async function cargarTiendas() {
        try {
            const snap = await db.collection('tiendas').get();
            snap.forEach(doc => { tiendasCache[doc.id] = doc.data(); });
            console.log('🏪 Tiendas cargadas:', Object.keys(tiendasCache).length);
        } catch (e) { console.error('Error cargando tiendas:', e); }
    }

    // ============================================================
    // ESCUCHAR PEDIDOS - CON CONTROL DE SONIDO
    // ============================================================
    function escucharPedidos() {
        if (pedidosListener) { try { pedidosListener(); } catch(e) {} pedidosListener = null; }
        if (!mensajeroUid) { console.warn('⚠️ No hay mensajero UID'); return; }
        listenerActivo = true;
        
        db.collection('tiendas').get()
            .then(snap => {
                const tiendas = snap.docs.map(doc => doc.id);
                console.log(`📢 Escuchando ${tiendas.length} tiendas para pedidos`);
                
                tiendas.forEach(tiendaId => {
                    const unsubscribe = db.collection('tiendas')
                        .doc(tiendaId)
                        .collection('pedidos')
                        .where('estado', 'in', ['Listo para asignar', 'En camino al restaurante', 'Recogiendo pedido', 'En camino', 'Entregado', 'Cancelado'])
                        .onSnapshot(snapshot => {
                            if (!listenerActivo || !mensajeroConectado) return;
                            
                            snapshot.docChanges().forEach(change => {
                                const data = change.doc.data();
                                const pedidoId = change.doc.id;
                                const estaDisponible = !data.mensajeroId && data.estado === 'Listo para asignar';
                                const esParaMi = data.mensajeroId === mensajeroUid;
                                
                                if (change.type === 'added') {
                                    if (estaDisponible) {
                                        const existe = todosLosPedidos.some(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                        if (!existe) {
                                            todosLosPedidos.push({ id: pedidoId, tiendaId: tiendaId, ...data });
                                            // ✅ INICIAR SONIDO SOLO SI ESTÁ DISPONIBLE
                                            if (!sonidoEyMoto.estaSonando(pedidoId)) {
                                                sonidoEyMoto.iniciarNotificacion(pedidoId);
                                                const tienda = tiendasCache[tiendaId] || {};
                                                toast(`🛵 Nuevo pedido de ${tienda.nombre || 'Tienda'}`, 'new', 5000);
                                            }
                                        }
                                    } else if (esParaMi) {
                                        const existe = todosLosPedidos.some(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                        if (!existe) {
                                            todosLosPedidos.push({ id: pedidoId, tiendaId: tiendaId, ...data });
                                        }
                                    }
                                } else if (change.type === 'modified') {
                                    const index = todosLosPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    
                                    // ✅ SI EL PEDIDO YA TIENE MENSAJERO O ESTÁ ENTREGADO, DETENER SONIDO
                                    if (data.mensajeroId || data.estado === 'Entregado' || data.estado === 'Cancelado') {
                                        if (sonidoEyMoto.estaSonando(pedidoId)) {
                                            console.log(`🔇 Pedido ${pedidoId} ya no está disponible, deteniendo sonido`);
                                            sonidoEyMoto.detenerNotificacion(pedidoId);
                                        }
                                    }
                                    
                                    // ✅ SI EL PEDIDO ESTÁ DISPONIBLE Y NO ESTÁ SONANDO, INICIAR SONIDO
                                    if (estaDisponible && !sonidoEyMoto.estaSonando(pedidoId)) {
                                        sonidoEyMoto.iniciarNotificacion(pedidoId);
                                        toast('🔔 Pedido disponible - ¡Tómalo!', 'info', 3000);
                                    }
                                    
                                    if (index !== -1) {
                                        todosLosPedidos[index] = { id: pedidoId, tiendaId: tiendaId, ...data };
                                    } else if (esParaMi || estaDisponible) {
                                        todosLosPedidos.push({ id: pedidoId, tiendaId: tiendaId, ...data });
                                    }
                                    
                                    // ✅ SI EL PEDIDO FUE TOMADO POR OTRO, DETENER SONIDO
                                    if (data.mensajeroId && data.mensajeroId !== mensajeroUid && sonidoEyMoto.estaSonando(pedidoId)) {
                                        sonidoEyMoto.detenerNotificacion(pedidoId);
                                    }
                                } else if (change.type === 'removed') {
                                    const index = todosLosPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    if (index !== -1) {
                                        todosLosPedidos.splice(index, 1);
                                        if (sonidoEyMoto.estaSonando(pedidoId)) {
                                            sonidoEyMoto.detenerNotificacion(pedidoId);
                                        }
                                    }
                                }
                            });
                            renderizarPedidos();
                        }, err => {
                            console.warn(`⚠️ Error en listener:`, err.message);
                            if (listenerActivo) {
                                clearTimeout(timeoutReconexion);
                                timeoutReconexion = setTimeout(() => {
                                    console.log('🔄 Reintentando conexión...');
                                    escucharPedidos();
                                }, 5000);
                            }
                        });
                    
                    if (!window._listeners) window._listeners = [];
                    window._listeners.push(unsubscribe);
                });
                
                pedidosListener = () => {
                    listenerActivo = false;
                    if (window._listeners) {
                        window._listeners.forEach(unsub => { try { unsub(); } catch(e) {} });
                        window._listeners = [];
                    }
                };
            })
            .catch(err => {
                console.error('❌ Error obteniendo tiendas:', err);
                if (listenerActivo) {
                    clearTimeout(timeoutReconexion);
                    timeoutReconexion = setTimeout(() => {
                        console.log('🔄 Reintentando conexión...');
                        escucharPedidos();
                    }, 5000);
                }
            });
    }

    // ============================================================
    // RENDERIZAR PEDIDOS
    // ============================================================
    function renderizarPedidos() {
        if (!mensajeroConectado) {
            document.getElementById('listaPedidosDisponibles').innerHTML = `
                <div class="empty-state"><span class="icono">🔴</span><p>Estás desconectado</p>
                <span style="font-size:12px;color:var(--text-muted);">Haz clic en "🔴 Desconectado" para conectarte</span></div>
            `;
            document.getElementById('listaMisPedidos').innerHTML = `
                <div class="empty-state"><span class="icono">🔴</span><p>Desconectado</p></div>
            `;
            document.getElementById('contadorDisponibles').textContent = '0';
            document.getElementById('contadorMisPedidos').textContent = '0';
            return;
        }
        
        const disponibles = todosLosPedidos.filter(p => 
            p.estado === 'Listo para asignar' && !p.mensajeroId
        );
        const misPedidosActivos = todosLosPedidos.filter(p => 
            p.mensajeroId === mensajeroUid && p.estado !== 'Entregado' && p.estado !== 'Cancelado'
        );
        
        document.getElementById('contadorDisponibles').textContent = disponibles.length;
        document.getElementById('contadorMisPedidos').textContent = misPedidosActivos.length;
        
        // Renderizar disponibles
        const containerDisponibles = document.getElementById('listaPedidosDisponibles');
        if (disponibles.length === 0) {
            containerDisponibles.innerHTML = `
                <div class="empty-state"><span class="icono">✅</span><p>No hay pedidos disponibles</p>
                <span style="font-size:12px;color:var(--text-muted);">Esperando nuevos pedidos...</span></div>
            `;
        } else {
            let html = '';
            disponibles.forEach(p => { html += renderizarPedidoCard(p, true); });
            containerDisponibles.innerHTML = html;
        }
        
        // Renderizar mis pedidos
        const containerMisPedidos = document.getElementById('listaMisPedidos');
        if (misPedidosActivos.length === 0) {
            containerMisPedidos.innerHTML = `
                <div class="empty-state"><span class="icono">📭</span><p>No tienes pedidos activos</p></div>
            `;
        } else {
            let html = '';
            misPedidosActivos.forEach(p => { html += renderizarPedidoCard(p, false); });
            containerMisPedidos.innerHTML = html;
        }
    }

    function renderizarPedidoCard(pedido, disponible) {
        const tienda = tiendasCache[pedido.tiendaId] || {};
        const nombreTienda = tienda.nombre || 'Tienda';
        const cliente = pedido.cliente || {};
        const total = pedido.total || 0;
        const fechaStr = formatearFecha(pedido.fecha);
        const estado = pedido.estado || 'Pendiente';
        
        let estadoColor = '';
        let estadoLabel = '';
        switch(estado) {
            case 'Listo para asignar': estadoColor = 'disponible'; estadoLabel = '🔔 DISPONIBLE'; break;
            case 'En camino al restaurante': estadoColor = 'camino'; estadoLabel = '🛵 En camino'; break;
            case 'Recogiendo pedido': estadoColor = 'recogido'; estadoLabel = '📦 Recogiendo'; break;
            case 'En camino': estadoColor = 'camino'; estadoLabel = '🚗 En camino'; break;
            case 'Entregado': estadoColor = 'entregado'; estadoLabel = '✅ Entregado'; break;
            case 'Cancelado': estadoColor = 'cancelado'; estadoLabel = '❌ Cancelado'; break;
            default: estadoColor = 'pendiente'; estadoLabel = '📋 ' + estado;
        }
        
        let itemsHtml = '';
        if (pedido.items && pedido.items.length > 0) {
            pedido.items.forEach(item => {
                const nombre = item.nombre || 'Producto';
                const subtotal = item.total || (item.precio * item.cantidad) || 0;
                itemsHtml += `<div class="item"><span>${nombre} x${item.cantidad || 1}</span><span>$${subtotal.toLocaleString('es-CO')}</span></div>`;
            });
        }
        
        let botonesHtml = '';
        // ✅ INDICADOR DE SONIDO ACTIVO
        const sonidoActivo = sonidoEyMoto.estaSonando(pedido.id);
        const indicadorSonido = sonidoActivo ? '🔊' : '';
        
        if (estado === 'Listo para asignar' && !pedido.mensajeroId) {
            botonesHtml = `
                <div class="estados-acciones">
                    <button class="btn-success" onclick="tomarPedido('${pedido.id}','${pedido.tiendaId}')">
                        ✅ TOMAR PEDIDO ${indicadorSonido}
                    </button>
                </div>
                ${sonidoActivo ? `<div style="font-size:10px;color:var(--green);margin-top:4px;text-align:center;">🔊 Sonando notificación...</div>` : ''}
            `;
        } else if (pedido.mensajeroId === mensajeroUid && estado !== 'Entregado' && estado !== 'Cancelado') {
            switch(estado) {
                case 'En camino al restaurante':
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-purple" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Recogiendo pedido')">📦 RECOGER PEDIDO</button>
                            <button class="btn-danger" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Cancelado')">❌ Cancelar</button>
                        </div>
                    `;
                    break;
                case 'Recogiendo pedido':
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-warning" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','En camino')">🚗 IR A ENTREGAR</button>
                            <button class="btn-danger" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Cancelado')">❌ Cancelar</button>
                        </div>
                    `;
                    break;
                case 'En camino':
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-success" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Entregado')">✅ ENTREGAR PEDIDO</button>
                            <button class="btn-danger" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Cancelado')">❌ Cancelar</button>
                        </div>
                    `;
                    break;
                default:
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-info" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','En camino al restaurante')">🛵 En camino</button>
                            <button class="btn-purple" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Recogiendo pedido')">📦 Recogiendo</button>
                            <button class="btn-success" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Entregado')">✅ Entregar</button>
                        </div>
                    `;
            }
        } else if (estado === 'Entregado' || estado === 'Cancelado') {
            botonesHtml = `
                <div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px;text-align:center;color:var(--text-muted);font-size:13px;">
                    ✅ Pedido ${estado === 'Entregado' ? 'entregado' : 'cancelado'} - Proceso finalizado
                </div>
            `;
        }
        
        const claseDisponible = disponible ? 'disponible' : '';
        
        return `
            <div class="pedido-card ${claseDisponible}" id="pedido-${pedido.id}">
                <div class="header">
                    <span class="numero">🛵 #${pedido.numeroPedido || pedido.id.slice(-6).toUpperCase()} ${indicadorSonido}</span>
                    <span class="badge-estado ${estadoColor}">${estadoLabel}</span>
                </div>
                <div class="info-grid">
                    <div><span class="label">🏪 Tienda:</span> <span class="value">${nombreTienda}</span></div>
                    <div><span class="label">📅 Fecha:</span> <span class="value">${fechaStr}</span></div>
                    <div><span class="label">👤 Cliente:</span> <span class="value">${cliente.nombre || 'Desconocido'}</span></div>
                    <div><span class="label">📍 Dirección:</span> <span class="value">${cliente.direccion || 'N/A'}</span></div>
                    <div><span class="label">📱 Teléfono:</span> <span class="value">${cliente.telefono || 'N/A'}</span></div>
                    <div><span class="label">💳 Pago:</span> <span class="value">${pedido.metodoPago || 'Efectivo'}</span></div>
                </div>
                ${itemsHtml ? `<div class="items">${itemsHtml}</div>` : ''}
                <div class="total">💰 Total: $${total.toLocaleString('es-CO')}</div>
                ${botonesHtml}
            </div>
        `;
    }

    // ============================================================
    // TOMAR PEDIDO
    // ============================================================
    async function tomarPedido(pedidoId, tiendaId) {
        if (!mensajeroUid) { toast('⚠️ No has iniciado sesión', 'error'); return; }
        if (!mensajeroConectado) { toast('⚠️ Estás desconectado. Conéctate para tomar pedidos.', 'warn'); return; }
        
        try {
            const docRef = db.collection('tiendas').doc(tiendaId).collection('pedidos').doc(pedidoId);
            const doc = await docRef.get();
            if (!doc.exists) { toast('⚠️ El pedido ya no existe', 'warn'); return; }
            const data = doc.data();
            if (data.mensajeroId) {
                toast('⚠️ Este pedido ya fue tomado por otro mensajero', 'warn');
                if (sonidoEyMoto.estaSonando(pedidoId)) {
                    sonidoEyMoto.detenerNotificacion(pedidoId);
                }
                const index = todosLosPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                if (index !== -1) { todosLosPedidos[index] = { ...todosLosPedidos[index], ...data }; }
                renderizarPedidos();
                return;
            }
            
            toast('⏳ Tomando pedido...', 'info');
            await docRef.update({
                mensajeroId: mensajeroUid,
                nombreMensajero: mensajeroData?.nombre || 'Mensajero',
                estado: 'En camino al restaurante',
                fechaAsignacion: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // ✅ DETENER SONIDO AL TOMAR EL PEDIDO
            if (sonidoEyMoto.estaSonando(pedidoId)) {
                sonidoEyMoto.detenerNotificacion(pedidoId);
            }
            sonidoEyMoto.reproducir();
            toast('✅ Pedido tomado exitosamente', 'success', 3000);
            
        } catch (e) {
            console.error('Error tomando pedido:', e);
            toast('❌ Error: ' + e.message, 'error');
        }
    }

    // ============================================================
    // CAMBIAR ESTADO DEL PEDIDO
    // ============================================================
    async function cambiarEstado(pedidoId, tiendaId, nuevoEstado) {
        if (!mensajeroUid) { toast('⚠️ No has iniciado sesión', 'error'); return; }
        if (!mensajeroConectado) { toast('⚠️ Estás desconectado. Conéctate para gestionar pedidos.', 'warn'); return; }
        if (!confirm(`¿Cambiar estado a "${nuevoEstado}"?`)) return;
        
        try {
            const docRef = db.collection('tiendas').doc(tiendaId).collection('pedidos').doc(pedidoId);
            await docRef.update({
                estado: nuevoEstado,
                ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp(),
                [`estado_${nuevoEstado.toLowerCase().replace(/ /g, '_')}_en`]: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // ✅ DETENER SONIDO SI EL PEDIDO FUE ENTREGADO O CANCELADO
            if (nuevoEstado === 'Entregado' || nuevoEstado === 'Cancelado') {
                if (sonidoEyMoto.estaSonando(pedidoId)) {
                    sonidoEyMoto.detenerNotificacion(pedidoId);
                }
            }
            
            sonidoEyMoto.reproducir();
            toast(`✅ Pedido actualizado a: ${nuevoEstado}`, 'success', 3000);
            
        } catch (e) {
            console.error('Error actualizando estado:', e);
            toast('❌ Error: ' + e.message, 'error');
        }
    }

    // ============================================================
    // FUNCIONES DE UTILIDAD
    // ============================================================
    function formatearFecha(fecha) {
        if (!fecha) return '--/--/--';
        try {
            let d;
            if (fecha.toDate) d = fecha.toDate();
            else if (fecha.seconds) d = new Date(fecha.seconds * 1000);
            else d = new Date(fecha);
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
                   ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return '--/--/--'; }
    }

    function toast(msg, type = 'info', dur = 4000) {
        const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️', new: '🛵' };
        const wrap = document.getElementById('toastWrap');
        const el = document.createElement('div');
        el.className = `toast t-${type}`;
        el.innerHTML = `<span>${icons[type] || '🔔'}</span><span>${msg}</span>`;
        wrap.appendChild(el);
        setTimeout(() => { el.classList.add('toast-fade'); setTimeout(() => el.remove(), 350); }, dur);
        return el;
    }

    // ============================================================
    // EXPONER FUNCIONES
    // ============================================================
    window.iniciarSesion = iniciarSesion;
    window.cerrarSesion = cerrarSesion;
    window.tomarPedido = tomarPedido;
    window.cambiarEstado = cambiarEstado;
    window.toggleEstadoConexion = toggleEstadoConexion;
    window.mostrarModalConfirmacion = mostrarModalConfirmacion;
    window.cerrarModalConfirmacion = cerrarModalConfirmacion;
    window.toast = toast;

    console.log('✅ Panel de mensajero cargado correctamente');
    console.log('🔇 Control de sonido por pedido individual');
</script>
</body>
