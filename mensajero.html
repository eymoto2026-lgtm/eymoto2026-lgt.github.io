<!DOCTYPE html><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyMoto - Panel Mensajero</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        :root {
            --yellow: #FFD600;
            --yellow-dim: #e6c200;
            --green: #00C853;
            --green-bg: rgba(0,200,83,0.12);
            --blue: #00B0FF;
            --blue-bg: rgba(0,176,255,0.12);
            --red: #FF3D00;
            --red-bg: rgba(255,61,0,0.12);
            --orange: #FF6900;
            --orange-bg: rgba(255,105,0,0.12);
            --surface: #141414;
            --surface2: #1e1e1e;
            --surface3: #252525;
            --border: #2e2e2e;
            --border2: #3a3a3a;
            --text-muted: #888;
            --radius: 10px;
        }
        input, select, button {
            font-family: inherit;
            font-size: 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--surface3);
            color: #fff;
            padding: 11px 14px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        input:focus, select:focus { border-color: var(--yellow); }
        select option { background: #1e1e1e; }
        button {
            background: var(--yellow);
            color: #1a1a2e;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background .15s, transform .1s;
        }
        button:hover { background: var(--yellow-dim); }
        button:active { transform: scale(.98); }
        .btn-sm { padding: 7px 12px; font-size: 12px; width: auto; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-success { background: #00C853; color: #fff; }
        .btn-success:hover { background: #00b748; }
        .btn-info { background: #0288d1; color: #fff; }
        .btn-info:hover { background: #0277bd; }
        .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text-muted); }
        .btn-ghost:hover { background: var(--surface3); }
        .btn-tomar {
            background: var(--green);
            color: #fff;
            font-weight: 800;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 6px;
        }
        .btn-tomar:hover { background: #00b748; transform: scale(1.02); }
        .btn-tomar:active { transform: scale(0.97); }
        .btn-tomar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .hidden { display: none !important; }

        header {
            background: #0d0d0d;
            border-bottom: 1px solid var(--border);
            padding: 13px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .brand {
            background: var(--yellow);
            color: #1a1a2e;
            font-weight: 900;
            font-size: 14px;
            padding: 5px 14px;
            border-radius: 20px;
        }
        header h1 { font-size: 15px; font-weight: 600; color: #fff; }
        header .spacer { flex: 1; }
        .header-badge {
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 7px;
            border-radius: 10px;
            display: none;
        }

        .wrap { max-width: 1200px; margin: 0 auto; padding: 22px 20px; }

        #loginBox {
            max-width: 420px;
            margin: 60px auto;
            padding: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        #loginBox .brand {
            display: inline-block;
            background: var(--yellow);
            color: #1a1a2e;
            font-size: 26px;
            font-weight: 900;
            padding: 10px 24px;
            border-radius: 30px;
        }
        #loginBox h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        #loginBox .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 26px; }
        #loginMsg { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 20px; }
        .login-logo { text-align: center; margin-bottom: 28px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 18px;
        }
        .stat-card .val { font-size: 28px; font-weight: 900; margin-bottom: 2px; line-height: 1; }
        .stat-card .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
        .stat-card.c-yellow .val { color: var(--yellow); }
        .stat-card.c-green .val { color: var(--green); }
        .stat-card.c-blue .val { color: var(--blue); }
        .stat-card.c-orange .val { color: var(--orange); }
        .stat-card.c-red .val { color: var(--red); }

        .kanban-wrap { overflow-x: auto; padding-bottom: 6px; }
        .kanban {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            min-height: 340px;
        }
        .kanban-col {
            background: var(--surface2);
            border-radius: 12px;
            padding: 14px;
            min-height: 200px;
        }
        .kanban-col-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .kanban-col-header h4 { font-size: 13px; font-weight: 700; flex: 1; }
        .col-count {
            font-size: 11px;
            font-weight: 700;
            background: var(--surface3);
            color: var(--text-muted);
            padding: 2px 7px;
            border-radius: 8px;
        }
        .dot-yellow { background: var(--yellow); }
        .dot-blue { background: var(--blue); }
        .dot-green { background: var(--green); }
        .dot-orange { background: var(--orange); }
        .empty-col {
            text-align: center;
            padding: 30px 10px;
            color: var(--text-muted);
            font-size: 12px;
        }
        .empty-col .ico { font-size: 28px; display: block; margin-bottom: 8px; opacity: .4; }

        .pedido-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            animation: slideIn .22s ease;
            transition: all 0.3s ease;
        }
        .pedido-card:hover { border-color: var(--yellow); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pedido-card .pedido-tienda {
            font-size: 14px;
            font-weight: 900;
            color: var(--yellow);
            margin-bottom: 4px;
        }
        .pedido-card .pedido-titulo {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }
        .pedido-card .pedido-cliente {
            background: var(--surface2);
            border-radius: 8px;
            padding: 8px 10px;
            margin: 4px 0;
            font-size: 12px;
            line-height: 1.8;
        }
        .pedido-card .pedido-cliente .label {
            color: var(--text-muted);
            font-weight: 600;
        }
        .pedido-card .pedido-total {
            font-size: 15px;
            font-weight: 800;
            color: var(--green);
            text-align: right;
            margin: 6px 0 4px 0;
        }
        .pedido-card .estado-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 4px;
        }
        .estado-badge.asignado { background: var(--blue-bg); color: var(--blue); }
        .estado-badge.en-camino { background: var(--orange-bg); color: var(--orange); }
        .estado-badge.entregado { background: var(--green-bg); color: var(--green); }
        .estado-badge.cancelado { background: var(--red-bg); color: var(--red); }
        .pedido-card .btn-detalle {
            background: var(--surface3);
            color: var(--text-muted);
            border: 1px solid var(--border2);
            padding: 6px 12px;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .pedido-card .btn-detalle:hover {
            background: var(--surface2);
            border-color: var(--yellow);
            color: #fff;
        }

        #toastWrap {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #1e1e1e;
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,.5);
            animation: toastIn .3s ease;
            pointer-events: auto;
            max-width: 380px;
            cursor: pointer;
        }
        .toast.t-success { border-left: 3px solid var(--green); }
        .toast.t-error { border-left: 3px solid var(--red); }
        .toast.t-info { border-left: 3px solid var(--blue); }
        .toast.t-warn { border-left: 3px solid var(--yellow); }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast-fade { animation: toastOut .3s ease forwards; }
        @keyframes toastOut {
            to { opacity: 0; transform: translateX(20px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal .modal-content {
            background: #1e1e1e;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            padding: 24px;
            border: 1px solid var(--yellow);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .modal .modal-header h3 { color: #fff; font-size: 18px; font-weight: 700; }
        .modal .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .modal .modal-close:hover { color: var(--red); }
        .modal .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .modal .info-row .label { color: var(--text-muted); }
        .modal .info-row .value { color: #fff; font-weight: 500; }

        .mapa-simulado {
            background: var(--surface2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
            margin: 12px 0;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .mapa-simulado .icono { font-size: 36px; margin-bottom: 4px; }
        .mapa-simulado .texto { color: var(--text-muted); font-size: 13px; }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .kanban { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="toastWrap"></div>

<div id="loginBox">
    <div class="login-logo"><span class="brand">EyMoto</span></div>
    <h2>Panel de Mensajero</h2>
    <p class="sub">Gestiona tus entregas asignadas</p>
    <div class="form-group"><label>Correo</label><input type="email" id="email" placeholder="mensajero@eymoto.com"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')iniciarSesion()"></div>
    <button onclick="iniciarSesion()">Ingresar</button>
    <p id="loginMsg"></p>
</div>

<div id="panel" class="hidden">
    <header>
        <span class="brand">EyMoto</span>
        <h1>Panel de Mensajero</h1>
        <span class="spacer"></span>
        <span id="nombreMensajero" style="font-size:12px;color:var(--text-muted);background:var(--surface2);padding:4px 12px;border-radius:12px;"></span>
        <span class="header-badge" id="headerBadge">0</span>
        <button class="btn-ghost btn-sm" onclick="window.logout()" style="width:auto;padding:8px 16px;">Salir</button>
    </header>

    <div class="wrap">
        <div class="stats-grid">
            <div class="stat-card c-yellow"><div class="val" id="statDisponibles">0</div><div class="lbl">Disponibles</div></div>
            <div class="stat-card c-blue"><div class="val" id="statAsignados">0</div><div class="lbl">Asignados</div></div>
            <div class="stat-card c-orange"><div class="val" id="statEnCamino">0</div><div class="lbl">En camino</div></div>
            <div class="stat-card c-green"><div class="val" id="statEntregados">0</div><div class="lbl">Entregados hoy</div></div>
        </div>

        <div class="kanban-wrap">
            <div class="kanban">
                <!-- COLUMNA 1: PEDIDOS DISPONIBLES -->
                <div class="kanban-col">
                    <div class="kanban-col-header">
                        <div class="col-dot dot-yellow"></div>
                        <h4>📢 Pedidos Disponibles</h4>
                        <span class="col-count" id="cntDisponibles">0</span>
                    </div>
                    <div id="colDisponibles">
                        <div class="empty-col"><span class="ico">🎉</span>No hay pedidos disponibles</div>
                    </div>
                </div>

                <!-- COLUMNA 2: MIS PEDIDOS -->
                <div class="kanban-col">
                    <div class="kanban-col-header">
                        <div class="col-dot dot-blue"></div>
                        <h4>🛵 Mis Pedidos</h4>
                        <span class="col-count" id="cntMios">0</span>
                    </div>
                    <div id="colMios">
                        <div class="empty-col"><span class="ico">📭</span>No tienes pedidos asignados</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal" id="modalDetalle" onclick="cerrarModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modalTitulo">Detalle del pedido</h3>
            <button class="modal-close" onclick="cerrarModal()">✕</button>
        </div>
        <div id="modalContenido"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
        authDomain: "eymotocomidas.firebaseapp.com",
        projectId: "eymotocomidas",
        storageBucket: "eymotocomidas.firebasestorage.app",
        messagingSenderId: "670474251560",
        appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ============================================================
    // GLOBALS
    // ============================================================
    let mensajeroId = null;
    let nombreMensajero = '';
    let tiendasCache = {};
    let miUnsubscribe = null;
    let todosDisponibles = [];
    let todosMisPedidos = [];
    let modoGPS = false;
    let watchId = null;
    let ubicacionActual = null;

    // ============================================================
    // AUTENTICACIÓN
    // ============================================================
    async function verificarRolMensajero() {
        const user = auth.currentUser;
        if (!user) return null;
        try {
            const doc = await db.collection('usuarios').doc(user.uid).get();
            if (!doc.exists) return null;
            const data = doc.data();
            if (data.mensajero === true || data.rol === 'mensajero') {
                return { uid: user.uid, ...data };
            }
            return null;
        } catch (e) { return null; }
    }

    function iniciarSesion() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('loginMsg');
        msg.textContent = '';
        if (!email || !pass) { msg.textContent = '❌ Completa todos los campos.'; return; }
        auth.signInWithEmailAndPassword(email, pass)
            .then(async (userCredential) => {
                const user = userCredential.user;
                const doc = await db.collection('usuarios').doc(user.uid).get();
                if (!doc.exists) { await auth.signOut(); msg.textContent = '⛔ Usuario no registrado como mensajero.'; return; }
                const data = doc.data();
                if (data.mensajero !== true) { await auth.signOut(); msg.textContent = '⛔ No tienes permisos de mensajero.'; return; }
                if (data.activo === false) { await auth.signOut(); msg.textContent = '⛔ Tu cuenta está desactivada. Contacta al administrador.'; return; }
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
                await inicializarPanel();
            })
            .catch(e => { msg.textContent = '❌ Credenciales incorrectas.'; console.error(e); });
    }

    function logout() {
        if (miUnsubscribe) miUnsubscribe();
        if (watchId) navigator.geolocation.clearWatch(watchId);
        auth.signOut();
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('panel').classList.add('hidden');
        toast('👋 Sesión cerrada', 'info');
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            inicializarPanel();
        } else {
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('panel').classList.add('hidden');
            if (watchId) navigator.geolocation.clearWatch(watchId);
        }
    });

    // ============================================================
    // INICIALIZAR PANEL
    // ============================================================
    async function inicializarPanel() {
        const info = await verificarRolMensajero();
        if (!info) { toast('⛔ No tienes permisos de mensajero', 'error'); setTimeout(() => logout(), 2000); return; }
        mensajeroId = info.uid;
        nombreMensajero = info.nombre || 'Mensajero';
        document.getElementById('nombreMensajero').textContent = '🛵 ' + nombreMensajero;
        await cargarTiendas();
        escucharPedidosMensajero();
        iniciarGPS();
        toast('✅ Panel de mensajero cargado', 'success', 2000);
    }

    // ============================================================
    // CARGAR TIENDAS
    // ============================================================
    async function cargarTiendas() {
        try {
            const snap = await db.collection('tiendas').get();
            snap.forEach(doc => { tiendasCache[doc.id] = doc.data(); });
        } catch (e) { console.error(e); }
    }

    // ============================================================
    // ESCUCHAR PEDIDOS DEL MENSAJERO
    // ============================================================
    function escucharPedidosMensajero() {
        if (miUnsubscribe) miUnsubscribe();

        // 1. Escuchar TODOS los pedidos que estén "Listo para asignar"
        const unsubscribeDisponibles = db.collectionGroup('pedidos')
            .where('estado', '==', 'Listo para asignar')
            .onSnapshot(snap => {
                const disponibles = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    const tiendaId = doc.ref.parent.parent.id;
                    disponibles.push({ id: doc.id, tiendaId, ...data });
                });
                todosDisponibles = disponibles;
                renderizarDisponibles();
                actualizarEstadisticas();
            }, err => {
                console.error('Error escuchando disponibles:', err);
            });

        // 2. Escuchar los pedidos ASIGNADOS a este mensajero
        if (!mensajeroId) return;
        const unsubscribeMios = db.collectionGroup('pedidos')
            .where('mensajeroId', '==', mensajeroId)
            .onSnapshot(snap => {
                const misPedidos = [];
                snap.forEach(doc => {
                    const data = doc.data();
                    const tiendaId = doc.ref.parent.parent.id;
                    misPedidos.push({ id: doc.id, tiendaId, ...data });
                });
                todosMisPedidos = misPedidos;
                renderizarMisPedidos();
                actualizarEstadisticas();
                actualizarHeaderBadge();
            }, err => {
                console.error('Error escuchando mis pedidos:', err);
            });

        miUnsubscribe = () => {
            unsubscribeDisponibles();
            unsubscribeMios();
        };
    }

    // ============================================================
    // TOMAR PEDIDO
    // ============================================================
    async function tomarPedido(pedidoId, tiendaId) {
        if (!mensajeroId) {
            toast('⚠️ No estás autenticado como mensajero', 'error');
            return;
        }

        try {
            // 1. Verificar que el pedido aún esté disponible
            const docRef = db.collection('tiendas').doc(tiendaId)
                .collection('pedidos').doc(pedidoId);
            const doc = await docRef.get();

            if (!doc.exists) {
                toast('⚠️ El pedido ya no existe', 'error');
                return;
            }

            const data = doc.data();
            if (data.estado !== 'Listo para asignar' || data.mensajeroId) {
                toast('⚠️ Este pedido ya fue tomado por otro mensajero', 'warn');
                return;
            }

            // 2. Asignar el pedido al mensajero actual
            await docRef.update({
                mensajeroId: mensajeroId,
                nombreMensajero: nombreMensajero,
                estado: 'Asignado',
                fechaAsignacion: firebase.firestore.FieldValue.serverTimestamp()
            });

            toast('✅ Pedido tomado con éxito', 'success');
            // La actualización en tiempo real se encargará del resto

        } catch (error) {
            toast('❌ Error al tomar el pedido: ' + error.message, 'error');
        }
    }

    // ============================================================
    // RENDERIZAR DISPONIBLES
    // ============================================================
    function renderizarDisponibles() {
        const container = document.getElementById('colDisponibles');
        const contador = document.getElementById('cntDisponibles');
        contador.textContent = todosDisponibles.length;

        if (todosDisponibles.length === 0) {
            container.innerHTML = `<div class="empty-col"><span class="ico">🎉</span>No hay pedidos disponibles</div>`;
            return;
        }

        let html = '';
        todosDisponibles.forEach(p => {
            const tienda = tiendasCache[p.tiendaId] || {};
            const nombreTienda = tienda.nombre || 'Tienda';
            const cliente = p.cliente || {};
            const total = p.total || 0;

            html += `
                <div class="pedido-card" style="border-color:var(--green);">
                    <div class="pedido-tienda">🏪 ${nombreTienda}</div>
                    <div class="pedido-titulo">🛵 ${p.numeroPedido || '#' + p.id.slice(-6)}</div>
                    <div class="pedido-cliente">
                        <div><span class="label">👤 Cliente:</span> ${cliente.nombre || 'Desconocido'}</div>
                        <div><span class="label">📍 Dirección:</span> ${cliente.direccion || 'N/A'}</div>
                        <div><span class="label">📱 Teléfono:</span> ${cliente.telefono || 'N/A'}</div>
                    </div>
                    <div class="pedido-total">💰 $${total.toLocaleString('es-CO')}</div>
                    <button class="btn-tomar" onclick="window.tomarPedido('${p.id}','${p.tiendaId}')">👤 Tomar Pedido</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // ============================================================
    // RENDERIZAR MIS PEDIDOS
    // ============================================================
    function renderizarMisPedidos() {
        const container = document.getElementById('colMios');
        const contador = document.getElementById('cntMios');
        contador.textContent = todosMisPedidos.length;

        if (todosMisPedidos.length === 0) {
            container.innerHTML = `<div class="empty-col"><span class="ico">📭</span>No tienes pedidos asignados</div>`;
            return;
        }

        let html = '';
        todosMisPedidos.forEach(p => {
            const tienda = tiendasCache[p.tiendaId] || {};
            const nombreTienda = tienda.nombre || 'Tienda';
            const cliente = p.cliente || {};
            const total = p.total || 0;
            
            let estadoBadge = 'asignado';
            let estadoLabel = 'Asignado';
            if (p.estado === 'En camino') { estadoBadge = 'en-camino'; estadoLabel = 'En camino'; }
            else if (p.estado === 'Entregado') { estadoBadge = 'entregado'; estadoLabel = 'Entregado'; }
            else if (p.estado === 'Cancelado') { estadoBadge = 'cancelado'; estadoLabel = 'Cancelado'; }

            html += `
                <div class="pedido-card">
                    <div class="pedido-tienda">🏪 ${nombreTienda}</div>
                    <div class="pedido-titulo">🛵 ${p.numeroPedido || '#' + p.id.slice(-6)}</div>
                    <div class="pedido-cliente">
                        <div><span class="label">👤 Cliente:</span> ${cliente.nombre || 'Desconocido'}</div>
                        <div><span class="label">📍 Dirección:</span> ${cliente.direccion || 'N/A'}</div>
                    </div>
                    <div class="pedido-total">💰 $${total.toLocaleString('es-CO')}</div>
                    <span class="estado-badge ${estadoBadge}">${estadoLabel}</span>
                    <button class="btn-detalle" onclick="window.verDetallePedido('${p.id}','${p.tiendaId}')">📋 Ver Detalle</button>
                    ${p.estado === 'Asignado' ? `<button class="btn-tomar" onclick="window.iniciarEntregaMensajero('${p.id}','${p.tiendaId}')" style="background:var(--orange);">🛵 Iniciar Entrega</button>` : ''}
                    ${p.estado === 'En camino' ? `<button class="btn-tomar" onclick="window.entregarPedidoMensajero('${p.id}','${p.tiendaId}')" style="background:var(--green);">✅ Entregar</button>` : ''}
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // ============================================================
    // ACCIONES DEL MENSAJERO SOBRE SUS PEDIDOS
    // ============================================================
    async function iniciarEntregaMensajero(pedidoId, tiendaId) {
        try {
            const docRef = db.collection('tiendas').doc(tiendaId)
                .collection('pedidos').doc(pedidoId);
            const doc = await docRef.get();
            
            if (!doc.exists) { toast('⚠️ Pedido no encontrado', 'error'); return; }
            const data = doc.data();
            
            if (data.mensajeroId !== mensajeroId) {
                toast('⚠️ Este pedido no te pertenece', 'error');
                return;
            }
            
            await docRef.update({
                estado: 'En camino',
                fechaInicioEntrega: firebase.firestore.FieldValue.serverTimestamp()
            });
            toast('🛵 Pedido en camino', 'success');
        } catch (e) {
            toast('❌ Error: ' + e.message, 'error');
        }
    }

    async function entregarPedidoMensajero(pedidoId, tiendaId) {
        try {
            const docRef = db.collection('tiendas').doc(tiendaId)
                .collection('pedidos').doc(pedidoId);
            const doc = await docRef.get();
            
            if (!doc.exists) { toast('⚠️ Pedido no encontrado', 'error'); return; }
            const data = doc.data();
            
            if (data.mensajeroId !== mensajeroId) {
                toast('⚠️ Este pedido no te pertenece', 'error');
                return;
            }
            
            await docRef.update({
                estado: 'Entregado',
                fechaEntrega: firebase.firestore.FieldValue.serverTimestamp()
            });
            toast('✅ Pedido entregado correctamente', 'success');
        } catch (e) {
            toast('❌ Error: ' + e.message, 'error');
        }
    }

    // ============================================================
    // VER DETALLE DEL PEDIDO
    // ============================================================
    function verDetallePedido(pedidoId, tiendaId) {
        const pedido = [...todosDisponibles, ...todosMisPedidos].find(p => p.id === pedidoId && p.tiendaId === tiendaId);
        if (!pedido) { toast('⚠️ Pedido no encontrado', 'error'); return; }
        
        const tienda = tiendasCache[pedido.tiendaId] || {};
        const cliente = pedido.cliente || {};
        
        let html = `
            <div class="info-row"><span class="label">🏪 Tienda</span><span class="value">${tienda.nombre || 'Tienda'}</span></div>
            <div class="info-row"><span class="label">🧾 Pedido</span><span class="value">${pedido.numeroPedido || '#' + pedido.id.slice(-6)}</span></div>
            <div class="info-row"><span class="label">📅 Fecha</span><span class="value">${formatearFecha(pedido.fecha)}</span></div>
            <div class="info-row"><span class="label">📌 Estado</span><span class="value" style="color:var(--yellow);">${pedido.estado || 'Pendiente'}</span></div>
            <div class="info-row"><span class="label">👤 Cliente</span><span class="value">${cliente.nombre || 'Desconocido'}</span></div>
            <div class="info-row"><span class="label">📱 Teléfono</span><span class="value">${cliente.telefono || 'N/A'}</span></div>
            <div class="info-row"><span class="label">📍 Dirección</span><span class="value">${cliente.direccion || 'N/A'}</span></div>
            <div class="info-row"><span class="label">🏘️ Barrio</span><span class="value">${cliente.barrio || 'N/A'}</span></div>
            <div class="info-row"><span class="label">💳 Pago</span><span class="value">${pedido.metodoPago || 'Efectivo'}</span></div>
            <div class="info-row"><span class="label">📝 Observaciones</span><span class="value">${cliente.observaciones || 'Ninguna'}</span></div>
        `;
        
        if (pedido.items && pedido.items.length > 0) {
            html += `<div style="margin-top:12px;"><strong>🧾 Productos</strong>`;
            pedido.items.forEach(item => {
                let nombreItem = item.nombre || 'Producto';
                if (item.pesoGramos) nombreItem += ` (${item.pesoGramos}g)`;
                const subtotal = item.total || (item.precio * item.cantidad) || 0;
                html += `<div class="info-row"><span class="value">${nombreItem} x${item.cantidad || 1}</span><span class="value" style="color:var(--green);">$${subtotal.toLocaleString('es-CO')}</span></div>`;
            });
            html += `</div>`;
        }
        
        html += `
            <div style="margin-top:12px;padding-top:12px;border-top:2px solid var(--yellow);">
                <div class="info-row"><span style="font-weight:700;">💰 TOTAL</span><span style="font-weight:800;color:var(--green);font-size:18px;">$${(pedido.total || 0).toLocaleString('es-CO')}</span></div>
            </div>
            <div class="mapa-simulado">
                <div class="icono">📍</div>
                <div class="texto">${cliente.direccion || 'Dirección no especificada'}</div>
                <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${pedido.estado === 'En camino' ? '🛵 Mensajero en camino' : pedido.estado === 'Entregado' ? '✅ Pedido entregado' : '⏳ Esperando asignación'}</div>
            </div>
        `;
        
        document.getElementById('modalTitulo').textContent = `📋 Pedido ${pedido.numeroPedido || '#' + pedido.id.slice(-6)}`;
        document.getElementById('modalContenido').innerHTML = html;
        document.getElementById('modalDetalle').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function cerrarModal(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('modalDetalle').classList.remove('active');
        document.body.style.overflow = '';
    }

    // ============================================================
    // GPS
    // ============================================================
    function iniciarGPS() {
        if (!navigator.geolocation) {
            toast('📍 GPS no soportado en este dispositivo', 'warn');
            return;
        }
        navigator.geolocation.getCurrentPosition(pos => {
            ubicacionActual = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            console.log('📍 Ubicación obtenida:', ubicacionActual);
        }, err => console.warn('⚠️ Error GPS:', err.message), { enableHighAccuracy: true, timeout: 10000 });
    }

    // ============================================================
    // ESTADÍSTICAS
    // ============================================================
    function actualizarEstadisticas() {
        document.getElementById('statDisponibles').textContent = todosDisponibles.length;
        const asignados = todosMisPedidos.filter(p => p.estado === 'Asignado').length;
        const enCamino = todosMisPedidos.filter(p => p.estado === 'En camino').length;
        const entregados = todosMisPedidos.filter(p => p.estado === 'Entregado').length;
        document.getElementById('statAsignados').textContent = asignados;
        document.getElementById('statEnCamino').textContent = enCamino;
        document.getElementById('statEntregados').textContent = entregados;
    }

    function actualizarHeaderBadge() {
        const disponibles = todosDisponibles.length;
        const badge = document.getElementById('headerBadge');
        badge.textContent = disponibles;
        badge.style.display = disponibles > 0 ? 'inline-block' : 'none';
    }

    // ============================================================
    // FORMATEAR FECHA
    // ============================================================
    function formatearFecha(fecha) {
        if (!fecha) return '--/--/--';
        try {
            let d;
            if (fecha.toDate) d = fecha.toDate();
            else if (fecha.seconds) d = new Date(fecha.seconds * 1000);
            else d = new Date(fecha);
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return '--/--/--'; }
    }

    // ============================================================
    // TOAST
    // ============================================================
    function toast(msg, type = 'info', dur = 4000) {
        const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️' };
        const wrap = document.getElementById('toastWrap');
        const el = document.createElement('div');
        el.className = `toast t-${type}`;
        el.innerHTML = `<span>${icons[type] || '🔔'}</span><span>${msg}</span>`;
        wrap.appendChild(el);
        setTimeout(() => { el.classList.add('toast-fade'); setTimeout(() => el.remove(), 350); }, dur);
        return el;
    }

    // ============================================================
    // EXPONER FUNCIONES
    // ============================================================
    window.iniciarSesion = iniciarSesion;
    window.logout = logout;
    window.tomarPedido = tomarPedido;
    window.iniciarEntregaMensajero = iniciarEntregaMensajero;
    window.entregarPedidoMensajero = entregarPedidoMensajero;
    window.verDetallePedido = verDetallePedido;
    window.cerrarModal = cerrarModal;
    window.toast = toast;

    console.log('✅ Panel de mensajero cargado correctamente');
    console.log('📢 Escuchando pedidos disponibles en tiempo real');
</script>
</body>
</html>
