<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Mensajero - EyMoto</title>
    <!-- ✅ FAVICON CORREGIDO -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛵</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        :root {
            --yellow: #FFD600;
            --yellow-dim: #e6c200;
            --green: #00C853;
            --green-bg: rgba(0,200,83,0.12);
            --blue: #00B0FF;
            --blue-bg: rgba(0,176,255,0.12);
            --red: #FF3D00;
            --red-bg: rgba(255,61,0,0.12);
            --orange: #FF6900;
            --orange-bg: rgba(255,105,0,0.12);
            --surface: #141414;
            --surface2: #1e1e1e;
            --surface3: #252525;
            --border: #2e2e2e;
            --border2: #3a3a3a;
            --text-muted: #888;
            --radius: 10px;
        }
        button {
            background: var(--yellow);
            color: #1a1a2e;
            font-weight: 700;
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background .15s, transform .1s;
            font-size: 14px;
            width: 100%;
        }
        button:hover { background: var(--yellow-dim); }
        button:active { transform: scale(.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { background: #00b748; }
        .btn-info { background: var(--blue); color: #fff; }
        .btn-info:hover { background: #0277bd; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-ghost:hover { background: var(--surface3); }
        .btn-outline { background: transparent; border: 2px solid var(--yellow); color: var(--yellow); }
        .btn-outline:hover { background: var(--yellow); color: #1a1a2e; }
        .hidden { display: none !important; }

        header {
            background: #0d0d0d;
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .brand {
            background: var(--yellow);
            color: #1a1a2e;
            font-weight: 900;
            font-size: 14px;
            padding: 5px 14px;
            border-radius: 20px;
        }
        header h1 { font-size: 15px; font-weight: 600; }
        header .spacer { flex: 1; }
        header .estado {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            background: var(--green-bg);
            color: var(--green);
        }
        .header-badge {
            background: var(--red);
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 10px;
            animation: parpadeo 1s ease-in-out infinite;
        }
        @keyframes parpadeo {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }

        #loginBox {
            max-width: 400px;
            margin: 60px auto;
            padding: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        #loginBox .brand {
            display: inline-block;
            background: var(--yellow);
            color: #1a1a2e;
            font-size: 26px;
            font-weight: 900;
            padding: 10px 24px;
            border-radius: 30px;
        }
        #loginBox h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        #loginBox .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        #loginMsg { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 20px; }
        .login-logo { text-align: center; margin-bottom: 28px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--surface3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: var(--yellow); }

        .pedido-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--yellow);
            animation: slideIn 0.3s ease;
            transition: all 0.3s;
        }
        .pedido-card.nuevo {
            border-left-color: var(--green);
            animation: pulseNuevo 1.5s ease-in-out infinite;
        }
        .pedido-card.asignado {
            border-left-color: var(--green);
            opacity: 0.5;
        }
        @keyframes pulseNuevo {
            0% { border-color: var(--green); box-shadow: 0 0 0 0 rgba(0,200,83,0.4); }
            50% { border-color: var(--yellow); box-shadow: 0 0 20px 10px rgba(0,200,83,0.2); }
            100% { border-color: var(--green); box-shadow: 0 0 0 0 rgba(0,200,83,0.4); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .pedido-card .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .pedido-card .header .numero {
            font-size: 16px;
            font-weight: 800;
            color: var(--yellow);
        }
        .pedido-card .header .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            background: var(--blue-bg);
            color: var(--blue);
        }
        .pedido-card .header .badge.disponible { 
            background: var(--green-bg); 
            color: var(--green);
            animation: parpadeo 1s ease-in-out infinite;
        }
        .pedido-card .header .badge.asignado { background: var(--orange-bg); color: var(--orange); }
        .pedido-card .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            font-size: 13px;
            margin: 6px 0;
        }
        .pedido-card .info-grid .label { color: var(--text-muted); }
        .pedido-card .info-grid .value { color: #fff; font-weight: 500; }
        .pedido-card .total {
            text-align: right;
            font-size: 16px;
            font-weight: 800;
            color: var(--green);
            margin-top: 6px;
        }
        .pedido-card .items {
            background: var(--surface2);
            border-radius: 8px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 12px;
        }
        .pedido-card .items .item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid var(--border);
        }
        .pedido-card .items .item:last-child { border-bottom: none; }
        .pedido-card .acciones {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .pedido-card .acciones button { flex: 1; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state .icono { font-size: 48px; display: block; margin-bottom: 12px; }

        #toastWrap {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #1e1e1e;
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,.5);
            animation: toastIn .3s ease;
            pointer-events: auto;
            max-width: 380px;
            cursor: pointer;
        }
        .toast.t-success { border-left: 3px solid var(--green); }
        .toast.t-error { border-left: 3px solid var(--red); }
        .toast.t-info { border-left: 3px solid var(--blue); }
        .toast.t-warn { border-left: 3px solid var(--yellow); }
        .toast.t-new { 
            border-left: 3px solid var(--yellow); 
            border-top-color: var(--yellow);
            animation: toastIn 0.3s ease, parpadeo 1s ease-in-out infinite 0.3s;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast-fade { animation: toastOut .3s ease forwards; }
        @keyframes toastOut {
            to { opacity: 0; transform: translateX(20px); }
        }

        @media (max-width: 600px) {
            .pedido-card .info-grid { grid-template-columns: 1fr; }
            .pedido-card .acciones { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="toastWrap"></div>

<div id="loginBox">
    <div class="login-logo"><span class="brand">EyMoto</span></div>
    <h2>Panel Mensajero</h2>
    <p class="sub">Recibe y gestiona tus pedidos</p>
    <div class="form-group"><label>Correo</label><input type="email" id="email" placeholder="tu@email.com"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')iniciarSesion()"></div>
    <button onclick="iniciarSesion()">Ingresar</button>
    <p id="loginMsg"></p>
</div>

<div id="panel" class="hidden">
    <header>
        <span class="brand">EyMoto</span>
        <h1>Mis Pedidos</h1>
        <span class="spacer"></span>
        <span id="mensajeroInfo" style="font-size:12px;color:var(--text-muted);"></span>
        <span class="estado" id="estadoConexion">🟢 Conectado</span>
        <span class="header-badge" id="notificacionBadge" style="display:none;">🔔</span>
        <button class="btn-ghost btn-sm" onclick="cerrarSesion()" style="width:auto;padding:8px 16px;">Salir</button>
    </header>

    <div class="wrap">
        <div id="listaPedidos">
            <div class="empty-state">
                <span class="icono">🛵</span>
                <p>Cargando pedidos disponibles...</p>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    // ============================================================
    // CONFIGURACIÓN FIREBASE
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
        authDomain: "eymotocomidas.firebaseapp.com",
        projectId: "eymotocomidas",
        storageBucket: "eymotocomidas.firebasestorage.app",
        messagingSenderId: "670474251560",
        appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ============================================================
    // 🏍️ SISTEMA DE SONIDO PERSONALIZADO EYMOTO
    // ============================================================
    class SonidoEyMoto {
        constructor() {
            this.ctx = null;
            this.inicializado = false;
            this.reproduciendo = false;
            this.timers = [];
            this.intervalo = null;
            this.pedidoActual = null;
        }

        // Inicializar contexto de audio
        iniciar() {
            try {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
                this.inicializado = true;
                return true;
            } catch (e) {
                console.debug('⚠️ Audio no disponible:', e.message);
                return false;
            }
        }

        // Limpiar timers
        limpiarTimers() {
            this.timers.forEach(timer => {
                try { clearTimeout(timer); } catch(e) {}
            });
            this.timers = [];
            
            if (this.intervalo) {
                try { clearInterval(this.intervalo); } catch(e) {}
                this.intervalo = null;
            }
            this.reproduciendo = false;
        }

        // Generar un tono simple
        tono(frecuencia, duracion, volumen = 0.2, tipo = 'sine') {
            try {
                if (!this.inicializado) this.iniciar();
                if (!this.ctx || this.ctx.state !== 'running') return null;

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.frequency.value = frecuencia;
                osc.type = tipo;
                
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(volumen, this.ctx.currentTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duracion);
                
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + duracion);
                
                return osc;
            } catch (e) {
                return null;
            }
        }

        // 🏍️ Sonido de MOTO ENCENDIENDO
        sonidoMotoEncendido() {
            try {
                if (!this.inicializado) this.iniciar();
                if (!this.ctx || this.ctx.state !== 'running') return;

                const frecuencias = [80, 120, 160, 200, 250, 300, 350, 400];
                frecuencias.forEach((freq, i) => {
                    const t = i * 0.035;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sawtooth';
                    const vol = 0.05 + (i / frecuencias.length) * 0.1;
                    gain.gain.setValueAtTime(0, this.ctx.currentTime + t);
                    gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + t + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + t + 0.15);
                    osc.start(this.ctx.currentTime + t);
                    osc.stop(this.ctx.currentTime + t + 0.2);
                });

                setTimeout(() => {
                    try {
                        for (let i = 0; i < 8; i++) {
                            const freq = 300 + (i * 50);
                            const t = i * 0.025;
                            const osc = this.ctx.createOscillator();
                            const gain = this.ctx.createGain();
                            osc.connect(gain);
                            gain.connect(this.ctx.destination);
                            osc.frequency.value = freq;
                            osc.type = 'sawtooth';
                            gain.gain.setValueAtTime(0.08, this.ctx.currentTime + t);
                            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + t + 0.08);
                            osc.start(this.ctx.currentTime + t);
                            osc.stop(this.ctx.currentTime + t + 0.1);
                        }
                    } catch (e) {}
                }, 300);
            } catch (e) {}
        }

        // 🔊 CHIFLIDO
        chiflido(duracion = 0.3, frecuencia = 1800) {
            try {
                if (!this.inicializado) this.iniciar();
                if (!this.ctx || this.ctx.state !== 'running') return;

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.value = frecuencia;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.25, this.ctx.currentTime + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duracion);
                osc.start(this.ctx.currentTime);
                osc.stop(this.ctx.currentTime + duracion);

                setTimeout(() => {
                    try {
                        const osc2 = this.ctx.createOscillator();
                        const gain2 = this.ctx.createGain();
                        osc2.connect(gain2);
                        gain2.connect(this.ctx.destination);
                        osc2.frequency.value = frecuencia * 1.5;
                        osc2.type = 'sine';
                        gain2.gain.setValueAtTime(0.1, this.ctx.currentTime);
                        gain2.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duracion * 0.8);
                        osc2.start(this.ctx.currentTime + 0.02);
                        osc2.stop(this.ctx.currentTime + duracion * 0.8);
                    } catch (e) {}
                }, 20);
            } catch (e) {}
        }

        // 🗣️ VOZ "EyMoto"
        vozEyMoto() {
            try {
                if (!this.inicializado) this.iniciar();
                if (!this.ctx || this.ctx.state !== 'running') return;

                const notasEy = [
                    { freq: 440, dur: 0.12, vol: 0.15 },
                    { freq: 520, dur: 0.15, vol: 0.15 }
                ];
                notasEy.forEach((nota, i) => {
                    const t = i * 0.1;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.frequency.value = nota.freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0, this.ctx.currentTime + t);
                    gain.gain.linearRampToValueAtTime(nota.vol, this.ctx.currentTime + t + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + t + nota.dur);
                    osc.start(this.ctx.currentTime + t);
                    osc.stop(this.ctx.currentTime + t + nota.dur);
                });

                setTimeout(() => {
                    try {
                        const notasMoto = [
                            { freq: 330, dur: 0.15, vol: 0.12 },
                            { freq: 280, dur: 0.2, vol: 0.12 },
                            { freq: 220, dur: 0.15, vol: 0.1 }
                        ];
                        notasMoto.forEach((nota, i) => {
                            const t = i * 0.12 + 0.25;
                            const osc = this.ctx.createOscillator();
                            const gain = this.ctx.createGain();
                            osc.connect(gain);
                            gain.connect(this.ctx.destination);
                            osc.frequency.value = nota.freq;
                            osc.type = 'sine';
                            gain.gain.setValueAtTime(0, this.ctx.currentTime + t);
                            gain.gain.linearRampToValueAtTime(nota.vol, this.ctx.currentTime + t + 0.02);
                            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + t + nota.dur);
                            osc.start(this.ctx.currentTime + t);
                            osc.stop(this.ctx.currentTime + t + nota.dur);
                        });
                    } catch (e) {}
                }, 200);
            } catch (e) {}
        }

        // 🎵 SECUENCIA COMPLETA DE NOTIFICACIÓN (una vez)
        secuenciaCompleta() {
            try {
                if (!this.inicializado) this.iniciar();
                if (!this.ctx || this.ctx.state !== 'running') {
                    this.fallbackBeep();
                    return;
                }

                // 1. Moto encendiendo
                this.sonidoMotoEncendido();

                // 2. Chiflido #1
                const timer1 = setTimeout(() => {
                    this.chiflido(0.35, 2000);
                }, 500);
                this.timers.push(timer1);

                // 3. Voz "EyMoto"
                const timer2 = setTimeout(() => {
                    this.vozEyMoto();
                }, 950);
                this.timers.push(timer2);

                // 4. Chiflido #2
                const timer3 = setTimeout(() => {
                    this.chiflido(0.4, 2200);
                }, 1450);
                this.timers.push(timer3);

                // 5. Aceleración final
                const timer4 = setTimeout(() => {
                    try {
                        for (let i = 0; i < 5; i++) {
                            const freq = 200 + (i * 60);
                            const t = i * 0.04;
                            const osc = this.ctx.createOscillator();
                            const gain = this.ctx.createGain();
                            osc.connect(gain);
                            gain.connect(this.ctx.destination);
                            osc.frequency.value = freq;
                            osc.type = 'sawtooth';
                            gain.gain.setValueAtTime(0.06, this.ctx.currentTime + t + 1.8);
                            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + t + 0.08 + 1.8);
                            osc.start(this.ctx.currentTime + t + 1.8);
                            osc.stop(this.ctx.currentTime + t + 0.1 + 1.8);
                        }
                    } catch (e) {}
                }, 1800);
                this.timers.push(timer4);

            } catch (e) {
                this.fallbackBeep();
            }
        }

        // 🔔 NOTIFICACIÓN CONTINUA (se repite hasta que se tome el pedido)
        notificacionContinua(pedidoId) {
            // Limpiar cualquier notificación anterior
            this.limpiarTimers();
            
            this.pedidoActual = pedidoId;
            this.reproduciendo = true;
            
            console.log('🔔 Iniciando notificación continua para pedido:', pedidoId);
            
            // Mostrar badge de notificación
            const badge = document.getElementById('notificacionBadge');
            badge.style.display = 'inline-block';
            
            // Reproducir primera secuencia inmediatamente
            this.secuenciaCompleta();
            
            // Configurar intervalo para repetir cada 5 segundos
            this.intervalo = setInterval(() => {
                if (this.reproduciendo && this.pedidoActual === pedidoId) {
                    // Verificar si el pedido sigue disponible
                    const pedidoAunDisponible = misPedidos.some(p => 
                        p.id === pedidoId && 
                        p.estado === 'Listo para asignar' && 
                        !p.mensajeroId
                    );
                    
                    if (pedidoAunDisponible) {
                        console.log('🔔 Repitiendo notificación para pedido:', pedidoId);
                        this.secuenciaCompleta();
                        
                        // Mostrar toast recordatorio
                        toast('🔔 Pedido disponible - ¡Tómalo ya!', 'new', 3000);
                    } else {
                        // El pedido ya fue tomado, detener
                        console.log('✅ Pedido tomado, deteniendo notificación:', pedidoId);
                        this.detenerNotificacion();
                    }
                } else {
                    this.detenerNotificacion();
                }
            }, 5000);
        }

        // Detener notificación
        detenerNotificacion() {
            console.log('⏹️ Deteniendo notificación');
            this.limpiarTimers();
            this.reproduciendo = false;
            this.pedidoActual = null;
            
            const badge = document.getElementById('notificacionBadge');
            badge.style.display = 'none';
        }

        // Fallback
        fallbackBeep() {
            try {
                if (!this.inicializado) this.iniciar();
                if (!this.ctx || this.ctx.state !== 'running') return;
                
                [800, 1000, 1200].forEach((freq, i) => {
                    const t = i * 0.15;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime + t);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + t + 0.15);
                    osc.start(this.ctx.currentTime + t);
                    osc.stop(this.ctx.currentTime + t + 0.2);
                });
            } catch (e) {}
        }
    }

    // ============================================================
    // INSTANCIA DEL SONIDO
    // ============================================================
    const sonidoEyMoto = new SonidoEyMoto();

    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    let mensajeroUid = null;
    let mensajeroData = null;
    let pedidosListener = null;
    let tiendasCache = {};
    let misPedidos = [];
    let listenerActivo = false;
    let timeoutReconexion = null;
    let pedidosNotificando = {};

    // ============================================================
    // FUNCIONES DE AUTENTICACIÓN
    // ============================================================
    function iniciarSesion() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('loginMsg');
        msg.textContent = '';
        
        if (!email || !pass) {
            msg.textContent = '❌ Completa todos los campos.';
            return;
        }
        
        sonidoEyMoto.iniciar();
        
        auth.signInWithEmailAndPassword(email, pass)
            .then(async (userCredential) => {
                const user = userCredential.user;
                const doc = await db.collection('usuarios').doc(user.uid).get();
                
                if (!doc.exists) {
                    await auth.signOut();
                    msg.textContent = '⛔ Usuario no registrado como mensajero.';
                    return;
                }
                
                const data = doc.data();
                if (data.mensajero !== true) {
                    await auth.signOut();
                    msg.textContent = '⛔ No tienes permisos de mensajero.';
                    return;
                }
                
                mensajeroUid = user.uid;
                mensajeroData = data;
                
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
                document.getElementById('mensajeroInfo').textContent = '👤 ' + (data.nombre || email);
                
                await db.collection('usuarios').doc(user.uid).update({
                    conectado: true,
                    ultimaConexion: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await inicializarPanel();
            })
            .catch(e => {
                console.error('Error de login:', e);
                msg.textContent = '❌ Credenciales incorrectas.';
            });
    }

    function cerrarSesion() {
        // Detener cualquier notificación activa
        sonidoEyMoto.detenerNotificacion();
        pedidosNotificando = {};
        
        if (mensajeroUid) {
            db.collection('usuarios').doc(mensajeroUid).update({
                conectado: false,
                ultimaDesconexion: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(() => {});
        }
        
        if (pedidosListener) {
            try { pedidosListener(); } catch(e) {}
            pedidosListener = null;
        }
        listenerActivo = false;
        
        if (timeoutReconexion) {
            clearTimeout(timeoutReconexion);
            timeoutReconexion = null;
        }
        
        auth.signOut();
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('panel').classList.add('hidden');
        toast('👋 Sesión cerrada', 'info');
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            mensajeroUid = user.uid;
            inicializarPanel();
        } else {
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('panel').classList.add('hidden');
            if (pedidosListener) {
                try { pedidosListener(); } catch(e) {}
                pedidosListener = null;
            }
            listenerActivo = false;
            sonidoEyMoto.detenerNotificacion();
        }
    });

    // ============================================================
    // INICIALIZAR PANEL
    // ============================================================
    async function inicializarPanel() {
        try {
            await cargarTiendas();
            await escucharPedidos();
            toast('✅ Panel de mensajero cargado correctamente', 'success', 2000);
            console.log('✅ Panel de mensajero cargado correctamente');
            console.log('🏍️ Sonido EyMoto integrado - Notificaciones continuas');
            console.log('📢 Escuchando pedidos disponibles en tiempo real');
        } catch (error) {
            console.error('❌ Error al inicializar panel:', error);
            toast('❌ Error al cargar el panel', 'error');
            setTimeout(inicializarPanel, 5000);
        }
    }

    async function cargarTiendas() {
        try {
            const snap = await db.collection('tiendas').get();
            snap.forEach(doc => {
                tiendasCache[doc.id] = doc.data();
            });
            console.log('🏪 Tiendas cargadas:', Object.keys(tiendasCache).length);
        } catch (e) {
            console.error('Error cargando tiendas:', e);
        }
    }

    // ============================================================
    // ESCUCHAR PEDIDOS
    // ============================================================
    function escucharPedidos() {
        if (pedidosListener) {
            try { pedidosListener(); } catch(e) {}
            pedidosListener = null;
        }
        
        if (!mensajeroUid) {
            console.warn('⚠️ No hay mensajero UID para escuchar pedidos');
            return;
        }
        
        listenerActivo = true;
        document.getElementById('estadoConexion').textContent = '🟢 Conectado';
        document.getElementById('estadoConexion').style.color = 'var(--green)';
        
        db.collection('tiendas').get()
            .then(snap => {
                const tiendas = snap.docs.map(doc => doc.id);
                console.log(`📢 Escuchando ${tiendas.length} tiendas para pedidos`);
                
                tiendas.forEach(tiendaId => {
                    const unsubscribe = db.collection('tiendas')
                        .doc(tiendaId)
                        .collection('pedidos')
                        .where('estado', 'in', ['Listo para asignar', 'En camino al restaurante', 'Recogiendo pedido', 'En camino'])
                        .onSnapshot(snapshot => {
                            if (!listenerActivo) return;
                            
                            snapshot.docChanges().forEach(change => {
                                const data = change.doc.data();
                                const pedidoId = change.doc.id;
                                
                                const esParaMi = data.mensajeroId === mensajeroUid;
                                const estaDisponible = !data.mensajeroId && data.estado === 'Listo para asignar';
                                
                                if (!esParaMi && !estaDisponible) {
                                    // Si estaba en mi lista y ya no es mío, remover
                                    const index = misPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    if (index !== -1) {
                                        misPedidos.splice(index, 1);
                                        // Detener notificación si estaba sonando
                                        if (pedidosNotificando[pedidoId]) {
                                            sonidoEyMoto.detenerNotificacion();
                                            delete pedidosNotificando[pedidoId];
                                        }
                                        renderizarPedidos();
                                    }
                                    return;
                                }
                                
                                if (change.type === 'added') {
                                    const existe = misPedidos.some(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    if (!existe) {
                                        const pedido = {
                                            id: pedidoId,
                                            tiendaId: tiendaId,
                                            ...data,
                                            _nuevo: true
                                        };
                                        misPedidos.push(pedido);
                                        
                                        // 🎵 INICIAR NOTIFICACIÓN CONTINUA
                                        if (estaDisponible && !pedidosNotificando[pedidoId]) {
                                            pedidosNotificando[pedidoId] = true;
                                            sonidoEyMoto.notificacionContinua(pedidoId);
                                            
                                            // Mostrar toast
                                            const tienda = tiendasCache[tiendaId] || {};
                                            const nombreTienda = tienda.nombre || 'Tienda';
                                            toast(`🛵 NUEVO PEDIDO de ${nombreTienda} - ¡Tómalo YA!`, 'new', 5000);
                                        }
                                        
                                        renderizarPedidos();
                                    }
                                } else if (change.type === 'modified') {
                                    const index = misPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    
                                    // Si el pedido ya fue tomado por otro mensajero
                                    if (data.mensajeroId && data.mensajeroId !== mensajeroUid) {
                                        if (index !== -1) {
                                            misPedidos.splice(index, 1);
                                            // Detener notificación
                                            if (pedidosNotificando[pedidoId]) {
                                                sonidoEyMoto.detenerNotificacion();
                                                delete pedidosNotificando[pedidoId];
                                            }
                                            renderizarPedidos();
                                        }
                                        return;
                                    }
                                    
                                    // Si es para mí o sigue disponible
                                    if (esParaMi || estaDisponible) {
                                        if (index !== -1) {
                                            misPedidos[index] = { id: pedidoId, tiendaId: tiendaId, ...data };
                                        } else {
                                            misPedidos.push({ id: pedidoId, tiendaId: tiendaId, ...data, _nuevo: true });
                                        }
                                        
                                        // Si está disponible y no está sonando, iniciar notificación
                                        if (estaDisponible && !pedidosNotificando[pedidoId]) {
                                            pedidosNotificando[pedidoId] = true;
                                            sonidoEyMoto.notificacionContinua(pedidoId);
                                            toast('🔔 Pedido disponible - ¡Tómalo YA!', 'new', 3000);
                                        }
                                        
                                        // Si ya fue tomado por mí, detener notificación
                                        if (esParaMi && pedidosNotificando[pedidoId]) {
                                            sonidoEyMoto.detenerNotificacion();
                                            delete pedidosNotificando[pedidoId];
                                            toast('✅ Pedido tomado por ti', 'success', 3000);
                                        }
                                        
                                        renderizarPedidos();
                                    }
                                } else if (change.type === 'removed') {
                                    const index = misPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    if (index !== -1) {
                                        misPedidos.splice(index, 1);
                                        if (pedidosNotificando[pedidoId]) {
                                            sonidoEyMoto.detenerNotificacion();
                                            delete pedidosNotificando[pedidoId];
                                        }
                                        renderizarPedidos();
                                    }
                                }
                            });
                        }, err => {
                            console.warn(`⚠️ Error en listener de tienda ${tiendaId}:`, err.message);
                            if (listenerActivo) {
                                clearTimeout(timeoutReconexion);
                                timeoutReconexion = setTimeout(() => {
                                    console.log('🔄 Reintentando conexión...');
                                    document.getElementById('estadoConexion').textContent = '🔄 Reconectando...';
                                    document.getElementById('estadoConexion').style.color = 'var(--orange)';
                                    escucharPedidos();
                                }, 5000);
                            }
                        });
                    
                    if (!window._listeners) window._listeners = [];
                    window._listeners.push(unsubscribe);
                });
                
                pedidosListener = () => {
                    listenerActivo = false;
                    if (window._listeners) {
                        window._listeners.forEach(unsub => { try { unsub(); } catch(e) {} });
                        window._listeners = [];
                    }
                };
            })
            .catch(err => {
                console.error('❌ Error obteniendo tiendas:', err);
                document.getElementById('estadoConexion').textContent = '🔴 Error de conexión';
                document.getElementById('estadoConexion').style.color = 'var(--red)';
                
                clearTimeout(timeoutReconexion);
                timeoutReconexion = setTimeout(() => {
                    if (listenerActivo) {
                        console.log('🔄 Reintentando conexión a Firestore...');
                        document.getElementById('estadoConexion').textContent = '🔄 Reconectando...';
                        document.getElementById('estadoConexion').style.color = 'var(--orange)';
                        escucharPedidos();
                    }
                }, 5000);
            });
    }

    // ============================================================
    // RENDERIZAR PEDIDOS
    // ============================================================
    function renderizarPedidos() {
        const container = document.getElementById('listaPedidos');
        
        const disponibles = misPedidos.filter(p => 
            p.estado === 'Listo para asignar' && !p.mensajeroId
        );
        const misPedidosAsignados = misPedidos.filter(p => 
            p.mensajeroId === mensajeroUid && p.estado !== 'Entregado'
        );
        
        if (disponibles.length === 0 && misPedidosAsignados.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <span class="icono">✅</span>
                    <p>No hay pedidos disponibles</p>
                    <span style="font-size:12px;color:var(--text-muted);">Esperando nuevos pedidos...</span>
                </div>
            `;
            return;
        }
        
        let html = '';
        
        if (disponibles.length > 0) {
            html += `<h3 style="color:var(--yellow);margin:12px 0 8px 0;font-size:14px;animation:parpadeo 1s ease-in-out infinite;">🔔 Pedidos disponibles (${disponibles.length})</h3>`;
            disponibles.forEach(p => {
                html += renderizarPedidoCard(p, true);
            });
        }
        
        if (misPedidosAsignados.length > 0) {
            html += `<h3 style="color:var(--blue);margin:16px 0 8px 0;font-size:14px;">🛵 Mis pedidos (${misPedidosAsignados.length})</h3>`;
            misPedidosAsignados.forEach(p => {
                html += renderizarPedidoCard(p, false);
            });
        }
        
        container.innerHTML = html;
    }

    function renderizarPedidoCard(pedido, disponible) {
        const tienda = tiendasCache[pedido.tiendaId] || {};
        const nombreTienda = tienda.nombre || 'Tienda';
        const cliente = pedido.cliente || {};
        const total = pedido.total || 0;
        const fechaStr = formatearFecha(pedido.fecha);
        const esNuevo = pedido._nuevo === true;
        
        let itemsHtml = '';
        if (pedido.items && pedido.items.length > 0) {
            pedido.items.slice(0, 3).forEach(item => {
                const nombre = item.nombre || 'Producto';
                const subtotal = item.total || (item.precio * item.cantidad) || 0;
                itemsHtml += `<div class="item"><span>${nombre} x${item.cantidad || 1}</span><span>$${subtotal.toLocaleString('es-CO')}</span></div>`;
            });
            if (pedido.items.length > 3) {
                itemsHtml += `<div class="item" style="color:var(--text-muted);font-style:italic;">+ ${pedido.items.length - 3} más...</div>`;
            }
        }
        
        const claseNuevo = esNuevo ? 'nuevo' : '';
        const estadoBadge = disponible ? 
            '<span class="badge disponible">🔔 DISPONIBLE</span>' : 
            `<span class="badge asignado">🛵 ${pedido.estado || 'Asignado'}</span>`;
        
        return `
            <div class="pedido-card ${claseNuevo}" id="pedido-${pedido.id}">
                <div class="header">
                    <span class="numero">🛵 ${pedido.numeroPedido || '#' + pedido.id.slice(-6)}</span>
                    ${estadoBadge}
                </div>
                <div class="info-grid">
                    <div><span class="label">🏪 Tienda:</span> <span class="value">${nombreTienda}</span></div>
                    <div><span class="label">📅 Fecha:</span> <span class="value">${fechaStr}</span></div>
                    <div><span class="label">👤 Cliente:</span> <span class="value">${cliente.nombre || 'Desconocido'}</span></div>
                    <div><span class="label">📍 Dirección:</span> <span class="value">${cliente.direccion || 'N/A'}</span></div>
                    <div><span class="label">📱 Teléfono:</span> <span class="value">${cliente.telefono || 'N/A'}</span></div>
                    <div><span class="label">💳 Pago:</span> <span class="value">${pedido.metodoPago || 'Efectivo'}</span></div>
                </div>
                ${itemsHtml ? `<div class="items">${itemsHtml}</div>` : ''}
                <div class="total">💰 Total: $${total.toLocaleString('es-CO')}</div>
                ${disponible ? `
                    <div class="acciones">
                        <button class="btn-success" onclick="tomarPedido('${pedido.id}','${pedido.tiendaId}')">
                            ✅ TOMAR PEDIDO AHORA
                        </button>
                    </div>
                ` : `
                    <div style="margin-top:8px;font-size:12px;color:var(--text-muted);text-align:center;">
                        🕐 Estado: ${pedido.estado || 'En proceso'}
                    </div>
                `}
            </div>
        `;
    }

    // ============================================================
    // TOMAR PEDIDO
    // ============================================================
    async function tomarPedido(pedidoId, tiendaId) {
        if (!mensajeroUid) {
            toast('⚠️ No has iniciado sesión', 'error');
            return;
        }
        
        try {
            const docRef = db.collection('tiendas').doc(tiendaId).collection('pedidos').doc(pedidoId);
            const doc = await docRef.get();
            
            if (!doc.exists) {
                toast('⚠️ El pedido ya no existe', 'warn');
                return;
            }
            
            const data = doc.data();
            if (data.mensajeroId) {
                toast('⚠️ Este pedido ya fue tomado por otro mensajero', 'warn');
                const index = misPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                if (index !== -1) {
                    misPedidos.splice(index, 1);
                    if (pedidosNotificando[pedidoId]) {
                        sonidoEyMoto.detenerNotificacion();
                        delete pedidosNotificando[pedidoId];
                    }
                    renderizarPedidos();
                }
                return;
            }
            
            toast('⏳ Tomando pedido...', 'info');
            
            await docRef.update({
                mensajeroId: mensajeroUid,
                nombreMensajero: mensajeroData?.nombre || 'Mensajero',
                estado: 'En camino al restaurante',
                fechaAsignacion: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // Detener notificación continua
            if (pedidosNotificando[pedidoId]) {
                sonidoEyMoto.detenerNotificacion();
                delete pedidosNotificando[pedidoId];
            }
            
            // Sonido de confirmación
            sonidoEyMoto.chiflido(0.3, 2000);
            toast('✅ Pedido tomado exitosamente', 'success', 3000);
            
        } catch (e) {
            console.error('Error tomando pedido:', e);
            if (e.code === 'not-found' || e.message.includes('no such document')) {
                toast('⚠️ El pedido ya no existe', 'warn');
            } else {
                toast('❌ Error: ' + e.message, 'error');
            }
        }
    }

    // ============================================================
    // FUNCIONES DE UTILIDAD
    // ============================================================
    function formatearFecha(fecha) {
        if (!fecha) return '--/--/--';
        try {
            let d;
            if (fecha.toDate) d = fecha.toDate();
            else if (fecha.seconds) d = new Date(fecha.seconds * 1000);
            else d = new Date(fecha);
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
                   ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return '--/--/--'; }
    }

    function toast(msg, type = 'info', dur = 4000) {
        const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️', new: '🛵' };
        const wrap = document.getElementById('toastWrap');
        const el = document.createElement('div');
        el.className = `toast t-${type}`;
        el.innerHTML = `<span>${icons[type] || '🔔'}</span><span>${msg}</span>`;
        wrap.appendChild(el);
        setTimeout(() => { el.classList.add('toast-fade'); setTimeout(() => el.remove(), 350); }, dur);
        return el;
    }

    // ============================================================
    // EXPONER FUNCIONES
    // ============================================================
    window.iniciarSesion = iniciarSesion;
    window.cerrarSesion = cerrarSesion;
    window.tomarPedido = tomarPedido;
    window.toast = toast;

    console.log('✅ Panel de mensajero cargado correctamente');
    console.log('🏍️ Sonido EyMoto integrado - Notificaciones continuas');
    console.log('📢 Escuchando pedidos disponibles en tiempo real');
</script>
</body>
