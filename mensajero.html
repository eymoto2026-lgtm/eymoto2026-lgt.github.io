<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Mensajero - EyMoto</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛵</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }
        :root {
            --yellow: #FFD600;
            --yellow-dim: #e6c200;
            --green: #00C853;
            --green-bg: rgba(0,200,83,0.12);
            --blue: #00B0FF;
            --blue-bg: rgba(0,176,255,0.12);
            --red: #FF3D00;
            --red-bg: rgba(255,61,0,0.12);
            --orange: #FF6900;
            --orange-bg: rgba(255,105,0,0.12);
            --purple: #9B59B6;
            --purple-bg: rgba(155,89,182,0.12);
            --surface: #141414;
            --surface2: #1e1e1e;
            --surface3: #252525;
            --border: #2e2e2e;
            --border2: #3a3a3a;
            --text-muted: #888;
            --radius: 10px;
        }
        button {
            background: var(--yellow);
            color: #1a1a2e;
            font-weight: 700;
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background .15s, transform .1s;
            font-size: 14px;
            width: 100%;
        }
        button:hover { background: var(--yellow-dim); }
        button:active { transform: scale(.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { background: #00b748; }
        .btn-info { background: var(--blue); color: #fff; }
        .btn-info:hover { background: #0277bd; }
        .btn-warning { background: var(--orange); color: #fff; }
        .btn-warning:hover { background: #e65c00; }
        .btn-purple { background: var(--purple); color: #fff; }
        .btn-purple:hover { background: #7d3c98; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-ghost:hover { background: var(--surface3); }
        .hidden { display: none !important; }

        header {
            background: #0d0d0d;
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header .brand {
            background: var(--yellow);
            color: #1a1a2e;
            font-weight: 900;
            font-size: 14px;
            padding: 5px 14px;
            border-radius: 20px;
        }
        header h1 { font-size: 15px; font-weight: 600; }
        header .spacer { flex: 1; }
        header .estado {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            background: var(--green-bg);
            color: var(--green);
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        header .estado:hover {
            transform: scale(1.05);
        }
        header .estado.desconectado {
            background: var(--red-bg);
            color: var(--red);
        }

        .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }

        #loginBox {
            max-width: 400px;
            margin: 60px auto;
            padding: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        #loginBox .brand {
            display: inline-block;
            background: var(--yellow);
            color: #1a1a2e;
            font-size: 26px;
            font-weight: 900;
            padding: 10px 24px;
            border-radius: 30px;
        }
        #loginBox h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        #loginBox .sub { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        #loginMsg { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 20px; }
        .login-logo { text-align: center; margin-bottom: 28px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--surface3);
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus { border-color: var(--yellow); }

        .pedido-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--yellow);
            transition: all 0.3s;
        }
        .pedido-card .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .pedido-card .header .numero {
            font-size: 16px;
            font-weight: 800;
            color: var(--yellow);
        }
        .pedido-card .header .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-estado {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-estado.pendiente { background: var(--yellow); color: #1a1a2e; }
        .badge-estado.camino { background: var(--blue); color: #fff; }
        .badge-estado.recogido { background: var(--purple); color: #fff; }
        .badge-estado.entregado { background: var(--green); color: #fff; }
        .badge-estado.cancelado { background: var(--red); color: #fff; }
        
        .pedido-card .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            font-size: 13px;
            margin: 6px 0;
        }
        .pedido-card .info-grid .label { color: var(--text-muted); }
        .pedido-card .info-grid .value { color: #fff; font-weight: 500; }
        .pedido-card .total {
            text-align: right;
            font-size: 16px;
            font-weight: 800;
            color: var(--green);
            margin-top: 6px;
        }
        .pedido-card .items {
            background: var(--surface2);
            border-radius: 8px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 12px;
        }
        .pedido-card .items .item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid var(--border);
        }
        .pedido-card .items .item:last-child { border-bottom: none; }
        
        .estados-acciones {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .estados-acciones button {
            flex: 1;
            min-width: 100px;
            padding: 10px 12px;
            font-size: 12px;
            border-radius: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state .icono { font-size: 48px; display: block; margin-bottom: 12px; }

        /* Modal de confirmación */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .modal-box h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .modal-box p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .modal-box .acciones {
            display: flex;
            gap: 10px;
        }
        .modal-box .acciones button {
            flex: 1;
        }

        #toastWrap {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: #1e1e1e;
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,.5);
            animation: toastIn .3s ease;
            pointer-events: auto;
            max-width: 380px;
            cursor: pointer;
        }
        .toast.t-success { border-left: 3px solid var(--green); }
        .toast.t-error { border-left: 3px solid var(--red); }
        .toast.t-info { border-left: 3px solid var(--blue); }
        .toast.t-warn { border-left: 3px solid var(--yellow); }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast-fade { animation: toastOut .3s ease forwards; }
        @keyframes toastOut {
            to { opacity: 0; transform: translateX(20px); }
        }

        @media (max-width: 600px) {
            .pedido-card .info-grid { grid-template-columns: 1fr; }
            .estados-acciones button { min-width: 80px; font-size: 10px; padding: 8px; }
        }
    </style>
</head>
<body>

<!-- Modal de confirmación -->
<div class="modal-overlay" id="modalConfirmacion">
    <div class="modal-box">
        <h3 id="modalTitulo">⚠️ Cambiar estado</h3>
        <p id="modalMensaje">¿Estás seguro de que quieres cambiar tu estado?</p>
        <div class="acciones">
            <button class="btn-ghost" onclick="cerrarModalConfirmacion()">Cancelar</button>
            <button id="btnConfirmarAccion" class="btn-danger">Confirmar</button>
        </div>
    </div>
</div>

<div id="toastWrap"></div>

<div id="loginBox">
    <div class="login-logo"><span class="brand">EyMoto</span></div>
    <h2>Panel Mensajero</h2>
    <p class="sub">Recibe y gestiona tus pedidos</p>
    <div class="form-group"><label>Correo</label><input type="email" id="email" placeholder="tu@email.com"></div>
    <div class="form-group"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')iniciarSesion()"></div>
    <button onclick="iniciarSesion()">Ingresar</button>
    <p id="loginMsg"></p>
</div>

<div id="panel" class="hidden">
    <header>
        <span class="brand">EyMoto</span>
        <h1>Mis Pedidos</h1>
        <span class="spacer"></span>
        <span id="mensajeroInfo" style="font-size:12px;color:var(--text-muted);"></span>
        <!-- 🔥 ESTADO CONECTADO/DESCONECTADO - CLIC PARA CAMBIAR -->
        <span class="estado" id="estadoConexion" onclick="toggleEstadoConexion()">
            🟢 Conectado
        </span>
        <button class="btn-ghost btn-sm" onclick="cerrarSesion()" style="width:auto;padding:8px 16px;">Salir</button>
    </header>

    <div class="wrap">
        <div id="listaPedidos">
            <div class="empty-state">
                <span class="icono">🛵</span>
                <p>Cargando pedidos disponibles...</p>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    // ============================================================
    // CONFIGURACIÓN FIREBASE
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyA_foZDTRxKYHRDhvYMjtPr5zBdi2LbmgY",
        authDomain: "eymotocomidas.firebaseapp.com",
        projectId: "eymotocomidas",
        storageBucket: "eymotocomidas.firebasestorage.app",
        messagingSenderId: "670474251560",
        appId: "1:670474251560:web:eab1fbbb744af4e0b8341d"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ============================================================
    // 🎵 SISTEMA DE SONIDO
    // ============================================================
    class SonidoEyMoto {
        constructor() {
            // 🔥 CAMBIA ESTA URL POR TU SONIDO
            this.audioUrl = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
            this.audio = new Audio();
            this.cargado = false;
            this.reproduciendo = false;
            this.intervalo = null;
            this.pedidoActual = null;
            this.cargarSonido();
        }

        cargarSonido() {
            try {
                this.audio = new Audio(this.audioUrl);
                this.audio.preload = 'auto';
                this.audio.addEventListener('canplaythrough', () => {
                    this.cargado = true;
                    console.log('✅ Sonido cargado correctamente');
                });
                this.audio.load();
            } catch (e) {
                console.warn('⚠️ Error cargando sonido:', e.message);
                this.cargado = false;
            }
        }

        reproducir() {
            try {
                if (!this.cargado) this.cargarSonido();
                const audioClone = new Audio(this.audioUrl);
                audioClone.volume = 0.8;
                audioClone.play().catch(e => {
                    console.debug('⚠️ Error reproduciendo audio:', e.message);
                    this.fallbackBeep();
                });
                this.reproduciendo = true;
            } catch (e) {
                this.fallbackBeep();
            }
        }

        notificacionContinua(pedidoId) {
            this.pedidoActual = pedidoId;
            this.reproduciendo = true;
            this.reproducir();
            if (this.intervalo) clearInterval(this.intervalo);
            this.intervalo = setInterval(() => {
                if (this.reproduciendo && this.pedidoActual === pedidoId) {
                    this.reproducir();
                } else {
                    this.detener();
                }
            }, 5000);
        }

        detener() {
            this.reproduciendo = false;
            this.pedidoActual = null;
            if (this.intervalo) {
                clearInterval(this.intervalo);
                this.intervalo = null;
            }
        }

        fallbackBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                [800, 1000, 1200].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = 'sine';
                    const t = i * 0.15;
                    gain.gain.setValueAtTime(0.15, ctx.currentTime + t);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
                    osc.start(ctx.currentTime + t);
                    osc.stop(ctx.currentTime + t + 0.2);
                });
            } catch (e) {}
        }
    }

    // ============================================================
    // INSTANCIA DEL SONIDO
    // ============================================================
    const sonidoEyMoto = new SonidoEyMoto();

    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    let mensajeroUid = null;
    let mensajeroData = null;
    let pedidosListener = null;
    let tiendasCache = {};
    let misPedidos = [];
    let listenerActivo = false;
    let timeoutReconexion = null;
    let pedidosNotificando = {};
    let mensajeroConectado = true;
    let accionPendiente = null;

    // ============================================================
    // FUNCIONES DE AUTENTICACIÓN
    // ============================================================
    function iniciarSesion() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('loginMsg');
        msg.textContent = '';
        
        if (!email || !pass) {
            msg.textContent = '❌ Completa todos los campos.';
            return;
        }
        
        auth.signInWithEmailAndPassword(email, pass)
            .then(async (userCredential) => {
                const user = userCredential.user;
                const doc = await db.collection('usuarios').doc(user.uid).get();
                
                if (!doc.exists) {
                    await auth.signOut();
                    msg.textContent = '⛔ Usuario no registrado como mensajero.';
                    return;
                }
                
                const data = doc.data();
                if (data.mensajero !== true) {
                    await auth.signOut();
                    msg.textContent = '⛔ No tienes permisos de mensajero.';
                    return;
                }
                
                mensajeroUid = user.uid;
                mensajeroData = data;
                mensajeroConectado = data.conectado !== false;
                
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
                document.getElementById('mensajeroInfo').textContent = '👤 ' + (data.nombre || email);
                
                actualizarIndicadorConexion();
                
                await db.collection('usuarios').doc(user.uid).update({
                    conectado: mensajeroConectado,
                    ultimaConexion: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                await inicializarPanel();
            })
            .catch(e => {
                console.error('Error de login:', e);
                msg.textContent = '❌ Credenciales incorrectas.';
            });
    }

    function cerrarSesion() {
        sonidoEyMoto.detener();
        pedidosNotificando = {};
        
        if (mensajeroUid) {
            db.collection('usuarios').doc(mensajeroUid).update({
                conectado: false,
                ultimaDesconexion: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(() => {});
        }
        
        if (pedidosListener) {
            try { pedidosListener(); } catch(e) {}
            pedidosListener = null;
        }
        listenerActivo = false;
        
        if (timeoutReconexion) {
            clearTimeout(timeoutReconexion);
            timeoutReconexion = null;
        }
        
        auth.signOut();
        document.getElementById('loginBox').classList.remove('hidden');
        document.getElementById('panel').classList.add('hidden');
        toast('👋 Sesión cerrada', 'info');
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            mensajeroUid = user.uid;
            inicializarPanel();
        } else {
            document.getElementById('loginBox').classList.remove('hidden');
            document.getElementById('panel').classList.add('hidden');
            if (pedidosListener) {
                try { pedidosListener(); } catch(e) {}
                pedidosListener = null;
            }
            listenerActivo = false;
            sonidoEyMoto.detener();
        }
    });

    // ============================================================
    // 🔥 TOGGLE CONECTADO/DESCONECTADO
    // ============================================================
    function toggleEstadoConexion() {
        if (!mensajeroUid) return;
        
        const nuevoEstado = !mensajeroConectado;
        const estadoTexto = nuevoEstado ? 'conectar' : 'desconectar';
        
        // Mostrar modal de confirmación
        mostrarModalConfirmacion(
            nuevoEstado ? '🟢 Conectar' : '🔴 Desconectar',
            nuevoEstado ? '¿Quieres conectarte y recibir pedidos?' : '¿Quieres desconectarte y no recibir más pedidos?',
            () => {
                ejecutarCambioConexion(nuevoEstado);
            }
        );
    }

    function ejecutarCambioConexion(nuevoEstado) {
        mensajeroConectado = nuevoEstado;
        
        // Actualizar en Firebase
        db.collection('usuarios').doc(mensajeroUid).update({
            conectado: nuevoEstado,
            [`${nuevoEstado ? 'conectado' : 'desconectado'}En`]: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            actualizarIndicadorConexion();
            
            if (nuevoEstado) {
                toast('🟢 Te has conectado. Recibirás pedidos.', 'success', 3000);
                // Reiniciar escucha de pedidos
                if (!listenerActivo) {
                    escucharPedidos();
                }
            } else {
                toast('🔴 Te has desconectado. No recibirás pedidos.', 'warn', 3000);
                // Detener sonidos y limpiar
                sonidoEyMoto.detener();
                pedidosNotificando = {};
                // Detener listener
                if (pedidosListener) {
                    try { pedidosListener(); } catch(e) {}
                    pedidosListener = null;
                }
                listenerActivo = false;
                // Mostrar mensaje de desconectado
                document.getElementById('listaPedidos').innerHTML = `
                    <div class="empty-state">
                        <span class="icono">🔴</span>
                        <p>Estás desconectado</p>
                        <span style="font-size:12px;color:var(--text-muted);">Haz clic en "🔴 Desconectado" para conectarte y recibir pedidos</span>
                    </div>
                `;
            }
        }).catch(e => {
            console.error('Error actualizando estado:', e);
            toast('❌ Error al cambiar estado', 'error');
            // Revertir
            mensajeroConectado = !nuevoEstado;
            actualizarIndicadorConexion();
        });
    }

    function actualizarIndicadorConexion() {
        const estadoEl = document.getElementById('estadoConexion');
        if (mensajeroConectado) {
            estadoEl.textContent = '🟢 Conectado';
            estadoEl.className = 'estado';
            estadoEl.title = 'Haz clic para desconectarte';
        } else {
            estadoEl.textContent = '🔴 Desconectado';
            estadoEl.className = 'estado desconectado';
            estadoEl.title = 'Haz clic para conectarte';
        }
    }

    // ============================================================
    // MODAL DE CONFIRMACIÓN
    // ============================================================
    function mostrarModalConfirmacion(titulo, mensaje, onConfirm) {
        document.getElementById('modalTitulo').textContent = titulo;
        document.getElementById('modalMensaje').textContent = mensaje;
        document.getElementById('modalConfirmacion').classList.add('active');
        
        // Guardar la acción a confirmar
        accionPendiente = onConfirm;
        
        // Configurar botón de confirmar
        const btnConfirmar = document.getElementById('btnConfirmarAccion');
        btnConfirmar.onclick = function() {
            if (accionPendiente) {
                accionPendiente();
                accionPendiente = null;
            }
            cerrarModalConfirmacion();
        };
    }

    function cerrarModalConfirmacion() {
        document.getElementById('modalConfirmacion').classList.remove('active');
        accionPendiente = null;
    }

    // ============================================================
    // INICIALIZAR PANEL
    // ============================================================
    async function inicializarPanel() {
        try {
            // Cargar datos del usuario
            const doc = await db.collection('usuarios').doc(mensajeroUid).get();
            if (doc.exists) {
                const data = doc.data();
                mensajeroConectado = data.conectado !== false;
                actualizarIndicadorConexion();
            }
            
            await cargarTiendas();
            
            // Solo escuchar pedidos si está conectado
            if (mensajeroConectado) {
                await escucharPedidos();
            } else {
                document.getElementById('listaPedidos').innerHTML = `
                    <div class="empty-state">
                        <span class="icono">🔴</span>
                        <p>Estás desconectado</p>
                        <span style="font-size:12px;color:var(--text-muted);">Haz clic en "🔴 Desconectado" para conectarte y recibir pedidos</span>
                    </div>
                `;
            }
            
            toast('✅ Panel de mensajero cargado correctamente', 'success', 2000);
            console.log('✅ Panel de mensajero cargado correctamente');
        } catch (error) {
            console.error('❌ Error al inicializar panel:', error);
            toast('❌ Error al cargar el panel', 'error');
            setTimeout(inicializarPanel, 5000);
        }
    }

    async function cargarTiendas() {
        try {
            const snap = await db.collection('tiendas').get();
            snap.forEach(doc => {
                tiendasCache[doc.id] = doc.data();
            });
            console.log('🏪 Tiendas cargadas:', Object.keys(tiendasCache).length);
        } catch (e) {
            console.error('Error cargando tiendas:', e);
        }
    }

    // ============================================================
    // ESCUCHAR PEDIDOS (SOLO SI ESTÁ CONECTADO)
    // ============================================================
    function escucharPedidos() {
        // Si no está conectado, no escuchar
        if (!mensajeroConectado) {
            console.log('📢 Mensajero desconectado, no se escuchan pedidos');
            return;
        }
        
        if (pedidosListener) {
            try { pedidosListener(); } catch(e) {}
            pedidosListener = null;
        }
        
        if (!mensajeroUid) {
            console.warn('⚠️ No hay mensajero UID para escuchar pedidos');
            return;
        }
        
        listenerActivo = true;
        document.getElementById('estadoConexion').textContent = '🟢 Conectado';
        document.getElementById('estadoConexion').className = 'estado';
        
        db.collection('tiendas').get()
            .then(snap => {
                const tiendas = snap.docs.map(doc => doc.id);
                console.log(`📢 Escuchando ${tiendas.length} tiendas para pedidos`);
                
                tiendas.forEach(tiendaId => {
                    const unsubscribe = db.collection('tiendas')
                        .doc(tiendaId)
                        .collection('pedidos')
                        .where('estado', 'in', ['Listo para asignar', 'En camino al restaurante', 'Recogiendo pedido', 'En camino', 'Entregado', 'Cancelado'])
                        .onSnapshot(snapshot => {
                            if (!listenerActivo || !mensajeroConectado) return;
                            
                            snapshot.docChanges().forEach(change => {
                                const data = change.doc.data();
                                const pedidoId = change.doc.id;
                                
                                const esParaMi = data.mensajeroId === mensajeroUid;
                                const estaDisponible = !data.mensajeroId && data.estado === 'Listo para asignar';
                                
                                if (!esParaMi && !estaDisponible) {
                                    const index = misPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    if (index !== -1) {
                                        misPedidos.splice(index, 1);
                                        if (pedidosNotificando[pedidoId]) {
                                            sonidoEyMoto.detener();
                                            delete pedidosNotificando[pedidoId];
                                        }
                                        renderizarPedidos();
                                    }
                                    return;
                                }
                                
                                if (change.type === 'added') {
                                    const existe = misPedidos.some(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    if (!existe) {
                                        const pedido = {
                                            id: pedidoId,
                                            tiendaId: tiendaId,
                                            ...data
                                        };
                                        misPedidos.push(pedido);
                                        
                                        if (estaDisponible && !pedidosNotificando[pedidoId]) {
                                            pedidosNotificando[pedidoId] = true;
                                            sonidoEyMoto.notificacionContinua(pedidoId);
                                            const tienda = tiendasCache[tiendaId] || {};
                                            toast(`🛵 Nuevo pedido de ${tienda.nombre || 'Tienda'}`, 'success', 5000);
                                        }
                                        
                                        renderizarPedidos();
                                    }
                                } else if (change.type === 'modified') {
                                    const index = misPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    
                                    if (data.mensajeroId && data.mensajeroId !== mensajeroUid) {
                                        if (index !== -1) {
                                            misPedidos.splice(index, 1);
                                            if (pedidosNotificando[pedidoId]) {
                                                sonidoEyMoto.detener();
                                                delete pedidosNotificando[pedidoId];
                                            }
                                            renderizarPedidos();
                                        }
                                        return;
                                    }
                                    
                                    if (esParaMi || estaDisponible) {
                                        if (index !== -1) {
                                            misPedidos[index] = { id: pedidoId, tiendaId: tiendaId, ...data };
                                        } else {
                                            misPedidos.push({ id: pedidoId, tiendaId: tiendaId, ...data });
                                        }
                                        
                                        if (estaDisponible && !pedidosNotificando[pedidoId]) {
                                            pedidosNotificando[pedidoId] = true;
                                            sonidoEyMoto.notificacionContinua(pedidoId);
                                            toast('🔔 Pedido disponible - ¡Tómalo!', 'info', 3000);
                                        }
                                        
                                        if ((esParaMi || data.estado === 'Entregado' || data.estado === 'Cancelado') && pedidosNotificando[pedidoId]) {
                                            sonidoEyMoto.detener();
                                            delete pedidosNotificando[pedidoId];
                                        }
                                        
                                        renderizarPedidos();
                                    }
                                } else if (change.type === 'removed') {
                                    const index = misPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                                    if (index !== -1) {
                                        misPedidos.splice(index, 1);
                                        if (pedidosNotificando[pedidoId]) {
                                            sonidoEyMoto.detener();
                                            delete pedidosNotificando[pedidoId];
                                        }
                                        renderizarPedidos();
                                    }
                                }
                            });
                        }, err => {
                            console.warn(`⚠️ Error en listener:`, err.message);
                            if (listenerActivo && mensajeroConectado) {
                                clearTimeout(timeoutReconexion);
                                timeoutReconexion = setTimeout(() => {
                                    console.log('🔄 Reintentando conexión...');
                                    escucharPedidos();
                                }, 5000);
                            }
                        });
                    
                    if (!window._listeners) window._listeners = [];
                    window._listeners.push(unsubscribe);
                });
                
                pedidosListener = () => {
                    listenerActivo = false;
                    if (window._listeners) {
                        window._listeners.forEach(unsub => { try { unsub(); } catch(e) {} });
                        window._listeners = [];
                    }
                };
            })
            .catch(err => {
                console.error('❌ Error obteniendo tiendas:', err);
                if (listenerActivo && mensajeroConectado) {
                    clearTimeout(timeoutReconexion);
                    timeoutReconexion = setTimeout(() => {
                        console.log('🔄 Reintentando conexión...');
                        escucharPedidos();
                    }, 5000);
                }
            });
    }

    // ============================================================
    // RENDERIZAR PEDIDOS
    // ============================================================
    function renderizarPedidos() {
        const container = document.getElementById('listaPedidos');
        
        // Si está desconectado, mostrar mensaje
        if (!mensajeroConectado) {
            container.innerHTML = `
                <div class="empty-state">
                    <span class="icono">🔴</span>
                    <p>Estás desconectado</p>
                    <span style="font-size:12px;color:var(--text-muted);">Haz clic en "🔴 Desconectado" para conectarte y recibir pedidos</span>
                </div>
            `;
            return;
        }
        
        const misPedidosActivos = misPedidos.filter(p => 
            p.mensajeroId === mensajeroUid && 
            p.estado !== 'Entregado' && 
            p.estado !== 'Cancelado'
        );
        
        if (misPedidosActivos.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <span class="icono">✅</span>
                    <p>No tienes pedidos activos</p>
                    <span style="font-size:12px;color:var(--text-muted);">Esperando nuevos pedidos...</span>
                </div>
            `;
            return;
        }
        
        let html = '';
        misPedidosActivos.forEach(p => {
            html += renderizarPedidoCard(p);
        });
        
        container.innerHTML = html;
    }

    // ============================================================
    // RENDERIZAR CARD CON BOTONES SEGÚN ESTADO
    // ============================================================
    function renderizarPedidoCard(pedido) {
        const tienda = tiendasCache[pedido.tiendaId] || {};
        const nombreTienda = tienda.nombre || 'Tienda';
        const cliente = pedido.cliente || {};
        const total = pedido.total || 0;
        const fechaStr = formatearFecha(pedido.fecha);
        const estado = pedido.estado || 'Pendiente';
        
        let estadoColor = '';
        let estadoLabel = estado;
        switch(estado) {
            case 'Listo para asignar': estadoColor = 'pendiente'; estadoLabel = '🔔 Pendiente'; break;
            case 'En camino al restaurante': estadoColor = 'camino'; estadoLabel = '🛵 En camino'; break;
            case 'Recogiendo pedido': estadoColor = 'recogido'; estadoLabel = '📦 Recogiendo'; break;
            case 'En camino': estadoColor = 'camino'; estadoLabel = '🚗 En camino'; break;
            case 'Entregado': estadoColor = 'entregado'; estadoLabel = '✅ Entregado'; break;
            case 'Cancelado': estadoColor = 'cancelado'; estadoLabel = '❌ Cancelado'; break;
            default: estadoColor = 'pendiente'; estadoLabel = '📋 ' + estado;
        }
        
        let itemsHtml = '';
        if (pedido.items && pedido.items.length > 0) {
            pedido.items.forEach(item => {
                const nombre = item.nombre || 'Producto';
                const subtotal = item.total || (item.precio * item.cantidad) || 0;
                itemsHtml += `<div class="item"><span>${nombre} x${item.cantidad || 1}</span><span>$${subtotal.toLocaleString('es-CO')}</span></div>`;
            });
        }
        
        let botonesHtml = '';
        
        if (estado !== 'Entregado' && estado !== 'Cancelado') {
            switch(estado) {
                case 'Listo para asignar':
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-success" onclick="tomarPedido('${pedido.id}','${pedido.tiendaId}')">
                                ✅ TOMAR PEDIDO
                            </button>
                        </div>
                    `;
                    break;
                    
                case 'En camino al restaurante':
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-purple" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Recogiendo pedido')">
                                📦 RECOGER PEDIDO
                            </button>
                            <button class="btn-danger" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Cancelado')">
                                ❌ Cancelar
                            </button>
                        </div>
                    `;
                    break;
                    
                case 'Recogiendo pedido':
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-warning" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','En camino')">
                                🚗 IR A ENTREGAR
                            </button>
                            <button class="btn-danger" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Cancelado')">
                                ❌ Cancelar
                            </button>
                        </div>
                    `;
                    break;
                    
                case 'En camino':
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-success" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Entregado')">
                                ✅ ENTREGAR PEDIDO
                            </button>
                            <button class="btn-danger" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Cancelado')">
                                ❌ Cancelar
                            </button>
                        </div>
                    `;
                    break;
                    
                default:
                    botonesHtml = `
                        <div class="estados-acciones">
                            <button class="btn-info" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','En camino al restaurante')">
                                🛵 En camino
                            </button>
                            <button class="btn-purple" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Recogiendo pedido')">
                                📦 Recogiendo
                            </button>
                            <button class="btn-success" onclick="cambiarEstado('${pedido.id}','${pedido.tiendaId}','Entregado')">
                                ✅ Entregar
                            </button>
                        </div>
                    `;
            }
        } else {
            botonesHtml = `
                <div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px;text-align:center;color:var(--text-muted);font-size:13px;">
                    ✅ Pedido ${estado === 'Entregado' ? 'entregado' : 'cancelado'} - Proceso finalizado
                </div>
            `;
        }
        
        return `
            <div class="pedido-card" id="pedido-${pedido.id}">
                <div class="header">
                    <span class="numero">🛵 #${pedido.numeroPedido || pedido.id.slice(-6).toUpperCase()}</span>
                    <span class="badge badge-estado ${estadoColor}">${estadoLabel}</span>
                </div>
                <div class="info-grid">
                    <div><span class="label">🏪 Tienda:</span> <span class="value">${nombreTienda}</span></div>
                    <div><span class="label">📅 Fecha:</span> <span class="value">${fechaStr}</span></div>
                    <div><span class="label">👤 Cliente:</span> <span class="value">${cliente.nombre || 'Desconocido'}</span></div>
                    <div><span class="label">📍 Dirección:</span> <span class="value">${cliente.direccion || 'N/A'}</span></div>
                    <div><span class="label">📱 Teléfono:</span> <span class="value">${cliente.telefono || 'N/A'}</span></div>
                    <div><span class="label">💳 Pago:</span> <span class="value">${pedido.metodoPago || 'Efectivo'}</span></div>
                </div>
                ${itemsHtml ? `<div class="items">${itemsHtml}</div>` : ''}
                <div class="total">💰 Total: $${total.toLocaleString('es-CO')}</div>
                ${botonesHtml}
            </div>
        `;
    }

    // ============================================================
    // TOMAR PEDIDO
    // ============================================================
    async function tomarPedido(pedidoId, tiendaId) {
        if (!mensajeroUid) {
            toast('⚠️ No has iniciado sesión', 'error');
            return;
        }
        
        if (!mensajeroConectado) {
            toast('⚠️ Estás desconectado. Conéctate para tomar pedidos.', 'warn');
            return;
        }
        
        try {
            const docRef = db.collection('tiendas').doc(tiendaId).collection('pedidos').doc(pedidoId);
            const doc = await docRef.get();
            
            if (!doc.exists) {
                toast('⚠️ El pedido ya no existe', 'warn');
                return;
            }
            
            const data = doc.data();
            if (data.mensajeroId) {
                toast('⚠️ Este pedido ya fue tomado por otro mensajero', 'warn');
                const index = misPedidos.findIndex(p => p.id === pedidoId && p.tiendaId === tiendaId);
                if (index !== -1) {
                    misPedidos.splice(index, 1);
                    if (pedidosNotificando[pedidoId]) {
                        sonidoEyMoto.detener();
                        delete pedidosNotificando[pedidoId];
                    }
                    renderizarPedidos();
                }
                return;
            }
            
            toast('⏳ Tomando pedido...', 'info');
            
            await docRef.update({
                mensajeroId: mensajeroUid,
                nombreMensajero: mensajeroData?.nombre || 'Mensajero',
                estado: 'En camino al restaurante',
                fechaAsignacion: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            if (pedidosNotificando[pedidoId]) {
                sonidoEyMoto.detener();
                delete pedidosNotificando[pedidoId];
            }
            
            sonidoEyMoto.reproducir();
            toast('✅ Pedido tomado exitosamente', 'success', 3000);
            
        } catch (e) {
            console.error('Error tomando pedido:', e);
            toast('❌ Error: ' + e.message, 'error');
        }
    }

    // ============================================================
    // CAMBIAR ESTADO DEL PEDIDO
    // ============================================================
    async function cambiarEstado(pedidoId, tiendaId, nuevoEstado) {
        if (!mensajeroUid) {
            toast('⚠️ No has iniciado sesión', 'error');
            return;
        }
        
        if (!mensajeroConectado) {
            toast('⚠️ Estás desconectado. Conéctate para gestionar pedidos.', 'warn');
            return;
        }
        
        if (!confirm(`¿Cambiar estado a "${nuevoEstado}"?`)) return;
        
        try {
            const docRef = db.collection('tiendas').doc(tiendaId).collection('pedidos').doc(pedidoId);
            
            await docRef.update({
                estado: nuevoEstado,
                ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp(),
                [`estado_${nuevoEstado.toLowerCase().replace(/ /g, '_')}_en`]: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            sonidoEyMoto.reproducir();
            toast(`✅ Pedido actualizado a: ${nuevoEstado}`, 'success', 3000);
            
        } catch (e) {
            console.error('Error actualizando estado:', e);
            toast('❌ Error: ' + e.message, 'error');
        }
    }

    // ============================================================
    // FUNCIONES DE UTILIDAD
    // ============================================================
    function formatearFecha(fecha) {
        if (!fecha) return '--/--/--';
        try {
            let d;
            if (fecha.toDate) d = fecha.toDate();
            else if (fecha.seconds) d = new Date(fecha.seconds * 1000);
            else d = new Date(fecha);
            return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
                   ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return '--/--/--'; }
    }

    function toast(msg, type = 'info', dur = 4000) {
        const icons = { success: '✅', error: '❌', info: 'ℹ️', warn: '⚠️' };
        const wrap = document.getElementById('toastWrap');
        const el = document.createElement('div');
        el.className = `toast t-${type}`;
        el.innerHTML = `<span>${icons[type] || '🔔'}</span><span>${msg}</span>`;
        wrap.appendChild(el);
        setTimeout(() => { el.classList.add('toast-fade'); setTimeout(() => el.remove(), 350); }, dur);
        return el;
    }

    // ============================================================
    // EXPONER FUNCIONES
    // ============================================================
    window.iniciarSesion = iniciarSesion;
    window.cerrarSesion = cerrarSesion;
    window.tomarPedido = tomarPedido;
    window.cambiarEstado = cambiarEstado;
    window.toggleEstadoConexion = toggleEstadoConexion;
    window.mostrarModalConfirmacion = mostrarModalConfirmacion;
    window.cerrarModalConfirmacion = cerrarModalConfirmacion;
    window.toast = toast;

    console.log('✅ Panel de mensajero cargado correctamente');
</script>
